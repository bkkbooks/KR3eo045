body:
  text: 調疾飲食辯卷四果類谷菜皆以養生誠不可缺若夫果僅用之交際供婦人之蟄而已其輕重相較懸絕也然周官太宰以九職任萬民其二曰園圃樹草木職方氏辨五地所宜之果場人掌場圃果蓏珍異之物籩人掌籩實饋實之籩復有加籩內則楂梨棗慄瓜桃諸果皆列庶羞是養與賓祭所必需宜聖王之注意也至其品類甚繁補瀉溫涼不一為利不少為害亦多可寘焉弗講歟獨不知素問五果為助何取乎桃李杏也意者軒農之世九州猶未盡入版圖故殊方所產聖人亦未必悉知耶讀內經者師其意而勿泥其物斯為善學古人矣梅梨棗並見一卷慄綱目曰說文作象花實下垂之狀木高二三丈花作條如箸可點燈子苞生多刺如蝟毛有青黃赤三色九月苞裂子出大者為板栗中心扁者為慄楔圖經曰所在皆有袞州宣州為勝葉似橡櫟詩疏曰雖五方皆有周秦吳揚特饒濮陽范陽者甜美他方不及也衍義曰慄欲干收宜曝或風乾欲生收宜潤沙藏至夏猶新生食質硬難化極不宜人惟能活血治腰腳病古跌撲方用之綱目曰食生慄須細嚼乃有益蘇子由詩曰老去自添腰腳病山翁食慄舊傳方客來為說晨興晚三咽彼收白玉漿熟食補脾腎厚腸胃耐飢昔有患內寒暴泄如注者食煨慄二三十枚頓愈慄於五果屬水水潦之年則慄不熟故素問以為腎之果然其味甘多咸少畢竟補脾胃之力為優故能厚腸胃耐飢農書云史記載秦飢應候請發五苑棗慄賑之按慄誠佳果而生食難化困脾熟食壅氣亦不免困脾食之總不宜過多若脾虛不運飲食難化人忌生氣滯中滿人忌熟惟心懸善飢及脾腎兩虛常病滑泄乃為宜食之物其木至數十年將老勿俟其枯鋸之留本一二尺則復發新枝不數年居然大樹又可結子數十年復鋸復生故古者宗廟神主以慄木為之名慄主者取其一本相傳生生不已也樹既可久結實又多故國策蘇秦說燕王曰燕北有棗慄民雖不田作而足食史記曰燕秦千樹慄其人與千戶侯等慄楔慄荴殼內薄皮及球殼根皮悉入藥用均不甚驗方概不錄榛綱目曰爾雅翼云鄭康成注禮記榛慄棗剺言關中鄜坊甚多關中秦地故字從秦一名山慄圓而末尖者為錐慄小如指頂者為茅慄即爾雅之糯慄又名慄詩皇矣其灌其又名栭慄禮內則芝柄菱椇圖經曰桂陽有慄樹低小叢生實大如杏仁處處皆有不獨桂陽又有奧慄子亦小或云即也詩樹之慄今楚丘篇作榛慄陸疏曰榛有兩種一種枝葉球實皆如慄而子小樹亦低小一種高丈餘子如胡桃久留易油壞此另是一物陸疏誤也榛無油與胡桃迥別性與大慄彷彿而生食較大慄稍易消熟食稍不壅氣開寶本草曰益氣力實腸胃耐飢健行日華本草曰調中補胃皆言熟食之功也而同破故紙山茱萸杜仲懷牛膝等為丸久服實能益腎腳弱人最宜其功勝於大慄俗作柿非柿音沛削木屑也綱目作亦俗字也隋書文帝將伐陳造舟於水次木柿蔽江而下晉書王伐吳亦有造舟河干木柿蔽江事圖經曰有多種紅林所在皆有朱出華山略圓小味甘美黃林生汴洛諸州色青可生啖又有一種小者謂之軟棗俗呼牛奶世傳有七絕一多壽二多陰三無鳥巢四無蟲蠹五霜葉可玩六可款嘉賓七落葉肥滑可以臨書綱目曰大者如碟八稜稍扁其次如拳小或如雞子牛心鹿心一種小如錢者謂之猴棗皆以核少為佳生食別錄謂治腸胃不足除胃熱止口乾解酒毒而拾遺云飲酒食林令人易醉則解酒之言誤矣性冷故陶隱居云多食令人腹痛又不可同蟹食干性稍平日華本草曰能健脾胃澀腸凡病大便滑泄者宜之澀者忌食止渴治怔忡健忘肺痿咳嗽血淋腸澼均煎汁久飲生者亦可其精華外溢結而為霜味尤甘美能清上焦心肺之熱生津止渴寧嗽治咽喉口舌瘡痛方勺泊宅編曰臟毒下血干燒存性研末米飲下每服二錢經驗方曰有人三世死於反胃後得一方以干同飯食絕不飲水遂愈食療本草曰搗和酒服更佳又曰脾虛腹皮澆薄飲食不消隨食隨出時泄時止用干三斤酥一斤無酥亦可蜜半斤煉熟同餅貯不津器中每日空心食三五枚又小兒秋痢脾虛及大人脾腎不足常病滑泄餅搗爛同粳米煮粥食又解桐油毒干食蓋其味醇正甘美故能補心脾肺之虛質滋潤多膏故能入血味甘而澀故能上止虛嗽下止虛痢然甘則生蟲助脹澀則閉邪中滿及蟲症嗽痢初起邪氣未盡大便燥結皆不宜用惟其甘而健脾胃故饑年可以代糧明史孫傳庭督秦師討賊以士卒飢疲主固守楊嗣昌為本兵一日發馬上紅旗六道督戰公不得已引兵出潼關而兵以無餉而譁時正熟乃就食之謂之園之役蒂能止嘔逆煮汁飲其木於皮外畫作花卉人物鳥獸形以刀刻之深一二分許久之內中紋理即如所刻鋸板作器甚美觀一種綱目曰樹矮小故謂之卑他生青熟黃赤此雖熟亦青黑故又名綠青烏花浸汁可染罾網摺扇或染苧布作衣頗爽汗謂之漆或曰油其只可生啖不能幹收味極澀性尤冷凡有病人概不宜食君遷子綱目曰即㮕棗千金方作軟棗齊民要術名紅藍棗廣志名梬棗司馬溫公名苑名牛木類葉稍長結實小而長形似牛奶熟則紫黑味甘美一種小如指頭者尤美日用本草名丁香拾遺曰君遷之名始見於左思吳都賦平仲君遷是也子中有白漿如乳性極益人善止消渴去煩熱令人潤澤海藥本草曰令人輕健救荒本草以為即羊屎棗誤矣羊屎乃棗類此因其形圓長似棗故名棗實類也橘綱目曰橘與柑柚三者相類而實不同橘實小味微酢皮薄而紅味辛苦柑稍大味甘皮厚而黃味甘辛柚大小如橙味酢皮最厚味亦甘辛宋韓彥直橘譜云橘出蘇州台州西出荊州南出閩廣撫州皆不如溫州最勝柑品有八橘品十有四黃橘扁小多香霧橘之上品也朱橘色赤如火綠橘紺碧可愛霜前色味已佳乳橘狀如乳柑皮硬瓤多味極酸塌橘大而扁外綠心紅瓣大多液經春乃甘美包橘外薄內盈其瓣隔皮可數綿橘軟美可愛而不多結沙橘細小甘美油橘皮極光滑中堅外黑橘之下品也早黃橘秋半已丹凍橘八月始花冬實春採穿心橘大而心虛可穿荔枝橘膚理致密形如荔枝前云橘品十四所列只十三橘下埋死鼠則結實多故物類相感志云橘借屍榮又周禮橘逾淮而為枳地氣使然也按橘色赤而不黃味甘而不酢黃者酢者皆柑類也橘皮氣味最薄入藥者悉柑皮也而自古本草皆曰陳橘皮不聞呼柑皮大抵柑橘古人互稱其性相似亦可以互用原無一定之區別也但瓤味厚者皮力薄瓤味薄者皮力厚豐茲嗇彼凡物皆然匪獨一橘也且今富貴家所尚橘紅云化州所出名化紅不知其皆橙皮所造橘皮安得如許之大且厚即是則橙橘亦可互稱況柑橘乎不觀金章宗之詠橘樽生查子曰風流紫府郎痛飲笥紗岸柔軟九迴腸冷怯玻璃碗纖纖白玉蔥分破黃金彈借取洞庭春飛上桃花面橘樽之制取皮面光滑之橙刮去內瓤俟稍干隨意捻成方圓瓜瓣之形可以為樽罍盒盎橘小而皮薄不能也然不曰橙樽而曰橘樽亦橙橘互稱之一證矣其瓤充果食日華本草曰止消渴開胃除胸中膈氣極是而陶隱居曰食之多痰綱目曰橘皮下氣消痰其肉聚飲生痰皆誤也本草拾遺曰酸者聚痰此則或然甘者和中開胃止渴行氣最為果中妙品無生痰之理且柑橘橙柚俱走氣分與痰無涉自陶隱居倡之拾遺綱目和之後世遂誤以橘皮為消痰之藥此說在綱目以前如六君子二陳等瞎方皆是陶氏陳氏不得辭其罪也而所謂化紅者無不詡為消痰上品富貴家或藉以錦袱或束以絲或韜以沉檀金玉之櫝群相矜尚不知其皆各處土產橙皮去白久壓以取平正不即曝乾失其本性毫無功力縱有功力亦只行氣斷不能消痰貴耳賤目徒為奸賈所愚而已至東垣李杲又創為異論曰留白則補脾胃去白則理肺氣同白朮則補脾胃同甘草則補肺一能導胸中寒邪二破滯氣三補脾胃多服久服能損人元氣夫既補脾胃又補肺是能益人何以多服久服又忽而損人然而破滯氣之藥必不能補補脾補肺之談竟是夢中囈語綱目既知其治百病總是取其理氣而於此等自相矛盾之邪說不知駁正且復表章之眶中尚有瞳子耶又添造一種青皮亦在宋元間古方絕無用者李杲云足厥陰肝引經之藥朱震亨云肝膽二經氣分之藥蓋以其色青屬木故入肝膽不知其色青者由未黃先摘非如青靛青蒿柴胡之類始終青色異於眾草故入肝膽之經醫家原有用色之理如赤多入血白多入氣黑多入腎或止血黃多入中州青多入肝膽大概如此而不可泥者甚多信如所云青皮入肝膽則天下萬草萬木秉水土之間色水黑土黃合二色則為青故畫家以靛青藤黃和合為綠其始也無不色青無不入肝膽乎綱目又曰青皮色青氣烈能發汗此楊士瀛之妙論世人罕知荒誕之言出於理外世人誠不得而知也若論其性當如枳實之於枳殼未曾黃熟行氣之力較猛耳與發汗何涉然市肆所售皆先時墜落不成之柑橘內瓤尚不可食皮豈有力試思青皮陳皮價值相等陳皮瓤既可食皮乃棄物又復得錢而未黃之先皮雖可充青皮瓤不可食誰肯專為此皮棄其半價預先採摘此眼前易見之理著書之人尚自不知而紛紛議論留許多夢話貽誤後人可笑之至也柑開寶本草曰柑霜前酸霜後甜故字從甘終不及橘綱目曰漢李衡種柑於武陵洲上號千頭木奴橘譜云乳柑出溫州泥山為最味如乳酷彼人呼真柑木婆娑葉纖長實圓正膚理如澤大六寸皮薄不黏瓣食之無滓子甚少一顆僅二三枚亦有全無者擘之香霧噴人柑中絕品也生枝柑微酸必久留枝間味乃變甘海紅柑樹小而顆大有圍及尺者皮厚色紅可久藏今獅頭柑是也洞庭柑出洞庭山皮細味美熟最早甜柑類洞庭而大每顆必八瓣木柑皮粗瓣大少液朱柑色紅瓣大味酸饅頭柑近蒂起一包如饅頭尖味香美按韓譜名橘而柑亦載其中其無大分別可知瓤性與橘同而不能如橘之醇正開寶本草曰解腸胃熱毒止渴利小便又云多食令人肺冷生痰發癖疾泄大腸發陰汗今食者並無此害蓋柑橘橙柚不拘味甘酸苦皆帶微辛故總皆理氣無助冷生痰之理集效方曰柑橘瓣陰乾燒存笥研末溫酒服二錢可催生恐此物漿多滓少既陰乾又燒之失其性矣素患難產人不如預先食之蓋能利氣又利小便核又治疝氣則其性專走前陰催生之言可信葉不拘柑橘和酒搗飲治肺癰膿血出經驗良方其刺和葉煮豆腐食治風熱牙疼呼吸畏風熱甚加石膏末煮煎酒服治乳癰初起濃煎儘量飲未消再作出必救方橙綱目曰一名金球一名鵠殼埤雅曰柚屬也葉有兩刻缺如兩段亦有氣臭者大小有各種色黃皮厚多㾦㿔可芼鮮可為菹醢可作醬齏可蜜餞糖藏性能降氣利膈寬中衍義曰宿酒未解食之速醒按橙味酢而苦惟廣南者味甘一種金錢橙繞臍起圓暈如錢氣清芬肉酸苦此物性猛烈走泄真氣不比柑橘之和平凡氣虛人不宜食氣虛有火人尤不宜食也柚綱目曰爾雅作又曰椵又曰條又曰食性本草曰朱欒又曰臭橙廣雅作鐳柚唐本草作壺柑其大有圍一二尺者形之圓長皮之光皺亦有多種橙屬皮皺而香瓤味辛苦柚屬皮粗而臭瓤味甘按古人之分橙柚如此然禹貢揚州厥包橘柚孔安國注云小者橘大者柚皆柑屬也是則諸物本可互稱其性柑橘和平登柚猛烈故本草衍義辯其皮謂不可混用後世以柚皮為橘皮貽無窮之害蓋病有虛實體有強弱一猛一平誠不可混用彼矜尚化紅者可廢然反矣化紅皆柚皮橙皮所造龍眼見一卷荔枝圖經曰荔劦也與劙同其實未熟時枝雖弱蒂牢不可脫採取者必劙斷其枝故名司馬相如上林賦作離枝其品以閩中為第一蔡君謨譜其種至三十餘品蜀中次之嶺南為下結子甚繁大樹可至百斛種始傳於漢世初出嶺南後至蜀故左思蜀都賦云旁挺龍目側生荔枝綱目曰荔枝炎方之果性最畏寒易種而根浮然能耐久有數百年猶結實者生時肉白干則紅日曬火烘滷浸蜜餞皆可致遠白香山圖序云荔枝生巴峽樹團團如蓋葉如冬青花如橘而春榮實如丹而夏熟朵如葡萄實如枇杷殼如紅繒膜如紫綃肉白如冰雪液甘如醴酪大略如彼其實過之若離本枝一日色變二日香變三日味變四五日色香味盡去矣蔡譜云荔枝以甘味然干百樹莫有同者奇品也若麝香觸之則花實盡落海藥本草曰荔枝人未採時百蟲不敢近人才採則鳥雀蝙蝠之類無不傷殘故必合眾手日中採盡按今廣南荔枝絕佳而諸書皆云閩為上蜀次之廣為下或者閩中得蔡君謨之譜蜀中得白香山之圖一經品題便作佳士物以人重未可知也惟其色香味易變故唐時以馬遞上供杜牧之詩曰一騎紅塵妃子笑無人知是荔枝來其性少食則止煩渴多則令人醺然如醉且反發煩渴口乾鼻血出延壽書齦腫口痛凡病齒𧐆及肺熱人皆不可食出綱目乾者雖稍平然助熱生蟲摜齒傷肺亦同入藥治病痘瘡出不快或顏色灰白或漿汁不滿或為穢氣所觸出而復收連殼剝開酒煎溫飲並食其肉出聞人規痘疹論呃逆不止用七枚連皮核燒存性研末白湯下立止出醫方摘要或同硫黃乳香燒煙吸之疔瘡惡腫和白鹽梅各三枚搗貼疔上根即出出濟生方風熱牙疼擘開殼入鹽少許煨研擦之出集效方或不用鹽單用荔枝煨研亦可出普濟方荔枝性熱本傷齒反用以治齒火鬱發之之義乃服寒涼藥不效之妙方俗醫謂其酸斂蓋不明物理之言也其核醋炒為末治心脾氣痛每熱酒服二錢出易簡方同香附子等分醋炒為末治婦人血滯作痛出婦人良方又治㿗疝腫痛同茴香各醋炒加木香勿炒研末每服二錢日三服寒甚者加桂附虛者加破故紙出必效方蓋荔枝每結必雙皮紅皺似人之腎囊核圓長似腎子而煨炒則氣香故入氣分治㿗疝也胡桃名物志名羌桃俗呼核桃綱目曰其葉長四五寸似大青葉對生頗作惡氣三月開花如慄花結實如桃熟時漚爛皮肉取核為果故名核桃按胡桃性熱其殼外皮肉可染帛作緇又能黑髮故入腎而治虛寒外皮並殼內薄皮味俱極澀故能上收久嗽痰喘之肺氣下收精寒滑泄之腎氣又有油故能潤肺而治無痰之乾咳古有黃柏無知母破故紙無胡桃猶水母無蝦之說蓋破故紙溫補腎陽胡桃亦補腎陽相須為用治腎氣虛寒不為大謬乃自明以來劈空造出命門之說云居兩腎之中為人身生命之源相火之主難經而後已有左為腎右為命門之說至明又變為此說立青娥丸胡桃丸等方皆用胡桃綱目備著其說謂命門非脂非肉形如胡桃仁故用胡桃全然杜撰其流弊遂有薛已張景岳趙養葵諸子妄立真陰真陽先天太極名色甚且謂孔門一貫儒釋道三教之傳皆在此命門之內如講學家一味空談全無實際國朝自呂留良焚骨後禁絕其書不獨儒者知務真修即醫者亦覘實學趙養葵醫書即呂留良評點名天蓋樓醫貫未奉嚴禁時曾及見之全部盲辭瞎辯高談性命人胸中一無知識於此可以概見今例禁其書既不許行世又有喻嘉言周禹載徐靈胎汪苓友葉天士諸先生出而闡明軒岐之學故元明一切浮泛無根之談至本朝而熄不知命門二字本出內經靈樞根結篇曰太陽根於至陰穴名在足小指甲後結於命門命門者目也經文明白如此造作空言者豈未之見乎抑欺後人之必不見乎至胡桃之充果食肺燥腎寒者宜之潤肺宜去衣溫腎宜留衣肺腎有熱者忌之食物本草謂多食動腎火則是開寶本草謂多食動風脫人眉同酒食多令人吐血亦理之所有孫氏則謂其性冷滑大誤蓋有油故滑大腸非冷也橄欖見一卷枇杷衍義云葉形似琵琶故名昔有誤書枇杷作琵琶者或誚之曰枇杷不是此琵琶只為當年識字差若使琵琶能結果滿城簫管盡開花然如衍義所云則枇杷作琵琶不為別字而六書正訛以為枇杷本即樂器不可別作琵琶爾雅釋名則曰枇杷胡琴也推手前曰批卻手後曰把從手不從木批字同批寫之批把字同把持之把則書枇杷作琵琶誤書反把作枇杷亦誤矣性專入肺能止渴下氣利肺氣止嘔逆主上焦熱出日華本草久患肺嗽人宜之而味兼酸則不純正食物本草曰同熱麵食令人患熱葉治肺熱久嗽又治時行溫熱呃逆嘔吐泡濃汁代茶飲木皮煎汁冷飲止吐逆不下食能疔百藥不能止者出千金方安石榴名義不可曉博物志謂出塗林安石國漢張騫使西域得來齊民要術謂種榴必須安石塊於根下則結實多故名安石皆附會之言考張騫使西域事出史記大宛列傳只有安息國無安石國雲安息在大月氏西其俗土著耕田以銀為錢錢如其王面王死則更鑄效王面焉漢使至安息其王發使隨漢使來獻大鳥卵如甕未及安石榴至使者得諸種於外國亦只云自烏孫以西俗嗜蒲桃酒馬嗜苜蓿漢使取其實來於是天子始種蒲桃首蓿此事亦在張騫卒後數年亦未及安石榴乃今草木谷果之來自外夷者悉云張騫出使得種恐西域不通舟楫萬里馳驅馬煩車殆不能攜帶許多物件也綱目曰廣雅名苦榴古今注名丹若吳越王錢鏐改名金罌西陽雜俎名天漿樹低小叢生一種海石榴僅長尺許即結實可盆植為玩花有紅黃白三色千瓣單瓣二種千瓣者不結實實有甜酸苦三種子有紅白二類白者名水晶石榴味最甘性亦稍平不熱每顆分數房有膜膈之子滿其中秋後皮裂子見乃可食按榴性大熱極傷人肺損人齒發咽喉熱痛別錄謂解咽喉燥渴大誤朱震亨謂戀滯成痰更為謬極震亨無痰字不開口皮極澀止腸滑久痢根能殺蟲千葉不結實者其花止吐血衄血桃綱目曰桃易種實早類甚多花有紅白紫碧千瓣單瓣之殊諸桃花總皆豔治因其開早寂寞春光藉以點綴故詩人吟詠多及之大抵實早者花必遲實遲者花反早又視乎其地白香山詩曰城中二月芳菲盡山寺桃花始半開惟白桃碧桃獨標雅淡惜不免繁縟且無香耳實有大小方扁有毛無毛酸甘苦之別扁桃味甘油桃無毛味亦甘其餘諸桃毛厚者必酸苦毛稀者必甘甜時有夏秋冬熟之異冬桃一名仙人桃一名西王母桃一名崑崙桃因其實大而色赤極美觀故命以美名也色有紅緋紺碧金銀胭脂諸品惟一種毛桃即爾雅之禠桃多毛味惡其仁充滿爾雅注云食者必去毛故名榹然諸桃皆須去毛內則云桃曰膽之楊鐵崖宋景濂集並載元朝御庫蟠桃核大如碗拾遺記載漢明帝時常山巨桃霜後始花次年夏乃熟元中記載積石之桃大如斗斛西陽雜俎載九嶷桃核半扇可容一升蜀後主桃核半扇可容五升貯水則變為酒悉屬幻談昔人謂桃為仙果然性不佳多食令人膨脹生癰癤按綱目之言極是且又難克化傷脾胃生腹中長蟲瘧痢人食之加倍難愈素問列為五果云肺病宜食切不可從至爾雅注謂冬桃能解勞熱尤不可信惟核中仁能破瘀血開血閉消癥瘕潤大腸破蓄血仲景治傷寒蓄血如狂抵當湯婦人傷寒熱入血室桃仁承氣湯皆用之其實著樹幹枯經冬不落者名桃梟懸掛為梟故罪人懸首示從日梟首又名桃奴又名桃景又名神桃又名鬼髑髏本經謂能殺百鬼精魅聖濟總錄用治鬼瘧均不驗蓋此物小時不成則墜大時不成則反不墜性本如此非有異也惟桃花本經謂能殺疰鬼杜陽雜編謂能治肝傷血閉之瘋狂極可信有此病者宜廣收用之或為末或和米麵作餅或輔以他藥為丸緣花乃精華所發不比桃奴為未成之實況此木性專辟惡山海經神荼鬱壘居東海度索山蟠桃樹下主領眾鬼之說雖不足深信而古人懸桃極於戶以辟邪後人或作桃梗桃艹辛人桃橛桃符歲終則更換有新桃換舊符之句溯厥由來在周秦以上戰國策中已有其語故識在周秦以上故禮曰王吊則巫祝以桃前引以闢不祥其葉可蒸汗凡天行熱病暨傷寒連發汗而汗不出者死症也備急方用水二石煎葉取汁置床簀下厚被覆蓋蒸之少時汗出遍身至兩足漸去其覆小品方用炭數十斤燒地令熱以水少灑之布干葉於上厚三四寸安席葉上溫覆臥之此二法蒸得汗皆就被中粉之汗收盡始可去覆後法更佳無桃葉柏葉麥麩皆可代而綱目引梁書徐文伯蒸範云謂其二年後當不起至期果死之事謂不俟汗出時日先期劫病貽害無窮似不可信蓋傷寒得汗惟恐不早有何時日可俟且此法原治屢發汗而汗不出之危症非可以服藥發汗而求速效也桃枝桃根桃膠古方並用均不驗不錄李綱目曰李之種近百子之形狀大上斑駁時之早晚味之甘酸苦澀各各不同今人用鹽醃蜜餞糖藏為果惟曝乾白李薦酒作飣皆佳按李味既不佳性又難化困脾生蟲作脹損人較桃尤甚素問列為五果因味酸故以配肝切不可泥食物本草曰和蜜食損人五臟究之其性本劣即不合蜜食亦何嘗無損果中極劣之物與桃杏糠頭梨均婦人小兒之災星厄鬼也郁李綱目曰本經名爵李詩疏名雀李別錄名郁李又名車下李爾雅名常橡或訛為唐棣非也唐棣乃枎栘白楊樹也嘉祐本草曰郭注爾雅云棠棣子如櫻桃可食陸疏棠棣之華鄂不云白棣也似李而小一名萸李按雀李郁李二種雀李樹稍大多野生子苦澀不堪食李郵侯所謂樹在道旁而多子必苦李是也郁李樹僅數尺子可食園林多種之無野生者較大李稍鬆脆易消化故為害亦少殺且核中仁可入藥治大腹水腫四肢面目浮腫利膀眺水道出本經腸中結氣關格不通出藥性本草潤大腸燥澀出用藥法象川並擂水服綱目引錢乙治一乳婦因驚而目張不瞑酒煮郁李仁盡醉飲之以為恐則氣結膽橫郁李性降而去結隨酒人膽使膽下而目乃得瞑為得治病之法誠有然矣杏有數種金杏色黃白杏色青白紅杏色赤奈杏青黃沙杏肉中有沙味甘帶酢又名甜梅樹高大可三四丈三春花紋雖豔冶如桃而傑閣危樓此花能出乎其表則繁華富麗中自有尊嚴體態故春風得意曰杏花春雨江南而明人之詠藏青塢閣上美人詩曰一點好春藏不得樓頭半露杏花放此雖借喻美人亦可見杏樹之高非桃李匹矣其性一無可取別錄曰多食傷筋骨扁鵲曰動宿疾令人目盲鬚眉脫落食鑑本草曰孕婦產婦尤忌衍義曰諸杏皆熱小兒食之生癰瘡成膈熱素問以皮赤味苦於五行宜配火故以為心之果萬不可泥杏仁入藥性專泄肺藥性本草曰治咳嗽上氣喘促又有油故能潤肺燥開聲音千金方治咳逆聖濟總錄治喘急食醫心鑑治喘促浮腫皆獨用之而傷寒無汗而喘麻黃湯亦用之皮毛肺之合表邪閉於肺故喘麻黃杏仁皆泄肺也不喘者去之其理較然矣而後世妄人造杏金丹託名左慈秘術云服之萬病皆愈久服通靈不死壽互千萬又託名青城山皇姑示夢云久服令人聰明老而壯健夏姬雞皮三少乃服杏仁所致又立萬病丸補肺丸等方泄肺之藥詎可用以補肺種種荒誕之辭綱目既加駁正以為古方之用杏仁皆用其毒杏仁非有毒不能毒狗而又詳列諸方殊不可解獨徐之才藥對謂能解錫毒凡錫器盛酒煎藥不宜停久久則有毒殺人中其毒與砒毒同砒錫根也宜研杏仁服物性相制不可以理測也櫻桃本草衍義曰一名含桃禮仲春天子以含桃薦宗廟故王右丞詩曰才是寢園春薦後非關御苑鳥御殘綱目曰顆如瓔珠故名櫻說文作鶯爾雅曰楔荊桃郭注曰即櫻桃也味甘又呼崖蜜樹不甚高春初開白花葉園而尖有細齒山家清供曰熟時遇雨則內生小蟲必以水浸使蟲出乃可食性大熱朱震亨云患喘嗽人食之立病有死者儒門事親云舞水一富家二子驕縱日啖櫻桃一二升半月後長者發肺痿少者發肺癰俱死受其熱者惟多啖蔗汁可略解右丞詩曰飽食不須愁內熱大官還有蔗漿寒天子之庖曰大官廚其葉圖經謂可治蛇咬搗汁服並敷之楊梅一名朹子綱目曰水楊子名朹此實似之故名葉似瑞香冬月不調二月開花結實五月熟有紅白紫三色紅勝於白紫勝於紅性雖較櫻桃稍平能止胃寒嘔噦消食解渴出開寶本草然助熱傷筋發瘡損齒之害亦不能無博物志云瘴地多產豈佳物乎而錢鶴灘詩曰西州一䖷蒲桃釀南國千頭荔子香又曰華清妃子如相見添得紅塵一倍忙比之蒲桃荔枝文人遊戲之筆也林檎一名來禽一名文林郎果拾遺曰其樹從河中浮來有文林郎拾得種之故名洪玉父曰唐高宗時誠王李謹得五色林檎以貢帝悅賜謹為文林郎河中浮樹已屬荒唐既為親王又賜郎署尤不可信物名不可解者甚多何必強為之說綱目曰林檎即奈之圓小者味甘而帶酸澀色有紅紫金黑又有水林檎蜜林檎諸種性總之無益開寶本草云多食弱人筋脈生瘡癤滯膈生痰令人好唾圖經曰能治消渴為其酸也食療曰主水穀痢止泄精為其澀也然性既不佳恐害多利少他藥甚多何必此也柰一名頻婆梵語也食性本草曰有三種大而長者為柰小而圓者為林檎皆夏熟小而味澀者為梣秋熟故又名楸子綱目曰有赤白青三色夏熟至冬熟數種白孔六帖言涼州白柰大如兔頭西京雜記言上林苑紫柰大如升皆異種也廣志曰西方最多每冬曝乾為脯至數十百斛謂之頻婆糧或取為豉按柰雖較林檎稍甘亦未能全不酸澀別錄謂食多令人肺壅臚脹病人尤忌極是而食療云補中和脾千金方云益心氣耐飢治食飽氣壅不通則為大誤蓋味澀者必難化故耐飢非益心也酸澀之物必不醇正病人極不宜食矧可入藥乎海紅一名海棠梨一名西府海棠綱目曰鄭樵通志云海棠之子名海紅即爾雅赤棠也沈立海棠記云蜀中最盛江南者花差小木類梨堅而多節二月開花五出初若胭脂點點大放則漸成纈暈有紫須三萼五萼成簇落則有若宿妝淡粉不香惟蜀之嘉州者有香一種垂絲海堂樹小枝幹柔弱花皆向下一種貼梗海棠附於作花花皆無附此二種因花相似故名海棠實非同類其甘棠沙棠二種雖同類而各種海棠木通身是節不堪鋸板作器沙棠則為美材作舟尤美李青蓮詩曰木蘭之楫沙棠舟玉簫金管坐兩頭按海棠古人皆曰無香故彭淵材以為三恨一鰣魚多刺二海棠無香三曾子固不能詩恐亦文人遊戲未足據為定論予家舊有一株高三四丈花開蜂蝶紛然滿樹不右桃李之過門不入日晏露晞不覺其香使至其下則清芬撲鼻始知蘇長公詩東風嫋嫋泛崇光香霧空濛月轉廊香霧俗本誤作花霧則與第三句重一花字近體詩此等字斷不可重說見唐太宗御製詩集蘇公博學大儒豈猶不知而犯此病乎只恐夜深花睡去故燒高燭照紅妝古人蓋實有所見非泛為花月間評也然則海棠不必嘉州處處皆香點綴春光與桃杏堪稱鼎足而桃則妖淫杏亦繁縟惟海棠於繁華富麗中獨標雅韻陸放翁詩云走馬碧雞坊里去被人喚作海棠顛良有以也子大如櫻桃味酸澀不宜食飲膳正要云能止泄痢澀故也木瓜爾雅曰楙木瓜郭注云實如小瓜味酢可食綱目曰食有鼻葉光而厚味不木者為木瓜圓小味木而酢澀者為木桃似木瓜而無鼻大於木瓜味澀者為木李一類三種故詩曰投我以木瓜投我以木桃投我以木李此詩乃衛文公毀感齊候驅狄城楚丘之德而作孔子曰吾於木瓜見苞苴之禮行焉朱子注詩以為不知所指又作男女贈答之辭未審何意三種皆可蜜漬為果或蒸爛同蜜搗為煎點湯食故古人用相贈答圖經曰處處皆有宣城者特佳實初成時剪紙為花黏於上久則其文如生用充土貢故有宣城花木瓜之號其性別錄曰主濕癉腳氣霍亂吐下轉筋不止拾遺曰腳氣衝心者此症至險不速治則死以嫩木瓜一枚勿犯鐵器性最忌鐵去子煎服胃寒嘔逆同生姜煎服水瀉後渴不止作飲服日華本草曰治水腫及奔豚氣心腹痛湯液本草曰去濕和脾胃治腹脹善噫心下煩痞均同蒼朮草果服陶隱居曰轉筋呼木瓜名或書土作木瓜字皆愈此理殆不可曉故聖惠方治霍亂轉筋獨用木瓜一兩酒一升煎服加白朮草果扁豆生薑各三錢更佳不飲酒者水煎加酒服另用木瓜煎濃汁浸青布乘熱緊裹其足立愈千金方治小兒洞利大瀉也木爪煎濃汁服加米或陳皮或姜尤妙大人亦可用蓋其味酸氣馥衍義以為得木之正故能舒暢肝氣調和脾胃而酸能益筋益血故凡腰腎腳膝無力皆必用之然多食不免有害食療本草曰損齒傷骨更傷肉傷筋衛生寶鑑曰太保劉仲海日食蜜煎木瓜三五枚忽病淋疾以問羅天益天益曰食酸所致輟食自愈綱目引經文釋之曰多食酸令人癃閉也酸入於胃其氣澀以收膀胱得酸則縮卷約而不通故水道不利與食療之言皆有至理不可不知也山楂綱目曰爾雅名朹子又曰檕梅圖經誤為棠梂子梂乃櫟子唐本草誤為赤瓜子乃赤棗之訛桂海虞衡志有赤棗子又曰鼠楂羊梂得效方曰猴楂蓋此物野生猴鼠羊喜食之也日用本草曰茅楂食鑑本草曰山裡果百一選方曰山裡紅俗作山楂查乃水中浮木省文別字也古方未見惟陶隱居用以煎汁洗漆瘡性善消肉積煮諸肉入數枚則易爛然其汁如清水全無滋味攻堅破積敗人津液耗人腹內脂膏病人雖有食積血積但脾胃虛弱者即禁用今醫視為泛常肆用無忌兒科尤甚且助之麥芽雖日殺人而不知其致死之由日用本草曰消食補脾本草補遺曰健胃行氣忽而又曰婦人產後兒枕痛煎汁和砂糖服立下則其為克伐攻下之藥明矣所以食鑑本草曰化血塊氣塊綱目曰消肉積癥瘕痞滿滯血脹痛此而謂之為補豈不謬極獨其能發痘瘡出不快者山查五枚煎酒服出得效方痘疹乾黑危困紫草煎酒調山查末一錢出心鑑體虛者加補托藥火甚者加清涼藥其用糖蜜餞為果實則性稍平中州有滯者宜之脾胃虛弱者忌之又有一種楂子又名和圓子即詩之木桃一種榠楂又名瘙楂又名蠻楂又名木梨即詩之木李皆木瓜之同類異種性亦與木瓜彷彿古人亦充果實內則楂梨鑽之者此二種也故木瓜章連類而及名雖俱同楂字實非山楂之類也橡子嘉祐本草曰爾雅云栩抒又作芋又曰櫟其實梂詩唐風云集於苞栩秦風云山有苞櫟陸疏曰柞櫟也子名皂亦曰皂鬥可染皂也說文作橡斗綱目曰有二種一種不結實者名棫詩曰瑟彼柞棫一種結實者名栩葉如櫧文理皆斜實如荔枝核有尖蒂有鬥包其半截故曰橡斗皂鬥山人取實搗浸為粉去其澀味曝乾可久留充果菜木堅實有斑文點點周禮職方氏山林宜皂物柞慄之屬是也唐本草曰橡實止下利厚腸胃日華本草曰澀腸止瀉可以御飢按橡實性微溫味苦而極澀凡內有食滯或氣滯大便不快者忌食其入藥用必實實脾虛滑脫如水穀下利日夜數十行或久痢脫肛者始可非此則塞住邪氣為害不小千金方治石癰堅硬如石用橡子蘸醋青石上磨汁塗勿計次數不內消即成膿潰妙方也用醋搗爛厚敷亦可衍義曰櫟木高大而堅不堪充材但為炭最佳不知櫟炭固佳而其木性堅而韌極難斷折大用可為櫟梁小用或鋸為扁挑足以擔荷重任或作車槓又名車手足以行地無疆南方獨推車其力全在兩槓或作牛曳之水車且足以補救天工非橡槲等難折之木孰克勝其任乎而古云枯樗散櫟為不材枯樗則實不材櫟也者不愧長材無嫌短馭謂之不材冤乎哉槲子綱目曰槲亦有二種一種小者叢生名枹吾郡鄱陽樂平浮梁遍山皆是此種因其與柞櫟同類名曰柞柴隔歲斫伐售與景德鎮故瓷器有柴窯柞窯之別一種大者名大葉櫟又名櫟子又名槲又名樸並見爾雅八九月滿樹皆黃足為秋山點綴劉禹鍚詩云楓葉初丹槲葉黃河陽愁鬢恰新霜實之性味與櫟無異槲吾鄉呼櫟子上條之櫟吾鄉呼為楮子大誤楮乃榖樹所結之實其葉花歧而有毛皮可造紙斫之內有白汁畫家用以黏金箔苦櫧子綱目曰樹全似慄但凌冬不調結實圓而有尖褐色外有綠苞霜後苞裂子出生食苦澀煮炒乃稍甘亦可搗粉充果菜食性亦澀腸止泄虛滑者宜有邪者切忌嫩葉用新鮮豬油炒熟冷水浸貼臁瘡久爛一日數易出日用本草木極耐腐濕郭注山海經云可作屋柱棺材又極難燼不可為薪用作門扇可御火災甜櫧子一名鉤慄拾遺名巢鉤子冬月不凋子圓而小又有雀子形相似而圓黑按甜櫧子殼光黑而硬大如小豌豆有尖一名鐵櫧味較橡槲櫧稍甘亦不免澀性亦僅澀腸止泄故拾遺云食之不飢厚腸胃故也木條直易長數十年可長三四丈圍五六尺松杉雖一二百年不及也又子落地自生一種不煩再種取大者為梁棟小者轉盼又覆成林材木之利莫過於此吾鄉惟兵田彭姓戚家有之高樓大廈綿亙數百間胥此木所造他處則彌望荒山絕無種者不可解也而彭姓亦僅原有之三處此外絕不補種一山尤不可解也榧子綱目曰本經虫部有彼子爾雅披亦名煔葉似杉木如柏唐本草曰彼當從木作披本經誤入虫部別錄有榧實又名棑華拾遺曰棑與榧同即本經之柀子也棑華即榧子之花爾雅翼曰披似杉木有文采絕難長有牝牡牡者華牝者實大如棗核有尖者有不尖者無稜殼薄黃白色仁可生啖炒食更香美性能殺蟲又有油能潤肺凡蟲病及乾咳無痰者可食然性甚熱脾肺有熱者忌之日用本草曰同鵝肉食令人生斷節風物類相感志曰其皮反綠豆同食殺人皆不可不知也海松子一名新羅松子綱目曰出遼東及雲南一鬣五葉球內子大如巴豆有三稜一頭尖炒食甘香久留易油壞性能潤肺治諸燥結咳嗽開寶本草云主骨節間風頭眩去死肌潤五臟外臺治乾咳無痰松子仁一兩胡桃二兩去衣研膏和熟蜜半兩每食後開水服二錢錢乙小兒方治肺寒久嗽松子仁五十個百部炒三錢麻黃二錢杏仁去衣四十個同白糖杆為丸每含化數丸如果肺寒宜略加乾薑衍義治大便虛秘松子柏子麻子同研膏蜜丸梧子大每黃耆湯下五十丸宜當歸黃耆湯海藥本草曰松子味雖美多食發熱毒列仙傳謂偓佺赤松子皆服此得仙幻談也梧桐子圖經曰詩小雅其桐其椅其實離離國風椅桐梓漆陸疏謂梓實桐皮為椅即梧桐陶隱居謂白桐為椅蓋二桐俱有子俱可為琴瑟爾雅曰櫬梧郭注云即梧桐又曰榮桐木邢疏曰與櫬桐一也遁甲書云梧桐可知月閏無閏則十二葉對生一邊六葉有閏則十三葉視其小者則知閏在何月故曰梧桐不生則九州異閏月之理肇自尚書堯典以閏月定四時成歲而其置閏之法不傳左傳曰舉正於中謂以中氣定月建如雨水必在正月春分必在二月又曰歸餘於終謂有閏之年以最後一月為閏月然春秋紀閏又未嘗用此後世以無中氣三月為閏而自東漢劉洪以前不知月行有遲疾自北周張子信以前不知日行有盈縮所謂無中氣者乃平朔非定朔以二差加減之無中氣或有中氣故置閏多訛而日非朔不食月非望不食古歷推之日食或在晦或在月之二日月食或在望前望後又或當食不食不當食而食前史紛紛議論以為人主求治太急則食早政務廢弛則食遲而當食不食諛者或以為祥諫者又以為天厭其德故不示儆若不當食而食更屬不祥之至豈知皆由不知定朔故朔不準非日月有異步算之訛也至唐初李淳風麟德歷始用定朔一行開元大衍曆因之然猶不知盈縮遲疾之法有平立定三差則其數未確故不免間有微差元郭若思太史授時歷出始為歷學集大成之書其法以歲策三百六十五萬二千四百二十五分所謂濿盈也與十二朔策三百五十四萬三千六百七十一分一十六秒相減所謂朔虛也餘數一十萬八千七百五十三分八十四秒為太陰十二周天不及太陽一周天之數為歲閏以所求年歲前十一月恆氣冬至距經朔之日數時刻為閏余閏余滿一十八萬六千五百五十二分零九秒為閏准其年必有閏月積滿二十九萬五千三百零五分九十三秒得一朔策為當閏之月其月必無中氣若小余些微不及閏准者為閏在次年本年必無閏月而我朝兼用中歷西曆測算之精亙古莫比蓋歷家稍有差錯必積及而始知故閱數十年或百年一修改其數必加密至我朝至精至密無以復加矣法以康熙二十三年甲子為曆元定為周天三百六十入算化為一百二十九萬六千秒不用古法三百六十五度四分度之一省卻許多轇轕歲周三百六十五日二四二一八七五此小余系五小時三刻三分四十五秒將時刻分化秒用萬分通之日法除之得此數蓋緣通風納子之法五小時三刻三分四十五秒應化為二萬零九百二十五秒與萬相乘為實以日法八萬六千四百秒為法除之得二四二一八七五以定朔定炁算至無中炁之月為閏月永無差錯西法回回法置閏皆以日計每年大小余不滿八萬六千四百秒為平年滿此數則多一日為閏年積一百二十八年而餘數滿二百六十七萬八千四百秒共閏三十一日以日法八六四乘所閏之日亦恰得二百六十七萬八千四百秒兩數齊同除之恰盡中法則以月紀炁盈朔虛每歲差十日弱積至無中氣三月節氣趲後十四日有奇加一閏月節氣又趲前十四日有奇雖終古無兩數齊同之理而古歷立排章紀閏之法以十九年為一章而得閏者七今法推之其數亦間有未確是知以日紀閏從太陽其數乃天造地設不容增損以月紀閏從太陰乃不關晝夜寒暑之事治歷明時者可不必講然從太陽之理著於西法實不始於西人宋太史令沈存中夢溪筆談已有不用閏月之說在西法末入中國之前六七百年國初遊子六先生天經或問亦有治歷當以太陽為主不當從太陰而加閏月此時初用西法草野猶未得知而所見與西法同而儒雖巧二先生亦中國之人傑也區區一木能知閏月乎其所知者古之經朔歟今之定朔歟夫蓂莢生階屈軼指侫乃一見不再見之事後人或難考其真偽梧桐處處皆有試執而數之果枝枝葉葉均有一定之數歟然則何曾有知閏之事腐儒幻談也綱目曰梧桐直而無節肌理細緊葉似白桐略小花細下垂莢長三寸五片合成老則裂開如箕名鄂子綴於兩傍或五六三四枚大如胡椒皮皺性喜向陽故詩曰梧桐生矣於彼朝陽其生也晚春始葉早秋即凋故諺云梧桐一葉落天下盡知秋材中琴瑟齊民要術云生山石間者音更清響按梧桐材則極美子充食甚不佳古方雖用治口瘡方不驗多食令人耳聾素有耳病人不宜入口也金櫻子開寶本草名刺梨子又名山石榴又名山雞頭子千金食忌名竹莢子圖經曰枝葉類薔薇有刺四月開白花結子如小石榴亦有刺綱目曰其實中核細而有毛味甚澀蜀本草曰止脾泄不利澀精滑證類本草曰夢溪筆談云金櫻子止遺泄取其澀也今人待紅熟時採摘則味甘不澀惟當取半黃者用之衍義曰採須霜熟不熟反令人利按金櫻黃熟者熬膏作餳味雖甘美亦有微澀但不若生者之甚耳用充果餌則可若入澀精止利之藥宜帶生筆談之言極是寇氏反云生者利誤說也朱震亨則云人身經隧以通暢為和平味者用金櫻澀之自作不靖咎將誰執不知平人以通暢為和平滑脫之人則又以秘密為和平一物一用一病一藥安可概論也若無滑脫之病而求澀精以縱欲是真自作不靖矣然慎恤膏硫黃鴉片人且甘之如醴況金櫻其小焉者乎戒之曷勝戒耶枸杞子陝西甘肅者為上實類蒲桃肉厚味甘糖蜜餞為果餌可致遠他處者小才如豆肉薄子多不堪作果入藥亦遠遜性補肝腎為強陰益精補血明目之要藥然質潤而滑大腸不結者忌之苗作蔬根葉代茶俱有益見總類菜類覆盆子爾雅曰蒛葐綱目曰大麥莓又曰插田藨又曰烏藨子以其熟於初夏也蔓生有細刺葉如野薔薇紋皺子似桑堪而圓每莖四五枚或七八枚大如櫻桃過熟則就枝生蛆須半熟採味甘不酸可入藥可作果餌能補腎精虛竭陰痿出藥性本草同蜜煎膏補肺氣虛寒出衍義俱宜多服一種逢子枝葉花實俱相似而熟於秋末味微酸本經雖收為上品而強陰補腎之力終遜覆盆爾雅邢疏以為蓬蘽即覆盆苗又有一種懸鉤子即爾雅之山莓也郭注云木莓圖經曰樹莓其本乃小樹不作藤蔓子稍大味亦微酸力則遠遜覆盆一種蛇藨又名蠶莓爾雅謂之藨雖蔓生而就地節節生根節上生枝長尺許一莖只結一枚本草會編謂之地蒲性冷多食作脹但能治天行熱病口乾頻食一二枚出傷寒類要按覆盆子固補腎上藥圖經謂研末用男飲乳浸汁滴目中可治天行目暗及青盲夷堅志謂可治爛弦風癢有蟲取葉咀嚼取汁皂紗矇眼注汁漬之則蟲從紗出理或然也桑椹圖經曰爾雅有女桑檿桑桋桑山桑數種椹作葚綱目曰白桑葉大而厚雞桑葉花而薄子桑先椹後葉山桑葉尖而長按桑雖有多種而葉皆可養蠶衣被天下之功誠大檿桑又可為弓禮所謂桑弧蓬矢周宣王時童謠所謂檿弧萁服是也其入藥也根皮枝葉皆有所用根皮別錄云去肺中水氣唾血熱渴水腫脹滿作線縫金瘡藥性本草曰治肺氣喘嗽虛勞客熱綱目曰瀉肺利大小腸降氣散血嫩枝圖經曰治腳氣風氣四肢拘攣久服終身不患偏風並宜浸酒葉涼肺宜用經霜老葉治風宜用嫩者唐本草曰煮濃汁多服除腳氣水腫食療本草曰煎飲代茶止熱渴同米煎更妙日華本草曰嫩葉煎酒服利關節治一切風搗爛蒸罯痛風取汗撲損瘀血綱目曰代茶飲治勞熱咳嗽本經曰除寒熱出汗出汗當是汗出傳寫之訛也人有身無他病但每夜盜汗如洗久久不成虛勞必成肺痿用經霜桑葉為末米飲調臨臥服五錢數服無不愈者蓋其性涼善降又能瀉肺逐水又善祛風濕利關節而於治目則全無干涉自古作本草者數十家並無一字道及至明周憲王普濟方創造逐月某日洗眼之法後人附和洗眼方中無不用之絕無一驗又或更換日期各創一法事同巫覡全非醫理綱目緣此於桑葉條下添入明目二字今俗至以桑木作盆洗面云亦能明目極為可笑予所見遵依日期洗至數年而瞽者二人又誤信此說每日勤洗不肯復用他藥以致久痛成瞽者亦二人蓋逐水之藥必傷睛不瞽奚待也桑椹質潤多膏唐本草謂能止消渴綱目謂能解酒毒尚或可信而拾遺云能安魂魄令人聰明不老則誤說也大抵此物質潤則助濕味淡則敗脾或用糖蜜餞為果餌燥涸之人無害非然者不寒中作泄即滑精成痿觀詩詠吁嗟女兮無與士耽而興之曰吁嗟鳩兮無食桑椹意可知矣婦人同鴨卵食則難產豈佳物乎無花果綱目曰便民圖纂名映日果廣州志名優曇缽西陽雜徂名阿駔樹高五六尺葉如花構五月不花而實似木饅頭而虛軟味甘無子能治五痔及咽喉痛食物本草曰澀腸止泄利但性寒中寒者忌食葉可熏洗痔瘡木饅頭一名鬼饅頭拾遺曰木蓮藤名薛荔夤緣樹木牆垣歲久枝葉繁茂生子似蓮房打破有白汁中有細子綱目曰其蔓四時不凋厚葉堅強不花而實實如蓮蓬又如無花果滿腹細子一子一須子分數房每房形狀各異或如稻如麥或如荍如粟俚人用以占歲視其何狀多者則來年必熟然試之不驗性能壯陽固精同補腎藥為丸消腫散毒止血下乳治久痢腸痔集簡方治婦人乳少木蓮二枚豬前蹄一枚煮食飲汁盡無子婦人食之亦有乳煮宜用酒得鮮蝦數十枚同煮更妙如無鮮蝦用於蝦米或干海蝦俱可外科精義治癰疽初起不問生於何處木蓮四十九個太多石臼搗入熱酒一二壺溫服盡出汗即消圖經本草治癰疽用葉生搗熱酒絞汁入蜜少許頓服數升渣敷患處二法皆妙醫藥不便處宜知夏月採實搗磨澄粉明亮如水晶加鹽醋或糖霜食名涼粉縱恣者愛食謹慎者畏不敢食不知多食此物而寒中腹痛或吐瀉者由冷水之害設使熱食何害之有天下壯陽澀精之物斷不能涼散涼血解毒之物斷不能溫補唯此兼之乃上等通才妙品豈反害人乎葉可治血淋澀痛新汲水搗汁可解砒毒宜服數升實可治婦人白帶白淫及血崩多年不愈煅存性研末其藤老則生鱗蒼古可愛宋人句曰煙黏薛荔龍鱗軟雨壓芭蕉鳳尾垂是也枳子綱目曰徐鍇注說文云枳枸又作其枝虯曲故廣志名木珊瑚又名交加枝又名其子形如雞腳故大蘇文集名雞距子又名雞爪子又名棘枸子實味甘故廣記名蜜又名蜜屈律拾遺名木蜜木餳曲禮云婦人之贄枳榛脩脯唐本草曰其樹名白石木葉如桑柘子作房似珊瑚核在其端甘美可食圖經曰即小雅南山有枸也陸疏曰樹高大如白楊所在皆有按枳古以為婦人之贄然大樹絕少吾鄱惟義城村劉姓宅後一株高數丈性能止渴除煩去膈熱潤五臟又解酒毒枝葉前膏味亦甜美食療本草曰屋外有此樹屋內釀酒多不佳造屋用此木為梁柱則屋內釀酒不成詢諸義城村人曰信然椰子綱目曰司馬相如上林賦名胥余又作胥耶果之最大者其樹初栽置鹽根下則易茂大至如斗方結實高五六丈直上無枝葉長四五尺在木杪二月開花成穗出於葉間長二三尺大如五斗器實綴穗間一穗數枚六七月熟有粗皮包之皮內有核甚堅硬厚二三分破之有白肉如凝雪味甘美如牛乳肉空處有漿數合清美如酒殼磨光有斑纈橫破可作壺爵縱破可作瓢杓內瓤能益氣出開寶本草治風出食物本草漿止消渴出開寶本草治吐血水腫去風熱出海藥本草殼治楊梅瘡筋骨痛燒存性臨服時再炒研末滾酒服二三錢暖覆取汗痛立止出綱目為酒器遇毒則沸起或破裂出衍義按椰子大如人頭有兩眼南方草木狀云昔林邑王與越王有怨使刺客乘醉取其首懸樹間化為此果故呼越王頭其漿猶帶酒器幻談也舊唐書云番人取其花造酒飲之亦醉後人緣此誤以為椰杯注水成酒不知椰杯但能試毒其變水為酒者青田核也綱目曰古今注云烏孫國有青田核狀如核桃大容數斗注水則變為酒味醇美隨注隨成但不可留久此乃必無之理但其說已久詩賦中至用為典故故不足信也寰宇志云緬甸有樹高五六丈結實如椰子土人以罐盛曲懸實下劃其汁流罐中即成酒名樹頭酒或不用曲取其汁可熬白糖其樹即貝樹葉可寫書一統志云瓊州有嚴樹搗其皮葉和米或入石榴花葉數日成酒梁書云頓遜國有酒樹取花汁注杯中數日成酒此皆椰漿椰花之類也使君子綱目曰南方草木狀名留求子性能健脾胃除虛熱殺蟲治小兒百病凡味甘者多生蟲酸辛苦者始能殺蟲惟此與榧子甘而殺蟲異物也而榧性大熱多食有損非使君子之匹也開寶本草曰潘州郭使君治小兒多用此故名使君主治小兒五疳白濁溺如米泔止瀉利按小兒多因飲食夾雜致生疳蟲虛熱泄利白濁等症他殺蟲藥必傷脾胃難多服此物味甘名雖為藥實屬果餌可以多服既能愈病又復健脾極宜常煨與兒食之落花生此物不知始出何地自古本草皆不載近種者甚多炒食甘香可口又可榨油惟其多油故能潤燥治乾咳無痰與松子相近而炒食則發癰膿其害與炒豆亦相去不遠凡瘡瘍麻痘雖已痊愈未滿百日猶不宜食又不宜與胡瓜同食汪訒庵收入本草備要甚言其功未免過譽又云開胃進食更屬非是有油之物皆敗脾胃也所以食多令人口不知味種法二月下種自四月至八九月葉間接續開細黃花跗長寸許柔弱如絲花落後節間另出一小莖如棘刺鑽入土中生子有一節二節者有三四節者或離土遠或遇天旱土乾其刺不能入土即不能結子非花已落地猶能不假母氣而生子也然則落花生之名蓋誤呼矣恍榔面綱目曰桄榔木臨海異物志名姑郎洛陽伽藍記名面木楊升庵卮言名董棕又名鐵木海槎錄云其身直如棕櫚椰子樹杪挺出數枝開花成穗綠色結子如青珠每條百餘顆一樹百餘條團團懸掛若傘圖經本草曰嶺南州郡皆有之其木堅硬斫其皮內有細面大者至數石食之不飢皮柔韌可作綆葉下有須如馬尾鹹水浸之即粗脹而更韌彼人用縛海舶不用鐵釘拾遺曰其木剛利如鐵可作釤鋤遇濕更堅海藥本草曰粉味腴美性能補益虛損治腰腳無力佳物也莎木面綱目曰海藥本草作莎木此字韻書不載惟孫愐唐韻莎字注云樹似桄榔則莎當作莎以其葉離披如莎衣也又名欀木張勃吳錄地理志云皮中有白粉可作餌食卮言云榱木即桄榔誤矣左思吳都賦云面有桄榔又有文欀楨橿既是一物不應兩出海藥本草曰莎木生南中八郡樹高十許丈大四五圍葉生其杪兩邊行列如鳥翼皮中有面石許滑美勝於桄榔面性溫能補虛冷又劉欣期交州記云都勾樹亦有面可食綱目以為即欀木未知果否存考黃精綱目曰其性大補中州脾胃故名黃精瑞草經曰黃芝五符經曰戊己芝皆此意也葉似竹或二三葉四五葉對節生別錄名兔竹又曰鹿竹又曰重樓又曰雞格子圓而連綴故廣雅曰垂珠又曰龍銜根似姜故蒙荃曰野生薑長食不害可以救荒辟穀故蒙荃曰米餔別錄曰救窮草又曰仙人餘糧拾遺曰有二種一種葉對節者名正精力厚一種不對者名偏精力薄圖經本草曰三月生苗高一二尺莖梗柔脆四月開青自花結子白如黍米亦有無子者其苗嫩時可充菜茹名畢菜山中人呼筆管菜是畢乃筆之訛也嘉祐本草曰服黃精花勝於實服實勝於根但花生者十斛干之才得五六斤又必須服至十年乃有益非大有力者不能辦也按此乃好奇之說極不可信黃精之力全在於根謂莖葉花實均可服餌均能補益則可謂勝於根則不可蓋凡諸草之根如菜中之薯蕷甘薯芋魁百合萊菔藥中之地黃門冬何首烏牛膝等其枝葉花實俱可食俱有用而力並遜於根所以然者精華既注於根則凡莖葉等自不能及豐此者不得不嗇彼造化之理本如是也又別錄謂二月採根亦非宜七月以後採之蒸曝久服能補中益氣除風濕安臟腑補勞傷助筋骨益脾胃潤心肺出日華本草聖濟總錄有治大風癩瘡方用黃精納粟米中蒸至米熟時時食之黃精宜蒸極熟食療本草曰帶生則戟人喉此乃僅同粟米蒸熟黃精尚末半熟或借其戟喉之力以祛風乎且與別錄除風濕之言相合有此患者久服之至於博物志太陽之草名黃精食之可以長生太陽之草名鉤吻食之入口即死陶隱居緣此遂謂二物相似炮炙論蜀本草群以為然唐本草本草拾遺並云鉤吻即野葛與黃精極不相似綱目曰博物志但舉陰陽二草言其良毒之性異未嘗曰形同也考神農本經吳普本草並言鉤吻是野葛蔓生莖如箭是二物明明不相似也當以拾遺唐本之言為正菡萏其實蓮其根藕其中藥菂中薏郭注云蔤乃花下白蒻在泥中者初生嫩藕俗名藕鞭又名藕尖蓮乃房也藥乃子也薏乃中心苦也別名芙蓉古詩曰涉江採芙蓉又拒霜花名木芙蓉以其色麗如蓮花也綱目曰北人以藕為荷亦以蓮為荷蜀人以藕為茄此皆習俗傳誤也陸機詩疏曰其莖為荷其花未放為菡萏已放為芙蕖爾雅以荷為根名蜀本草以荷為葉名詩疏以荷為莖名莖有負荷之義當從詩疏按爾雅首舉荷字下文曰其莖其葉其本其華其實其根諸其字皆指荷字是明明以荷字為總名何嘗以為根名至獨以為莖名目詩疏而外絕不經見綱目以負荷解之極為欠妥蓋荷花之荷平聲負荷之荷上聲不知根葉花實古人互稱者甚多何必強為區別宋人句曰風蒲獵獵弄輕柔欲立蜻蜒不自由五月臨平山下路藕花無數滿汀洲明人句曰歌扇舊分桃葉渡釣船還傍藕花居又曰接天蓮葉無窮碧映日荷花別樣紅李青蓮句曰若耶溪邊採蓮女笑隔荷花共人語是藕可名花荷亦可名花蓮又可名葉其他互用者不可枚舉其生也仲春初發莖弱不能出水葉甚小謂之貼水荷錢至孟夏莖漸粗葉漸大乃能出水亭亭如蓋明人句曰春色闌珊四月天數聲啼鳥落花前荷因有熱先擎蓋柳為無寒盡脫綿生肥澤者藕粗長可及丈莖亦不下六七尺故梁武旁西洲曲曰採蓮南塘秋蓮花過人頭至李青蓮詩蓮花十丈藕如船恐非實有也一種千葉蓮重薹攢簇不結子一種並蒂蓮一莖兩朵並開一種金蓮色黃碧蓮色綠繡蓮五色如繡一種睡蓮夜縮入水其單瓣蓮花晝開夜合有紅白二色白花者蓮藕俱佳結子差少紅花者子多藕味少遜其花侵晨浥露謂之初日芙蓉不獨色嬌香尤韻絕近午則香漸斂而暮靄澄江晚風送馥其葉香亦不在花香之下蓋花香早葉香暮也葉形如仰盂不傾不倚雖生於水而不沾水橫塘雨過如珠之走盤蓋惟不沾則不重故不傾而倚也泊乎霜後莖枯秋江夜雨猶足以滴碎鄉心驚回旅夢有梧桐之簫瑟所不得擬其幽芭蕉之淅瀝所不得侔其韻者李于田先生絕句云孤閣臨流混太清煙波渺渺抱重城西風莫遣枯荷盡醉客重來聽雨聲蓮實爾雅曰的薂郭注曰即蓮實本經曰藕實又名水芝又名澤芝味甘而澀性溫不宜生食能動氣作脹必須煮至極爛不爛則難以困脾入丸散藥則不宜煮去汁只去衣蒸熟去心焙研用性能補中養神益氣出本經主傷中五臟不足出食療本草止虛痢及泄精多食令人歡喜出日華本草交心腎厚腸胃固精氣止脾泄久痢赤白濁女人帶下崩中出綱目搗碎和米作粥飯食輕身益氣令人強健出詩經註疏又療胸胃寒冷逆噫不止蓮肉炒香二兩丁香一錢研末米飲下方寸匕或二匕出元和紀用經按蓮肉大補心脾之氣兼能補血凡產後虛脫及一切虛寒滑脫者切不宜食食療本草乃云諸鳥猿猴藏蓮子於石室至三百年者人得食之永遠不老請問此物何處尋覓假令有之又如何辨別古今來誰曾試驗又云雁食之不化糞于田野山岩之中人得之每旦空腹食十枚便身輕如雁能登高囑遠皆荒誕之言也又石蓮子乃秋後老蓮落水沉沒泥中多年者蓮殼極堅故種者必剁去始出不然浸泥水中雖十年不芽亦不壞味變極苦則甘溫之性亦變寒涼蓮本補脾胃味既變苦故入中州而除胃火為治噤口熱痢之神藥別錄以尋常殼堅黑者為石蓮則凡蓮實未有不俟殼堅而可收採者其性溫而澀痢疾雖已向愈餘熱未盡者猶忌之可用為治熱痢之藥乎俗醫又誤以煎鹽之石蓮為治痢之石蓮今藥肆中盡是此物此乃木生因其形似蓮故名石蓮名是實非豈可誤用欲得真者宜囑冬時掘藕之人便中撿取但新者多陳者少耳蓮薏味苦性寒功專涼血治產後血渴生研末米飲服二錢出藥性本草又善清心去熱治勞心吐血研末每以一二錢攪糯米粥食又有勞心即泄精者食此粥亦極效蓮蕊須味苦能止腎熱泄精血崩吐血綱目以為與蓮子同功大誤蓮子溫而澀此寒而澀也蓮房一名蓮蓬苦而極澀燒存性能止血崩下血溺血出綱目又治胎漏下血燒研末麵糊丸每阿膠三五錢煮酒下百丸出集驗方生煮酒則反消瘀散血治血脹腹痛胞衣不下又解菰子毒水煮汁服出拾遺荷葉本經別錄俱不收至唐陳藏器本草拾遺載其功用雲散瘀血治血脹腹痛下胞衣解野菌毒則是與蓮蓬同其言有理乃又忽云荷蒂能去惡血留好血可以安胎後人遵而用之絕無一驗荷蒂七枚泡水安胎之方舉世庸醫及窮鄉僻壤婦人女子無不知之迨至屢用屢不效而猶視為秘室與朱震亨白朮黃芩安胎聖藥產後雖有他症以末治之諸邪說均為流俗口頭常話蓋無日而不誤人者也日華本草云能破血落胎以理揆之消瘀散血之藥既下胞衣則落胎之言可信豈可反用以安胎乃俗醫誤用而胎不盡落者以其少也設使多用屢用無不落之理所以聖惠方治跌撲損傷惡血攻心悶亂疼痛用乾荷葉燒存性研末童便服二錢日三服集簡方治刀斧傷新鮮荷葉搗爛炒熱封無則乾者研末醋和韭汁調敷醫壘元戎治陰腫痛癢荷葉浮萍蛇床子煎湯頻洗一切風瘡癢俱可用濟生方治吐血衄血四生丸生荷葉生柏葉生地黃等分生艾葉減五之四同搗水煎服以上諸方皆取其散血也迨金時張元素創造枳朮丸方用荷葉包飯燒之為丸則不知何意至元朝李杲解為荷葉形如仰盂象震木用入此方乃升發足少陽甲木手少陽三焦生髮之氣此氣既升胃氣何由不升不知脾胃屬土補脾胃必須升發木氣其理安在且全部東垣十書所立數百千方不論溫涼補瀉每方必有升麻柴胡葛根蒼朮升散藥或一二味或四味全用乃至治天行疙瘩大頭症亦用升麻蒼朮荷葉三味名曰清震湯名其病曰雷頭風升麻荷葉助其上盛之陽邪蒼朮燥其垂竭之陰液畔道離經至此而極後世無目之人猶亟稱之豈不悲哉此症之生其氣最惡死最速回憶生平凡數見治之惟以退熱消風解毒為主者則十全八九服清震湯者則百無一生予蓋目擊數十百人矣願舉世業醫之人講求內經熱病論刺熱論諸篇之實理傷寒論金匱之實法更遠而參深師肘後東陽千金外臺活人諸書之變近而考方有執喻嘉言徐靈胎汪苓友葉夭士諸子之通勿為金元明空言所蔽邪說所迷斯足以挽回劫運利濟蒼生為彼蒼之肖子矣藕古方謂藕熱節涼極不可信大抵性皆熱生食或搗汁和酒飲能破血消瘀和梨汁治吐血不止龐氏方治產後悶亂用生地黃冷水浸搗絞汁和生藕汁等分加童便服又治小便血淋即上方加生蒲桃汁等分又治跌打瘀血積在胸腹作痛唾血生藕汁頻飲加生地黃牛膝搗汁服更佳出千金方又解蟹毒令人腹痛便血吐血又解水莽草毒均即上方藕汁一味出聖惠方又治塵芒入目生耦汁滴入即出蒸熟食健脾益心補氣血本經曰久食令人心歡古詩云一灣西子臂七竅比干心亦用形之理也然性更熱凡脾熱易肌及肺熱咳嗽吐血心熱驚悸夢遺者慎不可食普濟方治手足凍瘡坼裂潰爛熟藕搗爛敷之性可知矣菱俗呼菱角別錄名芰角風俗通名水慄又名沙角綱目曰武陵記以三角者為芰兩角者為菱左傳屈到嗜芰召宗老曰祭我必以芰及祥將薦芰其子屈建命去之以為不以私欲干國之典不知疱人共好羞情禮之至也屈建乃未之知乎爾雅謂之蕨說文曰菱楚曰芰秦曰薢茩大非薢茩亦見爾雅曰英茪郭注曰芵明許氏蓋因蕨芵明音相近而訛也丹鉛錄以芰為雞頭引離騷緝芰荷以為衣謂菱葉不可為衣亦非芰荷乃覆蓮花之葉蓮花每朵必有一葉與之共節而生若擎蓋然其名為芰與菱芰為芰名同物異見埤雅楊氏失考故誤以雞頭當之也其生也二月生蔓浮水葉下之莖有股如蝦股四五月開小白花夜開晝合隨月而轉惟其向月故美人之鏡取以為名唐人之詠昭君曰漢國明妃去不還馬絃索向陰山匣中縱有菱花鏡羞對單于照舊顏實或三角四角兩角或圓而無角野菱實差小嫩時食宜生老則宜熟味在蓮子之上澤居者舂去殼曝乾久留為飯為果可代糧其莖和米作飯可度歉歲家菱種於陂塘葉實俱大角軟而脆彎卷如弓色有青紅紫頗美觀味則遠遜野菱按菱實熟食能益氣安中健脾解暑而性平不熱久食無熱中之患平素大便溏者最宜多食其功在蓮子之上但澀而壅氣與蓮子同生食解暑治傷寒積熱止消渴解酒毒則非生蓮肉所能及惟氣滯中滿人忌熟中寒胃弱人忌生食療本草曰生菱肉性冷多食令人腹脹痛或吐利乾薑煎酒服或吳茱萸為末服解之予意不如砂仁草果或白豆蔻陳橘皮廣木香等為末服更佳可溫中調氣開胃醒脾不獨生菱即食多熟菱壅氣作脹或腹痛及一切瓜桃生冷所傷均可治方更穩也芡綱目曰本經名雞頭又名雁喙古今注曰雁頭韓文公集曰鴻頭莊子無鬼篇曰雞雍管子五行篇曰卵菱實味微甘而澀能止泄益腎治小便不禁遺精帶下白濁衍義難消化多食傷脾胃陶隱居曰小兒多食令不長按芡實較蓮肉菱肉更澀而無其甘且質粗而硬寇氏傷脾之說確乎可信唐本草乃云益人勝於菱肉則大誤矣而孫升談圃以為芡本不益人俗稱水硫黃者人之食芡必咀嚼終日故能使華液流通轉相灌溉矛盾之言極為可笑未以本不益人之物只多其咀嚼便變為有益是世間諸物不論性味功能只粗硬耐咀即為佳品有是理乎藥中用為止澀夫嘗無效作果多食甚不相宜小兒尤忌陶氏不長之言非謬也乃今富貴家群尚之可嗤也其莖其根充蔬生熟皆有益見菜類葉可下胞衣全者一片破缺者無用水煎或酒煮服出急救方葧臍綱目曰別錄名烏芋爾雅名鳧茈後訛為鳧茨通志作地慄日用本草曰小者名鳧花大者名地慄衍義曰皮厚色黑肉硬而白者為豬葧臍皮薄色紫肉軟而脆者為羊葧臍按葧臍野生者小而硬種蒔時加以培壅則大而脆性冷難化別錄云溫中益氣日華本草云開胃下食圖經云厚人腸胃皆誤食療本草云除實熱夙有冷氣人食之必腹脹氣滿食多臍下結痛此正論也入藥用能消銅小兒誤吞銅錢搗汁細細呷之出百一選方又破血博濟方名黑三稜神秘方用治大便下血搗汁和酒日二三服經驗方用治赤白痢完好者燒酒浸泥封瓶口每取二枚細嚼原酒下又解砒信毒搗汁灌之多服取效少則無功煨熟食性平不冷且易消化然未必遂能溫補也又野生小如豆者搗澄粉諸膽汁浸曝乾點目可除熱眼雲翳久點取效出備急方慈姑別錄名藉姑又名水萍圖經名河鳧茈又名地慄苗名剪刀草救荒本草名箭搭草唐本草名搓丫草日華本草名燕尾草綱目曰生淺水中四時不幹處生更多人亦種之三月生苗青莖中空有稜葉前尖後歧略似半夏葉霜後葉枯掘為果須灰湯煮熟乃不麻澀戟人咽性極不宜人食療本草云多食損齒髮腳氣癱瘓風損令人乾嘔然可治病日華本草曰解百毒治產後血悶攻心欲死催生下胞衣俱搗汁服一升又可下石淋一升太多約服一合可也圖經曰葉可搗塗諸瘡惡腫小兒赤遊丹毒又可敷蛇咬又有山慈菇因根形似故名實非同類但入藥用不堪作果葡萄綱目曰史記作蒲陶漢書作蒲桃有數種圓者名草龍珠長者名馬乳蒲桃白者名水晶蒲桃黑者名紫蒲桃蜀中有綠蒲桃雲南者大如棗波斯者大如雞卵西邊有瑣瑣葡萄小如五味子而無核按蒲桃西北產者肉厚味甘生食或糖餞皆佳東南所產肉薄子多味酸多甘少其性生者能除煩解渴逐水利小便出別錄又治血淋澀痛生蒲桃生地黃生藕各搗自然汁等分相和蕩微溫頻服一杯無生蒲桃用藤煮濃汁出千金方又治痘瘡不出煎酒服出圖經若充果不宜多食令人煩悶糖藏者稍佳然表病人亦不宜食酸主斂也又可作酒見穀類物類相感志云甘草作釘刺之立死人麝香於皮內則結子皆帶香氣愛憎之異如此又延壽書云蒲桃架下不可飲酒恐蟲屎傷人此蟲大而且多螫人有毒且蛇最喜上架食其子坐臥其下難免不測之禍庭院間不宜植之陸士衡詩渴不飲盜泉水熱不息惡木陰者此也蘡薁綱目曰即野蒲桃唐詩注曰山蒲桃廣雅名嬰舌蔓葉及花略似蒲桃實小而圓味更酸豳風所謂六月食鬱及蘡者也病人忌食藤可治熱病乾嘔呃逆四肢厥冷煎濃汁頻呷之出肘後方根可治赤遊風毒紅腫痛癢不速治殺人搗塗之出變通要法以上二方無野者均可代以家者但力少遜耳西瓜一名寒瓜有二種一種瓜大可徑尺子少其瓤津多味美有紅白二色謂之食瓜北土者為上南方遠不及也一種瓜差小瓤淡微酸子反多北土者子大無味南方者子小炒食甘香謂之子瓜瓤性極寒日用本草謂其能除煩止渴解暑熱則是食鑑本草謂其能寬中下氣則非食物本草曰西瓜性寒解熱有天生白虎湯之號然亦不宜多食按天生白虎湯誠非虛譽凡患實熱症及脾胃索強者食之頗有殊效若虛熱或資稟弱或夙有冷病人即不宜入口至於伏暑之時愛其寒涼適口取快一時而瘧痢霍亂諸病必隨之可不慎歟又不可同油餅及一切魚肉雞鴨卵食更敗脾腎令人腹痛嘔泄解多食成病見下甜瓜瓜子仁有油綱目曰清肺潤腸語可信食療本草曰補中則必無之理也今嗜之者眾性平味淡無甚損益欲醫用童女口中剝出仁入補藥極為可笑又云動火亦非也甜瓜綱目曰瓜類不同大曰瓜小曰瓞爾雅曰瓞瓝其紹瓞子曰肉曰瓤跗曰環脫處也蒂曰疐系蔓處也以狀得名則有龍肝虎掌兔頭貍首羊髓蜜筒之稱以色得名則有烏瓜白團黃白小青大斑之別唐志以遼東敦煌廬江者為勝而瓜州之大瓜陽城之御瓜蜀之溫瓜永嘉之寒瓜亦各有優劣也甘肅甜瓜皮瓤皆甘過於糖蜜浙中陰瓜色若黃金性亦僅能止渴除煩解實熱而已而衍義云暑月食之永不中暑誤矣大抵利害與西瓜同孫氏曰多食發黃癉病後食之令胃寒嘔吐不特此也能使中寒肚腹脹痛四肢虛腫腳氣人食之病永不除食療本草云多食破腹作泄令人手足無力陰下濕癢動宿冷成症癖解多食作脹法食鹽花少許即消綱目曰博物志言以冷水浸足至膝可啖瓜數十枚至項其啖愈多水皆作瓜氣物性之異也予意瓜最畏麝觸之則一蒂不收又畏酒熏之則爛凡解瓜積莫如飲熱酒燒酒尤妙及水服麝香勝於食鹽漬水也然僅能消不消之瓜積不能救瓜性之寒不如砂仁白豆蔻乾薑吳茱萸川椒之類或理中湯加砂仁白蔻治之解過食西瓜胡瓜越瓜同蒂味極苦千金方名瓜丁又曰苦丁香性能發吐仲景有瓜蒂散又治熱病發黃千金翼用瓜蒂為末吹鼻取出黃水乃愈又治鼻中瘜肉聖惠方用瓜蒂白礬各半錢為末綿裹塞之子中仁諸本草載有多用率皆不驗大約如西瓜子也甘蔗綱目曰南方草木狀作竿蔗離騷漢書皆作甘朽畦種每節庶出一苗故字從庶說見野史莖似竹而內實大者圍數寸長六七尺葉如蘆王灼糖霜譜云蔗有四種一曰杜蔗莖瘦皮硬汁極甘醇專用作糖一曰西蔗一曰蠟蔗又名荻蔗皮稍松可生啖亦可作糖一曰紅蔗又名紫蔗又名昆倉蔗皮肉鬆脆味差淡只可生啖不堪作糖其性秋時新出者熱至冬梢平春時更平不寒不熱日華本草曰性冷除煩熱綱目引王右丞大官還有蔗漿寒之句以為性寒能瀉火皆誤也別錄曰甘和中助脾氣日用本草曰多食發虛熱動衄血新蔗實然可知性必不寒矣梢頭數節味極淡近中則汁多味厚至根汁雖少而味愈厚故凡喻後勝於前者謂之倒啖蔗漸入佳境梅師方治胃寒吐食蔗汁七升薑汁二合細呷之胃熱者不宜用肘後方治乾嘔不息即上方此皆別錄和中之理不然甘者嘔家所忌也外臺方治傷寒發熱口乾甘蔗任啖不禁此蓋藉其冷汁以折熱不能去熱能折熱不必用開水泡且緣此少飲茶水可免傷脾惜乎暑熱病發時此物即紅腐無汁故其救病之功絕少蔗渣燒煙能損目目疾人宜遠之砂糖蔗性本溫煎煉成糖則近熱唐本草謂其冷利治心腹熱脹大謬食療本草曰性溫不冷多食令人生長蟲消肌肉助脹肋嘔發疳䘌同鯽魚食生疳蟲同筍食成積凡疳蟲脹滿嘔吐及齒病人忌食而其為用綱目云和中助脾緩肝氣蓋溫則能和甘則能緩凡腹中急痛宜砂糖泡水熱服加木香或枳殼尤妙又能破血婦人產後血滯宜攪熱酒服二三次但不宜多神授方治跌撲傷筋折骨雞骨炭獨木柴所燒之炭圓如雞骨故名其炭堅結擲地有聲者佳松如麩炭者不堪用不拘多少燒令內外通赤入研槽中同砂糖急研令稀稠得所乘熱敷之日華本草曰除大小腸熱解酒亦誤矣白糖一名糖霜一名白砂糖一名乳糖用紫砂糖煎煉加牛羊乳今惟用豬油俟其凝結逐層刮取潔白如霜吾鄉吉贛虔寧諸郡及浙閩粵東皆產潮州者為上性較紫砂糖稍平食療本草曰潤肺生津綱目曰潤肺消痰治嗽和中助脾緩肝唐本草亦謂其冷利能治熱脹大非多食助熱助脹損齒生蟲之害與紫砂糖同蓋蔗性本平加以火煉為砂糖則熱再經煎煉始為白糖性反稍平者得力於乳及豬脂之潤也故有潤燥生津消痰治嗽諸用獨其能消蛋積凡諸禽卵與此同食味佳而易化食卵成積泡濃湯熱飲之立消此則物理之難究者也冰糖一名石蜜王灼糖霜譜曰唐大曆間有鄒和尚者來往蜀之遂寧傘山始傳造法故甘蔗所在植之獨福建四明番禺廣漢遂寧有冰糖紫色及如水晶者為上深琥珀色次之淺黃又次之淺白為下按冰糖閩之福漳二州為上色皆瑩白其塊大者可數斤諸本草皆與白糖同列蓋其性亦略同也糖藏諸物佛手柑圖經曰枸櫞一名香櫞今俗誤以橙為香櫞閩廣江南皆有之性最畏寒惟閩廣及虔吉寧贛諸州可種他處僅盆植冬月移置暖室亦不能耐久葉如橙結實皮肉相連味短而香芬絕勝綱目曰其樹必近水乃生實如人手有指故名佛手亦有僅分數稜無指如人手之握者俗呼佛拳置之几案清香襲人若以蒂插芋上可經久不癟搗蒜罨其蒂則香更充溢切作薄片或雕鏤花鳥糖蜜藏之香味頗勝其性行氣和中快膈與橙橘無異耳金柑綱目曰橘譜名金橘漢書名盧橘廣州志名夏橘北戶錄名山橘魏王花木志名給客橘文選注以枇杷為盧橘司馬相如上林賦盧橘枇杷並列則非一物明矣其樹不甚高大結實大者徑寸小者如指頭形圓長不一味酸甘而氣芳馥生食不佳蜜餞糖藏則美一種山金柑小如豆俗名金豆一枚只有一核亦可糖蜜漬為果性與柑橘彷彿一種形圓長如牛乳過冬不摘至春復青次秋則又與新生者同時黃熟歲歲如此可歷數年不墜愈久則味愈佳名長生果返老還童真草木中之仙品矣橘餅閩之福漳汀泉等州以全橘壓扁糖霜餞之為橘餅漳州者為最甘香可口數十年前惟有大者近乃群尚小者名金錢橘餅其氣味遠遜大者蓋此乃黃落不成之橘巧立金錢之號以欺人而人遂受其欺亦可見俗情之愚矣大者行氣和中快膈之功較佛手金柑稍猛香橙皮橙味酸苦其皮糖餞為果頗可食名香圓條鄰邑都昌所出味美無渣然氣味最厚氣滯者則宜虛人則忌鹽醃力稍平虛病人總不宜食也天門冬見一卷桂花可糖藏亦可鹽醃或點茶或浸酒或入果餌性近熱又近耗虛而有熱者忌之玫魂花玫瑰紫玉也此花色紫香而豔故名果品中常用之物無甚損益其牡丹芍藥諸花皆入食品性皆彷彿珍珠蘭香氣甚濃性熱而耗點茶作果所用無多無所損益松花取花上黃粉點茶別是一般風味但不能停久和白糖作餅稍可久留性能潤肺釀酒服可疏風取初抽嫩心狀如鼠尾者搗碎浸酒服治風眩頭運腫痹皮膚𤸷急出元和紀用經薔薇花野者生籬落間栽蒔者花重蔓香豔根能止久泄治下虛小便不禁千金方聖惠方並用煮酒服又為口瘡聖藥野生單瓣根亦可用花糖藏入食品甚馥郁南番薔薇露香尤甚云是此花之露水非也蓋以花入甑蒸取其汁凡玫瑰茉莉珠蘭桂花蓮花牡丹芍藥均可作露其香太重性熱而耗氣虛有火人忌之梔子花佛書名薝蔔含苞時即有小蟲如塵在內食其心雖鹽醃糖藏常食無損然有蟲即有毒病人勿食茉莉花根可合蒙汗藥花可引蜈蚣其毒何如病人勿食諸粉葛粉葛根可績布又可澄粉生者可食性味辛涼能退肌膚大熱引津液上潮於口澄粉性平能止煩渴解酒毒表熱煩躁嘔家及酒客宜之入藥治時氣傷寒壯熱頭痛如劈生汁一大盞豉一合同煎分三服汗出即瘥未瘥再作心煩加生梔子十枚聖惠方熱嘔不息生汁一升服肘後方又治煩躁熱渴外臺方煩躁咽乾生黃耆生甘草生葛各二兩煎湯頓服元和紀用經熱毒下血生葛汁生地黃汁等分生藕汁減四之三和服梅師方如無生者用乾葛則力減宜加分兩但孕婦不宜用拾遺曰能墮胎按仲景葛根湯本太陽表藥明說太陽病頭痛無汗項背強𠘧𠘧惡風者葛根湯主之而張元素謬雲陽明表藥仲景用之者為斷太陽入陽明之路若太陽初病便服葛根反引邪入陽明夫仲景方書之祖同一葛根仲景既用為斷路之兵何以他人用忽變為引路之賊即如上文所列之方皆治傷寒初起危症若為此等邪說所誤畏不敢用豈不釀成大患耶其詳說在傷寒則例醫家三法二稿藕粉藕能入血而助熱澄粉則稍平然熱病亦不宜食綠豆粉見穀類蕨粉見菜類諸果有毒本草綱目曰凡果末成核者食之令人發癰癤及寒熱落地經宿有惡蟲緣過者令人患九漏或至殺人雙仁者雙蒂者沉水者此不可泥質重必沉並有毒殺人凡果異常者謂大小及形色根下必有毒蛇食之殺人光怪陸離者毒者尤烈通解食果成積不消首麝香次則熱酒解冷物所傷見菱實及甜瓜條下解熱物所傷如安石榴櫻桃榧子藕蔗當隨證立方從容調理不能預定成法蓋冷之害淺熱之害深也若一時救急甘草濃汁或桔梗甘草湯或梨汁或黑豆綠豆汁俱可
