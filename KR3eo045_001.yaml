front:
  text: 序飲食為生人大欲拂之則顛縱之則流誠不可不辨也觀經傳所載以及本草職方諸子百家言飲食者甚繁古人謂保壽有三其一在腹中量所受即是辨之明耳吾鄉前輩章杏云老先生儒雅士也本經術湛深之餘手訂飲食辨一書上窮天文日星歲序歷算下究草木蟲魚山海珍錯凡五行百産之精一飲一食之微無不源源本本辨其性之剛柔燥濕與其用之損益斟酌條分縷析較鍾伯敬遵生八箋異曲同工矣老先生積籍頗富自少而壯而老未嘗一日廢學資敏善記數千言過目一二遍便能背誦永不忘更精醫理家雖貧曾不知阿堵為何物聞相識有奇險症蔽裘破蓋輒親往無難色指下活人無數人望之如生佛云是書之成蓋得自老先生博覽群書識之於心筆之於簡不惟日追駒影亦且夜費蘭膏孜孜矻矻至老不倦所著各種皆經試驗不爽既考諸古復證諸今並非剿説雷同可比老先生仁心為質久欲以是編問世若無力不能遂意又不肯因人成事在日僅鐫半集輒止老先生壽履耋耄以無疾而終夫乃知其得力於手訂之功居多是書不即現身説法者歟歿後板存半稿存半適有好善者求其後稿續刻成編昨問序於余當夕豫就睡甫交睫忽與老先生大令嗣乃已故明經軒凌先生相晤於南柯下渠似有所託之狀豫醒而驚恍然老先生英光慈範猶在目前嗟乎神物斷無終埋明珠自應合浦老先生數十年攻苦婆心濟世功當不朽覽斯編者奉為飲食之經即共躋夫仁壽之域此其德澤之垂於無窮亦豈豫後學所能揚其萬一哉亦聊以志感慕不忘之意云爾時道光三年歲次癸未浴佛節同邑後學曹建頓首拜撰
