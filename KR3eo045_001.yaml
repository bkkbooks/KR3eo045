body:
  text: 調疾飲食辨述臆粵稽周官醫師為醫官長其下四官疾醫療疾瘍醫療瘍獸醫療獸命之曰醫宜也食醫職司調食不及藥石之具亦以醫名知飲食之關於疾病者大矣故魯論載不食之條大易著觀頤之訓雖無疾猶當謹之況其在沉疴困頓間乎杏云老人閲歷病情五十餘載見誤於藥餌者十五誤於飲食者亦十五藥餌之誤罪在醫飲食之誤罪在病人而律以食醫調食之皆醫者亦不得辭其責也然食品繁多講求不易自古醫書談此事者代不乏人鮮有善本獨前明李氏綱目最稱淹洽而詮理多乖愛不揣弇鄙舉世問食物分為六類考訂以綱目為宗詮理則折衷於漢魏六朝唐宋元明數百家之説期於得義理之安而後已是役也寒暑三更稿凡五六易書成得二十萬言焚膏呵凍揮翣驅蚊悉老人親添不律無一人一日之助也而其以辨名書者何李氏博學多聞於醫術則未窺堂奧蓋自軒農肇立醫經傳至宋時而統中絶金元明劉張朱李薛趙高韓諸子識趣卑陋學植空疏綱目為其所囿全部論説物理病情總不能出此數家之塵霧此則如金在沙非淘之汰之使沙盡而金胡以見豈好辨哉實將擁慧中逵為研搜者清拓古開蒙之道俾無愧於稱師長也云爾時皇清嘉慶十八年太歲在昭陽作噩皋月上淙翻陽杏云老人章穆調疾飲食辨發凡一病人飲食藉以滋養胃氣宜行藥力故飲食得宜足為藥餌之助失宜則反與藥餌為仇乃世俗之弊則有二叨餮之人但貪口腹不遵禁忌誤在放縱謹慎之人不知物理概不敢食誤在拘泥加之嗜好萬有不齊風土五方各別誤投害固非淺而當食不食坐失亦多矣然畢竟謹慎者誤小放縱者誤大數十年中常見用藥不誤而病日深者皆不遵禁忌之人也故書中諄懇言之願舉世病人各以生命為重慎勿欺瞞醫人偷食不宜之物以自喪其生且令醫人蒙不白之冤也一食物有極宜病人而俗醫反以為大戒者有極不宜病人而反不戒者是病人不知物性醫人更不知物性也書中辨論處必反復申明其理固已又必援引古訓或一二家或數家之説以證之明吾辨之有所依據非一人臆度之私也願舉世醫人各以病人生命為重慎毋偏執一知半解悍然自是致病人遭殺人不用刃之禍也一歷代醫書本草考據精詳莫過於唐陳藏器拾遺甄權藥性宋蘇頌圖經掌禹鍚嘉祐寇宗奭衍義明李時珍綱目而論食物稍詳者惟唐孟詵食療南唐陳士良食性明寧原食鑑王穎食物書中引證處惟以綱目為主其餘諸家亦不下十之五六凡整篇整段及語關切要者必標其名間有節引一二句或合數家之論以成一説者勢不能一一標名恐隔斷文氣令讀者目迷非敢掠美也一此書之作雖全以綱目為主而斷制處則不敢隨聲附和蓋考據之精綱目為最於理境則不能無欠也明眼人自知之一書中援引各家之説十九非全録原文其改竄刪補處取理明辭暢使讀者瞭然心目而已蓋古人千慮一失義理或有未安辭旨不無滲漏鄙意欲明示後人乃正以納忠古人九原可作當亦相視而笑莫逆於心也一書中所録諸方皆極平穩且應驗閲者隨時檢用不須加減以此乃醫家病家兩用之書家置一册即得百千救急妙方其因病制宜不可執泥者乃醫家變動不拘之活法非人人所能用也任是佳方概不敢録一書中辨論不厭詳明理也而語多提撕警戒未免嫌於狂憨蓋非立異鳴高亦力挽頽波不得不然之勢也試觀大司馬九伐之法載在周官子輿氏則曰善戰者服上刑矯時救弊之言易於抗激古今血性人往往如斯惟讀者諒其愚直而已一書中所引醫家論説動關實用不敢稍有舛訛其經史子集四庫中典故及稗官野史説部叢書不過借為考據或偶然涉筆成趣篇名地名人名朝代不無間有繼謬蓋此書成於晚歲學業久荒又卷帙散亡無片紙可供獺祭惟讀者諒其昏髦而已一醫書與儒書並重故本朝進呈醫家論著亦得與四庫全書並塵已覽武英殿書目中皆蒙欽定考語示其優劣而本草綱目一書康熙字典亦多采擇諸凡術藝家言不得與焉乾隆年間復奉敕纂修醫宗金鑑薄海內外無不欽遵故此書所載典故故藏冰鹽政茶課魚課曆法河工牧政馬政等條略於前代而於本朝謹遵乾隆年間欽定條例詳悉繕入仰草野儒生共知損益百王之盛軌焉其不能盡載者會典久已頒行朝野恪遵為成憲留心有用之學者可以全考也內經飲食宜忌靈樞五味篇黃帝曰願聞穀氣有五味其入五藏分別奈何伯高曰胃者五藏六府之海也水穀皆入於胃五藏六府皆稟氣於胃五味各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味咸先走腎穀氣津液已行營衛大通乃化糟粕以次傳下帝曰營衛之行奈何伯高曰谷始入於胃其精微者先出於胃之兩焦以溉五藏之字當虛字看先出於胃之兩焦者上下分行也注家乃云之至也則是看作實字如之一邦之三子告之類本文亦當先出於胃作一句之兩焦作一句理解殊覺牽強別出兩行營衛之道必內溉五藏然後能外濡軀殼故曰別出也兩行者營主血衛主氣谷入於胃則氣血一時同受其蔭無先後之分故曰兩行王太僕注云清者入營濁者入胃是也其大氣之摶而不行者積於氣海出於肺循咽喉故呼則出吸則入天地之精氣其大數恆出三入一人肖天地以生故呼吸之氣亦出三入一故谷不入半日則氣衰一日則氣少矣可知人無穀氣則無胃氣無胃氣則無呼吸俗醫遇病必戒食粥是恐其益胃氣用炒米湯是欲其無謂氣然則人必呼吸寂然始為無病乎無理不通帝曰谷之五味可得聞乎伯高曰五穀粳米甘麻酸大豆咸麥苦黃黍辛五果棗甘李酸栗咸杏苦桃辛五畜牛甘犬酸豬咸羊苦雞辛五菜葵甘韭酸藿咸薤苦蔥辛脾病者宜食粳米飯牛肉棗葵心病者宜食麥羊肉杏薤腎病者宜食大豆黃卷豬肉栗藿肝病者宜食麻大肉李韭肺病者宜食黃黍雞肉桃蔥肝病禁辛心病禁咸脾病禁酸腎病禁甘肺病禁苦此言五藏之虛故以本行所屬之味補之而復禁其相剋以免賊害只甘苦酸辛咸五味為一定之理其諸物則萬不可泥肝宜食甘如肝木乘脾非參耆甘草不能緩肝急是也粳米飯牛肉棗葵皆甘心宜食酸如心熱不眠及汗出非酸棗仁竹菰不能安不能斂是也犬肉麻李韭皆酸脾宜食鹹如脾約便難非蓯蓉芒硝不能潤是也大豆豕肉栗藿皆咸肺宜食苦如肺實而壅非黃芩葶藶不能泄是也麥羊肉杏薤皆苦腎宜食辛如腎寒邪閉非細辛肉桂不能發是也黃黍雞桃蔥皆辛此言五藏之實各引一二病以示大概而不能盡也蓋義理深微病症又極其繁賾從前注家亦未能盡合此不過為病人飲食起見期於顯淺共喻歧黃精理總未深談故不贅陳以滋轇轕黃帝問於少俞曰五味入於口也各有所走各有所病酸走筋多食之令人癃閉也咸走血多食之令人渴辛走氣多食之令人洞心心中空如無物苦走骨多食之令人變嘔甘走肉多食之令人悗心猶言厭厭欲吐不吐注家以為悶非是余知其言也不知其由願聞其故少俞答曰酸入於胃其氣澀以收上之兩焦弗能出入也不出即留於胃中胃氣和溫則下注膀胱膀胱之胞薄以濡得酸則縮綣約而不通水道不行故癃陰者積筋之所終也故酸入而走筋矣鹹入於胃其氣上走中焦注於脈則血氣走之謂走聚咸所血與咸相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本干而渴血脈者中焦之道也故鹹入而走血矣辛入於胃其氣走於上焦上焦者受氣而榮諸陽也薑韭之氣熏之營衛之氣不時受久留心下故洞心辛與氣俱行故辛入而與汗俱出苦入於胃五穀之氣皆不能勝苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨入而復出知其走骨也此義未曉甘入於胃其氣強小不能上至於上焦而與谷留於胃中者令人柔潤者也胃柔則緩猶言鬆軟緩則蟲動蟲動則令人悗心其氣外通於肉故甘走肉素問宣明五氣論曰五味所入酸入肝肝屬木洪範曰木曰曲直曲直作酸辛入肺肺屬金金曰從革從革作辛苦入心心屬火火曰炎上炎上作苦鹹入腎腎屬水水曰潤下潤下作咸甘入脾脾屬土土愛稼穡稼穡作甘五味所禁辛走氣氣病無多食辛辛能令氣散咸走血血病無多食鹹咸能令血凝苦走骨骨病無多食苦苦能令骨重甘走肉肉病無多食甘甘壅氣能令腠理不通酸走筋筋病無多食酸酸能令筋攣靈樞九針篇曰酸走筋病在筋無食酸辛走氣病在氣無食辛咸走骨病在骨無食鹹苦走血病在血無食苦前言咸走血謂其能凝血也此云苦走血心屬火主血脈苦者火之化也甘走肉病在肉無食甘口嗜而欲食之不可多也必使自裁前五味篇謂脾病宜食甘心病宜食苦腎病宜食鹹肝病宜食酸肺病宜食辛此則五藏皆曰不宜者前主五藏之虛言故宜以同氣者補之此主五藏之邪言故不宜以同氣者助之也素問至真要大論曰五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也素問生氣通天論曰陰之所生本在五味陰之五宮傷在五味六節藏象論曰天食人以五氣地食人以五味天陽也地陰也故曰陰之所生是故味過於酸肝氣以津張注曰津溢也酸助肝助之太過則肝氣滿而溢也脾氣乃絶木過盛必傷土味過於咸大骨氣勞注家皆云過咸則傷腎故骨氣困頓夫咸本補腎過咸固必有傷然所傷必不在腎下文曰短肌心氣抑正其所傷也觀本句大字勞字似亦指腎氣過盛而言蓋腎乃作強之官過盛則或力作無度房事不節皆得云勞皆病情之所有非咸僅傷腎也短肌注曰咸凝血血傷故肌肉消縮此則極是試觀體肥之人多喜食淡而嗜食鹹者任精神充實肌肉必不能肥也心氣抑火受水克味過於甘心氣喘滿甘能作脹故上焦滯而心下滿非傷心也心字只作胸字看此與傷寒論治胸膈間痞而名其方曰瀉心者同一理也色黑腎氣不衡腎屬水黑者水之色衡平也腎氣傷故不得其平也味過於苦脾氣不濡不潤澤也胃氣乃厚不能運化則留滯而生脹滿故曰厚按前三藏俱是傷其所克此味過於苦火之化也宜傷肺金何以傷及脾胃蓋味苦者性必寒苦寒肅殺脾胃之所最惡也故五味篇云苦入於胃五穀之氣皆不能勝穀氣不能勝非脾胃受邪而何治熱病不顧中氣肆用寒涼者其搏節之學河間丹溪者尤宜痛改之味過於辛筋脈沮弛辛為金化味辛者必傷肝木肝主筋筋得熱而長故弛味辛者性必熱熱則韌陽傷血血被熱劫而枯故沮精神乃央辛散氣肺主氣氣得熱而耗精神自然困頓央猶殃也前酸咸甘苦皆只各傷一藏此則傷及諸藏治寒病不顧營陰不保津液肆用熱毒者其酌裁之讀薛氏醫案景嶽全書者尤宜猛省之是故謹和五味骨正筋柔氣血以流腠理以密前三篇皆論五味之宜忌此三篇則不論宜忌即宜食者亦不可久而太過妄用霸藥之醫人與偏嗜厚味之病人皆當銘諸座右素問異法方宜論曰東方之域天地之所生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中咸者勝血故其民皆黑色疏理其病皆癰瘍皆字只作多字看西方者金玉之域沙石之處天地之所收引也其民陵居而多風水土剛強其民不依而褐薦其民華食而脂肥故邪不能傷其形體其病生於內北方者天地所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食藏寒生滿病南方者天地所長養陽氣之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕故其民皆致理而赤色其病攣痹中央者其地平以濕天地所以生萬物也衆其民食雜而不勞其病多痿厥寒熱故聖人雜合以治各得其所宜知治之大體也五方風土飲食居處嗜好既各不同則其生病亦必不同左傳所以有河魚腹疾之間也然不可泥就一方而論亦有山居澤居膏粱藜藿之異故篇未曰知治之大體醫者知此可以窺測病情病者知此可以移換氣血凡六淫外入之症與深邪痼疾久而不愈者皆宜奉為圭臬也
