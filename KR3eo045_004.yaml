body:
  text: 卷三菜類養生以粒食為主粒食而外似無可煩注意也然古聖王經理邦國言飢而不敢忽乎謹故藝草木於場圃以備民食小者可為百穀之輔大者且濟百穀之偏菜之為益豈淺鮮哉又況內則詳諸菜之名素問明五菜之用其於病也所繫更大且多矣至於谷之有諸粥諸酒是以谷代刀圭也而菜者性備寒溫功兼補瀉因病而施合宜而用何莫非方劑之良也若伕力有其偏性有其毒則古人炯戒具存悉著於編覽者其無忽焉韭熟食甘溫益脾腎助陽益陰利氣補血宜極熟不可帶生故又名草鍾乳又名起陽草生食辛熱破血行氣行一切敗血治胸脅血凝氣滯諸痛跌撲損傷産後兒枕作痛極走泄真氣凡症屬虛者忌之又多食傷目生者尤甚千金方治喘息欲絶生韭汁頻飲又治喉腫韭順搗爛炒熟敷冷即易又治百蟲入耳生韭汁灌之即出食醫心鏡治卒然中惡韭法灌鼻中又治水穀痢疾韭菜煮粥或炸炒任意食赤白痢亦佳活人書用治陰陽易陰腫小腹絞痛頭重眼花頃刻不救宜豭鼠屎十四枚兩頭尖者韭根一把水二碗煎七分去滓再煎二沸溫服得汗即瘥未汗再作簡便方治狾犬咬傷七日必一發須三七日不發乃為真愈初咬時急於無風處冷水洗淨服生韭汁一碗隔七日又一碗四十九日共服七碗須有二十日忌食酸鹹一百五十日忌聞金鼓聲一年忌食魚腥終身忌食狗肉按此法出肘後方一本作薤汁未知驗否而徐本齊云甚效且隨處皆有故録之為醫藥不便處救急之用摘元方治産後怒哭傷肝嘔青緑水韭汁一盞入薑汁一匙同飲丹溪治産後血運韭葉搗爛入酒壺內沃以熱醋將壺咀對鼻頻開合其蓋令氣衝射入鼻中即醒千金方治衄血不止韭根蔥根同搗如棗大塞鼻孔頻易以止為度又治刺傷中水腫痛刺雖出因盥濯為生水所傷復作腫痛不治必作膿潰韭菜杵爛炒熱敷跌撲傷亦可用加醋更佳若挑去刺時淋以熱尿膈二三日不見水則無此患刀傷亦然瀕湖方治金瘡血出韭汁和風化石灰晾乾為末敷若用雞骨炭松香等分研末生韭汁調作餅臨時再研細敷金瘡血不能止尤妙備急方用解肉脯毒凡熟肉未冷用密器蓋過夜絲毫不透風者為郁肉沾茅屋漏者為漏脯皆有毒並搗韭汁生飲又千金方治食物中毒不知其毒當作何解法飲生韭汗最佳又凡諸病宜用細辛牙皂搐鼻者不如俱代以生韭汁更便更穩綱目曰內則韭曰豐本言其美在黃也大誤本草衍義曰韭黃未出糞土含抑鬱未伸之氣病人切忌此確論也蓋禮所謂豐本者言其根茂可以屢剪非貴其黃也至鄭康成謂蔥變韭爾雅翼謂老韭變莧均幻談也野生者名蒮爾雅曰蒮山韭其性不佳韭子溫補下元主夢中泄精肝虛溺血出別録暖腰膝治夢與鬼交出日華本草又主小便頻數夢中遺尿及女人白帶白淫出本草綱目又燒煙可熏蟲牙出救急方蔥綱目曰一名菜伯一名和事草一名鹿胎一名芤草之有孔者也有數種一種名冬蔥又名凍蔥又名慈蔥無子分根而種頗易繁衍吾鄉呼四季蔥一種名漢蔥結子可種宿根極可復裁又有茖蔥野生之名爾雅曰茖山蔥樓蔥龍角羊角水晶等蔥其性熟甘溫能和中利氣生辛熱能通竅散寒凡內有寒滯外感風寒人均宜食之且熱而不燥故不劫陰世俗治感冒風寒妄用生薑胡椒為食料炮薑附子吳茱萸為藥餌劫陰傷液致寒變為熱遂成不起者比比然矣不如肘後蔥豉湯發散表寒乃歷古相傳之妙法而千金外臺活人諸書蔥鼓葛根白芷等皆表病初起一定之方無輕用薑附茱萸先奪其營血以為發汗散邪之理也蓋風寒外入為陽邪發熱惡寒為陽症雖治寒以熱理所必然而外解肌膚之表熱與內攻直中之陰寒殊不可同年而語病家每不知此無足怪矣醫家而不知此令人輕病致重重病致死尚得云醫乎清夜捫心能無愧且懼乎故濟生祕覽治時行感冒頭痛發熱蔥二十根碎切和米煮粥入醋少許乘熱食汗出立解又治各種傷寒初起不能分別何經亦用上方類要治娠妊傷寒尿血赤斑變黑蔥一握搗爛煮汁熱服盡取汗千金方治傷寒後交接勞復腹痛陰腫蔥和醋一盞掏汁服取汗此症若遇張景嶽必用右歸飲遇趙養葵必用八味瓦烏知此病由余邪乘虛內陷故汗解之與外臺方之用竹皮二升煎汁服治餘熱內陷同一法也古人精理詎可以曉流俗哉願後人平心閲之無偏執取咎也至如活人書治傷寒頭痛如劈蔥半斤姜一兩水煎分數服此因表寒甚故助之以姜而蔥多姜少亦不致大傷陰分也以上蔥白散之用而其開閉通竅也經驗方治小兒無故卒死蔥搗爛納入肛門及兩鼻孔氣通或嚏即生此法大人中惡卒死亦可用嬰孩寶鑑治小兒盤腸腹痛內釣搐搦蔥湯洗兒腹仍以蔥炒熱敷臍上得尿即愈本事方治小便閉脹蔥三斤炒熱帕包更互尉小腹氣通即通外臺方治大小便閉蔥和醋炒敷小腹灸七壯又治急淋陰腫熱蔥搗貼臍上獨行方治氣閉耳聾生蔥搗爛寒之全幼心鑑治小兒胎熱不尿或不乳蔥白乳煎灌數匙良久未通再灌惟臍四旁青色及口撮者不治危氏方治腹皮麻痹煮蔥多食自愈折肱漫録載其家西賓患水腫腹脹如豉頭面四肢俱腫小便閉而大便泄偶食蔥煎豆腐小便遂通乃連食半生熟蔥不輟腫消而愈開閉之功又如此至其安和臟腑華他中藏經治脫陽危症由大吐大瀉大汗後脫陽勿用此方及與女子交接後四肢厥冷不省人事小腹陰莖搐縮須臾不救外以炒蔥尉臍內灌酒煎蔥汁陽回即活南陽活人書治陰毒腹痛四肢厥冷唇青卵縮六脈全伏內服大劑四逆湯外用蔥炒熱貼臍上尉斗尉之手足漸溫必愈若良久不溫不可救也深師方治霍亂煩躁坐臥不安至危症也蔥二十莖搗大棗二十枚擘水煮分二服食醫心鏡治赤白痢腹痛蔥煮粥日日食之瑞竹堂方治卒急心痛牙關緊閉諸藥不效蔥五根搗爛以匙送入喉灌以麻油四兩但得下咽即蘇不拘蟲痛積痛皆下又其於雜病也普濟方治陰囊腫痛蔥白乳香搗塗或煨蔥半熟入鹽少許搗塗千金方治乳癰初起生蔥汁和熱酒服取汗重者須二三次醫藥不便處宜知又治一切腫毒蔥汁漬日四五度外臺治血痔痛甚蔥三斤煮湯熏洗聖濟總録治疔瘡惡腫刺破擠去敗血生蔥生蜜同搗貼兩時用醋湯微溫洗之洗冤録治自刎將死蔥搗爛炒熱敷又暑月熱渴欲死道中倉碎無水嚼生蔥二寸和津咽下可抵飲水二升奇疾方治血壅怪病人身上忽然肉出如錐痛癢不能飲食名血壅不速治必潰為膿血以赤皮蔥燒灰淋洗多飲鼓汁即安韋宙獨行方治水病足腫煮湯浸足日三五度永類鈐方用同蜜搗敷腎囊治小便不通皆妙方也又解鉤吻藜蘆及桂毒然亦走泄真氣凡體虛忌之又不可同蜜食又久食傷目蔥子功同韭子而力不及然治膀胱冷氣作痛力更勝於韭子也薤爾雅曰𣚊鴻薈邢疏曰一名菜芝綱目誤混藠子為一其葉似蔥中空無稜根似小蒜圓長薤葉雖空而有三稜全不似蔥且虯曲不能植立色碧緑亦不似蔥藠之青質極光滑露難久佇故挽歌曰薤露喻人生之不久也其根下子正圓如櫧子白色亦不似子之圓長又謂薤收子宜火烘故又名火蔥不知宜火烘者即是漢蔥漢者熯之訛也薤子不必火烘王氏農書曰薤生則辛散熟則甘補凡氣結中寒胸痹刺痛下焦冷滯食薤宜帶生中虛脾陽不足食少難化久痢冷瀉虛厄宜煮極熟金匱栝蔞薤白白酒湯橋蔞實連皮子一枚薤白半升白酒七升煮二升治胸痹痛徹心背喘息咳唾短氣喉中燥癢不治則死此方甚驗千金半夏薤白湯治前症薤白四兩半夏一合枳實半兩生薑一兩栝蔞實半枚連皮同搗爛白酨漿三升煮一升注白酨漿酢漿也蓋醋甕底之渾濁者肘後薤白一味生搗汁飲治奔豚冷氣用其散也範汪治産後冷痢同羊腎煮食用其補也此外如肘後治中惡卒死或先病或本無病寢寐奄忽而死皆是中惡生薤汁灌鼻中獨行方治霍亂乾嘔生薤一把水煮頓服心鏡治赤白痢薤同米煮粥每日食拾遺治血痢薤同黃蘖煮汁飲熱甚者宜黃連梅師方治患瘡毒人早行沾被冷露腫痛身發寒戰甚者殺薤白煨熟搗爛敷瘡中出水即愈聖惠方治咽喉腫痛薤白同醋搗敷又治氣閉厄逆一息一聲聞隔舍水煮薤汁飲然辛能助熱且耗散真氣凡內熱及陰虛者忌之圖經乃云性冷謬極矣久食傷目熱中山薤爾雅曰山𣚊農書野薤吾鄉呼鳥蒜山居者亦採以供饌生麥畦中根葉俱似薤但薤無花不結實此物抽苔開細碎紫花結小實氣味似家薤性宜亦略同古方未經採用藠子一名荍子綱目誤以為薤圖經誤以為蒜其葉條直不類薤之虯曲根似蔥不似蒜尤不似薤葉老有筋不堪食惟根可醋浸鹽醃食故吾鄉呼藠頭性亦頗利氣但系生物不宜多食蒜有大小二種古今注曰茹蒜說文曰葷萊綱目曰煉形家以小蒜大蒜韭蕓薹胡荽為葷道家以韭薤蒜薈苔胡荽為五葷佛家以大蒜小蒜興渠阿魏也慈蔥茖蔥為五葷蜀本草曰薍農書曰澤蒜衍義曰宅蒜蓋澤字之訛以上諸名皆小蒜也葉如韭根僅如薤今所蒔者為大蒜本名葫又名胡蒜漢時始自西域入中國二蒜生熟異性其理與蔥韭薤同能溫中化食理脾胃除邪痹止霍亂消脹滿凡醬藏鹽藏醋浸蒜瓣均能開胃進食又能解各種毒一面毒食小麥面搗蒜如泥加鹽醋為調和即不作渴一水毒春夏大雨暴漲山中腐草蛇蟲諸毒流入溪間或井中飲之令人腹脹作泄或食蒜或每日搗蒜數瓣浸水缸中俱解一暑毒葉石林避暑録話曰一僕伕暑月馳馬忽撲地欲絶用大蒜及道上熱土同研爛新汲水和取汁抉齒灌之即醒一飲食腥膻蟲魚毒魚肉腐敗搗生蒜入臭氣即為所掩食之有味且不傷人農書所謂化腐臭為神奇調鼎俎代鹽醢也一蛇毒凡被毒蛇螫急飲白芷雄黃煎酒白芷宜多煎酒汁濃儘量飲略醒又進常令醺醺藥氣不斷多食生熟大蒜則毒不內攻入腹食療本草曰蛇螫用大蒜搗爛封之日六七易另以蒜一升去皮人乳二升煮熟空心頓服明日又進又以蒜一升搗爛人尿一升煮三四沸浸傷處梅師方用獨頭蒜同酸莓草即破銅錢草搗敷一閉口椒毒花椒閉口者有毒能殺人即開口者藥中食中用之太過中其毒亦可殺人性熱故也煮蒜食出金匱方一蟹毒令人瞀亂髮狂或吐血或便血溺血不急治亦殺人蒜瓣煮汁飲又治心腹冷痛醋煮大蒜每日食又治血逆心痛用行氣散寒藥不效者生蒜搗汁頻飲並出肘後方又治氣淋腹脹大便時閉時泄小便淋瀝為氣淋大蒜煨熱每日空心食出集驗方又治暴下血用滋陰涼血藥愈甚者大蒜五七枚去衣搗爛豆豉數百粒同搗為丸梧子大每米飲下五六十丸出衍義又治腸毒下血獨頭蒜煨熱同黃連末搗為丸日日米飲服出濟生方又治積年心痛煮蒜勿著鹽飽食出兵部手集又能吐蟲吐蠱綱目曰李延壽南史云李道念病五年丞相褚澄診之云食白瀹雞子過多取蒜一升煮食吐出雞雛翅足俱全凡十二枚而愈後漢書云一人病噎食不得下華他令飲蒜齏三升立吐一蛇奇疾方曰人頭面上有光他人手近之如火熾者中蠱也蒜汁半兩和酒服當吐物如蛇狀又云眉光動搖目光交睫喚之不應但能飲食亦用前方其外用也一灸艾疔腫發背及一切內症用灸者均必須此有二法李迅曰蒜瓣切薄片如錢厚炷火灸三壯一易能使瘡不開大又能使內肉不壞瘡口易合外科精義曰用醋浸紙封瘡上視先干處為瘡頭隨瘡頭大小以蒜十顆淡豉數十粒乳香一錢同搗爛敷瘡頭二分厚著火灸之痛灸至癢癢炙至痛一搗敷足心治霍亂轉筋下利噤口惡症又治傷寒久熱不省人事四肢厥冷又治鼻衄不止皆能引熱氣下行一搗敷臍中治寒瀉冷痢小兒臍風敷訖灸之灸至口中有蒜氣則愈或用鹽蒜同搗敷臍灸七壯亦可治霍亂轉筋一汁㗜鼻中治頭風疼痛一煨熟搗爛塞入肛門治關格大小便閉一燒熱揩牙治胃火及蟲牙腫痛此物之功在性熱而能散熱故不劫陰而反能解暑毒蛇毒麥毒及椒蟹諸熱毒且外敷腫毒蓋腫毒屬陽者敷寒涼藥本不為誤而熱結則不散愈用寒藥冰之則愈不散惟大蒜搗汁和大黃末敷或加醋最為良法凡性熱者皆散寒皆能助熱獨此熱而散熱即外敷足心敷臍納下部㗜鼻諸法總一散熱之效也而其害則在熏辛葷臭故多食耗氣傷血損目昏神凡蔥韭薤胡荽芥萊蔔等俱損目惟蒜為最拾遺乃云初食昏目久食反明目大誤蒜葉蒜薹即二三月抽出之莖俗名蒜心又呼蒜苗功不及蒜瓣害亦少殺干蒜梗葉煎湯洗凍瘡極佳若每年至冬必凍者於五月五日六月六日以此湯浸洗一次即不凍孫氏曰大蒜不可同生魚食魚鱠魚鮓皆生物令人陰核作痛又不可同蜜食野生者名蒚爾雅曰蒚山蒜姜說文作䕬此物性極剛猛亦極偏僻散寒發表者其功助熱劫陰者其害入食料在平人為佳品在病人為忌物平人胃氣總宜溫暖不宜寒涼故為佳品胃中非溫暖之氣不能蒸腐食物且又能殺腥膻添滋味呂氏春秋曰和之美者楊朴地名之姜人多愛之而遂狎之不知其偏於辛而無回味即偏於熱而無回性也食之斷不宜多斷不宜久夫性稍偏於溫久食猶有積溫成熱之害故內經曰氣增而久夭之由也況極辛大熱乎孫氏曰多食姜患眼損壽減筋力綱目曰食姜久積熱害目蒜性熱而散熱故不積熱食蒜昏目不食則愈食姜害目必生胬肉起紅筋無藥可解此皆為平人言若其於病則惟感冒寒邪借其辛熱而解表胃寒嘔吐借其溫中而散逆蟲症借其辛熱以制蟲其他萬千病症屬內傷者並無用表散之法亦無不重陰血之理其為大禁不待言矣若屬外感似乎宜散而姜性偏熱止能散寒不能散風暑濕燥火外感原有此六症素問名曰六淫之邪非僅一寒氣能傷人也多服生薑炮姜營血受傷津液被劫外感變為內傷雖有良醫無從解救至論語記聖人飲食不曰必以姜食亦不曰無姜不食而曰不撤姜食撤字從手撿而去之也蓋指聖人作客而言凡作客者於主人所設各隨其便不宜當食講究烹調曲禮曰毋絮羹毋啜醢絮羹啜醢是臨食時加入調和撤姜是臨食時撿去調和皆非作客之禮姜雖有害少食亦自不妨調和之內業已有姜聖人必不於食時令其撿去但不多食而已然則此句當連下句成文始為通貫今竟解作無姜不食其誤亦不始於朱子集注漢晉人注疏已有通神明去穢惡之說而漢人則又出於神農本草經穢惡作臭惡言能調和滋味也而通神明殊不可解神明指人身何物蓋此書傳自上古其中為後人附益處甚多須善讀也而陶隱居曰久食少志傷心氣辛辣物惟此為常故論語云不撤姜食言可常食但不可多既云久食有害又云可常食既云可常食又云不可多曲為漢人文過遂不自覺其言之矛盾也若朱子語録則亦曰秋姜夭人天年是亦明知其非佳物也不知大學可增可改易之象數可亡詩之小序可削春秋之三傳可背此不過漢人誤注何必不可正之也又有善啖此物不見其害者往年一傭工每日可食生薑二三斤此乃藏氣極偏不可以常理論如夏辣之日服鍾乳不熱周維嶽之飲酒數甕不醉舉以藉口者皆自伐其生機也然力既剛猛用之得當治病未嘗無功凡寒嗽痰澼卒倒心痞嘔噦胸脅脹滿冷痢冷瀉及諸虛寒無火之症均必需之急救方治凍死救活及尚未死者生薑二兩陳皮五錢煎湯頻服扶壽方治刀斧傷生薑搗爛敷易簡方治跌撲傷和麵搗爛炒熱罨元和紀用經治寒嘔不止橘皮四錢甘草生薑各二錢半夏三錢煎湯分三次服衍義治寒眼腫痛鼻塞淚流古銅錢刮薑汁點之若畏點薑汁宜內服羌獨荊防菊花白芷蔓荊子蟬蛻當歸蒺藜散之連服數劑無不愈者夏子益奇疾方治産婦用力太過垂出肉線長三四尺觸之痛引心腹用老薑連皮三斤入麻油二斤拌炒至干油恐是二兩若二斤不能令乾絹袋盛作二包輕輕盤起肉線作三團納入産戶以姜袋就近熏之冷則更換至二日夜可收入且不可斷斷則死又脈溢怪病毛竅血出不止皮脹如鼓目鼻口俱脹合生薑自然汁和水各半盞服即安至陶華傷寒六書用擦舌胎變黑普濟方用治口瘡牙痛楊氏醫說薑茶治痢方並無理不通又方廣云能治乾霍亂尤為謬極乾霍亂即攪腸痧但一滴薑湯入口即必死無救凡腹中急痛不葉不瀉者切戒之吐瀉者即非此症生薑砂糖陳皮同煎服最佳又孕婦食之令兒盈指枝指也且助胎熱令兒多疾癰瘍人食之則生惡肉姜皮性較姜稍平能行氣消脹拾遺乃云皮性涼用姜要熱則去皮要冷則留皮大謬豈有姜而可用為冷藥乎芥農書曰其味辛烈菜中之介然者綱目曰芥有數種青芥又名刺芥葉有柔毛大芥又名皺葉芥色深緑葉有皺紋馬芥葉有花歧紫芥莖葉皆紫石芥低小其性倣佛能豁痰利氣然助熱傷中損神耗氣動血熱病及氣虛人切忌葉煎湯可洗漆瘡三月起苔取嫩心瀹存性入瓶中罨一二日辣尤甚謂之芥藍薑桂之性老而愈辣此獨嫩者最辣食之令人涕淚齊出耗氣助火倍於老芥埠雅曰望梅津生食芥淚墜五液之自外至者也慕而涎垂愧而汁出五液之自內生者也若用鹽水煮熟曝乾再蒸曝之俗名鹽菜辣味全失病人可食其子古方用之能散寒利氣豁痰今惟用白芥子矣嶺表録異曰南土芥子大如雞卵未知果否白芥性與芥同熱過之綱目曰其種來自西戎而盛於蜀故又名胡芥又名蜀芥子白色取辣入食料甚辛美入藥能溫中下氣豁痰消腫聖惠方治喉痹腫痛辣芥子末醋調取汁點入癰喉內待喉內鳴卻用陳麻骨燒煙吸入立愈千金翼治癰腫熱毒芥子末同柏葉搗塗摘元方治腰脊脹痛氣滯在經絡故脹芥子末酒調敷外用新麻布酒噴濕火上烘熱緊束之立愈瀕湖方治腫毒初起醋調芥子末塗濟生方治身體麻木方同上取辣法見二卷芥子粥條菘又名白菜又名黃牙菜葉層層相裹一株重一二斤北方者可至十餘斤秋末即為晚菘寒早也南方秋後始栽正月猶可食性味甘平能和中退熱止渴除煩惟藥中用甘草者忌食陶隱居曰張仲景言甘草同藩菜食令病不除故千金外臺諸方後多忌之以此也葉生搗塗漆瘡勝於芥汁又可點飛絲入目又塗小兒赤遊丹火行於上下至心則死出子母祕録又有黑菘白菘二種白菘圓莖者名箭桿菜扁莖者為瓦溝菜黑菘圓莖者名瓢兒菜扁莖者名春不老味遠不及菘性亦和平惟暑月所種白菘每日澆灌成於人力非時催逼且受濕熱鬱蒸之氣病人食之多腹脹作泄並生病後虛腫不時所以不食也蕓薹埤雅名臺菜胡居士方名寒菜又名胡菜沛縣志名蔓芥俗呼油菜菜中賤品也菘菜之佳者收子稍老或地土不宜皆變為油菜而油菜不能變菘亦猶秈白米之漸變為紅紅米不能變白蓋不能葆其本真則必流乾汙下人與物同也苗葉味短且傷血惟春初嫩莖味鮮腴近人因子可榨油種之甚廣春時花放阡陌間如給孤祗園現黃全世界足供玩賞閒情偶寄云香風導酒客尋簾錦蝶與遊人爭路食療本草曰損陽氣發瘡患腰腳人食之加劇又生腹內諸蟲獨能外治瘡瘍孫氏曰赤遊風丹取葉搗敷即愈亦可搗汁服又手足瘭疽四肢肩背纍纍如赤豆掐之汁出油菜葉煮汁服並食其葉數頓少用鹽醬無葉用子研水服又異疽似癰而小膿如小豆汁擠去復滿油菜葉搗煨熱布包更互尉不過二三度無葉用於者並出千金方豌豆斑瘡煎汁洗出外臺祕要子破血消腫及遊風丹毒熱腫方中用之性能傷婦人子宮古方經水行後服四物湯加油菜子能斷産極非佳物也又婦人方用子十五粒何其少也研末酒服云催生神效似乎難信但産難大事此物易得且必無他害存其方加而用之以備緩急可也萊蔔見一卷蕪菁唐本草曰蔓菁食療本草曰九英菘掌禹餳曰爾雅云須蕵蕪詩穀風曰採葑採菲毛萇注曰葑須也爾雅正義曰一名葑蓯禮坊記注曰葑蔓菁也詩疏曰即蕪菁也楊氏方言曰蘴蕘蔓菁也陳楚謂之蘴齊魯謂之蕘關西謂之蕪菁趙魏謂之大芥爾雅注曰葑須也蕪菁也蕵蕪葑蓯也蘴蕘也大芥也一物也嘉話録曰諸葛武候令兵士種之故又名諸葛菜取其四時根葉俱可啖也至三國史謂先主閉門種蕪菁不過自韜非有取於此也南方種者緣少唐本草謂北土無菘有人將子往種二年盡變為蕪菁若將蕪菁子南種亦二年盡變為菘誤說也菘菜北土極多且美南方遠不及北産且每年必有大半變為蕓薹不變蕪菁又別録列蕪菁萊蔔為同條或以其根葉皆可食也後人遂以為一物亦誤也綱目曰蕪菁是芥屬萊蔔是菘屬亦誤也萊蔔與菘根葉花實俱不相似但所云蕪菁根長而白味辛苦莖粗葉大而厚夏初起苔黃花四出子亦如芥則詮解明晰食物本草曰性能止渴消食下氣去心腹冷痛熱毒風腫乳癰寒熱止嗽其性當冷或云溫者恐誤也豫意此菜性必微溫觀所主之病可知矣溫而又能止渴者津汁多如萊蔔亦有止渴之效也治熱毒者辛能散如大蒜亦能消癰腫也苦以為冷則世間豈有味辛而性冷者乎子明目壓油塗頭能變蒜髮少年發白也輟耕録作算發謂心多思慮所致實乃稟氣也出東齊紀事蕹菜宜濕地南方草木狀曰甫人編葦為筏浮水上種之不須土養性滑利能和中解熱大便不快及閉結者宜多食葉妙於梗又能解野葛毒綱目曰唐瑤方搗汁和酒飲治産難滑可知矣菠薐一名菠菜證類本草曰劉禹鍚云出頗陵國訛為菠薐誤也菠者其名薐者因其子有梭角如菱芰也唐會要曰太宗時尼波羅國獻菠稜菜類紅藍花綱目曰有雌雄就莖間開碎紅花攢簇不顯實似蒺藜亦誤也菠薐花全緑與葉同色類紅藍花者謂其莖葉之形非謂花色也但有雄雌雄者開花無子雌者結子無花異物也種之難出有云必過月朔乃生試之不然性甘涼而滑調中止瀉潤燥利臟腑開胸膈張子和曰久患大便滯澀者宜常食食性本草曰令人腳弱發腰痛俗醫云發瘡毒皆大不然惟素病腹冷者久食破腹則或有之莧爾雅曰蕢赤莧蜀本草謂有六種白莧稍耐老赤莧紫莧不堪久食味雖甘平性則冷利能滑腸破血脾胃虛弱下元不固胎前及男婦血分素虛者均忌之又不可同鱉食生鱉之說或末必然有毒則確也凡病人惟血痢初起産後瘀血不行宜之談野翁方用以煎湯洗漆瘡集驗方治蛇咬用紫莧搗汁服一升渣敷之其子一名莫能明目去翳取其形色如目珠之光黑與青葙子雞冠子之明目同一理然莧實本經謂久服益氣力輕身日華本草謂益精血則實能補腎矣肝虛目暗者宜多用之莙薘一名菾菜綱目曰二月下種宿根亦自生葉青白如白菘而短生熟皆可食四月開細白花結實如茱萸梂而輕虛黃色內有細子根白色嘉祐本草曰性涼內熱人宜食素患腹冷者忌之別録曰生搗汁飲治時行壯熱解熱毒風腫唐本草曰夏月作粥食解熱毒止熱痢甚者亦宜生飲其汁敷炙瘡及湯火傷止痛易瘥萵苣綱目曰一名千金菜有三種青者名萵苣紫者名紫苣葉光滑白者名白苣葉有細毛農書謂之石芭詩疏曰青州謂之芭其根葉折之有白汁黏手諸本草云苦寒苦冷投過也味甘淡微苦性亦和平熱病最宜能通乳汁利小便食鑑本草曰解熱毒酒毒利大小腸令人齒白拾遺曰利五臟通經脈開胸膈紫者有毒入燒煉用丹房鑑源曰和土作器火煅如銅墨客揮犀曰萵苣自萵國來此國諸史無考性有毒百蟲不敢近蛇虺觸之則目不見物謬說也此菜無毒綱目曰一名生菜宜生食不宜蒸煮亦誤也此菜生熟皆佳其葉漸剝梗漸高可一二尺名萵筍削去外皮鹽醃醬藏糖蜜餞皆脆美但稍難克化脾胃虛寒人忌食苦蕒綱目曰本經曰茶說文曰又名遊冬又名苦苣又名褊芭又名老鸛菜又名天香菜詩曰誰謂茶苦注苦菜也陶隱居曰苦菜即茗唐本草曰苦菜即苦蕒苦蘵亦名苦菜與此不同見後茗乃木類爾雅釋草云荼苦菜即此釋木云檟苦荼即茗二物全別陶說誤矣葉狹長有丫歧淡碧色莖中空折之亦有白汁黃花如野菊結子如茼蒿子有毛如絮味苦平性涼能涼血解毒平素血熱好生瘡毒人宜長久食主腸澼熱痢熱淋熱渴霍亂後胃氣煩逆天行熱病凡有以上諸病人尤宜多食或生食或生飲其汁可以起死本經曰久食安心益氣嘉祐本草曰性雖冷甚益人洞天保生經曰夏三月宜食苦蕒能益心和血通氣菽園雜記曰痔瘡痛宜苦蕒煎湯頻熏洗可解毒止痛生搗敷一切癰瘍疔腫搗汁和酒飲渣敷之治對曰惡瘡多服取效出經驗方又能拔疔腫取白汁厚塗出拾遺又可敷蛇咬出日華子及壺蜂叮螫出摘元方壺蜂言其大也離騷曰南方元蜂若壺又解沙蝨毒此物在水中細小不可見人澡遇之鑽入皮里初得赤如黍豆痛如刺三日後發寒熱成瘡毒入骨則死嶺南多此但以茅葉刮去苦蕒生汁塗出肘後方又治喉痹腫痛生苦蕒汁燈心湯泡捻取汁各半盞和服出普濟方又白汁可點疣子出衍義又治血尿血淋血痢並生飲汁其根嘉祐本草云煮汁飲退骨蒸蓋性主涼血善入陰經宜有此效但必多服耳薺綱目曰釋家謂其莖作挑燈杖可闢蟲蛾故稱護生草俗呼地菜有大小二種小者名沙薺大薺稍大其莖硬而有毛者名菥蓂爾雅曰菥蓂大薺本經名大蕺吳普本草曰一名菥目一名榮目一名馬駒一名馬辛亦可食皆以冬至後生苗葉末圓長近本處有刻缺類黃瓜菜春暮起莖五六寸開細白花結莢如小萍而有三角莢內細子如葶藶子子名詩曰誰謂荼苦其甘如薺性能補肝利五臟功專利目眼生翳膜者宜長久食之子為末每夜點大眥澀痛忍之能退翳消胬肉出聖濟總録又三因方治腫滿腹大四肢枯瘦溺澀難便葶藶子薺菜根等分為末丸如彈子大每服一丸橘皮湯下馬齒莧綱目曰別録名馬莧初生小莩甲似莧實非莧類圖經名五行草內有水銀曝之難燥故又名長命菜葉有大小二種俗呼大葉者為㹠耳草小葉者為鼠齒莧寶藏論八寶靈變篇併名馬齒龍牙又名五方草方士隱其名曰九頭獅子草與龍鬚草為同類馬齒莧生陰濕地能變龍鬚草龍鬚草生乾地亦變馬齒莧處處有之野生亦可種蒔作蔬宜大葉者嫩而有味入藥則取小葉雷公炮炙論曰凡使勿用大葉內無水銀指入藥而言味酸性寒能解百毒暑月宜多食好生瘡毒人尤宜多食又能散血消腫利腸滑胎通淋治産後虛汗生搗汁和熱水服出婦人良方産寶方治産後血痢生搗汁三合煎沸和熟蜜一合服經驗方治痔瘡初起馬齒莧煮熟食以湯熏洗一月不斷愈瀕湖方治肛門腫痛馬齒莧同三葉酸莓等分煎湯熏洗日二次聖惠方治小兒熱淋生搗汁飲海上方治蛀腳臁瘡久爛生蟲為蛀研末蜜調敷此菜耐燥難以研末不如和蜜搗爛乾者略以水潤亦可搗也和生豬脂可敷反花惡瘡靈苑方治毛蟲螫痛生搗塗又痘後餘毒生手足者可廢人肢體生頭項腹背胸脅者可殺人稚時每見先君朴閹公以投豬蹄煮爛一兩和馬齒莧四兩搗如泥封之皆愈自後遇此如法治之無不愈者又唐書順宗紀帝居諒陰不御酒肉惟食馬齒莧此物雖微亦曾入天廚供御膳矣黃瓜菜一名黃花菜春初生野田卑濕處小科如薺四月開黃花食物本草曰味甘微苦作羹甚美能退內熱通結氣利腸胃熱病後宜食熱結者尤宜多食又煮汁飲治虎咬傷渣敷傷處立止疼痛或以飼豕可闢瘟飼鵝兒易長大苦菜綱目曰本經名敗醬又名鹿腸別録曰鹿首又名澤敗一名苦菜與苦蕒龍葵同又名苦蘵與酸漿黃除同俱名同物異也春初生苗深秋始調此誤也苦菜凌冬不凋葉狹長有鋸齒面深青背淺夏秋起莖高二三尺數寸一節節間生葉四周如繖即傘字開白花成簇作菜食味微苦氣如陳敗醬故名性能退熱排膿散血破多年凝血消癰疽焮腫治赤眼障膜胬肉凡熱病在血分或吐衄者宜多食癰疽痘後平素好生瘡毒及久熱傷眼者更宜多食竹雞菜綱目曰一名鴨跖草又名藍姑草又名碧蟬花處處有之夏初生苗紫莖亦有緑莖者竹葉嫩時可充菜食五月開花如蛾形兩葉如翅碧色可愛按碧乃淺緑江淹別賦春草碧色是也此花翠藍色非碧也味微苦性寒拾遺曰消疔腫治丹毒發熱大腹熱腫熱痢熱淋癰疽等毒並宜煮汁飲或作蔬食腫毒則內服外敷日華本草曰和赤小豆煮食飲其汁下熱腫水氣除濕痹利小便熱閉又消喉痹寒痹及中寒人忌之蘩縷綱目曰爾雅云䘒䕅𦎪郭注曰雞腸草誤千金方曰滋草言其易長也俗呼鵝腸菜古樂府曰為樂當及時何能待來滋滋即此草也此解牽強今茲來茲詩文常用字面若加點作滋則不可解唐本圖經皆誤以為雞腸草不知別録列蘩縷於菜列雞腸於草明是二物形相似耳蘩縷蔓方折之中空內有一縷故名花黃白二色雞腸蔓圓不空花紫內無縷蘩縷能破血別録曰治惡瘡痔久不愈拾遺曰産後宜食既去瘀血又能通乳若腹中血積成塊不下酒炒絞汁溫服即可取下食療本草曰惡瘡搗汁塗五月五日者神效東陽方治淋閉常煮汁飲血淋尤妙但作蔬不宜久食傷血故也苜蓿綱目曰爾雅翼作木粟因其米可炊飯也爾雅注作牧宿西京雜記曰樂遊苑多苜蓿風在其間常蕭蕭然日照其花有光彩故名光風草又名懷風草茂陵人呼連枝草張騫使西域始得其種見史記大宛列傳今北土處處有之年年自生歲可三刈嫩則作蔬老則以飼牛馬明湯胤績塞上詩曰苜蓿含花草露斑奚奴擾擾出沙灣塵飛大夏三千里泥滿東風十二閒按苜蓿賤而易得如此又苦而無味故貧士之家曰苜蓿齊頭唐薛令之為東宮侍讀官署閒冷作詩曰盤中何所有苜蓿長闌干長平聲作上聲誤闌干橫斜也言物既微賤烹飪割切又失宜極形貧家況味也或加木旁作欄杆尤大謬又廣文署亦曰苜蓿齊明沈自然贈以教職而參戎幕府者曰苜蓿階庭春漸肥榆關滇海雁書稀管城亦有封侯骨磨盾看君試短衣足令讀書人增氣其性別録曰安中利人可久食食療本草曰補五臟輕身健人又曰少食好多則冷氣入筋中令人瘦以理揆之苦寒之物必不能中和惟熱病及素有內熱人宜之衍義曰利大小腸食療亦曰去脾胃間邪熱其根唐本草曰熱病煩滿小便赤發黃者搗汁一升服得吐利則愈綱目曰搗汁煎飲治砂石淋痛皆有驗也藤菜爾雅曰蔠葵繁露一名承露別録名天葵食鑑本草名藤葵釋家呼御菜俗呼胭脂菜有二種一種味酸如馬齒莧者吾鄉呼木耳菜綱目曰三月種五月蔓延葉似杏葉而肥厚故名木耳軟滑性涼利大小腸脾冷人不可食別録曰滑中解熱陶隱居曰被狗咬者食之終身不愈一種味甘平不酸者葉薄而長不似木耳菜之圓厚性較優亦能解熱利腸不助脾冷頭髮菜此菜惟甘陝最多南方絶無蔓細如髮故名頭髮豫曾食其乾者味鮮腴草比閒情偶寄亦稱為蔬菜之首吾老友有官關中者詢之彼處醫人云熟食能清肝腎之熱生用鹽醋醃拌下氣和中此菜味甘而滑定能清熱色深緑近黑定人肝腎雖陳者猶帶芳香定能調氣此醫蓋明於物理者也萱說文曰忘憂古今注名丹棘風土記曰妊婦佩之生男故名宜男毛詩作諼性喜陰濕故云焉得諼草言樹之背嫩葉及花皆可食花為勝市肆乾者名金針味甘性涼能去熱除煩渴利胸膈治小便赤澀均宜煮汁淡飲勿用油鹽同豬肉煮安臟腑滋氣血根下砂石淋又治酒疸身黃生搗汁和熱水服出拾遺又治乳癰初起擂酒服渣敷之出綱目吾鄉有先輩云憂豈可以食物忘者此物殆昏人神知故耳語雖有理加之萱草則誤也延壽書乃云食之令人昏然如醉夫萱乃常食之物從無此害此則造言生事厚誣萱草者也或曰萱葉食之如此亦未聞也葵一名滑菜又曰露葵綱目曰採葵必待露解故曰露葵非也必帶露採始可曰露葵杜工部詩云山中習靜觀朝槿松下清齊折露葵是也有紫莖白莖二種白者良大葉小花花黃紫色葉如絲瓜葉小者名鴨腳葵遲早皆可種故有春秋冬葵之名素問五菜為充之一也古人以為百菜主故農書曰蔬茹之佳品民生之資益今人不復食亦無種者性涼滑圖經曰妊婦食之胎滑易産本草會編曰除客熱治惡瘡散膿血小兒熱毒下利丹毒並宜之張從正曰久病大便滯澀者宜食葵滑以養竅也外臺祕要曰痘瘡發斑煮葵葉同蒜齏啖則止奇疾方曰人手足忽長倒生肉刺如錐痛不可忍但食葵即愈然食療本草謂其發宿病天行病後食之令人失明又葵心及黃背紫莖者皆有毒又不可同鯉魚黍米及鮓魚食又被瘋犬咬者永不可食食之即發根治胎漏下血千金方用葵根燒灰酒服方寸匕葵能滑胎根反固胎亦猶麻黃之根赤豆之葉皆與其本物相反物理原有如此又葵子一兩榆白皮二兩煎汁頓服可治胎干難産出便用方蜀葵爾雅曰戎葵郭注云蜀葵也爾雅翼曰吳葵又作胡葵綱目曰夏小正四月吳葵華即此形似葵葉有歧丫嫩時充菜茹老則莖高五六尺花似木槿有深紅淺紅紫黑白千瓣單瓣之異性味功用如葵亦能退熱解毒滑竅易産潤燥通淋千金方云被狗咬者不論瘋與不瘋食之一生不愈久食鈍人志性胡荽說文作綱目曰本作荽俗誤作芫拾遺曰石勒時諱胡字呼香荽日用本草以為藠子云根苗如蒜大誤其氣葷辛香烈經霜則色微紫故入心脾肺血分外達皮膚生熟皆可食痘出不快者楊士瀛直指方用酒煎胡荽噴或浴之此法反惹外風加感冒大不佳不如內服藥中加入少許更穩更捷麻症更宜嘉祐本草亦云發痧疹凡麻痘之家床榻間宜多掛此菜無則以子研末撒之可闢汗臭狐臭天癸淫泆一切穢氣又治肺寒咳嗽煮汁飲又解盅毒用根搗汁半升和酒眼出必效方蛇螫合口椒研末同苗搗敷出千金方食肉中毒下血不止面色痿黃子一升煮汁俟冷分二次服出食療本草腸風下血子研末以米麵餅裹食出普濟方痔瘡疼痛子研末空心溫酒服二錢數服效出海上方痔漏脫肛子一升粟糠一升乳香少許同入小口瓶內燒煙燻出儒門事親牙痛百藥不止子煎汁含漱出外臺祕要但氣味俱厚葷辛耗散凡虛弱人不宜用又患腳氣及金瘡者藥中有牡丹皮白朮者均切忌拾遺曰不可同邪蒿食令人汗臭難産汗臭猶小難産則關係大矣總之耗血傷氣之物雖無邪蒿妊婦亦不宜食又食豬肉不宜食此能爛人臍又不可用鮓魚食茼蒿葉似蒿花黃如單瓣野菊掌禹錫曰多食動風動氣燻人心令人氣滿孫氏曰安心氣養脾胃消痰飲利腸胃蓋此物煮極熟能溫中下氣氣滯脹滿者食之氣從下泄而解有升必有降也虛人食之反作脹掌氏指氣虛者言孫氏指氣滯者言也而僭上之物動風動氣亦理所有也又性善升者必發患瘡毒人忌之邪蒿綱目曰四月生苗似青蒿葉紋皆邪色淺不臭生熟皆可食食醫心鑑曰煮食治五臟惡邪氣大約辛香能寬中理氣耳又治熱中大渴腸澼暴疾辛溫之物安能有此功用虛病及熱病忌之勿為所誤齊書邢峙以經授太子廚宰進邪蒿令去之曰此菜有不正之名殿下不宜食顯宗聞而嘉之青蒿本經名方潰又名草蒿爾雅曰蒿孫注曰荊楚之間呼蒿為又曰蔚牡郭注曰無子為蔚詩蓼莪曰匪莪伊蔚蜀本草曰鹿鳴章食野之蒿者即此嫩時醋醃為殖頗香美綱目曰諸蒿葉背白此獨青故名衍義曰陝西銀緩間蒿叢中一兩莖獨深青謂之香蒿深秋衆黃此猶如故恐古人所用在此性能退骨蒸勞熱虛勞盜汗凡久熱不愈及屢愈屢發者作蔬常食或熬膏服皆良本經亦云治留熱在骨節間不知何故列為下品也白蒿爾雅曰蘩皤蒿又名由胡食療本草曰蔞蒿一曰一曰藾一曰蕭吾鄉呼蘺蒿葉如細艾氣亦似之有白毛故古詩云同心托蕭艾一器戒薰蕕詩疏曰先衆草而生香美可食生熟皆宜綱目曰陸生熏辛不及水生者香美詩鹿嗚食野之蘋陸蒿也於以采蘩於沼於沚左傳蘋蘩蘊藻皆水蒿也性能溫中開胃下氣利膈解河豚魚毒然辛溫香竄耗氣昏神助火動風發毒皆所不免凡中氣虛弱及素有內熱風損血疾人均不宜食痘後癰疽瘡疥及天行熱病後雖已痊愈未滿半年者食之即發而本經收為上品云補中益氣療心懸善飢此物正令人嘈雜易飢何相反若是或者本經白蒿別是一物諸家之訓皆誤亦示可知蓋皤即白也爾雅既曰蘩皤蒿又曰蘋藾蕭是明明二種不得合為一物且蒿之類不一爾雅曰繁之醜秋為蒿郭注曰春時各有種類至秋通呼為蒿考唐書德宗御經筵問宰臣曰呦呦鹿鳴食野之蘋蘋是何草楊珏以藾蕭對帝曰詩疏云葉圓花白似非藾蕭恐詩疏所云即本經之白蒿存之以俟博識椿芽綱目曰禹貢作杶左傳作集韻作為材之最美又多壽其嫩芽瀹食醃食味並佳食療本草曰多食動風壅氣令人神昏血氣微生生編曰瀹食消風祛毒揆諸理氣味熏辛之物昏神耗氣助火發瘡皆所必至當以食療之說為是水芹綱目曰古作後省文作芹魯頌曰思樂泮水薄採其芹則芹字亦古矣性冷滑如葵故爾雅謂之楚葵此誤也芹不冷滑呂氏春秋曰菜之美者雲夢之芹雲夢楚地楚有蘄州蘄水縣爾雅翼曰因其地多産蘄故名據此則芹字不從芹亦不從當作蘄矣然芹音勤蘄音淇二字原不相涉且晉書地理志豫州所屬譙郡有蘄縣弋陽郡有蘄春縣豈亦因其産芹乎諸書皆附會呂覽之言而誤也又徐鍇注說文曰蘄字從草從考諸書無字惟說文別出䓄字據此則蘄州當作芹州或作䓄州矣亦誤也此菜有赤白二種延壽書曰赤者害人白者本經言能保血養精益氣語不可信綱目引詩觱沸檻泉言採其採及杜工部香芹碧澗羹謂皆美芹之功亦不可從蓋其形狀氣味皆似芎藭性能僭上上盛下虛人食之多走泄真氣若夙有頭痛頭眩及上焦火重常患咽喉口齒瘡痛人尤不宜食金匱言春秋二時蚊龍帶精入芹菜綱目曰非蚊龍乃晰䏢蛇虺之屬極是人食之面首青色腹滿如孕名蛟龍病當服硬餳三二升吐出蛟龍乃愈大抵此物香竄辛烈溫中理氣開胃引清氣上行則有之其性必不平和故列子曰蜇口慘腹凡病屬虛者忌之惟生搗汁飲能治小便淋痛又治小便出血日二三合出聖惠方旱芹唐本草人生堇爾雅曰齧苦堇郭注云即堇葵也綱目曰烏頭苗亦名堇與此不同嘉祐本草曰此內則所謂堇荁枌榆也氣味辛香與芎藭更相近俗呼川芎芹昏神耗氣助上焦火比水芹加甚上盛下虛人尤不宜食淮南萬畢術云生搗汁可塗蛇咬綱目云芹菜花紫色黃者有毒殺人今旱芹花皆黃未聞有毒不知古人誤乎抑傳寫之訛乎存考馬蘄爾雅曰茭牛蘄孫炎正義曰一名馬蘄鄭樵通志作胡芹俗呼野茴香綱目曰三四月生卑濕地一本叢生如蒿自毛蒙茸葉似水芹而小五六月開細碎如蛇床花結實似蒔蘿子作菜食益脾胃利胸膈祛冷氣此物氣香而性熱寒病則宜熱病忌之子醋炒研末服治寒氣心痛出食療本草茴香又作蘹香俗呼小茴子名八月珠陶隱居曰煮臭肉入少許即不臭臭醬入末即變為香故名茴香苗粗莖絲葉嫩時可為蔬氣香而不竄味辛而不烈佳品也藥性本草曰煮食治卒噁心心中似嘈雜非嘈雜似脹滿非脹滿欲吐又不能吐為噁心卒噁心者謂本無其病倉卒而起也腹中不安食療本草曰卒腎氣衝脅如刀刺痛喘息不得生搗汁和熱酒服圖經曰範汪方療惡毒癰腫或連陰卵髀間腿骨疼痛攣急牽入小腹一宿即殺人用茴香苗葉搗汁一升和酒服範汪時一升以晉書律曆志積一千四百四十一寸斛率用劉徽考定九章商功法算之得今時官量三合二勺有奇日三四次渣敷之冬月用根無根用子以上諸方皆然子溫丹田腎臟治膀胱冷氣疝氣偏墜腎寒腰痛如刺腰脅脹痛刺痛茴香一兩枳殼五錢各炒為末每酒服二錢出袖珍方又治便數茴香入鹽少許同炒為末糯米和山藥作糕蘸食出摘元方又治蛇咬久爛茴香同白芷研末敷出千金方番舶上八角茴香近時粵東西俱有俗呼大茴形雖不同功用相近然味辛性熱加甚蒔蘿開寶本草名慈謀勒俗亦呼小茴香形狀氣味皆似茴香而味加辛性加烈綱目曰苗作蔬食下氣利膈子治一切氣病拾遺曰主腹冷氣脹兩脅痞滿霍亂嘔逆殺魚肉毒添滋味研末酒服二錢治內挫腰痛出永類鈐方羅勒鄴中記曰石勒時改呼香菜吾鄉呼香草嘉祐本草曰一名蘭香葉形如紫蘇色不紫香聞二十步作蔬食調中消食去惡氣消水氣宜生食不如熟食多食澀營衛壅關節令人血脈不行又動風發腳氣綱目曰此菜能和血潤燥嘉祐謂其壅澀非也按此物辛香性熱多食則傷陰血非壅澀也綱目謂其和血亦非辛熱之物所能與嘉祐兩失之矣子大如蚤褐色能治翳可安三五枚入目中少頃濕脹與翳俱出目中不可著一塵獨此可安三五枚然但能取去熱淚去翳則不能陶隱居曰羖羊角馬蹄燒作灰撒濕地遍踏之即生羅勒俗呼西王母菜是此物無種自生未知果否紫蘇薄荷並見一卷胡蘿蔔元時始自胡地入中國根似小萊蔔故名色赤煮熟能下氣補中利胸膈今惟用鹽醃生食質硬難化病人不宜草豉拾遺曰生巴西諸國葉似韭豉出花中主調中開胃去惡氣按此菜南方絶無觀其所主性必辛溫熱病忌之蔊菜拾遺名菜又名辣米菜綱目曰蔊味辛辣如火烘故名考唐韻玉篇並無字止有蔊字則乃蔊之訛生南方小草也冬月布地叢生長二三寸柔梗細葉二月開小黃花結莢長一二分內有細子野人連根葉食味極辛辣林洪山家清供曰朱文公每酒後喜食此考亭食性如此格物之儒乃不知物理乎寄語談道學人他事效之此事切勿效之況在酒後乎稍有內熱者是自速其死也拾遺又曰主久寒冷氣飲食不消李鵬飛曰蔊菜拌生蜜汋食爽口然發痼疾生熱病好食辛辣人愛其爽口與服春方人喜其縱欲事不同而理則一發疾異日之憂何暇計哉此物性味若此設使內無寒冷食積長食多食何處著落劫陰助火理勢必然素問曰人年四十陰氣自半陰氣者精與血也一身之中百年之內本自無多加以辛熱日日劫之豈長有生命之理哉司空表聖曰六龍飛轡長相窘更忍乘危自著鞭言之可為寒心也辣枚子近數十年群嗜一物名辣枚又名辣椒亦蔊菜之類也葉如薝蔔而薄枝幹高尺余四五月開小白花結子前後相續初青後赤味辛辣如火食之令人唇舌作腫而嗜者衆或鹽醃或生食或拌鹽豉炸食不少間斷至秋時最後生者色青不赤日乾碾粉猶作醬食其形狀不一有本大末小者有本小末大者有大如拇指長一二寸者有小如筋頭短僅一二分者有四稜如柿實形者有圓如紅琅玕火齊珠者植盆中為玩可也今食者十之七八而痔瘡便血吐血及小兒痘殤亦多十之七八父母嗜食辛辣其精血必熱故遺害於兒女夫先師所慎者三疾居其一鄉黨一章所載不食之物多端雖未嘗作疾猶當謹之況明明有害而反嗜之哉明理之人飲食以沖淡和平為正醲厚之味久必傷生毒劣之物嗜之損壽乃食此而不盡夭者以體無內熱也若有內熱死安能不速耶讀吾書者幸毋倔強也蕨爾雅曰蕨櫅埤雅曰初生無葉狀如人足之蹶此解牽強蕨初生如人手之握蘇長公句曰竹筍初抽黃犢角蕨芽已作小兒拳則體物之工也周秦曰蕨齊魯曰櫅苗曰蕨萁拾遺曰多食消陽氣弱人腳令人好睡澄粉食性稍平食療本草曰多食令人目暗鼻塞有冷氣人食之腹痛綱目曰蕨性冷滑能利水道泄陽氣降而不升也然饑年賴以存活又不無濟世之功矣熱病或可寒病忌之水蕨似蕨生水中又名綱目曰呂氏春秋云菜之美者雲夢之治腹中痞塊淡煮食一二日即下忌雜食一月餘攻痞之物必不和平病人無痞不必食之薇爾雅曰垂水孫炎正義曰生水旁枝葉垂於水故名綱目曰生麥田原野詩曰山有蕨薇非水草也一名野豌豆蜀人謂之巢菜蔓葉皆似豌豆其藋作蔬味頗佳詩曰薇亦柔止禮曰芼豕以薇皆此物詩疏以為迷蕨迷蕨似蕨而色紫有花歧味苦不堪食非蕨類通志以為金櫻苗皆誤也拾遺曰蒸食利人久食調中利大小腸海藥本草曰利水道下浮腫百病不忌翹搖爾雅曰柱夫搖車郭注曰俗呼翹搖車拾遺曰幽州謂之苕搖綱目曰蘇子瞻云菜之美者蜀鄉之巢蓋詩疏有大巢小巢二種小巢即此大巢乃薇也生稻田中一名漂搖草一名野蠶豆作羹甚美食療本草曰利五臟止煩渴去熱風令人輕健長食不厭甚益人又療五種黃病每日食之以愈為度鹿藿爾雅曰蔨鹿藿其實莥郭注云鹿豆根黃而香綱目曰豆葉曰藿此葉鹿喜食之故名俗呼豆豆野菜譜名野緑豆生麥地及野中苗葉似緑豆引蔓三月開淡粉紫花結小莢子大如椒目黑色可煮亦可碾粉按此與薇翹搖三物所在皆有形略相似但翹搖蔓細而短此稍長大本經收為下品後世本草皆失載至綱目始著其形狀云治盅毒女子腰腹疼腸癰瘰癧癧瘍風主治如此其性必不平和病人不宜輕食蕺俗呼魚腥草氣惡也唐本草曰葅菜生濕地則引蔓葉似蕎麥莖紫赤綱目曰葉似荇三角半紅半青陶隱居曰蕺不利人腳食療本草曰小兒食之三歲不能行久食損陽氣消精髓孫氏曰腳氣人食之永不愈然能治療瘡發背搗敷出積德堂方又治蛇咬同皺面草即杜牛膝槐樹葉草決明同搗塗出救急方灰藋梁簡文帝勸醫文作灰滌俗訛為灰條炮炙論名金鎖天綱目曰所在有之二月生苗莖有紫紅線梭葉尖有刺面青背白中心嫩葉背面皆有白灰三月皆老不堪食性能殺蟲秦荻藜山海經所謂秦山有草名曰藜如荻今所在皆有食療本草曰菜中最為香美性能破氣療心腹冷脹藜即灰之紅心者故又名鶴頂草又名胭脂菜嫩時可食老則莖可為杖劉向校書天祿閣太乙下觀吹杖頭出火所謂太乙燃藜者是也詩南山有苔北山有菜陸疏曰菜藜也性亦不過殺蟲灰藋秦荻藜皆藜類皆非佳物病人忌食藿豆葉名藿貧賤所食而豆有多種其性大同中亦有小異分列於左然左傳肉食不能謀謀及藿食元微之詩野蔬充膳甘長藿皆猶孟子之言茹草泛言蔬菜不專指豆葉蓋訓詁家必雲豆葉臨文可以勿泥也黑大豆葉嫩者充菜茹能解毒退熱生搗敷蛇咬頻易取瘥赤小豆葉煮食明目去煩熱止小便數綱目曰赤豆利小便葉反止小便猶麻發汗而根止汗也物理之異如此緑豆葉退熱解毒之功在黑豆葉上暑月常食最宜又療霍亂吐瀉煩渴危症生搗絞汁加醋少許溫服絶佳白豆葉即飯豆利臟腑下氣豌豆葉味甘滑在諸藿上其利臟腑止煩渴亦在翹搖上蠶豆葉亦能退熱除煩又主酒醉不醒扁豆葉煮食治霍亂吐下不止吐下後轉筋生搗絞汁少加醋溫服立止亦可敷蛇咬蕎麥苗葉藥性本草曰作菜食下氣多食作泄尤不可生食動刺風令人身癢脂麻苗葉一名青蘘本經曰治風寒濕痹益氣補虛堅筋骨綱目曰祛風解毒潤腸嫩苗別録名夢神取子種之苗出即採甚滑美亦能補益又治崩中血凝注腹中成塊不速治殺人葉生搗汁半升溫服立愈無脂麻葉用苧麻葉無苧麻葉用苧麻根皮又治食物礙咽不下及飛絲入喉生嚼脂麻葉滿口吞之地黃苗在在有之根入藥用以河南懷慶者為勝苗則隨處皆可食也禮曰羊苄豕薇其充菜茹久矣春初生最早葉深緑如小芥有皺紋帶生食不入油膩能活血行血産後及癰疽瘡疥便血吐衄跌撲傷疼血在腹者宜之煮極熟加油膩或同豬羊牛雞鴨肉煮能養陰益血填精補髓胎前及諸虛百損骨蒸勞熱蓐勞凡虛在血分者無不宜之抱朴子曰飼五十歲老馬能使生駒又過一百三十年乃死雖未必如此其神有益無損則確也牛膝苗本經名百倍廣雅名牛莖救荒本草名山莧菜又名對節草綱目曰所在有之方莖腫節葉似莧對生性專下行壯筋骨活血行血凡痛風寒痹腰膝疼痛無力及婦人經血凝閉癥瘕血塊跌撲損傷癰疽初起均宜多食肘後方治小便不利莖中痛欲死酒煮服直指方治溺血及五淋砂石水煮服又可外治折傷閃肭出簡易方金瘡作痛出梅師方卒得惡瘡不識何症出千金方並搗敷又治胞衣不下無苗用根八兩上諸方俱可用根葵子一合水煎分三眼出延年方又治乳蛾乳痹搗汁和陳醋飲出肘後方又治老瘧不止酒煎濃汁儘量服不過三度必愈同上又治婦人陰痛方同上出千金方又連根葉搗酒擠汁治豬瘟喉腫出得效方枸杞苗子填精益髓補也根退骨蒸勞熱亦清而補也嫩苗充菜味苦微甘日華子曰補五功七傷去皮膚骨節間風消熱毒癰腫明目去頭風涼血和臟腑止消渴熱病後産後痘後癰瘡後及一切虛勞客熱均宜多食或和羊肉鴨肉作羹食尤佳五加苗其味辛甘氣芬馥作蔬多食下氣開胃去上焦頭項諸風行中焦腰腎胸脅諸氣外解皮膚風熱余詳一卷罌粟子有油故作粥食能潤主反胃隔噎久瀉腸枯殼能澀主肺虛久嗽腎虛精滑脾虛久泄脫肛苗作蔬能除熱開胃潤燥厚腸同豬羊肉煮補久病贏瘦肌肉不生極佳之品花本絳紅爛漫時能變五色故又名麗春又名虞美人結子似小罌罌中子如粟粒故名其津液為阿芙蓉又名阿片訛為鴉片又訛為啞芙蓉能補腎澀精房中術及阿片煙皆實非此假其名耳菊苗綱目曰爾雅曰治薔本經曰節華抱朴子曰周盈埤雅曰本作蘜窮也月令九月蘜有黃華花事至此窮盡也種甚多劉蒙泉史正志範石湖皆有菊譜範譜曰甘菊有鄧州黃鄧州白入藥充蔬皆取此二色余不堪用嫩苗花葉均可炸食博物志曰苦者名薏有毒不可食按菊苗鹽醃糖蜜餞皆美過於諸蒿且又有去頭目風熱明目調四肢療濕痹升而不僭香而不竄佳品也車前苗本經曰當道爾雅曰芣苜馬舄車前詩疏曰牛舌嫩苗作蔬大滑綱目曰山居録有種車前作菜法性能利小便通五淋治尿血凡水道有熱人宜之陶隱居曰主泄精衍義曰車前作菜食便覺小便不禁陶說誤矣不知陶蓋指水臟有熱者言熱去泄精自止非謂其能澀虛滑也無苗用子同茯苓研末服又詩采采芣苜注云能利産故梅師方治孕婦熱淋子母祕録治橫産不下皆用其子則何不於臨月時多食其苗又治熱眼久痛或生雲翳肝腎補方中均須其子唐張籍詩云開州五月車前子作藥人皆道有神慚愧文君憐病眼三千里外寄閒人又治夏月水瀉注下清濁不分車前子研末米飯下竹筍爾雅曰竹萌說文曰竹胎簡譜曰竹芽神異經曰竹子坤雅曰旬內為筍旬外為竹故從旬旬有六日而齊母也俗作筍非綱目曰從旬諧聲也顧凱之僧贊寧皆有筍譜贊寧譜曰江南湖南人於竹行鞭時掘取嫩者為鞭筍冬月取未出土得為冬筍東觀漢記謂之苞筍並可鮮食為珍味其次則曝乾者為玉版筍明筍火筍鹽曝者為鹽筍並可為蔬食採宜避風日見風則本豎入水則肉硬脫殼煮則失味生著刃則失柔煮宜久生必損人病人尤宜久煮味蘞者戟人咽先以灰湯煮過再煮詩曰其蔌伊何維筍及蒲禮曰加豆之實筍葅魚醢則筍之充食久矣按諸筍別録謂其益氣利水可久食吳氏本草謂淡竹甘竹苦竹筍冬筍鞭筍皆可久食均不可信蓋筍味雖鮮脆而鋭上之性耗氣損神滑腸敗胃平人可以暫食病人則斷不宜況可久乎冬筍稍平春筍更劣故食物本草用以發痘綱目極訾之目為刮腸篦不為無見筍性鋭上痘症必下身漿滿上身不起者宜之又傷中氣令人作泄必脾胃索強大便燥結者始可用之俗醫一例混施及至貽誤猶不解其故也至於明筍鹽筍病人反可食蓋鹽筍經湯煮加以久浸又得鹹味相制鋭上之性化為平和明筍亦經煮浸再用白礬代鹽醃藏用時又須久浸去礬始柔軟可食名雖為筍筍之性味全無加以調和反無大礙日用本草曰筍同羊肝食令人目盲又凡食筍用麻油調和其害略減觀榨麻油枯滓撒竹林竹死可知其性所畏矣又海槎録曰交廣人用沸湯泡筍冷水浸二三日縷如絲醋煮曝乾味美可食且能止渴解醒豁痰利氣又小竹筍為爾雅曰箭明郭注云筍屬也周禮曰葅雁醢又市肆一種青干筍青如旋掘庖人用配燕窩云性大補亦屬謬談蘆筍食鑑本草曰消膈間客熱同麥門冬甘草煎汁多飲利小便解河豚及諸魚鱉毒按此物不能常得蘆根可以代之蒲筍一名蒲蒻即香蒲嫩苗味甘平本經曰主口中爛臭堅齒明目食物本草曰生啖止消渴飲膳正要曰熟食補中益氣和血脈産乳全書曰搗汁服治孕婦勞熱煩躁胎動下血絶佳品也又野菜譜有蒲兒根然則根亦可食無筍用以代之茭筍一名菰筍即茭草之嫩苗味極甘淡性亦和平而食物本草及圖經皆極言其冷拾遺曰作蔬食去煩熱止渴除目黃利大小便止熱淋均生搗汁和熱水頻飲夫功效如此性非不涼而甘淡和平與苦寒傷胃者迥不侔也菰手蜀本草曰菰生三年中心起白苔如藕似小兒臂而白軟堪淡名菰首圖經曰此名茭白通志亦作茭白生熟皆可食甚甜美又名菰手作首者非爾雅曰出隧蘧蔬郭注云生茭草中狀如土菌味甜滑廣雅曰氍㲣食物本草曰能去胸心浮熱拾遺曰煮食止渴及小兒暑泄大人亦宜菰手之小者臂內有黑灰名烏郁俗名茭粑味甘而澀煨熟或和麵作餅食止水泄絶佳芡莖圖經曰一名蒍一名𦵸菜一名䓈菜味極甘平質極柔嫩生食止渴除煩退膈間客熱煮熟補脾開胃益氣生津涼不傷氣補不助邪佳品也根煮食能消小腹氣塊及偏墜作痛見法天生意菱莖菱為果中佳品莖則苦澀不堪食惟暑泄脾虛者同粳米煮粥食一取其澀一清暑也余病忌之性忌鐵宜手掐斷瓦罐內煮藕詳果類蓴綱目曰本作藥一名茆一名水葵顏之推家訓曰蔡朗父名藥改蓴為露葵蜀本草曰葉如鳧葵浮水面三月至八月莖細如叉股短長隨水深淺名絲蓴味甘體軟九十月莖粗硬冬時萌在土中粗短名瑰蓴葉如荇而圓形似馬蹄莖紫色大如箸柔滑可羹按蓴味甘而生於水性近寒涼日華本草謂其治熱疸厚腸胃逐水解毒唐本草亦云久食宜人主胃虛不能下食而工藏器孟詵皆言不堪食陳說至云食之多死未免過情且張翰因秋風起而思蓴鱸則必為吳中常食之物豈遂害人至死乎亦豈有性味甘平反殺人乎當以日華唐本之言為正莕一名鳧葵綱目曰爾雅云莕接余其葉苻則鳧當作苻說文謂之䖂楚辭謂之屏風紫莖屏風文緑波是也詩周南作荇菜杜詩云水荇牽風翠帶長謂其莖也葉似蓴微尖故野菜譜名靨子菜與蓴同類異種性亦倣佛能去熱治消渴利小便蘋拾遺名芣菜楊升庵卮言名四葉菜又名田字草韓詩外傳曜仙真隱書名醫別録唐本草諸書所載蓴莕藏形色不一獨綱目考訂加詳曰葉大如指頂面青背紫有細紋四葉合成一葉中折十字如田字形者蘋也葉徑一二寸有一缺而形圓者蓴也似蓴而稍尖長者蘋也花並有黃白二色不結實葉徑四五寸花黃結實如小角黍者蘋蓬草也爾雅曰萍蓱其大者蘋後人注詩於以採蘋皆因之大誤萍無根浮泛水面蘋根連水底二物絶不相侔呂氏春秋曰菜之美者崑崙之蘋吳氏本草曰甘寒而滑主暴熱下水氣利小便止消渴山海經曰食之已勞水藻詩曰於以採藻於彼行潦陸疏曰有二種一種葉如雞蘇莖如箸長四五尺一種葉如蓬蒿莖如叉股渭之聚藻並挼去腥氣糝蒸食滑美荊揚人以濟飢爾雅作曰莙牛郭注云江東呼馬綱目曰水藻葉長二三寸兩兩對生一種聚藻葉細如絲節節連生即蘊也俗名鰓草又名牛尾藻一節長數寸長者二三十節可食按藻蘊一類二種吾鄉俱呼須草其馬藻根連水底不可移栽聚藻無根不借土養池沼及魚缸內皆可畜之味甘氣腥性寒而滑主治暴熱熱利熱淋止消渴甚佳寒病大忌孫氏曰極冷無過於此凡熱毒瘡腫及丹毒搗敷干即易其效無比海藻綱目曰爾雅曰海藻郭注云一名海蘿本經曰落首別録曰藫拾遺曰有二種馬尾藻生淺水如短馬尾細葉黑色大葉藻生深海新羅諸國取以貨之四方形似水藻功用不同水藻生淡水性冷但能退熱此生鹹水故能軟堅益血亦能泄熱利水本經曰消癭瘤結氣散項下硬核癰腫破癥瘕堅氣治腹中上下雷鳴下十二水腫凡病血虧氣滯者宜食之海蘊綱目曰縕亂絲也此葉似之故名與海藻同種異類猶水藻之有水蘊也功同海藻海帶嘉祐本草曰似海藻而粗柔韌而長用以下水甚佳又能涼血補血催生婦女宜食陰虛血熱者尤宜多食昆布吳氏本草曰一名綸布綱目曰生登萊者搓如繩生閩浙者大葉如菜然今肆中昆布薄如菘菜葉青黃色全無布形而海帶之闊者俗名海布狹者乃為海帶恐爾雅綸似綸組似組者指此二種其似海藻與菘者皆別為一物不可知也但海中諸菜性味相近軟堅散結下氣利水均有同功而食物本草謂海中菜皆損人北人食之必生病極為無理海物皆軟堅利水且能益血養陰惟近海人食過於多則咸能劫血其害不在北方也沙著綱目曰嶺表録異云生海岸沙中春吐苗心如骨白而徑可作酒籌採者須輕步速撥之若聞行聲即縮入沙中不可得異物也寒外一種雪蓮亦能縮入土中海藥本草曰治水腫結氣宿滯不消腹中虛鳴紫菜一名紫䓴綱目曰生閩粵海邊大葉而薄彼人搓成餅曝乾華之色紫病癭瘤及腳氣者宜之咸故軟堅滑能利下也石蓴拾遺曰生南海附石而生形似紫菜色青主下水利不便海藥本草曰煮汁飲下結氣此二物食過多令人腹痛飲熱醋少許即解石花菜綱目曰生南海沙石中高二三寸似珊瑚故又名瓊枝有紅白二色沸湯泡脹入薑醋甚脆美根埋土中可復生一種稍粗者名雞腳菜味更佳二物久浸皆化成膠郭景純江賦所謂土肉石華者是也食鑑本草曰甘鹹大寒滑去上焦浮熱發下部虛確論也今人暑月用以煮魚其膠如冬天魚凍魚性熱石花寒兩物相合想當兩無弊也鹿角菜南越志曰一名猴葵綱目曰生東南海中崖石間長三四寸大如鐵線分丫如鹿角紫黃鍇土人採曝貨之水浸則發大如新醋拌食滑美久浸亦化為膠食性本草曰去熱風退骨蒸勞熱久食治虛勞肺痿食療本草曰丈夫不可久食指無熱病者言損腰腎令人腳冷按此與石花雞腳一類三種養陰退熱可以通用虛寒人均宜戒也龍鬚菜綱目曰生東南海邊石上叢生無枝葉狀如柳根之須長者尺余白色醋拌肉煮皆可食性能消癭結解熱氣利小便博物志之石發似指此物與苔類之石發名同物異也芋詳見卷甘薯又名翻薯其蔓宜數翻動否則節節生薯力分而薯小矣味甘美性能健脾胃補虛乏強腎陰長食代糧可以辟穀南方草木狀本草綱目說鈴皆極言其功為天下第一利濟無窮之物較芋尤美芋須培壅此得培壅更佳無培壅所收亦倍於芋且十脫於禾稻芋耐旱須沃壤沙土倘硬黃土地亦不能耐此不論地土均能耐旱均可多收但不能耐水此可擇地而種淹處少不淹處多也芋長食未能勝於米麥此物長食使人多壽此薯原出呂宋國其地專食甘薯不食五穀人多壽考或謂其人多壽乃水土所生未必由甘薯之力不知食物為後天生命之源甘薯設非佳物水土生之甘薯亦必害之今食甘薯而得此水土之功即甘薯之功也且不勞而得乃種蒔者僅一閩省近數十年江西吉贛南寧南瑞袁臨撫建諸郡亦稍稍種之自吾饒以西以北甘受水旱凶災之苦無一人肯試種之豈不怪哉豈不怪哉憶乾隆四五十年間因河南旱災普行蠲賑旋發胬金收買閩中薯種擇老農若干人至豫省教民種蒔嗣命天下有司每春出示普勸各直省農民廣種迄今二三十年竟無一人遵而行之使果遵而行之何水旱之足憂哉又其最小行鞭之薯可以搗澄為粉苗葉煮食甚佳糝蒸尤美取以飼豕可代米麥余用猶有如此誠哉其利濟無窮也薯蕷一名玉延圖經曰江閩人呼為薯音殊或音諸語音之輕重也衍義曰唐代宗諱預改為薯藥宋英宗諱署改為山藥盡失當日本名有大小二種大者盈握而輕鬆小者才如拇指而結實俱長尺余一種山中自生不假培壅者更結實名山薯俗誤呼甘薯為山薯蓋翻字之轉而訛也一種扁闊如姜者一枚可重數斤俱不及小者力厚性能安心神健脾胃強腎陰凡虛勞贏瘦盜汗怔忡等症宜多食味甘微澀凡脾虛久瀉腎虛精滑便數等症尤宜多食此與芋皆補氣補血上品而主治不同者芋甘而滑故能利腸胃此甘而澀故能固腎脾也鮮者能散血消腫癰瘍初起同鯽魚搗爛加醋敷可以內消已潰者周圍束之亦能使根腳易斂食療本草曰山藥不宜和麵作䬪飥令人作脹百合綱目曰韓詩外傳名強瞿俗名強仇又名摩羅又名重相又名中逢花吳氏本草名重邁又名中庭或名蒜腦薯因其根形相似也顧野王玉篇曰百合蒜也竟呼為蒜則比之不倫矣性能溫肺補肺上虛嗽健脾胃安心神凡脾肺心三臟氣分虛者宜食之別録謂其治浮腫消脹滿元和紀用經用桑白皮三兩漢防己兩半茯苓郁李仁百合各一兩治水腫每日一服忌食鹽藥性本草曰治百邪鬼魅涕淚不止故王右丞詩曰果堪止淚無欲縱望江目溫肺宜同蜜煮補諸虛宜豬牛羊肉煮生者可搗塗天泡濕瘡出瀕湖方又治骨哽久不下百合五兩和蜜搗圍頸項包住不過三五次必下出聖濟總録山丹卷丹此百合同類異種也綱目曰葉短而闊白花者百合也葉長而狹紅花者山丹也葉似山丹而莖高四月結子在枝間七八月乃開黃花帶紅色有黑點者卷丹也三物功用相近入藥用百合充食可不必拘綱目謂山丹與百合迥別卷丹似百合不堪食未為確論至陶隱居云蚯蚓所化更屬幻談瓠國語曰苦瓠亦曰苦匏詩曰匏有苦葉瓠本甘美間有苦者以人畜踐踏其苗或壅以牛馬糞皆能變苦若瓠甘葉亦甘詩曰幡幡瓠葉採之亨之爾雅曰瓠棲瓣郭注云瓠中瓣也詩云齒如瓠棲今碩人篇作瓠犀性滑而降故能下水通淋治四肢面目浮腫石水腹大味甘而平故能和中退熱治胃虛飲食不進煮汁淡飲除注夏熱渴解熱煩凡有以上諸病人宜多食壺盧說文曰瓠瓜論語曰匏瓜綱目曰壺酒器盧飲器此物各象其形故名詩豳風曰八月斷壺俗作葫蘆非葫蒜名蘆草名也圓者曰匏亦曰凡蓏屬皆得稱瓜故曰匏瓜瓠瓜說文曰瓠匏也又曰瓢瓠也後人以長如越瓜者為瓠瓠之一頭有腹長柄者為懸瓠無柄而形扁者為匏匏之有短柄大腹者為壺盧壺之細腰者為蒲蘆各分名色其實一也按壺與瓠一類各種性味誠不相遠蔡虛齊據埤雅匏短瓠長匏苦瓠甘謂為二物且引論語繫而不食以證之不思瓠亦可稱苦國語苦瓠不材於人共濟而已蓋匏有甘苦瓠亦有甘苦故可互稱其一種生成味苦絶無甘者乃別為一物形似瓠本經謂之瓠𤬏不以匏名安得云匏苦瓠甘乎又匏可為樽古人之祭天地及婚禮合巹用之然公劉篇酌之用匏則燕飲亦用之矣又風俗通曰燒穰可以殺瓠注曰黍穰也故云畜瓠之家不燒穰種瓜之家不焚漆物性相制也冬瓜見一卷南瓜味甘色黃凡脾虛久瘧久利宜食俗醫謂其有毒非也味過於甘故性偏於壅癰疽痘疹痢疾初起諸症忌之者壅則生膿壅則滯氣與忌白朮同理非毒也凡嗜食此者加細切蔥葉或花椒末為調和則無弊矣氣滯中滿及素患腳氣黃疸者忌食此二症雖已愈多年猶當忌之又不可同羊肉食其內穰治銃子入肉厚封之即出絲瓜事類合壁曰天羅又曰布衣本事方曰天絲瓜又曰蠻瓜有二種一種瘦長者為絲瓜一種粗短者為蠻瓜又曰魚鰦或作虞刺食物本草曰痘疹及腳癰方中用之性能解毒退熱利腸胃和胎氣氣味甘平百病不忌熱病及痘疹腫毒尤宜或多飲其汁能解大毒生生編謂其暖腎助陽俗醫謂其化痰均大誤此物捻之綿軟形如已痿之陽故善能痿陽直指方治癰疽瘡口大深不能斂合搗汁頻抹丹溪治玉莖瘡潰搗汁和五倍子末頻搽普濟方治喉閉腫痛搗汁飲又稀痘諸方用其藤上須不驗不足録也苦瓜綱目曰救荒木草名錦荔枝又名癩葡萄星槎勝覽曰蘇門答刺一種瓜若荔枝未剖臭如爛蒜剖開香甜可口或即苦瓜也按此瓜嫩時色青味極苦能除邪熱解勞乏清心明目老則色紅味極甘能益肝腎壯陽明目一物前後補瀉二用皆有奇功異品也暑月不拘有熱無熱宜多食目疾人更宜多食越瓜食物本草名梢瓜又名菜瓜味雖甘淡而質硬難化能敗脾傷胃開寶本草曰利腸胃止煩渴蓋指病熱者言然清涼退熱之物甚多何需乎此故食物本草謂其冷中令人心痛又令人腳弱不能行總一敗陽傷胃之害也霍亂人犯之則難救蕭子真曰久食爛人眼觀驢馬食之眼爛可知鹽醃醬藏皆不為美百病忌之平人食多秋來亦不免瘧痢俗醫乃令病人專食醬瓜大誤患瘡毒人食之令難收口至劣物也黃瓜本名胡瓜石勒時諱胡改呼此食鑑本草曰清熱解渴利水然寒中損胃傷脾作泄之害與越瓜同食療本草曰生食多食發瘧病動疰氣敗陽氣損陰血髮腳氣虛腫百病小兒食之生疳蟲天行病後尤不可食食之即發千金方用治熱水浮腫服溫暖藥轉甚者胡瓜一枚連穰與子醋煮至爛空心盡食之海上名方用治熱利嫩黃瓜同蜜生食醫林集要治咽喉熱腫老黃瓜開一蓋去子入火硝填滿陰乾候硝透出取吹之壽域神方用治火眼赤腫取硝點之亦可用皮硝醫方摘元治湯火傷灼老黃瓜入瓶內封掛檐下待成水取刷之按此物雖入藥用然舍此數方而外不宜濫試又不可同落花生食茄綱目曰拾遺名落蘇未詳其義五代貽子録云酪酥言其味甘也穿鑿之至太平御覽名崑崙瓜開寶本草曰多食動氣發瘡及痼疾李鵬飛曰秋後食多損目生生編曰女子食多傷子宮婦人不孕及數墮胎者切戒西陽雜俎言其厚腸胃大非茄性滑敗腸胃也今人或切碎曝乾醃食或摘下即拌鹽生食未經蒸煮辣味全在傷人更甚木耳一名木一名木蛾性之良毒視所生之木而山中人不知往往雜採而食甚或貪一時之口腹損百年之身命謹依本草考訂如左所不能盡知者惟自愛之人謹之可也至若市肆所售從無一人中毒豈不由業此者擇木而伐非零星雜湊者比哉觀此木耳可食不可食之理較然矣名醫別録曰五木耳生犍為山谷二月多雨時採即曝乾陶隱居曰五木耳不言何木惟老桑樹上有青黃赤白者濕軟者人採以作菹耳唐本草曰桑槐楮榆柳為五木耳並堪啖綱目曰木耳各木皆生今貨者亦多雜木惟桑柳楮榆之耳為多雲按五木耳者取其最良有益於病也其餘雜耳貨者井由伐木釀埋既已擇去有毒之木雖無大益亦不至傷人然非濕熱鬱蒸之氣不生故皆有毒無益其性專走血分非血病人不宜多食也桑耳本經曰治婦人漏下赤白血病癥瘕陰痛凡女人血病及腸風痔痿不拘男女宜之槐耳亦主血病而槐性本清大腸之熱故於腸風五痔為更宜又聖惠方治月水不斷勞損黃瘦暫止復發槐耳炒黃色赤石脂各一兩為末每食前熱酒下二錢按赤石脂難得以海螵蛸代之更佳如無槐耳用他木耳加醋炒槐米一兩亦可榆耳亦主血病淮南萬畢術云可辟穀不飢幻談也柳耳生生編曰補胃理氣恐未必然又活人心鏡治反胃吐涎用柳耳或柳菰五七枚煎服柘耳綱目曰反胃咳唾膿血柘耳一兩研百齒霜二錢梳篦上垢膩糊丸梧子大每服三十丸按百齒霜最令人吐今反以治反胃或有深意然非唾膿血者毋輕試也楮耳諸書原缺又不拘何木耳冷水浸噙皆治胃火牙疼杉菌圖經本草曰即杉樹上木耳治心脾氣痛楓耳食之令人狂笑不休不速解殺人地耳生卑濕地不假木氣狀如木耳春夏時雨過即生俗名地踏菰亦土菌之類中其毒亦殺人別録乃云明目益氣令人有子無理之極但食之有死有不死亦似土菌可竟以為佳物乎石耳生天台四明黃山及巴西諸山石岩上盧山亦多石之精華所發形似木耳性則判若天淵日用本草曰久食益顏色令人耐飢大小便少綱目曰益精明目又治瀉血脫肛熱淋熱痢按木將枯朽受天地濕蒸之氣精華外泄而為木耳木在臟肝在體為血故性專走血分肆中所售雜耳既不害人入藥無不可用而桑耳柘耳之補血槐耳之涼血非他耳所及臨病覓之萬不能得幸腸風崩漏均可緩治三十年前曾令患腸風者隔冬覓得槐樹一株去皮任春雨淋灑久晴則覆以草不使過干至初夏天氣倏晴倏雨隔數日以清糯米粥灑之遂生多耳用之神驗病深者盍仿而行之所費無多且次年復生可以待用不僅愈一疾也諸耳有毒金匱要略曰木耳赤色及仰生者並不可食拾遺曰採歸色變者夜視有光者欲爛無蟲者皆有毒解毒法拾遺曰中木耳毒生搗冬瓜蔓汁飲之然不能隨時隨地皆有不如地漿灌之最妙見一卷糞汁亦可香菰一名香菌一名香菌一名樹雞一名木㙡本無種類感濕熱之氣而生形色氣味亦無一定大率有毒宋人陳仁玉作菌譜云有九種一曰合菌二曰稠膏三曰松菌四曰麥菌五曰玉菌六曰黃菌七曰紫菌八曰四季菌九曰鵝膏菌生孟溪五臺天台括蒼諸名山芳香氣味莫與倫比然此不過山家之清供富室之珍肴已耳於養生治病無關也概置不録所辨者肆中處處皆有常食之菰也此菰系伐木罨造木本無毒加以糯米汁引之糯米之性速朽故諸果見之即爛古方有豬羊血拌糯米飯干筍包之埋土中種靈芝之法與此理同食之無害然濕熱之毒總不能無中氣弱者下元虛冷者及瘡瘍痘後均不宜食菰稟木氣而生故善升易曰地中生木升愈升則中下愈弱必頭眩鼻衄或足不能行菰成於一二日其生最捷故善發瘡瘍痘後雖痊愈食之必復作膿諸本草有云益氣補虛者有云食之不飢者皆非見理之言也近或用以發痘亦當論其上下必上部頭面未起始可若上部已發下部未發者大不宜也蘑菰長二三寸本小末大中空如玉簪花氣味香美價亦極昂尋常之菰有木處皆有此惟生於山東淮北然濕熱之毒及善發善升之性無異地菰生生編曰益腸胃化痰理氣誤說也飲膳正要曰動氣發病不可多食則正論也羊肚菜此菰狀如羊肚有蜂窠眼味極鮮腴食之終日不飢然不恆有明季歲飢各處皆生此菜至秋谷熟則無參此上蒼救濟災黎不可以常理論也見朱竹垞靜志居詩話雞㙡生滇南沙地大頭高腳土人以充方物性近香菰雷菌廣西橫州遇雷雨過即生須速採稍遲即腐或老作羹甚美然濕熱鬱蒸之氣暴長暴消性又在香菰下矣雚菌此物本經所收不著形狀陶隱居曰生鸛屎中附會之談何處有許多鸛屎為末和豬肉食可殺蛔蟲唐本草曰渤海蘆葦中咸所鹵化非鸛屎也觀其所主之病知性之劣矣竹蓐拾遺作竹肉云生苦竹枝上如雞子似肉臠有大毒須灰汁煮二三度然後可食否則戟人喉出血手爪盡脫是其害過於砒鴆本草猶云能治痢好奇無理土菌爾雅曰中馗菌也孫炎注曰地菌或曰地雞亦曰獐頭食物本草曰菰子其生與地耳同理而濕熱之毒過之味雖鮮美性則惡極自愛之人斷不肯食而愚俗嗜之歲有死者推原其故每云死者不能辨識誤食惡菰彼則別擇精詳無何而善辨者亦死矣其辨之之法云色紅黃者背無雞絲坼紋者不可食而已詎知此物本無種類濕熱之氣倏長倏消受氣輕者食之或不盡死遂侈為善辨一遇氣重則身命殉之安能遍告天下愚夫愚婦陰司菰子鬼盡是陽間善辨菰子之人其不善辨者不敢食也至諸本草皆云蛇蟲從下過則有毒是菰本無毒殺人者乃蛇毒矣無理不通相沿千百載無不隨聲附和極為可笑夫百果百菜皆生於原野蛇蟲無地不有獨不過其下乎何以千萬年來從未聞何年何地有何人食某谷某果某菜而中蛇毒者谷菜猶可果中櫻桃楊梅蒲桃蛇最喜食蓋無一樹一架不經蛇過者夫天下有毒之物多矣豈必蛇蟲而蛇之毒在口被螫者輕者腫潰重則立死中其涎毒也自涎而外一身首尾儘可撫摩乞兒終日弄之且食之藥劑亦多用之豈一過即毒人至死乎蛇有不可食不可入藥者無不可弄蓋菰之毒在濕熱全不關乎蛇蟲菰之難辨在無種亦難拘以形狀本草拾遺雖載辦法亦不能盡附録於左夜中有光者爛不生蟲者煮不熟者煮湯照人無影者上有毛者下無紋者仰卷者色赤者並殺人食物本草曰煮菰以姜屑飯粒投入色變黑者有毒中其毒以地漿及糞汁解之地漿最妙張景嶽曰解菰毒以大劑補中燥濕之藥如理中之類加薑附服之此言極有理豫意略加黃連寒溫並行濕熱兩解似為更妥清明前菰毒乃寒濕勿用黃連即飲地漿得吐後亦宜多服此藥乃善後之良策也製造諸菜鹽藏凡菜不經烹飪旋採旋用鹽醃概非病人所宜若久藏者浥郁之氣更傷胃氣惟蒜苗蒜梗蔥韭等稍可又難克化則亦非佳物也北地一種大頭菜其葉甚佳根如萊蔔味美而質硬病人愛食細切如縷可以不忌醬藏見二卷醋藏醋用於調和則佳專食味過厚病人即素性愛酸亦宜少食惟醋浸蒜瓣味甘不酸可以開胃下氣令人思食糟藏見二卷黃齏菜不拘何菜以煮飯熱米飲浸一二日色變黃味微酸加鹽食頗爽口此菜雖微其來古矣性亦無益有損麵筋豆腐豆腐皮豆腐乾豆腐乳油豆腐緑豆芽大豆黃卷豉豆莢扁豆莢並見穀類
