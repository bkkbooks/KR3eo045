body:
  text: 卷二穀類周人尊社稷以配天必曰粒我蒸民而後曰帝命率育由是觀之洪荒之世茹毛飲血天札疵癘必不能無自有神農又有後稷教之樹藝五俗而含哺鼓腹之民乃得遂生適性共安於耕鑿之樂矣獨是穀類甚繁周官有五穀六穀九穀詩有八谷百穀加以南北土産各各不同則繁而益繁矣所以職方氏辨九州之谷地官辨土宜穜稑種播獲宜知養生療疾即在其中也諸谷考鄭康成詩箋曰麻黍稷麥豆為五穀稻黍稷粱麥瓜為六穀稷秫黍稻麻大小麥大小豆為九穀其分別處或有稻無麥或稻麥俱無或無粱或無麻總皆未當至楊泉物理論謂稻粱各二十種蔬果之能助谷者各二十種共為百穀而麥黍稷並遺之更為杜撰蓋詩之百穀不過極言其多必泥定其數以求解則鑿矣此所考以八谷為主而諸凡粒食似已盡該何勞辭費也粳米秈米即八谷之禾粳一名粳米秈一名占米九十月收者為粳六七月收者為秈自唐以前中國無夏熟之谷故豳風曰十月納禾稼又曰十月獲稻始自閩人得種於占城國宋真宗就閩中取三萬斜分給諸道種之一説占城貢新米真宗訝其早貢使曰其國谷皆以六月熟帝命明年貢谷得數萬斜分給諸道為種綱目曰有水旱二種南方土下塗泥宜水稻北方地平宜旱稻又真臘國有水稻高丈許隨水而長真臘在占城之西南由中國開洋至占城行丁未針再由占城開洋至彼處行坤申針海程甚遠安得此種則禹貢揚州之域厥土惟塗泥厥由惟下下者復何憂潦歲乎圖經曰一種香稻長白如玉可充御貢按香稻今名白米惟浙東西可種本朝蘇松常鎮杭嘉湖等郡計田貢之歲漕京通二倉用供內府光祿寺以待王公百官各國貢使廩之用江蘇六萬九千四百四十七石浙江三萬零五百五十三石又轉輸薊州一千三百一十五石易州四百五十石用供陵寢官兵俸餉之用民間日食則不能常得以收成不及燦粳之多也性之中和味之醇正為百穀之首其餘種類甚多總不外乎燦粳二類詳見欽定授時通考糯米即八谷之稻綱目曰又名稌周頌曰豐年多黍多稌內則曰牛宜稌樂雅曰稌稻開寶本草曰稻即糯也其不黏者為粳説文曰沛國以稻為糯粳或以稻為諸谷之總稱非也周官有稻人漢有稻田使者則非總稱可知且禾亦總名詩八谷有禾復有稻又論語曰食夫稻言非常食之物如粢糕之類取其適口非以養生故孝子不忍為也若作總名是諸谷皆不食可以枵腹三年乎詳説在掌禹餳嘉祐本草暨本草綱目粟米即八谷之粱綱目曰陶隱居云梁米皆是粟類考之周禮九穀有梁無粟可知亦可為諸谷之總稱有粒大粒小有毛無毛青黃紅紫各種穗大者長尺余小者才一二寸獲無早晚早種早收晚種晚收爾雅曰虋赤苗芭白苗郭注皆以為粱秬黑黍秠一稃二米郭注皆以為黍詩維秬維秠維糜維芑是也爾雅翼以秠為來牟大誤糯粟綱目曰爾雅曰衆秫郭注云黏粟也蘇恭唐本草曰秈者為粟糯者為秫蘇頌圖經謂秫為黍為黏者許慎説文謂稷之黏者崔豹古今注謂稻之黏者皆誤也然離騷屈原種秫明史洪武四年禁民種秫則秫似又為諸黏谷之總名也小麥周頌曰來一作䅘有有芒無芒二種每種各有多類詳授時通考大麥周頌曰牟孟子作牟有遲早及落芒不落芒數種紅黃二色其燕麥穬麥各種均各有大小之分見後穄米即八谷之稷又名粢禮記曰稷曰次粢爾雅曰粢稷羅願爾雅翼曰稷穄粢皆一物語音之輕重不同耳綱目曰稷與黍苗似粟而低結子似粟而光滑顆粒稍大似蘆粟略小其穗分枝而疏散不若粟穗之叢聚攢族也黏者為黍不黏者為稷為八谷之長故祀穀神以稷配社上古以烈山氏之子為谷主至成湯時始易以後稷皆有功農事者稷主猶言谷主穀類最多舉其長以概其餘也二三月種四五月即收其獲最先故以長八谷吳瑞日用本草汪昂本草備要均誤以蘆粟為稷未免臆説黏稷即八谷之黍按此二種吾鄉通呼水粟蓋黍稷一類但分黏不黏俗皆呼粟又訛黍為水也但爾雅既云粢稷也禮記亦云稷曰明粢是黏者為稷不黏者為黍注家皆反其説恐誤也存考麻詩八谷曰禾麻菽麥後人以脂麻當之脂麻木名胡麻來自大宛漢時始入中國僅可榨油及作餅餌不堪為飯安得三代時即列於八谷疑是火麻即本經之大麻爾雅翼謂之漢麻詩疏曰枲麻以其皮可作布及履索也又曰牡麻雌者名苴麻爾雅曰枲實郭注曰儀禮云苴麻之有蕡者蓋有子之麻為苴廣即蕡字故爾雅又曰蕡藹郭注曰樹實繁茂菴藹又曰莩麻母郭注曰苴麻之盛子者為莩陶隱居以蕡為無子之麻誤矣詩詠桃夭亦曰有蕡其實蕡乃實多之象且服食法有大麻子救飢方其為八谷之麻無疑豆即八谷之菽本作綱目曰谷之有莢者也有大小二類大豆有黑共青白諸色早收晚收數種小豆有青白黃緑斑諸色粒圓粒長數種其類甚多張揖廣雅曰大谷菽也小豆答也董仲舒注詩八谷亦曰菽是大豆小豆名答按小豆種類較大豆尤多其扁豆蠶豆豌豆等粒雖大皆是答類一種赤小豆俗誤以相思子當之大非此乃木實半截紅半截黑亦有全紅者其硬如鐵木團團如蓋密葉不調人或植之門庭為玩不可為谷也沈自然詩曰從此人間無別離門前不種相思子李義山詩曰玲瓏骰子安紅豆入骨相思知不知不知即此木之子也與赤小豆全不相涉不知何時誤起必不可從今藥肆中盡是此物其赤小豆葉蔓似緑豆花黃色粒長亦有圓者秋種可和米作飯極耐飢故名飯豆有青赤二種赤者即赤小豆青者名白豆諸飯總説病人飲食一欲其不改故常則胃氣安病易治藥餌之外不必飲食為助則飲食只如平時一欲其頓改故常則臟氣變病難治或不能多服藥餌則視其合病之飲食變更平日以助藥力此不特粥飯凡茶酒蔬果魚肉皆宜如此五穀雖曰中和而稻梁黍麥不一其種南方北方水生陸生不一其地播種收穫節候早晚不一其時則其性又安能畫一也南人食米北人食麥均可滋生氣血長育子孫亦且同登壽考無方隅之異者臟氣習而相安也平時既可養生病時即可養病而病人脾胃必遜於平人南人米飯平時愛食乾硬者病時即不宜傷寒熱病之後尤不宜稍易以滋軟則無弊矣北人面飯平時愛食炙煿者病時亦不宜內傷虛熱之症尤不宜或發以酒酵或隔湯蒸煮則無弊矣而米麵及諸雜谷之可為飯者有極佳有極不佳醫家病家皆不可不知也白粳米飯白秈米飯粳熟於秋性稍涼秈熟於夏性稍溫總皆和平但養胃和脾粳力較勝而已獨傷寒久熱之後只宜食粥不宜食乾飯食之即反此內經所戒切勿犯之又凡米新者極香極甘煮汁亦極濃其和中益氣之功過於陳者試觀諸米麥黍稷初登場時作餳作酒皆汁多味美非新者力厚乎稍久則漸少漸薄非陳者不及新者之明驗乎世醫乃謂新米堵氣病人及産後忌食大不明理之言也彼蓋因諸本草有陳者最良之説不知彼取陳者性涼為熱病而言各本草陳米之上下文皆有其語請細閲之豈禁食新者乎惟汪穎食物本草曰天生五穀所以養人性秈粳得中和之氣同造化之功忽而又曰新米乍食動風氣如此美物何陡然又有此害問之汪公亦難自解其為藥治生兒無皮白秈米粉每日撲之出聖濟總録又治胎動腹痛下黃水粳米一升黃耆六兩水七升煎取二升分四服出聖惠方又治表虛漏汗不止白米粉絹包撲之出肘後方元和紀用經用麻黃藁本白芷各三兩米粉四兩撲之尤妙傷寒論名白粉紅米飯此米氣味亦頗不惡而其不益脾胃實甚病人及産婦食之枯瘠尪羸極難復舊且粳餵豬長毛不長肉稈食牛馬足重難行牛馬之劣者不擇佳者自不肯食之而舉世農家不察也醫家更不察也自古醫書本草皆云白為勝獨孟詵食療本草異於衆説云紅米粒大而香益人綱目乃謂白米益胃紅米益脾請問此是何理更屬杜撰又凡藥色白者入氣赤者入血故醫書有血病用紅米之方此以紅白分走氣血較分走脾胃之説似乎近理然性本不益人諸方亦不足採粟米飯養脾胃益氣補虛與秈粳同而性稍涼煩渴熱淋熱痢及諸病之屬熱者宜之陳者至隔冬而止二三年者斷不可作飯氣味極惡最敗胃氣又有食粟米即腹中微痛者此臟氣偏寒非粟米之罪也故久食則相安而痛亦止若病中改食他谷可也中寒最宜小麥秫米飯味甘質軟但可作糕餌暫食不宜作飯常食難化困脾病人及小人忌之曾發黃病者尤忌之糯米飯雖能清肺固表但寒中難化非肺熱病人不宜食借其稈臥令人生癩牛馬豬羊等圈中亦不宜用大麥飯食療本草曰煮須極熟帶生則損人諸飯皆然能健脾胃行氣消腫止渴止泄久食令人肥白麥蘖芽也消食比穀芽倍猛能敗脾作泄且耗散血氣觀婦人産後子死乳不回腫痛發寒熱及乳癰初起麥芽五錢炒香水煎頓服立消未消再作必愈其耗何如兒科視為泛常肆用無忌不知若干小兒受其害也小麥飯小麥宜於磨面而別録云作飯食養肝氣止漏血孕中下血名胎漏唾血亦指孕婦言能令女人易孕別録陶隱居所輯陶齊梁間人此書乃漢晉人語不比後世醫書艱子者盍仿而行之事極不難且無損也綱目曰素問云麥屬心火之谷也鄭康成詩箋云麥有莩甲屬木説文云麥屬金金旺而生火旺而死而別録云養肝氣與鄭説合麥能益血所以養肝非屬木也千金方云養心氣亦益血之效心主血脈也與素問合夷考其功除煩止渴斂汗利溲止血皆心病也蓋許以時鄭以形素問以功耳當以素問為準又北方麥性平南方者稍熱此地氣使然凡物皆同匪獨一麥也近有強作解事者云北方麥花皆夜開故涼北麥性稍平耳亦不涼南方則晝開故熱豈知北人食麵不助熱不發渴者以習慣食之何關花之晝夜不觀北人來南常食麵飯皆南方晝花之麥亦未嘗發熱發渴非胃氣習而相安之明驗乎其作為湯麵及餅餌各處製法何止幾千萬種性之優劣當各隨其和合之物明理者自知之難以悉數也大抵湯食者醋佳干食者酵佳耳其入藥也奉親書治老人腹滿淋瀝小麥一升通草二兩水三升煮取一升飲劉涓子鬼遺方治金瘡腸出小麥五升水九升煮取四升濾取汁待極冷令病人臥席上含汁噀之或噀傷處忽而又噀其頭面病人一驚腸即一縮俟漸入則噀其背總勿令病人知然後抬席四角輕輕搖動令其易入若歷時久腸干滯不能入者千金方用大麥米煮粥噀之入則以新桑根皮作線縫口口小者不必縫熱雞血塗之新湖綿燒灰如無新綿舊絹帛衣物亦可沾油者勿用同海螵蛸生大黃研極細末摻瘡口包好十日內但可略食美物海物最佳如海參魚肚蟶乾之類及豬肉鱖魚不宜過飽未入時切不可令間人看視妄語嘈雜致令憂惶不能入即死又能止汗古方用浮小麥乃麥之未成者殊屬無謂若云麥熱麩涼浮者取其有皮無肉何如只用麥麩豫治汗症但用陳麥不論浮沉無人不效蓋浮者肉既未成皮亦無力也面主嘔吐不止醋和作彈丸二三十枚先燒沸湯入丸煮熟漉出投漿水中待溫吞三兩枚嘔定即不用復吞未定如人行一里再吞出兵部手集又治虛寒白痢日久者小麥麵炒老黃色以方寸匕和粥食能療百方不能止者出外臺祕要又治頭皮虛腫形如裹水皮薄如紙以口嚼面敷出梅師方又治遠行足研成泡水調生面塗出海上方醋及尿調尤妙麥奴即麥穗之不結實如被火燒有黑灰者千金方暨朱奉議南陽活人書有黑奴丸初虞世古今録驗名水解丸又名高棠丸治陽毒溫毒熱極發狂發斑熱啞大渴諸惡症小麥奴黃芩大黃麻黃釜底墨灶突墨梁上塵等分為末蜜丸彈子大每服一丸誠起死良方也然非預備不能得古人所以司歲備物也穬麥飯西北諸處種之亦有大小二種皮稍厚別録曰穬大麥作飯食令人多力健行蕭炳四聲本草曰穬小麥作餅食補中燕麥粥西北一種燕麥即爾雅之雀麥一名蘥其穗分數枝子亦疏散略似野麥唐本草竟以為野麥綱目至解為燕雀所食均誤也作飯與大麥倣佛燕小麥亦可作面而性不及小麥稷米飯主安中益脾胃涼血解暑綱目曰呂氏春秋云飯之美者陽山之穄高誘注云關西謂之廣摩冀州謂之聚然味澀性又近涼氣滯者便難者中寒者均不宜食黍米飯即稷之黏者涼而澀與稷同而又難消化熱泄滑汗等症可以暫食其餘百病忌之食療本草曰久食緩人筋骨小兒多食行遲小貓犬食之其腳局屈醉臥其穰令人生癩蜀黍飯綱目曰俗名蘆粟又名蜀秫又名高粱廣雅名木稷又名荻粱食物本草名蘆穄有秈糯二種紅黑二色性雖溫而味則澀非滑症皆忌之連殼研碎煮汁飲止霍亂吐瀉久食亦敗人筋骨博志云地種蜀黍年久多蛇玉蜀黍飯綱目曰似蜀黍而稍矮六七月開花成族如粃麥狀葉間別出一苞如稜苞上出白鬚垂垂久則苞裂子出子大如芡實之小者有紅白二色一本生二三枚或五六枚山中呼為苞蘆作飯作面俱可性能開胃和中其根葉煮汁多飲能利小便治砂石淋菰米飯即茭草之實綱目曰説文曰雕苽唐韻曰胡管子曰雁膳孫炎爾雅正義曰茭米周札供御乃六穀九穀之列五飯之一故內則曰魚宜菰西京雜記漢太液池邊皆凋胡杜詩波漂菰米沉云黑是也氣味甘涼無毒能止煩渴調腸胃熱病最宜黃蓬飯有二種爾雅曰齧調蓬薦黍蓬其蔓細而糾結有如亂髮故發之未櫛者曰蓬首又輕虛風易撥之隨風飛去故詩曰首如飛蓬吾鄉訛為黃坯荒年澤居人採以為食味極苦澀故能除熱不免敗胃拾遺乃謂作飯無異粳米必不然矣病人勿食𦬣草子飯爾雅曰皇守田郭注云一名守氣生廢田中似燕麥子如凋胡可食拾遺曰作飯去熱利腸胃按此物吾鄉絶不之見既云生廢田恐亦如王莽時之野谷兵凶則有太平則無耶抑方隅之異有生有不生耶自然穀物拾遺曰博物志云東海洲上有草名篩草又名自然谷又名禹餘糧結子如大麥七月熟民斂獲至冬乃盡食之不飢輕身李列海藥本草曰補虛乏溫腸胃止嘔逆久食健人據此二説則極佳而綱目引方正學詩海邊有草名海米大非蓬蒿小非薺婦女攜籃晝作群採摘仍於海中洗歸來滌釜炊松枝煮米為飯充朝飢莫辭苦澀咽不下性命聊假須臾時又似不佳或者瀕海可食之物不一耶海邊人當深考大抵甘平則益苦澀必損也米渣飯平人病人總宜胃氣充暢胃氣者穀氣也今病而思食胃氣和也醫乃教人煮去米汁或去二三次然後豫之云米汁堵氣不知甘香之氣味全無所食乃米渣也豈萬病盡由氣多爾之醫病總欲病人氣絶乎無理不通可恨可殺隔宿飯飯以旋出甑為美至隔宿必傷胃氣聖人所以食饐而餲不食也可豫病人乎再炊飯雖不隔宿至冷而復飲亦不宜食炸炒必乾硬難化重蒸則氣味無存也青精飯出陶隱居登真隱訣云神仙所食言頗荒誕拾遺曰烏飯用南燭枝葉搗取汁浸粳米九浸九蒸九曝米粒緊小黑如醫珠作飯能益顏色堅筋骨按南燭即南天燭本腎家補藥堅筋骨之言或有可信若今釋家四月人日所作之青精飯皆用糯米採集雜木染成青色病人斷不宜食胡麻飯即脂麻其內有油傷脾敗胃令人作泄本不堪作飯只作果餡及榨油耳乃亦云神仙所食語更不經詩文中至用為典故自小説劉晨阮肇入天台山始豈可信之又藥肆一種胡麻乃壁蝨胡麻與脂麻名同實非穀類不入食品韓懋醫通曰凡造飯用荷葉湯者寬中芥菜湯者豁痰紫蘇湯者行氣解肌薄荷湯者去熱竹葉湯者解暑按此法觸類增加不僅此數種然必氣味純正始可入撰若辛酸苦劣與飲食不相投者縱合病只可入藥不宜入食恐因此減膳是弄巧反拙也又古人左飯右羹羹以養陽食以養陰若因病所宜用各種蔬菜魚肉汁下之是即古人之羹矣不能悉載明物理者自有化裁也白粳米粥白秈米粥爾雅作鬻糜也郭注曰淖糜又曰糊饘也郭注曰糜也邢疏曰稠者曰糜淖者曰鬻糊饘是其別名左傳曰饘於是鬻於是以糊其口劉熙爾雅釋名煮米使糜爛也故凡食粥必須久煎極爛使無完米性能養脾胃生津液利小便消脹滿調中健脾除煩止渴利膈益氣推陳致新萬症皆宜平人亦妙其功不可殫述綱目曰每早食粥胃中空無他雜物穀氣先入所補不細又極柔膩與腸胃相得最為飲食妙品薄者為淖凡病腹中氣脹小便不利渴者煩者水泄者及表虛不能大發汗者乘熱儘量啜之初覺脹滿轉瞬即快然矣厚者為饘為糊凡病脾胃虛寒嘔泄者乘熱漸次啜之其效皆捷於藥餌又極虛久泄腸滑隨食隨出百藥不能止者作夾飲粥食之即止其法用未經油膩瓦罐入米煮俟米熟汁出撈去米再入米煮極稠食之是兩次米汁俱在一粥之中真能回元氣於無有之鄉此而不效乃真死症也無識之醫乃為首禁謂其堵氣詎知其為行氣通腸利水消脹之第一物乎故凡病未必遂無生機無奈醫者禁其食粥又不能食乾飯則胃氣空虛病必日甚胃虛不能宣布傳達則藥必無功加以炒米湯則胃氣死矣明理之人廣為傳説俾病人不致餓死其功德必無量也又粥之愈疾全在於熱出鍋即啜啜時自覺陽和滿腹遍身汗意津津乃有奇效若稍冷則真能堵氣慎不可啖又熱飲能解誤服大黃冷飲能解誤服巴豆均有神驗粟米粥性能養脾胃百病不忌與秈米粳米同而粟熟於秋末冬初秉清涼之氣故別録曰養腎去脾胃中熱利小便解煩渴又治熱痢熱淋韓懋醫通曰有人病淋不肯服藥豫令專啖粟米粥絶去他味旬余減月餘痊觀此則凡病症屬熱者宜多啖之秫米粥性雖黏滯煮為粥則易消能清肺中百藥不能清之熱靈樞治多年不寐半夏湯中用之取其益陰而清肺也血淋血痢肺癰肺痿熱渴煩汗等症均宜多食中寒者切忌糯米粥秉秋金之氣而成質又黏滯故性寒功專補肺治肺虛熱咳惟其補肺故又能固表肺主皮毛也肺虛表熱漏汗不止最宜肺寒咳嗽表邪未散脾虛飲食不化切忌而別録謂其溫中令人多熱綱目乃誤信之力詆圖經食療性寒之説為謬至謂冷泄病及老人便數皆食糯米即止謬極萬不可信緑豆粥主解熱毒止煩渴凡病稍近熱者無不宜之平人暑月常食此粥亦極佳大麥米粥磨如粟米大煮粥主寬中下氣和熟蜜少許代茶飲治淋痛出聖惠方又久食治皮裡膜外水氣出聖濟總録粥能滋養虛實百病固已若因病所宜用果菜魚肉及藥物之可入食料者可煮食之是飲食即藥餌也其功更奇更速方書所載甚多摘録數十種於後蔥白粥細切蔥白俟粥將成時投入煮熟熱啜取汗主散表寒行氣又主胃寒嘔吐泄瀉氣痢腹痛蔥不宜過多薤白粥主奔豚冷氣胃寒吐逆胸脅脹痛老人冷痢氣實者略煮帶生虛人煮極熟用生薑粥主散表寒又主胃寒吐逆上氣乾嘔又奇效方有神仙粥法治感冒風寒暑濕頭疼骨疼四時疫氣流行初起用糯米半合生薑五大片搗爛共入沙鍋內水二升煮至米熟入連須蔥十數莖再煮稠加真米醋二三匕乘熱啜溫覆取汗花椒粥川産最妙隨處土産者亦可用但宜陳耳研末纖少入粥主胸腹脹滿冷痢刺痛又主蛔蟲上膈煩躁吐涎蘇子粥微炒研末入粥主上氣喘急肺寒咳嗽乾咳無痰或用紫蘇嫩葉切碎入粥更能散寒又消胎氣脹滿行婦人一切血中之氣杏仁粥去衣炒研入粥主治同上或加蘇子萊蔔粥主消食利膈痢疾腹痛裡急後重無萊蔔時以子炒研去油代之或干萊蔔絲切碎入粥亦妙菠薐粥切碎入粥煮爛主大便燥結芥子粥炒研去油入粥主豁痰利氣痰氣甚者芥子取辣用取辣法生芥子研末以瓷甌入沸湯內泡熱盛芥子溫水調如糊濕紙封口覆地上半刻許取出辣如新芥菜麻仁粥主津枯便閉用火麻仁炒去殼研末入粥或加皂角子炒熟同研能治大腸風閉皂角子減三分之二脂麻粥用黑芝麻炒研極細入粥不細則敗脾作泄主治同上又主幹咳無痰痰清者忌食蔥豉粥主發散表寒赤小豆粥即飯豆主利小便消水腫又治腳氣用赤小豆多米二三倍先煮爛撈去豆然後入米煮食薏苡仁粥亦須多用苡仁如煮赤豆粥法主除濕利腰腳然性專下行故久食令人身重降令太過也本草乃云久服輕身不可誤信郁李仁粥主消水腫潤腸通痹酸棗仁粥主膽虛煩熱不寐炒熟研末入粥小麥粥主寧神斂汗止渴除煩先煮小麥熟撈去麥取汁入米煮粥食陳者良蓮子粉粥主健脾胃止精滑泄利氣虛者用白蓮氣血兩虛者用紅蓮去皮心研為粉同米煮氣滯中滿及大便澀者忌食芡實粉粥功用同上力遠不及菱實粉粥主益氣健脾厚腸胃止暑瀉氣滯者忌食薯蕷粉粥主益氣健脾固精滑止久瀉氣滯者便難者皆忌食金櫻子粥先用金櫻子煮濃汁布中濾去渣入米煮粥主腎虛精滑瀉利脫肛婦人産後子腸不收百合粥主補脾肺止虛汗虛瀉定虛喘虛嗽芋粥用生芋切細如芡實大同米煮主寬腸胃益脾氣消虛腫食滯者忌食藕粉粥主補心脾澀精滑及婦人産後血虛血滯內熱人忌食葛粉粥主熱病後津液不回口中燥渴此物能引津液上潮於口生者尤佳又解酒毒麥門冬粥用麥門冬杵爛先煮濃汁去渣入米煮主熱病後氣虛呼吸微弱熱則傷氣及津液不回咽乾口渴心煩不寐又主肺熱久嗽虛喘虛汗天門冬粥煮法如麥冬粥主潤腎燥治老人痰瞅及少年人乾咳又補腎虛治相火上炎虛熱虛汗黃精粥切碎同米煮主一切諸虛百損不拘陰陽氣血衰憊無不宜之黃耆粥用北地真箭耆味甜如蜜者煮濃汁去渣入米煮粥主表虛自汗痘疹不起癰疽內潰不能成漿及一切虛陽下陷子腸不收脫肛等症龍眼粥主安心神定魂魄斂汗液內有火者禁用膃肭臍粥主陽痿不舉精寒無子火裹溏泄及一切腎虛之症海參粥主一切腎陰虧損之症燕窩粥主一切氣虛及表虛之症人參粥主一切脾肺氣虛之症豬腎羊腎鹿腎粥主一切腎虛之症鹿為最羊次之豬又次之豬肝羊肝雞肝粥並主肝虛目暗多年冷淚瞳人散大羞明怕日等症羊為最雞次之豬又次之羊汁雞汁粥並主勞損又大補産後蓐勞血分有火者禁用又大補瘦人肥人禁用鴨汁粥主虛勞肺熱咳嗽肺癰肺痿等症又消水腫鯉魚汁粥專消水腫一斤以上者佳愈大愈妙勿去鱗牛乳羊乳粥大補陰血八月以後佳春夏勿用酥蜜粥南方酥不可得以牛羊乳代之酥宜多蜜半之又蜜須煉至滴水成珠方同米煮主養心肺潤臟腑燥涸及一切津枯血少又主肺虛久嗽乾咳無痰炒麵粥見前小麥下茴香粥平肝和胃治胸隔脹痛疝氣偏墜研末入粥甘松粥研末入粥主胃寒作嘔脾氣不運又最能引胃氣上升令病人思食橘皮粥用陳廣橘皮研末入粥或漳州糖餞橘餅切碎同米煮治脾氣不運食物作脹石灰粥炒石灰和些須入粥其味甚甘然大熱能令人吐血衄血便血不宜久食惟寒濕作脹腹中窄狹者暫食最佳右所列粥五十餘種大半出本草綱目非杏云老人創造也然實散見各書乃歷古相傳之舊法亦不自綱目始也素問玉機真臟論曰粥漿入胃泄注止則虛者活是以粥代參耆也傷寒論桂枝湯方後曰啜熱稀粥一升以助藥力取微似汗是以粥代麻黃葛根也神明變化觸類引伸雖千百種亦奚不可其各種粥通用白粳米或秈米惟熱病用粟米表虛肺熱用糯米秫米妙用總在熱啜尤須久煮極爛蓋諸藥溫涼補瀉性各不同一飲下咽總由胃氣傳布病人胃氣既不能速行停留片刻藥之氣味即殊試觀平人飲食偶有不順轉瞬暖出即成酸水故凡用藥行速則有功行遲則無力古法所以有人行十里五里一里之限也若其停蓄不行變為酸水尚何功效之與有惟以穀氣助其胃以熱氣速其行而桴鼓之應乃退非湯劑所能及此古人用粥治病之精理千載無人道破者也即使不以粥為藥亦必以食為天水之與谷實後天生命之原無水穀安望有生乎今日禁人食粥之醫謂其堵氣請問此語見於何書何人所説爾自閲歷以來曾見何人受粥之害蓋彼不過借醫糊口何曾讀書不過人云亦云何曾實有所見雖死者目接於目猶以為死於病耳烏知其橫遭餓死哉願遍天下醫人平心細繹之清夜猛省之炒米湯此天下第一害人之物宜痛心疾首與病家嚴申厲禁者也今日禁人食粥之醫必教人食此竟有炒五七次至黑而成炭者歷觀往古風寒濕痹尉以炒米者有之用為粥飯則未之前聞至明李氏綱目始見本朝陳飛霞小兒科再見而李説乃云不去火氣令人作渴夫既知炒之而熱能令人渴其助熱劫陰明矣何如勿炒自相矛盾百口奚辨試思米經火炒煮之水清無汁嗅之無氣食之無味是去其甘香之正性必不能充養脾胃一也味苦而淡不能下咽故常枵腹而胃氣不充藥何由效二也性熱傷陰敗人津液三也不能充養胃氣弱者將自此不復思食強者得火氣以助其熱必旋食旋飢而又不許食粥飯勢必藉助於餅餌餺飥諸不益人之物病更難愈四也且也任如何攤晾總不能去火氣病寒者害在傷胃病熱者必且留邪五也坐此五害故凡死於病者十之一死於藥者十之三死於炒米湯者十之六七設使不信倘世有父母患病為之子者先且自食二三頓此亦父飲藥子先嘗之通議視其口中尚能知味否腹中尚能泰然否精神尚能照舊否如其無害是杏云老人為謬言可以等諸野田泄氣可將吾書焚之棄之醬瓿覆之不然平人且不能當其害何況病人當奉吾説為師之針矣當聽吾言如朦之誦矣諸米飲凡諸米為飯其汁為米飲醫書中用之甚多然作飯之法只煮半熟撈出再蒸則其飯軟硬得所病人所用之飲撈去飯後宜再煮數沸然後服否則其飲未熟能生蟲敗胃且令人腸胃收縮食量減少粳米飲止渴除煩熱病渴不能止者勿豫茶水以此代之極佳無病之人暑月代茶亦妙濃者能止瀉秈米同以下諸飲諸泔俱宜多飲代茶少則無濟粟米飲熱病小便不利及霍亂煩躁大渴危症也不能止者死均為聖藥秫米飲救霍亂煩渴不如硬粟止諸熱渴及利小水則過之糯米飲止消渴又主霍亂煩躁服諸飲不止者古方糯米三合石蜜一合此兩粵山中野蜂所釀味甘微苦色微白今名廣蜜水三升同煮至米成飯撈去之頻飲勿輟得睡即愈又暑月力作及注夏之人常飲代茶秫米亦妙能保肺氣固衛陽勝於藥肆燥熱傷陰之藥茶萬萬也大麥米米飲亦止消渴又調中消脹極佳之品小麥米飲治暴淋止虛汗不必論浮沉諸米泔一名瀋洗米水也醫書曰淅二泔淅亦洗也孟子曰接淅而行二泔先略洗一次傾去水再入水用力洗之取其粳去而汁清也粳米泔代茶止消渴利小便粟米泔亦止霍亂煩躁唐本草曰臭粟米泔止消渴妙方也按此但當云隔宿酸泔若臭則不堪用矣秫米泔煩渴身大熱飲諸泔不愈者用之糯米泔主治同上右諸飲諸泔性雖不無小異而生津養胃則同故主治不甚相遠但味皆淡病人不能頻飲者可微加糖蜜須煉熟或鹽醋均須極少多則穀味反為所奪必無濟矣酒北人呼為南酒亦曰白酒吾鄉則呼水酒綱目曰清者曰釀濁者曰盎厚者曰醇薄者曰醨重釀曰耐一宿曰醴美曰醑未榨曰醅色紅曰醍緑曰醽白曰醝凡一切草木谷果之實無油者均可釀酒入藥暨病人飲糯米為勝能宣布藥力通行經絡活血和營上行頭頂外達皮膚旁通四末平時嗜飲病時惡飲病斯劇矣若稍稍思飲則劇者生矣蓋酒人以酒為命病中思飲即如不飲者之思粥飯切勿禁之但宜節耳又單飲醇酒取醉能治馬汗入瘡此症最惡凡患瘡毒一觸馬汗立時腫痛倍加或搐搦不省人事不急救有死者若猘犬傷則最忌酒肘後方云能戒一年乃佳若被蛇咬宜以冷酒洗淋出廣利方若卒遇大驚而死急以熱酒灌一二杯即蘇出急救方若其腐腸亂性助濕生蟲甚且敗國亡家招尤起禍則占今戒之屢矣詩歌既醉書謹德將不俟醫家繁喙也至若李氏綱目雲天之美祿濁俗俚言見於何典操觚著述之儒乃挂諸齒是猶孔北海之手薦導人沉湎烏可訓乎淡酒酒人喜濃而醫家有用淡之法其性極利小便凡小便不利及腹中有積水者以甘淡酒蕩至極熱乘熱儘量飲之酸者慎不可用不熱慎不可飲初覺脹滿少頃盡從小便而出酒去腹中之水亦隨以去與啜熱稀粥無二理均妙方也此法杏云屢用得效及閲東恆十書見王海藏云淡酒能利小便而速下則已先得我心矣然範汪東陽方治水腫已有用薄酒之法則海藏之言蓋有所本也但須下水本多醞釀日期滿足若臨時攙入生水及下水才一二日醞釀未到者反能敗脾作泄切不可用淡酒稀粥説或問淡酒稀粥之利小便固已設用稠粥釅酒亦有濟乎曰不能內經曰膀胱者州都之官津液藏焉氣化則能出矣凡飲食入腹自咽喉以至大腸皆有其入之之路獨膀胱只有下口可決而出無上口不能受以入設有上口則清濁一齊傳入水穀何自而分乎故飲食初入胃中傳至幽門胃之下口與小腸相接處而下小腸此二處水穀猶未分也再傳而下至闌門小腸之下口與大腸相接處其地前當臍後當兩腎之中人身陽氣發源於此此處之熱過於釜甑谷被蒸而腐化入大腸為干糞水被蒸則化為升騰之氣透出小腸而布於三焦人身大腔子包羅臟腑之軀殼統名三焦氣既上騰胸脅間如春夏時之地氣空濛翳塞故曰上焦如霧也至中焦則積上中二焦之熱氣其氣更熱更濃凡軀殼之內臟腑之外受此熱氣皆津津若汗珠氣復化為水也故曰中焦如漚漚者水面浮泡即形容汗珠之狀也至下焦則積上中下三焦之熱氣是又不僅如汗珠而如汗之淋漓直下故曰下焦如瀆瀆者江河之總名水流之道也此外正當膀胱之外脂膜如絮可以受如瀆之水此脂膜即𦚟也惟其能受水故售豬羊𦚟者以水淋之則倍重民火又蒸之總一腎中陽氣分立心為君火腎為相火膀胱為民火諸各色者便於指稱耳於是氣化之水復化為氣滲入膀胱出前陰而為小便矣然則小便不利由民火不旺故不蒸不蒸故聚𦚟之水不能化氣膀胱既無上口空濛之氣可蒸而入如瀆之流何自而入乎不入膀胱何自而出乎是小便者本由飲水入胃傳至小腸受腎火之蒸化氣而出復為軀殼所遏如霧之氣不得泄又化為如漚如瀆之水而聚於𦚟再受民火之蒸復化為氣始透入膀胱而為小便故曰州都之官州都者三焦之水悉聚於𦚟有通都總彙之象津液藏焉藏者𦚟能盡受三焦之水有包藏含蓄之象氣化則能出矣民火能蒸聚𦚟之水則能復化為氣入膀胱而出前陰也今以淡酒薄粥入胃則水多水多則迫以不得不歸小便之勢且也穀氣助而胃氣驟長熱氣助而火氣倍增則無慮其進入大腸而為泄瀉是又迫以不得不蒸之勢而膀胱之化雖欲不速於平日不可得矣若稠粥但益脾胃而果腹且易飽不能多食釅酒但活血脈而通經且易醉不能多飲均之水少與膀胱無涉安望其氣化速而小便多也此經文氣化能出精而又精之理杏云為中人以下説法煞費苦心學者幸毋渾圇讀過也糟一名粕能溫中消食開胃健脾既榨去酒曲中毒烈亦微又加油鹽則酒毒全失鹽最能淡酒又能醃藏魚肉瓜薑等物病人食之無所不宜且酒之害在多糟則非能多食之物故為用勝於酒也獨糟薑性熱糟蝦動風各有所忌其他一概不忌淡糟和蔥韭蒜薤等炸食亦佳外用罨跌撲損傷風寒濕痹蒸熱糟加薑韭等搗爛厚罨患處取效如神燒酒糟亦可燒酒又名火酒飲膳正要曰阿刺吉番語也蓋此酒本非古法無末退羅及荷蘭皆東洋之國近福建荷蘭即紅毛番等處人始傳其法於中上凡水酒之害燒酒均有之而性之惡劣倍屣耽飲太過有七竅流血而死者有二便出血而死者或不即死而發為流注疼痛過於刑夾俗名流火未有燒酒之前世無其病故古醫書無其治並無其名以諸痹諸疰及痛風歷節風法治之皆不驗必壯年能斷燒酒或有愈者老則必死於此然酒人酷嗜不可挽回也其喪軀命損精神招愆尤膺惡疾皆所自取極無足惜獨其耗粒食困民生則為害於天下古之所謂耕三餘一耕九餘三者今則絶無其事偶有水旱偏災即煩有司之籲請虞當寧之憂勤而蠲賑頻仍害且及於天瘐蠹國傷農莫此為甚而其為用於病能行冷氣消水濕凡潦歲民病身寒吐瀉及脹滿腹中窄狹者落水遇救腹中水吐之不盡者頻飲火酒均小便利而愈也至其害則不可勝言凡有血疾人不戒火酒藥必無功風損及跌撲折傷筋骨一飲火酒必成廢疾孕婦好飲火酒子多痘兀及瘡瘍驚癇男女俱嗜此者其子女必凋零若子孫又復嗜之必至絶滅無能飲三代不覆嗣者杏云蓋目擊數十百家故苦口言之彼沉溺者曷不屈指自計鄰里戚友存者滅者奚若當亦憬然悟惕然思矣至耳剽集所載吳江知縣周偉酷嗜燒酒終日昏昏顛罔可笑未幾醉死設奠焚楮錢棺中火發亟救之尸已燼矣此殆天惡其昏德故示罰於死後耶固應得之罪也按燒鍋功令所禁凡囤貯米麥至八石以上者豫罪而近來此風愈甚每一城市村鎮店至數十百家每家所積至數百千石統計一歲之入給饔飧者三之一作燒酒者三之二飲此酒者每日二三次為撙節不節或五七次十餘次竟有入醉鄉十年二十年未醒者較之古昔遊惰之民其為害不知若干倍展伏讀本朝敕修明史見前明賦斂苛繁幾於敲骨取髓民風凋弊理有宜然本朝定鼎凡諸虐政悉豫蠲除正供而外無寸絲粒米之徵求迄今百七十年中休養生息大有頻書凡遇國家大慶普免天下錢糧潛米者不知幾千百萬億偶有水旱偏災隨在蠲賑者又不知幾千百萬億而民積亦未見加盈非此物之害又誰之害欽獨是燒鍋例禁雖嚴實難認真辦理是不能不望於賢當事焉考酒誥曰群飲汝勿佚盡執拘以歸豫周豫其殺此等人本聖世所必誅雖待之過嚴絶之過甚不為虐也葡萄酒綱目曰葡萄及藤汁皆可釀酒梁四公子記云高昌獻蒲桃干凍酒入風谷凍成之終年不壞葉子奇草木子云元朝於冀寧等路造蒲桃酒久藏者中有一塊雖極寒其餘皆凍此獨不冰飲之令人透腋而死又云酒至二三年皆有大毒此説極是微論蒲陶凡諸谷所造至隔年性必加烈愈久愈烈初飲不覺其醉至出戶遇風酒性一發猛不可當北風猶可南風更甚有醉死者有成病者病人切戒不可犯之至史記大宛列傳云烏孫以西地近胸奴俗嗜飲以葡萄為酒富人藏至萬餘石久者數十年不敗此則何以不毒殆水土使然不可援以為例也飲膳正要曰蒲桃酒有數等哈刺火者最烈西番次之平陽太原又次之總之徒有麴櫱而無穀味不論新陳病人概不可飲又云蒲桃久藏不必加曲亦自成酒芳甘酷烈癸辛雜志曰梨久藏亦不用曲自成美酒書曰若作酒醴爾惟麴櫱無麴櫱何以成酒又何以酷耶理不可曉矣又凡諸果皆可為酒元人詩曰洞庭春色應無價多種黃柑作酒材又西域葡萄燒酒中國人飲之必醉死本草綱目切戒之各種酒凡酒皆活血而蘆粟及稷黍之酒僅滯血凡酒皆利氣而荍麥及諸豆酒反壅氣凡酒皆熱而隔年酻酒尤熱俗名酒娘酒之未下水者味雖甘美性則酷烈飲之令人喉舌乾燥多飲則腹痛溺血若今時所尚各種老酒大率醲厚加以辛熱香竄之藥助火劫陰損神耗氣倍於常酒又紹興酒最為時尚其味酸不成酸澀不成澀飲之令人頭痛口乾曲性之烈可知矣山西之汾酒則又甚焉又浙紹一種玉蘭酒一種會泉酒暨吾江右之丁坊酒雖味俱甘美而性皆酷烈又有一種金華酒又名東陽酒味極甘美酒乃淨酻食物本草曰入藥最佳然口乾頭痛傷血之害亦如吾鄉之隔年酻酒金華即古蘭陵也李青蓮詩所謂蘭陵美酒鬱金香者徒以其氣味耳其性必不良也入藥之言為北方專飲燒酒無水酒處言之也至於射洪酒擅名天下云夏月飲之可以解暑明人詩曰六月江干冰雪涼射洪春酒鬱金香自從筇竹通西夏漢使年年出夜郎蓋此酒造法傳自西夷漢武帝用事西南而大宛月氏筇笮康居一時盡通中國自博望候始故詩云爾也然天下未有性涼之酒或以夏月伏陰在內少飲不至大醉稍覺適然耳今嗜燒酒者亦有解暑之説亦猶是也又若秦蜀之咂嘛酒晉趙之襄陵酒山東之秋露白淮南之緑豆酒燕冀之薏苡酒金陵之瓶酒蘇州之小瓶酒處州之金盆露皆載籍所傳均未之見即如建昌之麻姑酒近在跬步亦未獲沾唇一以生平未出戶庭故見聞弇陋一以量不勝蕉故見如未見總之此物功過各半損益兼行造法雖多均之熱毒為病人謀莫如仿漢賜丞相上樽酒法糯為上稷為中粟為下設地處偏方病人嗜酒而酒不宜病則惟略和以熱水使厚者薄醇者釀是調劑之良也試觀隔年酻酒少飲亦熱倘以熱水洽為酒湯即至醉亦無害是可以得酒之理矣然獲罪醉鄉主人不小矣醫書所載可以治病之酒又有多種摘録於左五加皮灑用五加皮煎濃汁釀酒主一切風濕痿痹壯筋骨加懷牛膝更佳天門冬酒造法同上主陰虛勞損老人痰嗽地黃酒造法同主補精血壯筋骨中滿者勿服或用地黃石臼內搗爛浸酒亦佳枸杞酒造法同主陰虛陽痿精寒無子或加地黃或加桂便溏忌當歸酒造法同主補血虛行一切血滯便溏忌用黃精酒搗爛煮汁釀酒補益虛羸調和血氣性無所偏百病不忌龍眼酒主思虛傷脾鬱怒傷肝與龍眼粥不同此有酒力故補而兼行彼加穀味故一於補氣滯痛脹者加木香肝脾有火忌用巨勝酒即脂麻每一升炒研同生地黃三兩搗爛煮酒主血虛風癢及老人津枯便閉乾咳無痰柏子仁酒炒研去油浸酒主心脾血少夜不安神怔忡盜汗肌膚消削眼倦無神龍眼麥冬炒棗仁俱可隨證加用蜜酒用沙蜜煉熟和酒飲主風診風癬肌膚枯燥或加豬脂尤妙肺熱忌用海藻酒洗淨煮酒頻飲勿令酒氣間斷主益陰利血散結消癭凡人身上有結核者不拘痛與不痛潰與未潰均宜飲之菊花酒或煮酒或煮汁釀酒主去頭風眩運明目除痿痹松液酒用嫩黃松香煮酒頻飲勿令酒氣間斷主一切大風頑痹腳氣不仁松毛主眉發脫落松節主骨節痛風槐枝酒用嫩槐枝或根皮或青葉煮酒熟另以槐實炒香為末投之頻飲主遠年便血大風痿痹加地榆生地黃何首烏俱可木瓜酒用木瓜蒸熟煮酒主補肝脾舒筋攣利腰腳治轉筋病愈即止不宜久服柏葉酒主風痹歷節疼痛加松節又主遠年便血加槐實地黃茴香酒主肝脾腎三經血凝氣滯胸脅腰腹脹滿刺痛腳氣攻心疝氣偏墜木香酒主胸腹脹滿一切氣滯不行研末浸酒縮砂酒用砂仁研粗末浸酒主和胎氣除氣腹痛消食積此與木香均不宜煮椒酒用川椒浸酒不宜多當使有椒氣而無椒味主冷氣刺痛胸腹脹滿橘紅酒用廣陳皮浸酒主一切氣病此物與酒相宜墨娥小録曰凡人家喜慶親友饋酒其味酸甜不一雜貯之則酒敗以橘皮一二兩煮熱浸之俱變為甘美蓼酒用蓼汁釀酒不宜多主中寒脾胃不健飲食減少胸腹刺痛金銀花酒用連葉金銀花無花專用葉煮酒鮮者尤佳主一切奇瘍惡毒初起服之則立消已成膿服之則易潰易斂古方同甘草煮酒為外科起死回生之聖藥宜多飲令酒氣不斷病愈為度若用水煎則力緩無濟但其味太甘病人不能多飲者可略用鹽醬小菜下之冬菊花酒此乃小朵菊花非前之菊花也有黃白二色俱可用白者為勝花開獨晚至冬猶不絶故名冬菊山居者用鹽醃可以點茶性能治一切惡疔初起濃煮酒飲至盡醉渣敷患處立消外科救命仙丹也無花用葉用根俱驗豆淋酒黑豆三升炒焦以酒五升蕩熱沃之主中風困篤口噤口喎背強瘛瘲目眩頭旋又主産後瘀血均須飲酒儘量溫覆取微似汗極效麻仁酒用火麻子炒研煮酒主臟燥便難或加皂角子炒研同煮又主骨髓風毒痛不能動紅曲酒研末煮酒主腹中積血及婦人産後瘀血不行加桂亦可花蛇酒主諸風頑痹疥癩惡瘡癱瘓攣急蚺蛇酒每蛇一斤同羌活四兩煮酒主諸風攣痹不仁大風惡疾歷節痛風虎脛骨酒炙黃研極細絹包煮酒主歷節風痛膝脛無力加故紙肉桂主腎虛膀胱寒痛平素肺熱者忌用羊羔酒用嫩肥羊煮如糜攪酒飲主陽虛脾胃不健肌肉消減又主婦人産後蓐勞平素有風損瘡疥人切不可用無徒羡黨家風味也右諸酒古方所載殆千百種此書為病人飲食而作故與前諸粥皆取氣味與飲食相近者録之如五加皮地黃天冬黃精龍眼當歸巨勝枸杞蜜酒之類無病人飲之亦有裨益其辛酸苦劣諸物雖各有治病之功然是藥方非飲食也概不利又凡可入粥者均可入酒入酒者亦可入粥大抵欲行須酒欲守須粥入血宜酒入氣宜粥因病而變通之可也餳諸谷果之無油者可作酒俱可作餳糯米為勝爾雅釋名曰清者為飴吾鄉呼小糖稠者為場稠而濁者為餺吾鄉呼水糖離騷謂之本紫撥而牽之則變白古人清明寒食食之吹簫而賣故唐宋詩詞賣餳簫皆點綴春景之句其入藥能和胃補中稼穡作甘之義也仲景建中湯用之又治蚊龍病見芹菜下多食傷脾敗胃作脹作泄蘖性善消故傷中耗氣也又甘能傷腎又生蟲又經火煉極助濕熱脾虛腎虛中州有熱及脹滿者蟲病及齒病者均切忌醋亦作酢即醋字魯論曰醯傷寒論金匱曰苦酒諸谷粟皆可作秈粳米為上小麥及糯米次之余皆下矣作法有蒸熟者有用生米者入藥宜米醋陳者良性能開胃進食殺一切魚肉菌菜毒添滋味又能制面毒凡麵食入醋些須食之即不作渴味亦倍佳是相制而又相成也世醫以其味酸畏其收斂嚴禁病人勿食夫不宜酸斂者惟外感宜散之症慮其收住表邪他病收住何物乎且醋味雖酸卻能通竅又最能散結氣行滯血雖表症猶必用之況其他乎如菜類蔥條下所載濟生祕覽千金諸發表方皆用之是也此外尚多不可枚舉觀其消食積攻氣痞止血運破産後瘀血以鐵或磚瓦燒紅好醋淬之令血暈者聞其氣即醒俗呼打醋炭甚則醋煎荊芥入酒壺中以壺咀對鼻急合其蓋令氣入鼻中尤妙治血凝氣滯之痛凡痛症藥如陳皮白芍白芷香附元胡靈脂之類均須醋製非醋不能開氣結也斂乎散乎外用散癰疽腫毒外科敷藥必用之物久而不潰者醋調雀屎貼瘡頭即穿出出肘後方解蜘蛛娛蚣蛇蠍瘋犬咬毒並以醋磨生鐵塗之出篋中方蒸跌撲損傷出日華本草白虎風痛足上轉筋出外臺方並以舊棉絮浸醋中甑上蒸熱裹之及各種風寒濕痹出近效方斂乎散乎千金方治鬼擊卒死不省人事吹少許入鼻中即蘇霍亂心煩腹脹飲之即定且炙附子塞耳能開氣閉之聾和釜底墨塗舌可消卒急不消之腫同葛根蔥白可療肌解表至於孫光憲北夢瑣言云一婢抱兒落炭火上燒灼以醋和泥塗之旋愈無痕洗冤録曰醋和大黃末更佳均之其為斂乎為散乎又其散逆氣能止百方不能止之嘔見小麥下治胞衣不下血滿腹中此死生呼吸之候非散何以解救乎用無名異一兩研末鴨卵白調勻溫醋一盞吞之其餘用也猶能治蝨出怪病見首卷外臺祕要云蠼螋尿瘡繞身匝則死以燕巢土醋和豬脂調敷肘後方云螻蛄即土狗咬人痛甚醋和石灰塗立止醋之為用如此何者取其斂乎即爾雅釋名亦只云醋措也能措置食毒也未嘗言收斂病邪也蓋醋成於釀造與作酒作豉同理故味雖酸而性則散比諸烏梅五味生而酸者迥不侔也如果收斂則虛汗虛泄陽脫陰脫百凡宜斂之症何古今方書無一人用之寇宗奭乃渭塗蜂蠆毒為收且引皺皮靴為喻可謂不知物理雖然醋以酸而為散奇矣若夏秋暑熱瘧痢等病汗出過多其後病雖愈而表虛漏汗或畏風者久開難以聚闔也任日服參耆燕窩烏梅五味不如飲食調和中略加醋即安海味尤佳宜肉食者海參魚肚蟶乾之類宜素食者海藻昆布海帶之類取其益陰滋血陽開陰闔之理也杏云蓋屢用之無不效且於注夏人令其調和之中常用此物亦無不效是醋也者有邪則散邪無邪則斂正乃仙品也獨其久食令人筋骨無力此則耗之太過故血不榮於筋內經曰酸走筋凡物過中皆有之害醋肯任其辜乎醬此亦諸谷皆可作而且有用魚肉作者調和諸撰雖無大益亦絲毫無損爾雅釋名曰醬將也制飲食之毒如將之平禍亂也魯論曰不得其醬不食其字所該者廣古人必有某醬如何造法某物宜用某醬之方不得其醬則毒無所制故聖人不食也今人用醬取其咸而且鮮比鹽較美而已其制食毒之法及造法一概失傳何故禁之乃醫人亦必禁之不知何意至內則豕胾芥醬濡雞醢醬濡魚卵醬濡鱉醢醬魚膾芥醬糜腥醢醬桃諸梅諸卵鹽雖著諸醬之用亦略而不全且觀桃梅之用鹽附於醬後則用醬即與用鹽同理也故儀禮公食大夫三飯以侑醬又曰凡炙無醬蓋無鹹味者必濡醬炙有鹹味故不復濡醬其理亦同也綱目曰調水服解砒毒又用榨去油脂麻枯滓和麵蒸罨作醬味更鮮美惟榆仁茱萸花椒等醬不免熱毒不宜輕食醬油毛詩曰醓用黑豆如作豉法蒸罨生黃入水加鹽曝氣味芳鮮能引胃氣俗醫謂其作嗽禁人勿食不知何本不必信之附醬藏諸物醬之藏物比鹽較鮮美為胃氣之所愛天下土産可以醬藏者不能悉數病人愛食即是漸進飲食之機且咸物不能多食些微不合亦無大礙惟醬越瓜性冷難化極不益人今之醫者專教病人食此百病忌之醬薑性熱熱病忌之黃蒸用小麥面水調作餅罨生黃衣曝乾收藏用時水浸濕加鹽蒸熟不蒸則帶吝氣可調和諸饌即是作醬之法此取其便也女曲以完全小麥蒸罨生黃曝而收之用同搗碎加鹽蒸食以供缺醬時之用有旨畜御冬之意故名女曲拾遺名子亦即作醬之法此二物藏過冬者能消食止瀉出圖經為末米飲下又治黃痹黃汗水煎絞汁服出必效方紅曲綱目曰紅曲古本草不載法出近世奇術也其法用白粳米一石五斗水浸一宿作飯分作十五堆入曲母三斤搓令勻並作一堆以帛密覆熱即去帛攤開覺溫急急堆起又密覆次日午又作三堆過一時分作五堆再一時合作一堆又過一時分作十五堆稍溫又作一堆如此數次第三日用大桶盛新汲水以竹籮盛曲作五六分蘸濕又作一堆如前法分合為一次至第四日如前又蘸濕若曲半浮半沉再依前法作一次又蘸若曲盡浮則成矣日乾收之性能消食健脾活血煮酒飲下産後瘀血按紅曲性大消肉食今人作魚肉鮓用之較古之鮓稍易化然總屬生物病人大忌附神麯古無此藥綱目曰昔人用曲即造酒之曲至宋賈思協齊民要求始創造此其法繁瑣葉氏水云録甄權藥性論群相附合云以五月五日六月六日或三伏日用白麵青蒿汁赤小豆末杏仁泥蒼耳汁蓼汁和合作餅罨生黃衣爆炒用名六神麯蓋以此配青龍白虎朱雀元武勾陳騰蛇六神也至倪維德啓微集乃云生用能發生氣炒熟能攸暴氣百病皆治張元素云能養胃氣夫醫非巫覡安用六神醫方治病不過取溫涼補瀉之藥勝寒熱虛實之病乃牽扯六神已極無理可笑況青蒿赤豆等物何以即能配合六神想創始者亦如青鳥家扯河圖洛書等書輒自以為深入理窟乎今藥肆所造僅以麥麩少和麵水調作餅炒黃色云蘇州出者名吳曲四川出者名峽曲價比白麵數倍醫者受其欺而不悟更不值一笑矣蘖米始見別録衍義曰粟蘖也唐本草曰食經用稻蘖稻乃諸谷之總名綱目曰凡谷以水浸濕候芽生去殼炒研入藥皆主消導而麥蘖性猛中州實滯者可暫用谷蘖性稍平能快脾開胃下氣和中小兒飲食不節可和白朮山藥扁豆蓮肉砂仁加糖霜作餅餌食淡寮方有穀神丸用谷蘖米四兩入薑汁鹽少許作餅焙乾同甘草白朮各一兩砂仁三錢為末白湯服麵筋小麥面熱而麩涼洗面筋者以麩入水揉擦其近麩之面結而為筋故涼食鑑本草曰寬中益氣綱目曰解熱和中病人宜湯煮食不宜干炸平人不拘麨爾雅曰糗孟子曰舜之飯糗茹草爾雅釋名曰糗齲也飯而磨之使齲齒也按此或米或麥皆可作吾鄉以粳米蒸為飯曝乾炒之名曝米或冬月蒸糯米俟凍過然後曝炒名凍米或以大麥生炒不必蒸曝名焦麥均可磑為細面湯泡加糖蜜食不再炊煮取其便也故為舜微時所食焦麥粉久食最消腹中氣脹拾遺曰性能健脾胃解煩熱止泄利實大腸蓋味甘氣香為脾胃之所愛而與炒米之失去本性者不可同年而語也惟糯米作者難化又固表外感及中虛人忌之俗以脂麻黑豆早糯米同磨粉食名三合粉云甚益人則極不知物理者詳早糯米下粃綱目曰諸谷粟之殼為粳其近米之皮為粃粃薄之義也味極甜凶年可以濟飢食物本草曰作糧食能充滑膚體可以頤養按此乃米之精華實能益脾開胃長肌肉悅顏色史記陳平食粳核而肥晉書王戎子萬有美名少而大肥戎令食粳而肥愈甚皆粃也古人互稱或蒸或炒熟拌糖蜜或拌豬肉汁食病後虛羸肌膚枯瘠者極宜之以此乃米之皮故長肌肉潤皮膚之力多也陳倉米一名陳廩米一名老米言其囤積倉廩陳久耳乃又名火米或以日久腐敗色紅而黯似乎燒灼漢書文帝紀曰粟紅貫朽是也綱目解為用火燒治或火蒸治而成夫燒則為灰蒸則為飯豈可復貯倉廩乎此米氣味俱盡煮汁不濃別録收為下品取其沖淡而已然傷脾敗胃故食鑑本草曰多食反飢得之矣又曰寬中消食則未也乃傷耗中氣非寬中也千金方治洞注下利炒研末米飲下本是米又用米飲下正以制其耗也日華子乃云補五臟澀腸胃食療本草至謂其補中益氣堅筋骨起陽道蓋誤以治泄為補為澀大不明理之言也僅可入開胃消食下利之藥斷不可為粥飯二三年者止矣若至數年雖入藥且不堪矣俗醫用數十年陳谷碾米以為妙藥大誤又此米只用秈粳而本草云陳粟米亦可不知粟米陳至二年其氣味如船之油灰更傷脾胃慎不可用又有畲田火米乃新墾之地爾雅曰二歲曰畲用火燒過然後插禾故名火米與此不同早糯米此種與秈米同獲而質黏粒團皆如糯自古醫書本草暨爾雅注疏説文物理論種植書農書齊民要術本朝欽定授時通考均未齒及其為無用之物可知矣而世俗甚珍之云性暖健脾補氣且和脂麻黑豆為糧食這名三合粉不知健脾宜用秈粳取其性暖也糯則性寒黏滯難化最能困脾設有表虛自汗火嗽喉腥癰毒無膿痘瘡不起諸病宜用寒糯取其性涼也無既用糯米之寒又取其暖之理且此米作餳作酒俱少每一斗不及寒糯九合其無汁可知又極易敗場可食一二日酒則出缸即酸或臭或未出缸即已酸敗總不能醇正其性不平和可知味俱帶澀其壅氣可知加以脂麻黑豆之滑泄欲其補氣健脾實傷氣害脾也此理於諸書既無可考請遍詢作餳作酒之人果實有酸敗無汁之事乎抑杏云之好為異説強詞奪理乎餅餌總説束哲餅賦曰三春之初陰陽交際寒氣既消溫不至熱於時宴享饅頭宜設炎律方回純陽布暢服絺飲水隨陰而涼此時為餅莫若薄壯商風既薦大火西移鳥魯毛樹木疏枝淆饌尚溫則起溲可施元冬猛寒清晨之會涕凍鼻中霜成口外充虛解渴湯餅為最此隨四時氣候適飲食之寒溫非言物性也若以物性論四方餌餅製法何止萬千雖楊子方言齊民要求諸書且不能得夫百一然綜其大概不外乎米面麻豆諸種油糖二料病人以不食為佳必欲食之小麥麵粉為上米粉為中麻豆為下以麵粉易化不壅米粉壅氣困脾麻豆則敗脾作泄也調和之物水與酵為優油為劣以水與酵不滑油則滑而熱也肉食為餡者隨病有忌有宜糖則極不宜多多則百病及平人皆忌不能悉數録常見之數種以見意余可類推也蒸餅餅賦曰饅頭俗呼包子乃小麥面發酵而成面已過性不助濕熱且易消化百病不忌性能消食導滯養脾益胃利三焦通水道又大消脹滿故古方治水腫氣腫多以蒸餅打調和丸長食尤佳無餡者良如用肉菜糖霜諸物為餡者隨病各有宜忌泰考之自得其全也又烈火焙燒存性熱酒沃之乘熱飲酒並食其焦黑之渣極消病後虛腫出必效方又治腋氣一名狐臭千金方論作胡息教坊記作溫羝用熱蒸餅擘開摻密陀僧細末錢許緊挾候冷棄之出奇效良方粢糕餌綱目曰糯米粉作者曰粢粳米粉合豆末作者曰餌黍糯合粳米作者曰糕吾鄉則論所作之形大塊方正曰糕小而圓扁曰粢又曰粑又曰果歲終相餉曰年粑或不設餡或用糖霜及緑豆赤豆脂麻為餡或以米麵粉裹蔗糖脂麻及肉菜等作長扁如梭形中為摺疊曰餃新正則以糯粉裹蔗糖為小丸煮炸食名元宵果楊子云方言曰餌謂之糕或曰粢或曰或曰然則諸物本無一定之名也劉郎不敢題糕豈以子云之説猶未足為典要乎總難克化且寒中滯氣有損無益也寒具一名捻頭一名環餅一名繖子綱目曰服虔通俗曰餲張揖廣雅曰雜字詁解曰膏環楚辭曰粔粒小麥面糯米粉俱可作齊民要求曰以牛羊脂合作吾鄉以小麥作者為油繖糯米作者為油粢油團油餃均用油煎食困脾作泄極非所宜糯粉尤甚然其來甚古鄭康成注周禮云寒具米食也又晉桓元宴客盛陳名畫法書客有食寒具不濯手者汙其畫元大不懌自是宴客不設寒具又蘇東坡寒具詩曰纖手搓來玉數尋碧油煎出嫩黃深夜來春睡無輕重壓扁佳人纏臂金六經無糕字乃有寒具乎詩中豪聊以自解也餺飥或作餺飥又作不託以小麥面入少油作餅內包蔥韭或糖或肉炸食之即餅賦牢九之類也丹鉛録曰餅賦本作牢丸乃湯餅也西陽雜俎有籠上牢丸湯中牢丸蘇文忠誤以真一酒對牢九具然歸田録引餅賦饅頭薄持起溲牢九作久近之久安知段成式非誤以牢九為牢吾鄉呼燒餅亦曰火燒觀其名知性之熱矣雖無大損不宜多食餛飩餛亦作以小麥面和緑豆粉作薄皮包蔥韭或肉瀹食或不用包切肉菜如糜和緑豆粉為丸入湯瀹之其來亦古唐宋時有尚家餛飩庚家餛飩每晨食之謂之頭腦湯雖無甚益然湯瀹則不熱不滯必無損也粽亦曰角黍是以黍為之今用糯米裹以箬葉如牛角形五月五日設之云屈原以是日溺死汩羅江楚人憐其忠投角黍以食蚊龍免戕其尸也一云蛟龍最畏糯米故投之性黏滯難化病人勿食米粉索碾粉則壅氣米之本性也而作索必入酸漿更非脾胃所宜山居者買肆中成排曝乾米粉取其便宜又可久留用以供客亦或充饌平人尚無大礙病人食之則胃氣不行藥多無效且助脹困脾乃真正堵氣之物而病人多嗜之醫人反不戒之不可以理喻況味甚不佳何故群嗜又不可以理解也小麥面索米粉索壅氣面索似不壅氣然未經發酵令人作渴多飲茶水必破腹作泄甚為腹胃之害令人每遇有病不論內傷外感必食此物多入胡椒辣味至不堪入口云可以發散甚或每日食之其後雖遇明醫無可解救而愚俗習為故常不知歸咎五十年中見死於此者蓋不止千百人矣願舉世醫人病人猛省之切戒之推原其所以相習成俗之故蓋以病之中人重症少輕症多輕症遇此不過加重幾分未必盡死遂自以為得計若其症本重未解表先傷其胃氣劫其營血不死奚待哉又市肆擀為薄餅切作條者名切面其助熱發渴傷中作泄之害同又平人病人食索麵不助熱不發渴法煮須極熟令如糜則受水足入胃中不能復受水津液不被其滲故不發渴且受調和又須略入醋一二匕則面有所制不助熱且倍添滋味又須少用油則不滑泄今人食麵群嗜生食好油膩必不肯用醋不可解也麵餅水調生面就釜烙為薄餅或用糖蜜蘸食或包蔥韭諸菜諸肉食北人以此為飯南人習食粳米病中食此不免助熱緑豆此諸豆中第一佳品也日用本草曰有二種圓小色深緑者名油緑豆粒稍大淺黃者名官緑豆官豆粉多開寶本草曰大者名植豆小者佳春夏秋皆可種性涼而不傷胃能退諸熱解百毒凡熱腫熱痢熱渴熱淋癰疽痘毒癍疹金石藥發誤食砒信誤服熱藥一切草木菌菌及自死禽獸等毒無不宜之然退熱解小毒宜煮汁飲解大毒宜生研末冷水調下服之必吐吐過又進得傾囊而出毒立解矣再以甘草三四兩緑豆黑豆各半升煮濃汁頻飲不宜去皮夷堅志解附子毒緑豆黑豆各數合末服並煮濃汁飲醫學正傳治痘後癰毒緑豆黑豆赤小豆等分為末醋調時時塗之加生大黃更佳全嬰心鑑防痘入眼緑豆七粒令兒作七遍自投井中回視七遍則可免普濟方治消渴飲水飲緑豆濃汁並煮粥食集驗方治多食易飢緑豆大麥糯米各一升炒熟磨粉白湯泡儘量食三五日見效食鑑本草治濕瘡不結痂緑豆粉干撲加海螵蛸末少許更妙外科精要治惡疽五日內防毒氣內攻護心散緑豆粉一兩乳香半兩燈心同研甘草煎濃湯調服三四錢日三四次若有嘔逆症是毒氣攻氣更宜多服簡易方治暑月痱瘡緑豆滑石末和勻撲其甚處不可全撲閉住熱氣必生他病直指方治痘後目翳緑豆皮白菊花穀精草等分同柿餅煮每食一二枚日三次並飲其汁又普濟方治赤痢經年緑豆嫩英或葉常煮食無則以豆及芽代之又葉能解草烏毒誤服者搗汁或煮汁飲中毒箭者搗爛敷緑豆粉其退熱解毒之功在皮去皮澄粉則力減矣然可為病人食料如泡藕粉法食之熱病最宜寒病亦不必忌性本中和也緑豆粉皮粉索以銅錫器入沸湯蕩為薄皮最為食中佳品或以漏勺就沸湯作索性雖同稍難克化緑豆芽綱目曰緑豆本佳發芽則受濕熱鬱浥之氣未免發瘡動氣試之殊不然蓋受濕熱而發生非受濕熱而腐敗也亦病人食物之佳品黑大豆古名角曰莢葉曰藿莖曰萁凡諸大豆黃黑青數色早收晚收數種皆有油故性皆滑泄但可點茶下酒不可為飯諸小豆赤白緑豇豌數種皆無油故可和米作飯亦可單食濟飢汜勝之種植書反云大豆能保歲可以備凶年小豆不保歲誤説也黑大豆性能解毒同甘草煮又為腎部引經而炒食則動風發毒煮食則敗胃傷脾故靈樞五味篇不曰腎病宜食大豆而曰大豆黃卷意可知矣而古方用為藥物亦多可取延年祕録豆黃方能益瘦人長肌肉填精髓見雁肪下千金豆淋酒法治中風及産後瘀血見前肘後治腹中腸痛脅痛炒二升酒五升煮二升頓服又治誤服巴豆瀉不止煮汁冷飲此方又可解一切惡毒廣利方治腳氣衝心煩悶不省人事用一升煮汁服未定再作東陽方治新久水腫大豆一斗煮取汁八升去豆入薄酒八升再煮取八升頓服水當從小便出外臺治瘟疫頭身發腫用二升甘草一兩水煎豆熟取汁頻飲千金治打傷頭面青腫豆黃末敷普濟方治痘瘡濕爛生研末敷産乳方治子死腹中母悶欲絶黃大豆三升醋煮汁服濟急方治蛇頭指瘡臭爛痛甚生研末入繭內籠之急救方治斑蝥毒煮濃汁服又可解草烏附子毒大豆黃卷即大豆芽豆有油故滑泄發芽則無害故內經曰腎病宜食然退熱之功遠不及緑豆芽也黃豆有黑豆之害而無其功獨其可以作紙則為用於世甚大作腐充饌其小焉者也晚收者粒加大欲名泥豆青豆有早晚二種晚收者粒大炒食香美其害與黃黑同黑料豆粒差小而多汁作豉作醬較大豆稍濃故名料豆亦僅為腎部引經煮食炒食害與大豆同煮豆法煮豆甘草為上蜜次之蔗糖又次之鹽為下然平人點茶宜甘下酒宜咸病人諸病宜甘中滿嘔症蟲症忌甘腎病宜咸血病忌咸煮宜極熟須頻翻轉之旋煮旋食能令人泄必曝之曝不宜過干過干則堅硬難化更傷脾作瀉且瀉出完豆用糖蜜煮稍多猶可鹽則極不宜多愈咸愈硬且發渴而多飲茶水無不破腹之理脾胃既傷大便不結藥必無功俗雲豆能解藥職是故耳此物總為無益必欲食之宜淡而潤又宜少忌咸而干又忌多鄉村蠢婦至以醃菘芥擠出之鹽滷煮豆又曝至硬如砂石又無搏節縱兒取食其子女必皆鳩形鴿面黃髮枯皮每云生來多病鳥知此物之為害也若炒豆動風發病腫毒遇之膿血必無了期十分痊愈者可以復發且作泄傷脾過於煮豆凡有病人尤不宜食豆豉豆經範罨為豉則不作泄為食中佳品百病不忌有咸淡二種咸者但充食料淡則能升能散仲景梔豉湯用以湧吐升也肘後蔥豉湯用以發表散也又治血分諸病血痢刺痛豉一升水煎二沸絞汁頓服傷寒暴利以薤白一握水三升煮薤熟納豉再煮分二服並出藥性論舌上血出如針孔豉一升水煮日三服牙縫出血同出葛氏方毛蟲螫人嚼豉敷之出外臺祕要又解砒毒煎濃汁冷飲以多為妙豆腐豆固有油故傷脾作泄為腐則油去豆存不為大害延壽書乃雲中豆腐毒萊蔔解之夫豆腐有何毒食鑑本草云能寬中益血消脹滿和脾胃則又何曾有其功譭譽皆失其平總之無益且無味病人不宜多食惟火嗽久而不愈者以石膏所收豆腐煮老豆腐不入油鹽久煮則老加糖霜每夜食頗效又治休息久痢醋煎豆腐每夜食不可用油出得效方有石膏酸漿鹽滷木葉各種收法皆甚微少入食料可不必拘又豆腐漿冷飲二三升能解砒毒相傳造法創自淮南王劉安有詠豆腐詩云旋乾磨里流瓊液煮月鐺中滾雪花亦小有風致豆腐乳以豆腐濾干置生黃衣入水加酒糟鹽醬藏久而腐熟體質消融酥膩有如乳酪不愧腐乳之名且香美能引胃氣令人甘食極宜病人世醫乃重禁之不可解也豆腐乾用布中包豆腐濾干或淡或加鹽或醬油浸性與豆腐無異而質硬難化則困脾冷食尤甚百病忌之世醫反不禁之尤不可解也又一種作法可數月不壞行旅齎之以致遠甚珍之腎韌如牛革更為劣物油豆腐以豆腐入沸油煎則發大如面之得酵最易消化故不困脾作泄與麵筋同為素食佳品和肉食亦佳又豆腐所制食物各處不同難以悉數大抵易化則宜難化則忌也赤小豆性能逐水利小便水腫腹大極宜食綱目曰和鯉魚鯽魚黃雌雞煮粥食並利水消腫雞不如鴨又性善降食療本草曰和鯉魚煮食治腳氣惟其逐水而降故能劫津液久食令人枯瘦身重脾氣不運津枯血少者忌之本草謂其健脾胃以其粉多然粉多者皆壅脾胃雖虛亦勿多食獨其能通乳汁産書單用煮汁飲又生研末醋調外敷癰瘍痄腮疔腫甚效又千金方治六畜肉毒炒研末水服三方寸七豇豆一名豆一名豆綱目曰處處種之蔓長丈餘葉本大末小花有紅白二色莢有紅紫青斑數種俱長盡余必兩兩並垂子長而微曲如人腎形嫩時充菜老則收子可菜可果可谷有二種一種宜風必插竹引蔓使高名豆莢棚英條直一種不必晾風就地鋪滿層層相壓莢皆糾曲極肥厚名纏地豇性能和臟腑止消渴煮熟日乾不拘素食肉食俱可子能補腎健脾止吐瀉然亦不免壅氣中滿者忌之袖珍方云能解鼠莽毒煮汁灌之鼠莽即水莽又作繭亦名斷腸草生水溝內似馬齒莧北方最多南方亦間有人畜中其毒者必死北方宜廣傳也豌豆綱目曰本出西域故爾雅曰戎菽渭之荏菽遼史曰回鶻豆飲膳正要曰回回豆唐史曰畢豆崔實月令曰蹕豆拾遺曰胡豆別録曰青斑豆千金方曰青小豆又曰麻纍鄴中記曰國豆俗呼安豆蔓長七八尺有須葉似蒺藜二三月開花淡紫色者豆粒小如藥丸白色者粒大如椿子花並如蛾形芳香可愛結莢長一二寸每莢四五枚性能健脾止瀉功同扁豆而力過之然亦壅氣氣滯中滿者勿食聖惠方治霍亂吐瀉豌豆香葇三兩煮汁分二服加草果陳皮更佳扁豆一名沿籬豆一名蛾眉豆嫩時食莢老則食子均如豇豆莢有長短各種長者良子有紫白斑諸色白者良莢充菜食能消暑和中解河豚毒出圖經子健脾胃消暑止泄同陳皮草果仁白朮車前子木瓜研末服亦治霍亂吐利同香薷紫蘇葉陳皮草果水煎頻服出千金方又治誤服毒藥墮胎或已傷未墮口噤手強頭低魄汗似中風九死一生之候煮濃汁頻飲出永類鈐方又治禽獸肉毒燒存性或生研末冷水服出事林廣記又解砒霜毒方同上然亦壅氣中滿者少食蠶豆農書曰蠶時始熟故名性能快脾胃利臟腑故不壅氣炒食煮食皆佳積善堂方曰有女子誤吞針入腹或教令煮蠶豆同韭菜食針自大便出食物本草曰其苗葉能解酒醉不醒刀豆西陽雜俎曰樂浪有挾劍豆即此樂浪古遼東後漢書封公孫康為樂浪侯是也莢長者盈尺短或五六寸形似腰刀嫩時可醃可醬可煮雖不佳尚無大害老則子大如拇指味甘氣惡能令胃氣逆上必屢吐乃已古方用治厄逆乃病在上因而越之之義與用瓜蒂藜蘆同理綱目乃謂其溫中下氣利腸胃誤矣荍麥俗作蕎非爾雅曰荍蚍衃注曰多華少葉葉皆翹起此物似之故取以名花時全不見葉田隴間一望平鋪如三冬瑞雪詩陳風曰視爾如荍亦言其多華也若蕎則大戟苗一名澤漆亦見爾雅曰蕎邛巨與此無涉綱目曰性主降氣寬腸故能煉腸胃滓滯而治濁帶泄利腹痛上氣之疾氣盛有濕熱者宜之若脾胃虛寒食之則大泄元氣至言也食療本草曰實腸胃益氣力續精神則誤説也又癰瘍未潰食之必難作膿已潰食之則難收口外科不拘何症總為忌物又不可同羊肉食苦荍麥此物似荍麥而苦惡須蒸晾去其惡氣乃可磨粉食貧有聊以濟飢實非穀類綱目曰多食敗胃動風動氣發諸病黃病人尤忌獨噎隔症宜之
