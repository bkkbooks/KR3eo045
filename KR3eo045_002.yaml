body:
  text: 調疾飲食辯卷一上總類水天地間未有萬物先有水故水者萬化之源也水何以先乎萬物曰水即氣也氣即水也水為氣所生氣又為水所生試觀一陽之氣起於下陰上遏之則氣聚而為水雲雨之理一陰之氣聚於上陽下蒸之則水復散而為氣釜甑之理易乾之象曰雲行雨施品物流行蓋氣聚而為雲雨自無形而之有形自有此有形之水而太虛寥廓之中生生化化不窮矣其行於地也流則為江河為溝澮大小皆流也止則為行潦為海水歸墟大小皆止也上而有此雲雨霜露下如有此江湖河海而水之類不齊水之性味亦各異本草綱目分為天水地水兩類各辨其甘淡鹹苦之味而著其寒溫良毒之性自古談物理者未有若是其詳且盡者也況乎民非水火不生活是平人病人日不可離之物醫者可置焉不講乎謹依綱目條例如下雨水綱目曰立春雨水宜煎發散及中氣不足清水不升之藥此說出虞摶醫學正傳然不拘何日雨水尚未落地其性清真用供病人飲食藥餌無不相宜若夏秋暴雨承取其水冷如冰雪煎時行暑熱之藥更有應驗露水夜中無雲星光照吸地中滋潤之氣升於半空降而為露故陰晦之夕及不見星光之所如樹下屋中雖地濕亦無露其性屬陰最能長養萬物月能吸海水為潮汐星能吸地氣為霜露故其性皆屬陰說見揭子宣璇璣遺述飲之能退大熱止消渴出本草拾遺凡有此二症服藥不效危急者宜多用瓷盤承取實有奇功秋露秉肅殺之氣宜煎潤肺殺崇之藥出醫學正傳柏葉上露能明目旦旦洗之熱眼極效寒者禁用出綱目續齊諧記曰赤松先生八月一日取柏葉上露以明眼雞蹠集曰八月一日作五明囊盛百草露可以明目雪水爾雅釋名曰雪洗也故洗滌冤誣謂之昭雪洗除瘴癘蟲蝗也綱目曰雪花六出陰之數也冬至後三戊為臘臘前三雪宜麥授時通考載古諺曰若要麥臘月見三白瓦器盛緊築密封泥口避日宜小口舊瓦罐未經鹽者用藏一切果實不生蟲蠢夏月置几席間蠅自去宜煎傷寒火喝之藥傷寒即是熱病日用本草曰煎茶煮粥能解熱止渴本草拾遺曰解諸毒治天行瘟疫酒後暴熱黃癉小兒熱癇張從正曰洗目退赤熱霜水霜即露也然稟寒冷肅殺之氣結而為霜其性極寒較雪尤甚凡雪水所主之病霜皆能治之而解毒退熱之功於時行瘟疫尤為親切收藏宜冬至後立春前日未出時用雞翎掃取菘芥葉上者舊瓦器藏如藏雪水法國語駟見而隕霜注房星見在霜降節今時霜降太陽在房屋之後法當昏見然以距太陽不遠日入時房星已近地平不能得見以歲差逆數之春秋魯隱公元年已未距今大清嘉慶十六年辛未共二千五百三十三年每年五十一抄差一十二萬九千一百八十三秒度法收之得三十六度弱距度愈近更不能得見至於火見心星也而清風戒寒天根見氏星也而不涸皆與當時星度不合不知何故霜雪水解春秋時行瘟疫暑熱瘧痢等毒實有奇效而苦於無人收取則危急時萬不可得醫者所以宜司歲備物也冰篆文作仌亦曰凌南方地氣暖冬時雖有冰而不厚藏之春暖即融亦僅如霜雪水耳北方地氣寒河流徹底皆凍車馬可以通行故月令季冬之月水澤腹堅藏之至夏不釋詩豳風曰二之日鑿冰沖仲三之日納於凌陰冰室周禮天官凌人掌冰正歲十有二月令斬冰三其凌凡內外饔之膳羞祭祀賓客無不用之左傳古者日在北陸而藏冰西陸朝覲而出之其藏之也深山窮谷涸沍陰寒於是乎取之其出之也朝之祿位賓客喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災祭寒而藏之獻羔而啟之公始用之火出而畢賦自命夫命婦至於老疾無不受冰山人取之縣人傳之輿人納之隸人藏之夫冰以風壯而以風出其藏之也周其用之也遍則冬無愆陽夏無伏陰春無悽風秋無苦雨雷出不震無災霜雹癘疾不降民不夭札按藏冰於冬及夏而用借其陰寒以制暑熱理之所有也故拾遺曰去熱煩日用本草曰解煩渴消暑毒綱目曰治傷寒陽毒熱甚昏迷冰之用如此已不可謂不大且能殺蝗蝻故春秋以冬燠無冰為災紀之者三謂當寒不寒恐為歲害也獨不知藏冰遂能無愆陽伏陰悽風苦雨乃至無雷震無霜雹無夭札癘疾左氏之失也誣此或其一也本朝藏冰之制伐冰取諸御河及龍王堂蓮花池歲以冬至後半月工部委司官一人募夫伐取明淨堅厚者以方尺有五寸為塊紫禁城內窖五藏冰二萬五千塊景山西門外窖六藏冰五萬四千塊德勝門外窖三藏冰二萬六千七百塊以供各壇廟祭祀暨內廷之用德勝門外土窖二藏冰四萬塊正陽門外土窖二藏冰六萬塊以供公廨官學及各衙門各監獄官暑湯之用凡陵寢祭祀則藏冰於畿輔遵化州薊州易州豐潤縣等處車駕巡幸直省均由地方有司供用無常數惟熱河定額二千塊喀喇河屯三百塊巴克什營兩間房長山谷樺榆溝中關小營波羅河屯各一百塊又古者雖命夫命婦至於老疾無不受冰而藏冰則有品節大夫非有采地者不得與焉故大學孟獻子曰伐冰之家不畜牛羊不知冰既可為夏月消暑之用先王之立此制其理安在今則戶戶可藏且鬻於市消融為水熱病人煮粥煎茶誠佳若整塊冷食不免敗人脾胃中寒者切戒江河長流水水以動為性以潤下為德故水無不流中國地勢西南高東北下故天下之水皆發源於西南而下注於東北江河其最大者江曰南條河曰北條江源出蜀之岷山所匯之水兩川滇黔兩湖兩江如洞庭彭蠡諸巨浸皆納焉至潯陽而分九派故曰九江至南徐今鎮江府而始入海自源迄委水程九千三百餘里河流則來自塞外爾雅曰河出崑崙虛色白所渠並千七百一川色黃百里一小曲千里一曲一直邢疏曰河源出崑崙山下之基其初纖微源高激湊故水色白造所受渠多凡一千七百併為一川沙壤溷淆故水色黃海內西經曰帝之下都崑崙之虛方八百里高萬仞河水出東北隅以行其北西南又入渤海又出海外即西北而北入禹所導積石山又北山經云敦夢山敦夢水出焉西注泑澤出乎崑崙東北隅實為河源今注云西北者蓋傳寫訛也漢書西域傳河有兩源一出蔥嶺一出於闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海蒲昌一名鹽澤去玉門陽關二百餘里廣紊三百里其水亭居冬夏不增減皆以為潛行地下南出積石為中國河又山海經云不周山東望泑澤河水之所潛也其源渾渾泡泡郭注云河出崑崙潛行地下至蔥嶺山于闐國分流歧出復合而東注泑澤又復潛行南出於積石而為中國河泑澤即蒲昌海也古之談河源者如此元朝遣使逆流溯之西南行至一處名星宿海云是河源然星宿乃彼處眾水所匯其上游必復有源則是河源遠甚莫可得而稽也其行於塞外也自南而北凡六六大灣其入中國也由秦而晉而豫過齊魯入直隸去海畦步不即入海忽而後轉復北流二百餘里及瀛洲今河間府而始入海故人以自矜其有者一遇高人而自喪如河伯之自旋其面目也究竟此乃遊戲之筆緣海岸陡絕地高下之勢使然耳其源雖不可知而自星宿海至直隸河間已數萬餘里矣河既源遠流長挾沙而行其水渾濁故名黃河其自積石龍門下浮中國在甘陝山西之地束於萬山不能旁決至河南開封建瓴而下李青蓮詩曰黃河之水天上來加以地勢平衍沙不積則順軌安流一積則頃刻旁溢其決而南也害在穎毫徐宿決而北也害在曹濮單鄆不知禹錫元圭而後歷夏商周一千餘歲何以不聞河決至敬王二十三年始決自後代代有之迄元明本朝其決尤數究在何理說者曰齊桓公任管仲將九河故道盡墾為田故下游無所泄此說見春秋緯寶乾圖云移河為界在齊呂填閼八流以自廣鄭康成據此亦云齊桓公塞八河同為一河郭注爾雅云九河徒駭在今東平縣太史馬頰覆釜俱不言所在胡蘇云在東莞縣簡絮鉤盤鬲津亦不言所在邢昺引漢書溝洫志疏之曰成帝時河堤都尉許商上書云古記九河之名有徒駭胡蘇鬲津今在成平東光鬲縣界中自鬲津以北至徒駭其間相去二百餘里是知九河所在徒駭最北鬲津最南蓋徒駭是河之本道東出分為八支也許商上言三河下言三縣則徒駭在成平胡蘇在東光鬲津在鬲縣其餘不復知也然九河之次從北而南既知三河其餘六者亦可想見太史馬頰覆釜即覆鬴在東光之北成平之南簡絮鉤盤在東光之南鬲縣之北以今考之九河故道皆在直隸河間河之決由沙壅不關下游不泄河決之所在開歸淮徐等處去海岱之邦遠甚且也禹之行水也行其所無事也苟拂其性而塞之湍流之下雖尋丈之渠且無所施其知巧況滔天之河可塞其八而為一乎觀前乎禹者有鯀築堤障水九載而績用弗成後乎禹者有梁武帝欲以鄰國為壑浮山築堰而漂沒田廬數十萬頃沉溺人民數十萬家是則齊桓公塞河之語蓋經生冒眛之談不足信也曰若然則八河何為而塞乎不知高岸有時為谷深谷有時為陵此殆有天焉非人力所能為也不觀今之黃河日陡而南舊河皆成陸路誰塞之乎惟其南徒故前明之世有欲引河與漕合流者既以漕水千步百折河流湍激必不能按轡徐行有欲引河與淮合流者又以淮水獨流且有泛溢之患加之以河其泛溢也必更甚今則黃淮已合關而泛溢依舊古治河之策有三曰疏曰浚曰塞疏在下游分支灑澤就所決之一處暫開支河以殺水勢庶便於興工非欲壞山東田而尋九河故道也浚在河身築堤固岸使水刷沙行也塞堙其決口也治河之人元總管賈魯事見元史河渠志當時史臣歐陽元就賈公細詢顛末得其物料工費之全數與分支固岸塞口之全法而備紀之為前史之所未有至明代賈魯河已成陸地其河臣則有徐武功有貞潘尚書季訓此三人一出而無河患者或三十餘年或四五十年後之從事於斯者皆取則焉儒生伏處而談經濟禮樂兵農或可得其要領此事恐難究其十全也我朝河工政務黃淮二讀為大運河次之永定河又次之及南北諸條附流入海分流濟運者咸受治焉其職掌江南河道總督一人掌黃淮會流入海洪澤湖汕黃濟運南北運河泄水行漕及瓜州江工支河湖港疏浚堤防之事所屬河庫道一人司出納河帑淮徐河道一人同知通判州同州判縣丞主簿共十六人分管天津河道一人同知通判二十四汛州同州判每汛一人縣丞主簿巡檢共五十四人分管淮揚河道一人同知通判三十八汛州同州判每汛三人縣丞主簿巡檢十四閘閘官共一百六十九人分管設河標兵二十三營副將二人參將二人遊擊三人都司三人守備二十四人千總二十七人把總五十人兵一萬三千七十二人山東河南河道總督一人掌黃河南下汶水分流運河蓄泄及支河湖港疏浚堤防之事所屬山東運河道一人同知通判二十八汛州同州判每汛三人縣丞主簿共百一十三人又分理泉河州同府經歷縣丞巡檢四十八閘閘官共四十二人分管兗沂曹兼管黃河道一人同知縣丞主簿巡檢守備千總把總共二十人分管河南開歸陳道一人同知通判州判縣丞主簿共一十六人分管彰衛懷道一人同知通判縣丞主簿巡檢典史守備千總把總共三十八人分管河標兵七營副將一人遊擊二人都司二人守備六人千總十有二人把總十有九人兵三千二百五十五人直隸總督兼河道總督一人掌彰衛入運歸海永定河入澱疏浚堤防之事所屬永定河道一人同知通判州判縣丞主簿吏目共十九人分管通永河道一人通知通判州同州判縣丞主簿共十六人分管天津河道一人同知通判州同州判縣丞主簿共十七人分管天津河道一人同知通判縣丞州判主簿巡檢共十七人分管清河道一人同知通判州判知縣縣丞主簿巡檢典史共二十一人分管大廣順河道一人同知知縣縣丞典史守備千總把總共四十九人分管設督標兵十五營副將一人參將一人遊擊三人都司二人守備五人千總二十五人把總四十五人兵五千八百四十五人凡河兵於綠營旗兵之外別自為伍專屬河工調遣守汛防險之事惟江南葦蕩營兵專司樵採不與雜役凡伕役江南山東河南設堡夫山東江南設閘夫直隸山東設淺夫河南設柳船長夫樁埽夫山東設搖夫泉夫壩夫軍夫橋渡夫直隸設夫防夫各隨其地之宜凡工式蓄泄以漸曰涵洞束水曰堤堤外重堤曰遙堤堤外築堤伸河流繞堤而過曰越堤亦曰月堤兀立者曰縷堤截流曰壩泄漲者曰滾水壩曰竹絡壩銳出河流以分水勢者磯咀壩護堤曰埽塌有魚鱗龍尾丁頭之別雙埽曰障障有六稜三稜排木之異他如以導大溜則有木龍柳簰以濟覆舟則有救生樁木凡經費各工有修防俸餉役食歲報圖冊之費江南河工有歲增五寸之費山東有疏浚運河之費各有常額凡物材葦柳秫稽論束荷麻論斤土論方磚論塊石料分雙單樁木別杉楊下至米汁釘鐵之屬有額者歲辦如額無額者需要之時如數購備凡修防當沖溜鬚用長樁大埽歲加鑲築費有定額者曰歲修或河流遷徒或三汛屆臨偶被刷損隨時搶護工費在五百兩以內者曰搶修江南淮運河堤每歲增高五寸亦曰歲修其核費具題歲修以十月搶修無定期題銷均以次年之四月凡三汛以清明節後二十日為桃汛自桃汛後至立秋前為伏汛自立秋至霜降為秋汛屆時該管官弁督率兵夫多辦物材晝夜分防有警則鳴金為號附近兵夫協力搶護凡疏浚河道面必廣底必深運土必於堤內無堤者必去河百丈運河歲小浚間歲大浚黃河無定期遇沙停淤即浚其法或以勺或以刮板或以浚船因地以制其宜凡浚船以疏渝河道柳船以運物材垡船與船與浚船同石船與柳船同凡保固黃河工程限一年運河限三年江南河東直隸南運河同北運河限二年永定諸河險工限一年其餘平易工程並限三年均以報竣之日起限限內沖決責承修督修官賠修限外沖決守汛官弁暨該管文武沿河州縣皆分別議處經制詳明超越前代如此以故百餘年來河流不無泛溢而不為民害者賴先事豫防之早後事補救之速也其前代河政諸史河渠志載之甚詳均可考也目河而外流水之大者西則有涇渭東則有淮濟汝泗南則有漢沔睢漳北則有桑乾漕濮內經以此諸水分配人身十三經絡疑是後人偽造非古聖人之言也何則諸水所經不過禹貢九州腹內一線之地磧路所回三萬餘里就沙漠磧石言之如此陳臥子詩曰磧路西回三萬里青天遙掛白龍堆若論北極至漠北窮荒西極至闊灤海大秦猶不止此數滄溟所浮數十餘國此亦就歷朝會典聲教所及言之如此朱從訓詩云海外波臣三十國一時浴日頌唐堯若論東極南極遠隔重洋之地亦必不止此數皆不共此水道其民將無經絡乎將生於彼國而效中國水道以為經絡乎抑將變而肖彼國之水道乎此不待辨而明者也又醫書有東流水亦儘可勿泥蓋中國地勢西高東下水無有不下故百川皆東匯於海易曰天與水違行天西轉水東流故曰違行言其大概耳就一處而言則各有不同塞外之水皆北流西藏之水皆西流姑勿深論就中國而言如吾鄉饒廣撫建之水皆西會於彭蠡章貢虔塗諸水皆北會於彭蠡又共西北流而入於江禹貢曰江水東匯澤為彭蠡誤也蔡虛齋曰江西古苗地禹跡或未親履其處故有此誤或然耳兩粵及閩中之水無甚大會皆各自南流或東流而入於海浙東之水皆東北會為太湖浙西之水亦東北會為浙江而入於海益州之水漾沱黑白四派分流故名四川此數千里之地其水皆不盡向東流皆不可為藥餌飲食乎總之長流之水合千派而不竭納眾汙而不垢所以郭云純江賦曰咨五行之並用實水德之靈長隨在可以汲取養生療疾無所不宜古方云宜煎下行利導之藥理則然耳但居近長流者平時飲食無非此水用以煎藥何獨能速下乎存其說而已矣溪澗急流水江河溪澗者流水也江河取其長溪澗取其速性順而善下則同也但山居者平日長飲此水臨病用之未必遂有奇效是亦不可全恃也爾雅山夾水澗陵夾水杜預注左傳澗溪沼沚之毛曰溪亦澗也李巡曰水出於山人於川為溪皆急流之名也逆流水水無逆流之理因流勢本急又遇河道轉變之所此岸順流屈曲而下則彼岸必逆流回旋而上其逆者順之轉也水大彎長可逆上一二十里水急彎陡可成漩渦大數畝爾雅曰過辨回川是也古方用煎中風卒厥及湧吐之藥然迴旋逆上處即穢汙所聚處汲取此水非精細人不可用也除煎藥之外一切飲食概不宜用詩奏風溯洄從之道阻且長溯游從之宛在水中央爾雅曰逆流而上曰泝徊順流而下曰泝遊泝同溯又作溯孫炎正義曰此順逆指渡者非言水之順逆也勞水傷寒論名甘瀾水綱目曰用流水置大盆中以勺高揚千萬遍有沸泡相逐乃取用之水味鹹而體重勞之則甘而輕取其不助腎氣而益脾胃也此解大誤總是取其善行不止觀下二方可見其來最古靈樞治衛氣常行於陽不得入於陰目不得瞑多年不寐半夏秫米湯用千里長流水八升揚之萬遍半夏五升秫米一升炊以葦薪取汁一升飲一小杯以知為度此欲行衛氣使得入於陰也傷寒論治發汗後臍下悸茯苓桂枝甘草湯茯苓一兩桂枝三錢甘草二錢半甘瀾水煮服之此欲假其善行而去臍下蓄水也凡病經絡阻滯及內有積水中滿臚脹等人飲食之中能用此水亦可以助藥力也止水大而湖蕩小而陂塘皆止水也水性動止而不行則靜拂其性矣且四岸穢汙有納而無出故凡鄉村飲此水者其人丁必不繁盛且多中滿蠱脹矧病人用之乎井泉水世本云伯益始作井或云黃帝穿井爾雅云泉一見一否為瀸謂有時出有時不出井一有水一無水為瀱汐謂夏有冬無濫泉正出湧出也詩作檻大雅曰觱沸檻泉公羊傳作泉杜注云直泉湧也直即正也沃泉縣出下出也曹風冽彼下泉酒泉穴出仄出也大東有冽酒泉歸異出同流肥邶風我思肥泉瀵大出尾下郭注云尾猶底也泉之名不同如此蓋泉者地之氣脈也其大小視乎氣脈之盛衰優劣視乎氣脈之清濁醫書之用井水隨出初出曰新汲出甕未放曰無根謂未曾放於落地平旦首汲曰井華平人病人飲食藥餌新汲水最佳蓋夏月陽氣用事陰伏於下井水極冷冬月陰氣用事陽潛於下井水微溫此皆地脈陰陽之正理苦汲之既久則失其本性與地面停蓄者何殊隔宿尤劣然此皆小者論其大要第一直辨味味甘而淡為優咸者及作石氣泥氣者為劣次論色色清如水晶為優色白如米泔及雖清而面有紅黃紫沫者為劣此數種水其作石氣泥氣及白如米泔者由地脈實實不佳必另鑿他井得佳泉乃可汲飲否則非居人之地速宜遷去伍子胥之治姑蘇白香山之治杭州胥此為首務不宜執改邑不改井之說也至於味鹹及水面浮沫之井人煙稀少處僅無通都大邑則十丸如此此由居人稠密糞穢雜汙漬入泥土所致雖地脈本旺飲之者人戶未嘗凋敞而明明穢物豈可入口況病人藥餌乎夫浚泄溝渠清理街道亦為民父母所有事是在官茲土者加之意焉矧膏粱藜藿富貴貧賤各殊而井汲同受王明之福則為民亦以自為也綱目曰河圖括地象云九州殊題水泉剛柔各異青州角徵會其氣慓輕人聲急其泉酸以苦梁州商徵接其氣剛勇人聲塞其泉苦以平袞豫官徵會其氣平靜人聲端其泉甘以苦雍冀商羽合其氣馱烈人聲捷其泉咸以辛觀此知人賴水土以生可不擇乎然九州水土固不同就一處而言相距咫尺即異是又不可以執論也其新汲冷泉水之入藥集簡方治中砒石毒倉猝不能得藥速速多飲冷水輕者得吐利即解解後仍宜頻飲重者亦可緩死待救然毒輕則解毒重則膨脹而死其死反速此不可不知也又治中烏啄毒即川烏草烏方同上濟急方治中蒙汗毒經驗方治中煤炭煙毒不速治能殺人均以冷水灌之千金方治馬汗或馬毛入瘡毒其氣入腹亦殺人冷水浸之不可浸者不住手淋洗之內飲美酒取醉立瘥肘後方治誤服勢藥或吐或衄或發狂頻飲冷水以安為度保壽方治療疽惡瘡初起痛癢或麻木身發寒熱乃極毒之候急用針刺破擠盡惡血令人口噙冷水吮之水溫吐去再噙吮至痛癢皆住即愈延壽方治鼻衄不止冷水淋洗後項風池風府或浸濕布中貼之傷寒論曰病人慾飲水者少少與之不特傷寒凡一切時行熱病瘟疫諸症但大熱大渴急欲得涼水者均可用宜頻飲一二口不可頓飲過多其熱而為湯須極熟故古名百沸湯傷寒論名麻沸湯本草衍義曰能助陽氣行經絡拾遺治小兒客忤卒死用瓦器盛熱湯隔衣熨其腹冷即易氣通立蘇嘉祐本草治霍亂轉筋亦以器盛熱湯熨之仍令足踏熱器使足底熱透內服安和脾胃之藥即愈千金方治暑月暍死以熱湯徐徐灌之略舉其頭令湯入腹即蘇又治手指腫痛熱湯久浸延壽書治金瘡血不止舊布蘸熱湯合之綱目曰熱湯善通經絡加以藥力其效更速予每治寒濕用艾煎湯治風虛用桑槐桃柳榆枝或五加皮煎湯淋洗按此法觸類變通其用無盡如治客忤可用蔥韭治轉筋可用五加木瓜用藥煎湯只蘸所隔之布器內熨湯但取其熱不必用藥治暍死可用蒜治手指腫痛可用大黃地丁治金瘡血出可用荊芥白芷不能枚舉也又本草拾遺有生熟湯加鹽引吐之法原治誤食毒物臚脹欲作霍亂用冷水沸湯各半相和俗名陰陽水綱目遂謂其能通陰陽升降清濁譽之未免過情蓋果系熱病可全飲冷水無熱病而飲陰陽湯往往有害考其法始於陳藏器自唐以前醫書本草並無之不足信也諸水有毒本草綱目曰沙河中水飲之令人瘖聲啞也陰地流泉行人飲之成瘴瘧損腳力兩山夾水及流水有聲音者久飲令人成癭疾澤中停水五六月有魚鱉精飯之令人成瘕病即無之久停之水總不宜入飲食藥餌說見前止水條古井眢井井無欄謂之眢井井欄古名銀床唐人句曰井梧花落盡一半在銀床久無人汲者夏月行人縱渴甚不可妄飲有毒甚者能殺人周易所以云井道不可不革也溫泉本草拾遺曰下有硫黃即令水熱故溫泉多作硫黃氣熱甚處可燖豬羊熟雞卵非有瘋癩病人不宜輕入漁隱叢書曰天下溫泉惟黃山是硃砂泉春時水色微紅長安驪山是礬石泉俱不甚作氣有砒信處亦有溫泉其水大毒本草會編曰盧山溫泉患瘋癩及楊梅瘡人飽食入池久浴至汗出乃止旬日自愈按溫泉天下有處甚多其下不有硫黃即有砒石總皆有毒浴且不宜輕入況可入飲食藥餌乎獨驪山者可浴白香山長恨歌曰春寒賜浴華清池溫泉水滑洗凝脂此乃地脈之奇也他處慎之花瓶中水飲之殺人蠟梅尤甚炊湯甑下水洗面令人無顏色洗體成癬洗腳疼痛生瘡貧家以惜薪故每用泡茶病人切不宜飲也水經宿面上成五色者有毒不可入宿食不可濯手足與飲湯同春夏大雨山水暴漲有毒山居別無他水可汲者宜搗蒜或白礬末少許投水缸中已受其毒梅葉煎湯解之無梅葉礬蒜俱可本草會編曰昔在潯陽忽一日城中馬死數百詢之云數日前大雨洗出山中蛇蟲之毒馬飲其水故也秋冬水涸湖蕩溝渠停蓄之水雖無甚毒極能作脹傷脾澤居必須飲此水者亦宜常搗礬蒜投之然住居此地若無高阜可以鑿井常飲此水其人丁總不繁盛非樂土也陸羽茶經尚知辨天下性之美惡況病人飲食藥餌反不知辨屆不戾哉以上並見本草綱目諸水治病地漿亦曰土漿此物最古名醫別錄即有之陶隱居曰掘黃土地作坎深三尺一二尺亦可以新汲水沃入攪濁少頃取清用之病輕取清重者連泥濁飲力更大能解一切卒急不可名狀之惡毒蓋凡物遇土則化香者不香臭者不臭坤德之所以能受也若羅天益衛生寶鑑云地屬陰於牆陰掘坎作地漿乃陰中之陰能瀉陽中之陽語乃大謬作此須稍遠居人高阜潔淨黃土地常受風日雨露之所則佳樹下牆陰屋內皆不可作第一善解楓菌土菌等毒閉口椒毒口吐白沫身冷欲死出金匱要略熱毒煩渴出聖惠方天行熱病及瘟疫尤佳乾霍亂病即攪腸痧脹痛不得吐瀉救遲則死飲地漿三五盞以雞羽探喉中得吐即生大忌米湯尤忌薑湯但一滴入口則萬不能救出千金方誤服或過服熱藥煩躁瞀亂出肘後方中野芋毒黃魚毒集簡方並飲地漿則解酸漿本草蒙筌曰炊粟米半熟投冷水中浸三五日待面生白花味酢用之古方凡用漿水者即此性能調中消宿食解煩渴止嘔吐並溫服一盞浸至臭敗者不可用城居擠粉店中日日有之鄉居卒急不能得勿用收豆腐之酸漿此乃豆汁非米汁也然米漿亦不宜妄服衍義曰孕婦服令兒骨瘦飲多能絕產醉後飲之失音齏水綱目曰此即作黃齏菜中酸水也溫飲能湧吐痰飲宿食不可過多磨刀水綱目曰利小便消熱腫集簡方云肛腫痛欲作痔瘡急取屠刀磨水內服外洗數日即效扁鵲方云盤腸生產腸幹不上取磨刀水溫潤之內服好磁石末救急方云蛇咬毒攻入腹取刀於水中相磨飲其汁活人心統曰耳中卒痛取刀於粗石上磨汁滴入即愈甑氣水集簡方云小兒唇面生瘡爛成臼孔取蒸糯米甑篷滴下氣水日掃數次數日即愈無糯米秈米粟米俱可但更須多上市門溺坑水俗名溝尿本草拾遺曰能治消渴飲一小盞三四度瘥按此物能解大毒但須不近豆腐酒店又無燖豬血水者又必晴日乃佳雨後者無用凡時行瘟疫頭項作腫或生疙瘩大熱煩渴吐血便血哮喘等症取數升燒鐵一塊令赤投中淬之少頃水清飲數次可以起死豬牛瘟病縛置坑中捺其頭於水內使不得息水自然入腹一二次便瘥繅絲湯綱目曰止消渴漚麻水別錄曰止消渴浸藍水解毒退熱與藍澱同見後火綱目曰水火皆所以養民也太古燧人氏鑽木取火教民熟食使無腹疾周官司烜氏以燧取明火於日鑑取明水於月以供祭祀司爟氏掌火之政令四時變國火以救民疾春取榆柳之火夏取杏棗之火季夏取桑柘秋取槐檁冬取柞楢之火季春龍見於辰而出火於時為暑季秋龍伏於戍而納火於時為寒後世寒食禁火乃季春改火遺意觀唐時清明日腸百寮新火新字可見矣俗作介推以是日焚死故禁火豈不謬哉按先王之世火政如此似乎近迂且所云順天道而百工之作息皆因之以免水旱災之流行其理尤不可信今惟戛石取火或以玻璃照日取火得火之由只此二法火幾元日不新於養生療疾未見其害也綱目論火乃遠扯君火相火及周濂溪聖人定之以中正仁義而主靜朱紫陽人心道心諸說一派空談全無實際醫家不宜有此蓋火之憂劣視乎薪炭故桑樹可以烹老龜軒轅墓上千年華表可以照孤魅次視乎文武久暫之候故丹經有溫養之義內典有烈焰燒空之喻而養生療疾於此外又奚足辯乎桑火諸木作薪惟桑火最烈故凡牛羊雞鴨老者煮之不爛得此即糜熬鹿肉虎骨等膠得此比他薪較損而得膠且多宜煎一切補藥如地黃二冬牛膝之類汁本難出且補藥宜熟也況桑性能除風寒溫痹諸病此數種病人不拘飲食藥餌概宜用之竹火此火亦烈但遜於桑耳宜煎補藥松火凡木供爨此為最多火性在緊緩間又香竄之木火亦竄惟此與柏不竄故可用諸雜木諸木火雖不能如桑火之烈然桑薪不能常得不拘何木加而用之火候既足亦有同功也樟本火此薪中之最劣者作餳作腐草柴中但夾樟木葉數片則滿鍋皆成清水且釜中未沸近底處先焦故煉為樟腦能於水中發火若烹飪諸物能令滋味全失且帶樟木氣病人切宜避之為害不小也杉木火較樟木之害稍殺病人亦不宜用蘆火其性柔緩烹飪用之不助熱煎藥不耗藥力故靈樞半夏秫米湯方後曰烹以葦薪獲火同諸雜草火但香竄者即不宜供病人之用其餘性皆柔緩可隨便用蕭艾蘺蓼諸火凡草木氣香竄者作薪火亦竄觀所烹蔬菜魚肉失味茶無香可見矣不堪為病人飲食藥餌之用諸稻粱黍麥等穰火一名稈俗呼禾稈粟稈麥稈易燼多灰火性極其柔緩烹飪難熟煎藥豈能出汁但火性既柔則不耗藥力加而用之可也諸菽穰火一名其陳思王詩煮豆燃豆萁火性緊而烈又且難燼灰少作飲食易糜煎藥出汁又不助熱與木中桑火同佳品也不拘黃黑大豆赤白小豆豌豆豇豆同落花生穰亦同諸麻穰火其火性雖平不助熱苦其易燼脂麻穰稍可火麻尤易燼病人飲食加而用之糠火礱糠供爨有二用一用風箱曳搧焰甚烈而火性不熱病人飲食藥餌俱不忌一不用風箱不能作焰僅能煨養諸般食物易糜而有味但性較熱不宜煎滋陰補血之藥凡麥芒秕豆秕粟等俱可燃性亦彷彿白炭火用雜木煨糠火中不使其燃俟煙盡閉窯滅火其炭堅結故俗呼硬炭外有白粉者良故名白炭無白粉者多爆其火甚烈能使肉食易糜藥易出汁但極熱平素飲食習用薪火者驟遇炭火所烹令人口糜舌爛或咽痛或鼻衄凡肺熱咳嗽及天行熱病人切宜遠之也冬月烤火亦然研末蜜丸含咽治卒然咽喉閉塞無白炭烰炭亦可千金方燒紅急研為末陳香油調搽愈陳愈佳治湯火傷灼濟急方一種獨木所燒名雞骨炭能治跌撲傷損見果類砂糖下雜木烰炭火較白炭稍不熱病人治食煎藥皆無所忌櫟炭尤佳泡湯飲或研末蜜丸含咽治卒然失音杉木炭最驗但勿用曾經水淬者及竹炭皆不驗前咽喉閉塞方無白炭可代以烰炭此則必用烰炭不可代以白炭得效方煤炭火綱目曰一名石炭一名烏金石即拾遺記之焦石古人用以書字故又名石墨南北產處甚多代薪炊爨鍛鍊鐵石大為民利曹叔雅異物志云豫章有石黃色而理疏張華謂之然石以水灌之則熱可以烹鼎冷則再灌高安亦有之按高安豫章與吾饒接壤不聞有水沃之然石或古有今無乎石灰初出窯時堅硬仍如石體扣之亦作石聲按之不熱遇水則煙焰陡發榜人裝載稍不檢點可以焚舟張公曹公得毋為人所愚所云然石即此乎高安豫章多有灰窯有煤之山必有亂石成行高出土面風雨之夕火光炳耀倏明倏滅者即是其在土中淺深不一必作坎如井少則二三丈多或十餘丈得炭則為隧橫人鑿取用修綆轆轤出之有三種一種色黑而黯者為紅火炭其焰色紅煙多易燼一種深黑光明如瑿者為緣火炭其焰色綠煙少難燼一種焰綠而更難燼者名鐵炭惟供煅鐵之用炊爨者以價昂不能用也三種炭火皆作硫黃氣性烈有毒紅火者尤烈中其煙毒能令人昏瞀速以冷水灌之移向風吹則解一切煙毒皆宜解以冷水乍食煤火所烹之物其害甚於白炭病人概宜避之煎藥則斷斷不可研末同滑石末水調或人尿調可敷金瘡血出不止醫學集成卷一下油凡草木豆果蔬菜之實不能釀酒者均可榨油故油之類不一而烹飪必資之性之美惡可弗究乎脂麻油人饌能解飲食之毒但性滑蔬菜中過多則敗脾病人大便不解者酌而用之別錄曰主天行熱閉服一合取利為度胎產須知曰漏胎難產漿水先下其胎乾澀不行麻油半兩蜜一兩入湯煎數沸頓服食療本草曰通大腸熱閉治蛔攻心痛麻油一合雞子兩枚芒硝一兩攪服又總解百毒香油灌之又治盤腸生產其腸不收用油燒溫盆盛令坐其中食頃以燈草添鼻作嚏立上陳者外用作薄貼膏藥愈陳愈妙至一二十年即是仙丹能消腫解毒散血生肌但過陳者不宜耳約二年為率二年以外者切勿入病人之撰豆油熬熟入食料比他油較美而滑腸助熱則同凡草木之實可榨油又可作酒者惟此余皆各得其一也茶油此雖名茶實非茗也有二種一種樹高二三丈生子反少一種僅尋丈生子反多均可榨油吾鄉虔吉南贛及湖南諸郡甚多為利於民甚巨肥膩不亞豆油性亦熱而滑蕓薹油即菜子油為諸油中第一劣物能敗陽發病損精神又損腰腳生寸白蟲見食物本草又能使女人不孕見綱目凡生產不順欲斷產者及師尼寡婦慮受私胎者諸古方皆用油菜子則不孕之說豈虛語哉吾鄉反貴之呼真香油而以攙和脂麻者為假香油香油載在醫書本草不知幾千百見皆謂脂麻油無道及薈蔓者市儈不知以此為價之低昂無足深責醫人豈皆無目何竟憒憒也認賊作子認子作賊可發軒渠獨其外用消腫解毒與脂麻油同亦愈陳愈妙過陳者尤不可食烏桕油烏桕殼內之仁其油之滑泄熱毒與桐油等而殼外白皮另取入榨名皮油白膩如蠟云可食味肥美然大熱大毒則同病人切戒又此油亦可敷腫毒亦愈陳愈妙且能殺蟲凡頭瘡疥癩之有蟲者有蟲則癢敷之其功乃在脂麻蕓薹二油之上吉貝油即木棉子油木棉花本出緬甸車師八百媳婦等國治末始入中土原名古貝番語也後訛為吉貝衣被天下之功固大作油充食似非所長而食之者云初食則泄久食則不泄性能暖腎未知果否大抵較烏桕稍不毒而大熱則斷斷如也然患瘡毒人但行木棉地畔觸其氣則腫痛倍加是未嘗不毒也凡有病人切不宜食緬甸及交廣滇黔等處地無霜雪木棉有成大樹者名古貝他處一歲一種者僅草本名古終蓋一類二種也按病人食料脂麻油為上茶油豆油次之若內傷諸病可以不戒肉食者莫如豬油為妙其烏桕吉貝蕓薹等油切宜嚴戒雖然凡油無不熱亦無不滑忌者固忌宜者亦勿過多滑則敗脾熱則助火而肥酞入胃足令諸藥無功病者毋過貪適口也油即火也博物志曰積油滿千石則自焚古衡數小得今三分之一也今滿三百石則焚七十年中三見其事矣而別錄乃云滿百石則自焚夫百石肆中常有之積未見其焚即以累黍成斤法算之四鈞為一石百石當一萬二千斤所差亦不遠而齊梁間衡數與今相較僅得今秤四千余斤然則此焚者或天時地氣有不同乎總之積多且久必焚觀油紙置箱篋遇濕熱蒸之則火自內發可知油即火也鹽綱目曰一名鹺天生曰滷人生曰鹽說文東方謂之斥禹貢曰海濱廣斥西方謂之滷河東謂之鹹鹹字有二音二義一音咸鹽味也此音減鹽土也鹹地也後人或作鹼作鹻又或作𨢑醶醶字從酉西方金也易傳曰兌為澤其於地也為剛滷黃帝之臣夙沙氏始煮海為鹽管子亦曰煮海為鹽其利通於天下然鹽不盡出於海夙沙氏就其多者言管子就齊國言也市語隱其名曰海沙不知古方士久已呼之周禮鹽人掌鹽之政令祭祀共苦鹽散鹽賓客共形鹽散鹽王之膳羞共飴鹽苦鹽名顆鹽出於池皆成顆粒未經煉治其味鹹苦散鹽名末鹽出於海及井皆散末形鹽名丘鹽刻作虎形或曰積滷自結不煩丘刻飴鹽味鹹而甘或曰以飴煎治非也鹽品甚多海鹽取海水煎煉而成今遼薊山東兩淮浙閩廣南所出是也井鹽取井水煎煉而成今四川云貴所出是也池鹽出河東安邑解州疏鹵地為畦引池水注入候南風大起一夜結成謂之鹽風海豐深州亦或引海水入池曬成幷州河北皆鹼鹽也刮取鹼土煎煉而成階成鳳州皆崖鹽也生於土崖狀如白礬此五種皆食鹽也海鹽井鹽池鹽鹼鹽崖鹽共五種上供國課下濟民用海鹽井鹽鹼鹽出於人煎治也煎鹽必以皂莢鹽成就焉籌策數之故司鹽政督廠灶之官謂之治鹽莢或曰算鹽莢池鹽崖鹽出於天自然而成不須煎煉又有戎鹽生於土傘子鹽生於井石鹽生於石木鹽生於樹蓬鹽生於草造化之妙誠難殫知也本朝鹽政凡沿海及有池井之地聽民闢地為場置灶開畦為鹽而售之商或官出帑收鹽授之商而行之以鹽課大使掌其場地交易權衡之政令運同運判分司其地而糾察之長蘆都轉運鹽使司所屬分司天津運同治場八滄州運判治場二兼轄山東都轉運鹽使司所屬分司濱樂運同膠萊運判各治場五每場設大使下同鹽行直隸及河南開封彰德衛輝陳州懷慶南陽府屬之舞陽許州屬之臨穎共九十六萬六千零四十六引課入六十萬零三百九十四兩山東鹽行本省及河南歸德江南宿州徐州府屬之銅豐沛碭正引五十五萬票引一十七萬一千七百四十課入二十四萬五千六百八十八兩兩淮都轉運鹽使司所屬分司泰州運判治場十有二通州運判治場十淮安運判治場三鹽行江南之江寧安慶鳳陽廬州池州太平寧國穎州淮安揚州各府六安滁和泗通海各州徐州屬之邳宿州睢寧三州縣江西之南昌饒州九江南康建昌撫州臨江吉安瑞州袁州河南之汝寧府光州及湖南湖北共一百六十八萬五千四百九十二引課入二百一十七萬九千二百六十四兩河東都轉運鹽使司中分司運同治山西解州安邑鹽池一設場三陝西甘肅定邊大池一設鹽池大使統隸於河東鹽政其靈州小池一設鹽池大使別隸於陝甘總督兼甘肅巡撫鹽行河南之南陽河南府陝汝二州許州屬之襄城陝西之西安鳳翔同州府邠乾商興安州共四十二萬六千九百四十七引課入四十二萬九千三百八十二兩陝甘鹽行漢中延安鄜綏德各府州共三萬九千四百引課入八千九百八十兩行蘭州鞏昌平涼慶陽寧夏泰階各府州靈州洮州各衛共七萬二千六百八十八引課入二萬零四百一十六兩兩浙鹽驛道所屬分司寧紹運副治場二十嘉松運判治場十有一鹽行本省及江南之蘇州松江常州鎮江徽州太倉廣德江西之廣信等府州共正引七十萬零四千六百九十八票引十萬零六百九十八課入七十三萬七千七百零五兩福建鹽法道所屬鹽場十有三在內地者十有一均不設鹽課大使其八場委簡發試用官三場委知縣或首領佐貳官令其場務在臺灣者二以知府兼理之統隸於閩浙總督鹽行本省共九十四萬六千四百八十五引課入三十九萬七千三百四十二兩廣東都轉運鹽使司所屬分司惠潮汀贛運同治場十有三鹽行本省及江西之南安贛州福建之汀州湖南之桂陽彬各府州貴州之古州共五十三萬八千五百二十二引課入四十六萬八千七百八十七兩行廣西共六萬五千六百一十引課入十二萬三千七百八十二兩四川驛鹽道所屬鹽井七千七百有三井大使十有二鹽行本省及湖北之施南府宜昌府屬之鶴峰長樂二縣雲南之東州昭通二府曲靖府屬之南寧霑益平彝三縣共一十一萬五千一百八十五引課入八萬九千五百三十六兩雲南驛鹽道所屬鹽課提舉司三分轄鹽井十有六井大使十有一鹽行本省以道遠不頒引按井給票課入二十六萬一千六百四十三兩貴州各府近湖廣者食淮鹽近四川者食川鹽不通商不頒引小民就近負販而輸稅於官布政司鹽驛道兼理之課入七千六百一十五兩各有奇鹽課以乾隆十八年奏銷冊所定天下直省總共行銷六百三十八萬四千二百三十一引課入五百五十六萬零五百四十兩有奇以上本朝鹽政大略其分行分徵各細數限於幅隘不能悉載若夫歷朝鹽法諸史食貨志具存留心有用之學者可以詳考也按鹽生於海生於池生於崖井總不外洪範潤下作咸之理而草木土石本備五味草木土石之酸甘辛苦既所習見而又何異乎咸獨是五味分配五行其入食品也酸甘辛苦可有可無咸則日用所不可缺酸甘辛苦各自成味咸則能滋五味酸甘辛苦暫食則佳多食則厭久食則病病而不輟其食則夭咸則終身食之不厭不病雖百穀為養生之本非咸不能果腹別錄所以云堅肌骨拾遺所以云令人壯健也陶隱居乃云西北人食不耐咸故多壽少病東南人喜咸故少壽多病悖理之言至於此極素問異法方宜論亦只云東南人黑色疏理病多癰瘍未嘗言少壽也而西方北方亦必云病生於內或藏寒生滿病未嘗言不病而多壽也全文已載卷首可查閱使果北人必嗜淡南人必嗜咸何一母所生其食性即不同使果北人必壽南人必夭何一爨所供其修短即懸絕況欲以南北畛域齊億兆人之嗜好且齊其命數不亦慎乎試觀力作之人多喜食鹹彼非咸則不能力作腎之所以為作強之官也咸走骨咸補骨令人壯健之說亦不信哉又牛馬食鹽則肥健業弦高之業者遇羸瘦老牛每日飼之以鹽旬月之間牛必肥健得價倍之是鹽乃補腎上藥延壽金丹也橐駝嗜鹽故多力畜艾豭者每飼必以鹽故一日數交而不疲皆咸補腎之力也人與諸物靈蠢之性雖殊血肉之軀則一取彼證此理豈難明我嘗嘆世間膏粱紈絝之子見力作之人多喜食鹹彼則以食淡為高雅食鹹為村俗視其形狀醜弱尪羸幾於臨風欲倒而又多置妾媵廣田自荒或且狎比孌童狹邪漁色必致精寒腎痿不得不服補藥買春方烏知有此絕妙春方而不能用乃乞靈於鴉片硫黃以速其死誠可悲而復可笑也杏云老人治病五十年矣除血症水腫消渴喘嗽而外從未一申食鹹之禁過咸則劫血又生水又傷肺故此數種病食物宜比平人略淡蓋他物恐其過食此則萬不能過也彼嗜咸者遇咸物正其本色且太鹹亦不能食嗜淡者遇咸物自不肯入口安俟醫人之瑣瑣哉綱目曰鹽之主病極多補腎藥用之者咸走腎也補心藥用炒鹽者鹽炒則苦苦為火味故入心也積聚結核用之者咸軟堅也諸癰疽眼目血病用之者咸走血也諸風熱用之者咸消風散熱也大小便病用之者咸潤下也諸齒病骨病用之者咸補腎腎主骨也發吐亦用炒鹽者苦以泄之也唐柳子厚纂救死三方一治攪腸痧即乾霍亂腹中急痛爪甲青色上不得吐下不得瀉四肢厥冷魄汗淋漓頃刻殺人用鹽一大匙炒令通赤研碎入童小便一大盞冷服無童便大人尿亦可但略帶黃赤色者即是有病之人不可用少頃得吐下即愈不吐以雞羽入喉探之此症切忌米汁尤忌薑湯曾兒子之者必死無救切勿誤治招謗救急方治霍亂轉筋欲死或氣已絕但腹有暖氣者以鹽填臍中炙鹽上七壯即蘇子母秘錄治小兒臍風撮口藥性本草治小兒卒然不尿頃刻殺人方並同上儒門事親治病笑不休形若瘋狂炒鹽用流水煎沸啜之探吐即愈外治方治體如蟲行鹽一斗水一石煎湯頻浴之此數大多每浴一次約水二斗鹽半斤是矣經驗方治蚯蚓咬毒眉發俱脫形如大風方同上奇疾方治蝨出怪病臨臥遍身出蝨數升每夕漸多血肉俱壞痛癢不可言狀晝夜號哭舌尖出血身齒俱黑唇動鼻開但飲鹽醋湯十餘日即安肘後方治腎風耳鳴又治耳卒痛鹽五升蒸熱布包枕之冷即易東陽方治目中多淚直指方治目翳初起研生鹽點之急救方治牙齦宣露食鹽頻搽溫水嗽之肘後方治手足心毒鹽末花椒末醋和敷外科精義治潰癰作癢以鹽水抹其四圍或煮豬肉汁入少鹽頻洗千金方治喉中生肉漸礙飲食聖惠方治帝鍾垂長俗名小舌並用綿裹箸頭蘸藥頻點易簡方治喉痹乳蛾鹽煅赤研箸頭點小品方治面生酒齇炒鹽頻擦如出血水將鹽按止又治婦人陰戶癢極難忍生鹽頻搽腹痛如絞嘔吐不休炒鹽包裹隔衣熨之凡寒氣作痛不拘炒飯炒米炒麥麩炒蔥俱可解借其暖氣以散寒也惟血凝氣滯之痛非炒鹽炒韭菜不驗又千金方治蜂蠆惡蠅叮螫並用冷水沃洗嚼鹽塗之徐伯玉方治毒蛇傷螫方同上但塗後宜灸三壯灸後仍頻塗之千金翼治一切癬瘡食鹽頻擦之鹼此非煎鹽之鹼乃用炭灰及雜薪灰淋出性能湧吐去頑痰宿食外用蝕瘡瘍久爛死肌惡肉點疣痣飲食中用稍多亦令人吐其性甚烈內外俱不宜輕用石灰及煅灶中灰尤烈茶綱目曰爾雅云檟苦茶郭注云即茶也蜀人謂之苦茶又名荈陸羽曰其名有五一茶二檟三蔎四名五荈丹鉛錄云茶即苦茶字音塗詩曰誰謂茶苦其甘如薺是也顏師古云茶陵地名漢時始轉塗音為宅加切是則茶即茶也或言六經無茶字未深考耳觀楊氏顏氏二家之說則六經有茶字但考爾雅茶字凡兩見其釋草云茶苦菜郭注引詩誰謂茶苦釋之釋木云檟苦茶郭注云葉可煮作羹飲早採為茶晚採為茗是明明二物恐苦茶之茶可讀宅加切苦菜之茶仍當作塗音楊氏引詩之言未免失考清明前採為上穀雨前次之此後皆老茗耳此亦視乎南北地氣但賣者必曰雨前細茶若清明前葉尚未萌未必可採採蒸揉焙俱有法詳見茶譜茶之稅始於唐德宗盛於宋元至我朝時珍自謂明朝乃與西番互市易馬遂為朝廷賦稅之助其利溥哉我大清會典所載茶課凡山鄉宜茶之地土人蒔茶為業者無徵惟商賈轉運而售之民者徵其商曰茶課榷茶之法由戶部頒引州縣官暨茶馬司甘肅五司以道府同知兼之批驗茶引所江蘇設大使一人受而布之商商採茶于山及經過關津居積待售於各府州縣運行於邊界土司皆憑引以為信無引冒行者為私茶私茶之禁與私鹽同茶引之頒於各省者江蘇安徽江西浙江湖南湖北陝西甘肅四川雲南貴州歲行三十六萬四千九百四十有九引已行之引由所司照驗截角更頒新引茶課之專入奏銷者陝甘歲徵銀六千二百六十六兩有奇茶一十三萬六千四百八十篦十斤為篦四川歲徵銀五萬九千七十兩有奇商有通負者經理之官論若江蘇安徽浙江所屬茶課由經過關津驗引徵收歸入關稅江西湖北湖南暨貴州仁懷一縣歸入雜稅雲南歸入田賦其他直省不產茶及雖產茶不頒引者皆聽民販運賦歸關市不列茶課陝甘茶商受引於本省市茶於湖南回經河南由陝州照驗出關均不徵課惟行於陝甘有徵其所賦篦茶初制於關外互市以易番馬後停易馬之令所賦篦茶貯庫發售四川茶引行於外州縣者為內引行於沿邊者為邊引行於土司者為土引其賦入不同各酌土俗之宜以定徵輸之等此本朝茶課大略按凡飲古人惟曰羹不專用茶羹者諸飲之通稱不拘肉菜谷果汁皆可為之至唐始尚盧金遂有七碗之詩此後其品漸眾綱目曰茶有雅州之蒙頂石花露芽穀芽建寧之北苑龍團鳳團東川之神泉獸目陝州之碧澗明月夔州之真香邛州之火井思安黔陽之都濡嘉州之峨嵋滬州之納溪玉壘之沙坪荊州之仙人掌湖南之白露長沙之鐵色蘄州之團面壽州之黃芽六安之英山霍山武昌之樊山岳州之巴陵辰州之淑浦衡州之紫筍福州之生芽洪州之白露又井之白毛盧山之雲霧常州之陽羨池州之九華丫山之陽坡袁州之界橋睦州之鳩坑宣州之陽坑金華之舉岩會稽之日鑄皆產茶有名者其他尚多而猥雜更甚蓋茶產處既多其所謂有名者緣貨者巧立名色品茶之書如陸羽之茶經丁謂之北苑茶錄毛文錫之茶譜蔡宗顏之茶對大率皆如筍譜菌譜為清客所矜誇而已耳其性但能去油膩清頭目同川芎蔥白止頭痛濃煎吐風痰而已他無所長而其害則在刮削臟腑消人腹內脂膏嗜茶之人營衛既傷必面無血色枯瘦痿黃積傷既久暗損壽元有茶癖者曾不悟也試觀餚饌中無論豬羊牛肉任十分膘肥遇茶則油膩全無滋味盡失几案油膩用茶洗之則油去如新人乃血肉之軀全賴脂膏充足可勝此消伐乎惟其如此故西北塞外之民日食牛羊飲乳酪非茶不能去肥壅而得其平明之所以開互市增國賦者職是故也中國食稻梁飲酒醴何取乎其消也觀食肉飲乳宜茶之消則平素食厚味肥白嬌嫩之人亦必宜之蓋此等人臟氣多壅故多中風痰厥之病飲以濃茶乃以偏救其偏之法不可不知每見嗜茶成癖者必好食茶葉甚至刻不可離男子猶少婦人極多其人身必多病所不待言且必失財敗事久而不愈必死若晦運將終亦必不食茶葉乃得身家安泰然則茶也者災星厄難之媒也文人之筆如盧仝七碗兩腋生風以為戲談則可耳肯為之誇色誇香誇味作譜作經乎蘇頌圖經本草乃至引毛文錫茶譜謂蒙山中嶺茶得四兩可以成仙直到無稽吃語其入藥自古本草皆不收至蘇恭唐本草陳藏器本草拾遺始載又有神農食經亦載之此乃後人偽造非上古之文也蓋載籍所傳自郭注爾雅以前總無茶字安得神農時即有之乎李笠翁偶寄曰六經無茶字史記前後漢書亦無之始見於陳壽三國志吳志韋曜傳曰韋曜性不飲每宴會孫皓命以荈代酒荈即茶也自唐以後醫方用之者皆只前所列去油垢清頭目吐風痰而已至宋陳承本草別說云同醋煎治泄利已無理不可信楊士瀛醫說又巧立薑茶治痢方謂姜助陽茶助陰一寒一熱調平陰陽昔蘇東坡用治文潞公有效夫蘇文二公誠名士誠貴人而服藥治病不論資格苟藥餌不當恐二豎無知非勢力所能壓也醫書論列諸方多有某帝王某卿相試驗之說竟是遊方術士虛張聲勢哄騙鄉愚之法可鄙可笑且潞公偶然患病偶然服藥正史既所不書稗官野乘又復無有數百年後之醫何自而知而士瀛言之綱目信之尤為不值一笑即使果有其所患必是寒痢治之而愈者得力於姜也設為熱痢而欲借茶之寒茶何曾寒制姜之熱豈非夢夢而今之愚俗雖目不識丁無不知薑茶治痢方者遣至百用百誤而猶圭臬奉之不可解也且茶能令人不睡此亦耗人精血有消無息之驗也李廷飛延壽書曰飲茶宜少不飲尤佳空腹最忌此見理之言但茶不知始自何人欲使舉世不飲實難勸喻惟飲宜少宜清忌多忌濃或以他草本之可煎飲者代之尤妙平時有平時之代法遇一病有一病之代法此非創論爾雅注暨各本草甚多若天渴症及諸熱症發渴者多飲此物病更難愈尤不可不代也獨茶子能治天白蟻其症頭中鳴響如蟲蛀物聲蛀穿唇鼻則死以茶子研末頻吹入鼻中又俗傳茶能解藥夫藥有千百性但補藥忌茶之消其他豈此一物所能盡解然此或古醫制病人少飲之法其意甚佳不必辯也又俗尚陳茶僅隔年或二年止矣乃竟有陳至五七年一二十年者能令人立時失音或暴死蓋凡物過陳者皆有毒愚俗何足以知之也代茶諸品金銀花葉綱目曰諸藤右轉此獨左旋故名左纏藤凌冬不調故名忍冬藤又名鷺鷥藤其花初開色白一二日變黃前後相續則黃白相間故名金銀花處處皆有蔓延籬落間初夏開花其氣芳馥連葉收採曝乾備用花葉與蔓功用如一藥中凡用一切草木之花皆以半開者為上若含苞時氣尚未盈大放後氣又盡泄此花柔細勢不能逐朵摘取故淨花每一斤半開者不及數兩其餘非未成之嫩芯即已過之殘花而俗醫每尚淨花是為不知物理且不知葉與蔓性雖稍有不同解毒則一也別錄曰治寒熱身腫久服輕身益壽藥性本草曰治腹中脹滿上氣喘下澼泄本草拾遺曰濃煎多服解熱毒血痢綱目曰治屍疰鬼擊一切風濕及癰疽疔瘡百般惡毒屍疰見下鬼擊謂人忽然狂言遍身青紫如被刑杖用此藤濃煎酒服取醉立愈又治百般腫毒同甘草濃煎酒服水煎則無力常令醺醺勿使間斷以愈為度能解百藥不能解之惡毒為外科第一神方肘後方治五種屍注同疰一飛屍遊走皮膚洞穿臟腑每發刺痛變動不常二遁屍附骨入肉攻鑿血脈每見死人聞哀哭輒發三風屍浸淫四末不知痛之所在每遇風雪則發四沉屍纏結臟腑沖引心脅絞痛每遇寒冷則發五屍注舉身沉重精神錯亂常覺昏廢每遇節氣則發並是身中屍鬼勾引外邪為崇宜用忍冬莖葉銼數斛煎取汁去渣熬濃和溫酒下以醉以度每日三四服選奇方曰惡瘡不愈用忍冬藤葉一大把搗爛雄黃五分水二升瓦罐煎紙封七重穿一孔以瘡對孔熏之待黃水流出用生肌藥取效衛生易簡方曰腳氣痛引筋骨一時卒不得藥取忍冬藤花葉無花亦可煎酒熱服不計多少如有藥用羌活獨活懷斥膝生首烏各五錢忍冬藤葉一兩尤效凡此皆因病用若平時代茶氣味芳甘飲至二三年不斷其人必不患天行瘟疫必不患時毒熱痢必不患癰疽疔腫必不患腳氣腫滿若男女俱飲又能戒食薑椒辣枚等惡物所生子女必不厄於痘瘡無如為茶葉所誤不暇用此且為茶經茶錄及清客所誤不屑用此陶隱居曰忍冬既能治病又可長年且極易得人多不用而更求其難得者貴遠賤近庸人之見大抵如斯誠哉是言也枸杞苗葉子綱目曰爾雅作枸別錄作枸忌詩小雅集於苞杞陸疏曰一名苦杞以其苗葉作蔬味微苦也開寶本草曰枸杞無刺有刺者溲疏也本草衍義曰枸杞一名枸棘未有無刺者但樹小刺多大則刺少溲疏另是一物子類枸杞枝葉不類所辨良是苗葉根皮子俱可代茶常飲久而不輟必無皮膚骨節諸風及虛勞吐血目疾癰疽消渴等病夫婦俱飲其子女亦必無之但苗葉不滑子多膏則滑大便不結者忌之此與忍冬俱易栽蒔繁衍五六月葉盛時援取曝乾用側柏葉寇宗奭本草衍義曰予官陝西登山望柏見千萬株一一皆西指綱目曰凡木向陽柏獨指西蓋陰木而有貞德者故其性涼能入陰分而治吐血衄血痢血崩中赤白熱痹出別錄治歷節疼痛止尿血出藥性本草作湯常服殺五臟屍蟲益人出圖經本草按柏性有三異凡木向陽而柏向陰一也凡氣香者必入氣分柏香而反入血二也凡味辛者性必熱柏辛而反涼三也性極堅貞故能耐久吾饒城北一株大可五六人合抱高六七丈團團如蓋故老言乃元明以前物考杜工部古柏行所謂孔明廟前有老柏柯如青銅根如石霜皮溜雨四十圍黛色參天二千尺則元明以前之說不誣也入藥治病大率皆涼血之效而氣香味辛得天地之正性故又能治諸風諸痹煎汁代茶久服必無上文所列諸病即虛勞吐血痔漏腸風二症有父子祖孫相傳世世不絕者服此不輟必斷其根且能使筋骨壯健耳目聰明令人高登上壽至老不衰其木雖難長有子可種山場寬廣之家雖欲植千萬株可唾手而辦惜皆為茶葉所誤舉世無一人用之也其子之性尤佳用須自採肆中難得真者本經曰治驚悸善補心血故也益氣除風濕安五臟久服令人潤澤美色有油故也耳目聰明不飢不老別錄曰疔恍惚虛損歷節及腰中重病益血止汗此乃止汗第一藥汗為心液故也藥性本草曰治頭風腰腎中冷膀胱冷濃宿水清濁不分尿如米泔及膏淋之類故曰濃柏性涼何以反能治冷氣辛味香故也興陽道益壽祛百邪鬼魅小兒驚癇綱目曰養心血潤腎燥安魂定魄益智寧神凡心虛血虛而燥者用以代茶比葉尤妙松葉載籍所傳皆松柏並舉詩曰祖徠之松新甫之柏禮曰如松柏之有心也論語曰歲寒然後知松柏之後調也實則松不抵柏遠甚柏樹高大任狂風不能拔折鬆則易拔易折柏雖老無枯枝敗葉鬆則常有柏材鋸板滑膩如鏡鬆則砢礧多節甚不美觀柏歷數百年絕無蟲蠹鬆則易生毛蟲每發則遍山皆是食葉盡則氣無所泄而樹死明史崇禎十六年癸末南京孝陵松樹為毛蟲所食望之如赭樹盡枯死析材作屋作棺白蟻不蛀松材稍遇濕氣即為招蟻之媒是松種種不如柏也獨其葉其花其皮其節其脂入藥治病則與柏各有所長難分軒輊葉煎汁代茶可治風濕諸瘡生毛髮出別錄療惡疾出藥總訣謂大風癩疾治一切風瘡出日華本草去風痛腳痹殺米蟲人腹中有此蟲即好食生米數年必死出綱目千金方治中風口喎松葉一斤搗爛酒一斗浸二日微火溫一夜初服半升漸至一升汗出即愈又治中風三年如此其久宜和以養血之藥如地黃首烏等又治歷節風痛腳氣風痹大風癩瘡方並同上其大風風痹二症非數十百斤不效少則無功其花上黃粉可摻痘瘡抓破潰爛其皮節與脂所主無非風疾而松脂研細末火煅過退火氣則可研和生銅末可治金瘡血出不止乾摻之出經驗方其節用有油者凡用皮葉俱宜有油者其無油者謂之樅入藥無力爾雅曰樅松葉柏身檜柏葉松身酒煎服可治骨節痛風炒微焦乘熱沖熱酒服可治陰毒腹痛出集簡方其層疊厚皮可治堆皮瘡揭去一層又生一層或痛或癢總不收口燒存性研末濕則乾摻干則陳麻油調搽出得效方若用以代茶其味苦而澀初頗難飲久則稍可相安凡有風癩諸病皆系惡疾非多服久服不能取效水煎代茶則效遲酒煎常服則效速秦時毛女食松葉成仙之說雖未必其然而利骨節長毛髮祛風愈病則確乎有驗慎毋畏難而輟飲也五加根葉綱目曰一枝五葉交加故名五加丹鉛錄作五佳炮炙論作五花本經名豺漆別錄名豺節不知何義根皮酒煎入藥療痿躄小兒三歲不能行出本經主男子陰痿囊下濕癢小便餘瀝女人陰癢腰脊痛兩腳疼痹風弱五緩堅筋骨久服輕身耐老出別錄破逐惡風四肢不遂腰腳痠軟濕痹疼痛出藥性本草明目治中風骨節攣急五勞七傷出日華本草風痹四肢拘攣出圖經本草並煎酒久服作飯代茶可免諸病所不待言耐老輕身的的不妄莖葉功用相同槐枝葉花實俱可入藥俱可代茶性相去不遠綱目曰古作周禮外朝之法左九棘孤卿大夫位焉群士在其後右九棘公侯伯子男位焉群吏在其後面三槐三公位焉州長眾庶在其後吳澄注曰槐懷也懷來遠人也春秋天命苞曰槐歸也古者樹槐聽訟其下使情歸實也爾雅曰槐葉晝聶合也宵炕開也曰寧宮神農本經曰槐子主五內邪熱止涎唾中州有熱則胃緩不能約束津液故多涎唾槐子治之若無熱病而多涎唾乃脾虛不能收攝食牛肉則愈勿誤用此療婦人子臟急痛臍下痛連陰戶者是若不連陰戶乃小腹痛非子宮也當溫藥理其氣勿誤用此別錄曰久服明目益氣血頭不白治五痔瘡痿其枝煎湯加鹽少許可洗陰囊濕癢煎酒療大風痿痹宜久服根白皮煎湯頻呷治爛瘡喉痹寒熱藥性本草曰治口齒風疳䘌血多服取效根皮不能多得葉子但可本草拾遺曰殺蟲去風明目除熱淚冷淚勿用頭腦心胸間熱風煩悶風眩欲倒吐涎如醉瀁瀁如在車船之上日華本草曰花治五痔腸風皮膚風熱赤白久痢葉治小兒驚癇壯熱非壯熱者勿用根皮煎湯浸洗五痔一切惡瘡婦人牝門痛癢濃煎膏塗消癰腫生肌止痛本草衍義曰疏導風熱綱目曰花炒香頻嚼治肺熱失音及喉痹圖經本草曰青枝燒熱揩牙止風熱及蟲痛保壽堂方曰凡大癰大毒將發覺有頭運眼花口乾舌苦心驚背熱四肢麻木即是其候說症詳確習醫者宜謹記急用槐子一大合炒褐色熱酒一碗沃之略煎乘熱飲一汗即愈未愈速速再作神方也但須及早遲至二三日則不能散矣集驗方曰咯血吐血槐花炒研每服三錢糯米飲下舌衄出血如線不止槐花研末摻之齒衄亦可篋中秘密方曰小便尿血槐花炒鬱金煨各一兩研末每服二三錢豆豉湯下按槐治病之功如此總不外乎退熱疏風涼血解毒而上而熱在喉舌下而熱在大腸尤為專用凡有諸病人代茶多飲功效如神惟性能墮胎故催生方中亦用之妊婦不宜飲也麥門冬汁氣味和平功專補益故仲景用治傷寒解後虛羸少氣及脈代結歇至也心動悸別錄謂能治胃絡脈絕質潤多膏故巢氏病源千金外臺用治勞熱口乾燥渴性近乎涼故拾遺謂能止煩熱善入肺故日華本草謂能止熱嗽定肺痿作飲代茶於一切虛熱喘嗽呼吸短氣脈弱神倦及熱病後最宜濃煎多飲平人暑月代茶亦佳注夏人同五味子甘草煎汁長飲尤妙綱目曰本作麥須也省筆作門此草之根似麥粒而有須又凌冬不調故名天門冬汁嘉祐本草曰爾雅云蘼虋冬注云門冬也一名滿冬抱朴子名顛棘或名地門冬或名筵門冬綱目曰爾雅云髦顛棘或作天棘乃門冬其蘼乃營實之苗而爾雅指為門冬蓋古書之訛也其根滋潤多脂味甘微苦能潤燥滋陰清金降火別錄云保定肺氣蒙簽云潤腎燥清熱痰藥性本草云治肺氣咳逆喘急肺癰肺痿本經云除諸風濕痹強骨髓天門冬善治風痹之血虛枯燥音不能治濕按天門冬可入藥可代茶可作果然性平而緩少則無功凡肺腎二家咳喘風痹之症及老人痰火久咳者並宜長久服惟肺腎有寒及大便滑者忌之地黃汁爾雅曰芋又名芭本經曰地髓河南懷慶者佳為填精補血之首又為活血行血之良其代茶也於一切腎虛血虛之近燥涸者近熱者跌撲損傷癰疽目疾及婦人崩帶胎產並宜多飲惟中州有濕者忌之時後方曰跌撲折傷筋骨地黃搗爛醋炒乘熱厚敷日二次外以杉木皮緊扎挑燈集異曰有人墜馬折傷手足痛甚醫云宜用生龜和藥搗敷龜已得矣但藥未備未搗夜見夢曰勿害我命我有奇方奉告用生地黃一斤生薑四兩酒糟一斤同搗炒熱罨之冷即易用之果愈聖濟總錄曰物傷睛突但目系未斷者搗地黃綿裹敷此條不列補方者以地黃填精補血主病極多難拘成法故雖有佳方一概不錄其入藥也古名乾地黃即肆中所售之生地入藥必須煎煮即是熟地如欲生用須臨時掘取不曝不見火煎冷水搗汁故別錄云性大寒宋仁宗病內熱求生地黃不得即不用以其非掘取之時不許有司索之百姓事見脫脫宋史若肆中乾者可稱生地則隨時皆有有何難得俗醫不知古方之用生地乃是不見火煎之名而以乾地黃入湯煎煮謬云此乃生地大寒不可輕服不學面牆聾瞽之談誤人病症考神農本經只有乾地黃其末曰生者尤良名醫別錄有生干二地黃生者則曰大寒治婦人崩中血不止產後血上薄心胎動下血墮墜踠折瘀血流血衄血吐血又曰皆搗飲之言不可見火煎也所主諸病一取其寒一取其生性走而不寧於乾者則曰主男子五勞七傷女子傷中胞漏下血補五臟內傷不足通血脈益氣力利耳目是明明以既經煎煮則溫平而補故無一語道及寒字此即今醫所用之生地請細思之其書具在有目者所共見也此二書乃藥性之開天鼻祖後人只宜詳考深玩切勿妄肆譏評以招端木氏不知量之責也自此而後作本草者五十餘家皆遵用生干二味並無蒸熟入藥之法其書亦具在可考而知也至宋時添造一種熟地黃始於太平惠民和劑局方寇宗奭首先收入本草衍義金之張元素乃云臍下痛非熟地黃不能除諸家之言生地似乎比芩連更寒元素之言熟地竟至與桂附同熱距知地黃氣味甘平縱寒不肅殺本為陰藥縱溫不燥烈況臍下痛果屬腎臟陰寒乃地氣加天之漸陽藥中倘雜以歸地能使桂附不能成功豈可用以為治此理惟喻嘉言先生知之寓意草中言之悉矣元素庸下之資何能夢見而元之李杲朱震亨王好古戴元禮輩群然附合至明李時珍載之本草綱目薛己張介賓等遂紛紛議論有謂宜用酒者有謂宜用水者有謂宜九蒸九曝者有謂宜拌砂仁末者只有謂不宜者皆未見本經別錄之文已盡地黃之用徒為此紛呶以誤世也讀書不能詳考深思雖見亦如未見蓋地黃蒸熟則滯膈傷中無論治病何如先已不宜於脾胃今之常知六味八味丸為補益者至晚年成中風偏廢或水腫氣腫不知凡幾烏知此物之為害也追原禍本總因畏生地之寒故為輾轉遷就遂生如許葛藤不知乾者煎汁即是熟地故本經別之曰生者尤良生地之寒不可煎煮故別錄申之曰皆搗飲之讀宋以後書人烏足以知此甘草汁其味純甘而厚性極和平能和百種峻厲之藥解一切急迫難解之毒故別錄稱為國老凡病內熱煩渴腹中急痛虛羸驚悸癰疽惡尰肺癰肺痿咽喉熱痛等症均為聖藥並宜濃煎汁代茶多飲腹痛加酒炒白芍藥驚悸加麥門冬咽痛見下直指方治熱瘡煩渴甘草瓜蔞根等分濃煎汁服即傷寒熱病煩渴此方亦妙蓋病而至於煩渴其熱已深徒恃每日一服錙銖之藥萬難勝病幸而能飲即是挽回津液之機乃又以茶誤事愈加消伐不死奚待故此方代茶多飲即是救命仙丹傷寒論治汗下過度脈結代心動悸炙甘草湯雖用人參薑桂麥冬生地麻仁阿膠大棗酒諸品而以甘草名方此乃千古補方之祖蓋首重甘草故全論言病但涉於虛所主方必定重用甘草千金方用此治諸虛脈微欲絕更名復脈湯傷寒類要治此專用甘草一味水煎常服皆得仲景遺意後世不知只以人參為補是未見古人用補之法也又治少陰咽痛亦用甘草一味蜜水炙此亦千古咽喉百方之祖或加桔梗半之二方伐茶多飲無不愈者熱甚加牛蒡子再甚加黃連寒痛加紫蘇葉薄荷葉聖濟總錄治舌腫塞口不急治殺人甘草煎濃湯漱飲愈多愈妙千金方解誤服熱藥毒如川烏草烏附子薑椒巴豆等甘草黑豆或綠豆濃煎汁多飲百一選方解初生胎毒甘草濃汁綿裹指蘸抹兒口中無綿新青布紅布俱可一日數次月內常常用之令兒智慧無病出痘稀少若三四歲兒多生熱瘡口氣腥臭小便常赤者未經出痘即是痘殤之先兆既經出痘又是將來虛勞夭折之先兆速宜絕云茶湯專以甘草代之此物味甘小兒喜歡外科精要治一切癰疽甘草熬膏用酒或白湯點下勿計次數外科宜酒不如即用酒煎甘草或加金銀花尤妙水煎則無力十分不能飲者酒水各半煎之李迅癰疽方治陰下懸癰大甘草三兩水蘸濕文武火慢慢炙之炙即是焙炙至中心潤透切片酒煎汁一日服盡明日再作此方不能速效服至二十餘日必消盡而愈乃外科第一解危救急之方咎殷產寶方治產難交骨不開大甘草五寸柞木一尺銼碎新汲水三升半入砂鍋內紙封三重文武火煮取一升半每飲一大杯至三四杯必下按柞木在在有之高僅數尺或丈餘葉小有細齒光滑而韌五月開細白花不結予枝丫及葉俱有刺李樓奇方治湯火傷的甘草煎蜜塗之便用單方曰暑月辛苦力作或負重遠行常帶甘草不時以數片含口中咽汁則口不渴少飲茶水必不中賜而死救命方也侍候官府辦公伕役尤宜知此宜廣傳按甘草能愈諸病固已無病之人暑月常用代茶可免天行熱病癰疽瘡毒三秋熱痢咽喉熱痛等惡疾但素患中滿及腹內有蟲者嘔者忌之蘆根汁綱目曰毛萇詩疏云葦之初生曰葭未秀曰蘆長成曰葦圖經本草曰其莖都似竹而葉抱莖生爾雅注云葭即蘆也葦即蘆之長成者菼薍似葦而小江蘇呼為烏或謂之䱉即荻也此非蕭荻之獲爾雅邢疏曰蕭荻乃牛尾蒿即郊特牲所謂蕭合膻香者是也至秋老又謂之萑左傳子太叔為政盜取人於萑苻之澤蒹似萑而細長此亦荻類爾雅曰蒹其花皆名芳唐本草曰花名蓬其萌皆名可食如茭筍其根似竹根而節疏入藥代茶味甘平純正為退熱除煩止渴止嘔熱嘔之上藥解一切魚鱉蝦蟹肉毒之神丹肘後方治熱病嘔噦蘆根椎汁頻飲勿輟若以童子小便煎服其效尤速乾嘔為嘔有物為吐唐以前醫書從不混稱至宋以後始無區別噦即呃逆也內經難經傷寒論金匱東陽深師千金外臺諸書皆千百見皆稱噦不稱呃逆金元時始創呃逆之名而以噦為乾嘔此肘後方乃晉人葛稚川所著其嘔噦二字當從前解金匱治五噎吐逆即上方千金方治霍亂煩悶蘆根麥門冬煎湯常飲又肘後治傷寒解後食復勞復外臺治骨蒸肺痿別錄治消渴客熱唐本草治傷寒內熱腹中虛熱不能下食藥性本草治大熱噎噦此吵亦即是呃逆不可誤作乾嘔日華本草治時行熱病煩渴熱瀉熱痢孕中胎熱食鑑本草治小便熱閉梅師方治食肉中毒不拘馬牛羊犬雞雉其症心下堅硬腹脹口乾發熱妄語吐血便血千金方治食河豚站鱯蝦蟹等毒並用蘆根煮汁不計多少頻飲之此物味甘近補而不助邪性涼善清而不傷胃無病之人暑月常用代茶暑熱瘧痢諸病可以一概消除也蘆葉陳者研末可治癰疽久爛蔥葉花椒煎湯洗淨以末摻之甚效出乾坤秘韞燒灰可治禿瘡鹽湯洗淨摻之出聖濟總錄同白炭灰蘆灰十之八炭灰十之二開水淋汁瓦罐煎減十之八可塗爛瘡蝕惡肉蝕盡然後用生肌藥但其性猛厲不可過用出肘後方花能破血凡吐血衄血血崩但色帶紫黑者無不宜之方用蘆花槐花白雞冠花紅花茅花一名芭茅其葉能割人手等分水煎服但蘆花茅花開不同時得一味倍其數即有效出萬表積善堂方土茯苓汁綱目曰俗名冷飯糰又名山地慄根形似萆薢故又名土萆薢拾遺名草禹餘糧處處皆有蔓生莖有細點葉不對節厚滑如瑞香葉根連綴而生肉軟味甘可生啖小兒喜食之有赤白二種白者良性能健脾胃強筋骨去風濕利關節止泄瀉治拘攣骨痛惡瘡癰疽解汞粉銀硃毒近有好淫之人多生梅瘡又名黴瘡粵中尤甚醫用輕粉銀硃劫劑五七日即愈毒氣收閉竄入經絡之間發此攣痛為癰毒疳漏輕者必成廢人重者即死惟此物或單用或和皂角子五加皮金銀花苦參煎汁多飲能飲者酒煎服不能飲者水煎和酒服常令醺醺勿使間斷未服輕粉者半月已服輕粉者一月可愈古方有土茯苓一兩薏苡仁金銀花防風木瓜木通白蘚皮各三錢皂角子炒研四錢甘草當歸各五錢酒煎一日三服切忌飲茶及牛羊雞鵝魚鱉蝦蟹諸禽卵燒酒房室救命金丹也蓋其性平味甘能解大毒不獨梅瘡一切癰疽疔毒結核癭瘤用以代茶或煎酒皆有奇效但須多飲少則無功耳苧根皮葉汁綱目曰苧可績紵故名種之歲可三刈宿根自生一種不須再種亦有野生者其根皮治心膈間熱漏胎下血體厚之人孕中下血宜用苧根水煎頻飲或和生地黃芩尤佳此血熱也若平素體薄而胎漏為衝任虛當補其氣血如耆朮歸地阿膠杜仲之類勿誤用此產前後心煩天行熱病大煩大渴誤服熱藥毒氣入心令人瞀冒癲狂又治血熱胎動不論下血與否出日華本草又治小便血淋出聖惠方又通治諸般淋疾出斗門方並煮汁代茶頻飲之又治癰疽發背初起未成苧根和醋搗極爛敷日夜數易腫消為度出圖經本草又治肛門熱腫及臟熱脫肛苧根搗爛坐之出瀕湖集簡方又治咽喉骨哽百方不下苧根搗爛搓丸如龍眼大極力吞下以湯送之出醫方大成苧麻可治喉痹乳蛾燒煙張口盡力吸入喉內皮破血出立愈又治風虛腰痛新苧麻酒潤濕甑內蒸之乘熱緊束腰間並出便用單方葉功專散血行一切敗血綱目曰五月五日採和石灰搗作團遇金瘡跌撲血出者刮末敷立止且易結痂永類鈐方曰凡跌撲傷瘀血在腹內久不能行即死苧葉蘇葉擂爛流水絞汁服不如酒血皆化水而出秋冬以根代之又治熱痢赤白陰乾為末冷水服二錢戒食熱物的出護命方又治蛇咬嫩葉搗汁和酒服渣敷之出摘元方按苧葉雖能破血而性味甘平故饑年可以代糧凡有血疾常用代茶皆有益無損也藍葉汁綱目曰埤雅云月令仲夏令民無刈藍以染鄭康成以為恐傷生養之氣是劉藍先王有禁故字從監刈藍何以獨傷生養之氣此理殆不可曉至於字從監或六書諧聲之理解為監禁未免牽強爾雅曰馬藍本經收藍實入藥列為上品而藍有五種蓼藍子葉皆如蓼花淺紅色菘藍葉如白菘馬藍葉如苦蕒即爾雅注之大葉藍一名板藍花子並如蓼藍吳藍長莖如蒿葉如槐而花色白本藍長莖如決明花淡紅葉亦如槐本經所用藍實乃蓼藍之子云能解百毒作丸服殺蠱蚑疰鬼鬼病有此三種蠱即云貴兩廣人家所畜之蠱蚑亦作魃小兒鬼也專害人家小兒疰見魚蟲類鮫魚條藥性本草云能填骨髓明耳目利臟腑通關節治經絡中結氣使人健而少睡唐本草云療腫毒而諸藍形狀既各不侔則其功用自有微別然可以作澱則同一澱或作澱又作靛味苦而甘性寒則同解百種惡藥毒如蛇虺蜈松斑蝥蠍誤食則搗汁內服被螫則外敷退一切大熱於天行狂熱班疹煩渴尤驗行一切敗血於跌撲金瘡血悶欲死及產後血暈尤驗亦無不同則諸神通用自無不可也是則先王之世禁之者此以時當仲夏炎熇正盛毒蟲正多意在留有用之物以救民疾觀以染二字可見言不當為染色之小用也不然長養之氣萬物所共何刈他草不禁獨禁藍乎凡有上文所列諸病及遊風熱毒熱眼赤腫者宜代茶久飲之又治陰陽易病傷寒初愈交合餘熱入里必病手足拘攣小腹急熱頭重眼花當汗之此症滿四日則死死後必舌出口外數寸藍葉一兩雄鼠屎兩頭尖者是三七枚水煎熱服溫覆取汗仲景原有燒褌散取所交女子輝襠當陰處方五寸燒灰水服取汗女病用所交男子褌如服之不愈急用此方又治驚癇發熱藍葉煎汗調牛黃未三五分服不發熱者勿用並出聖惠方又治熱藥過劑煩悶欲死搗藍汁頻服數升出肘後方又治痘瘡出不透穩熱不退板蘭根或葉一兩甘草三錢煎汁入溫酒一杯雞冠血數點頻服出錢氏小兒方其葉入窖入罨即為藍靛用以染布靛缸面上浮泡名靛花干之為青黛但靛內有石灰內服不宜過多外用及殺蟲方中其力更大蓋石灰蟲所最畏也聖惠方治時行發熱煩躁藍靛一杯新汲水一杯和服集簡方治天泡熱瘡及丹毒藍靛敷肘後方治毒箭傷人靛花和水飲並敷無則以新染藍布未經入水者熱湯泡汁代之千金方治口鼻急疳數日即蝕盡肌肉而死名走馬疳藍靛敷日夜十餘上內服三黃解毒湯又治腹中鱉瘕按之有頭足能走動靛花汁溫飲一大杯日二三次聖濟總錄治頭瘡爛癢染缸內久罨臭靛頻塗普濟方治誤吞水蛭青靛和水飲即瀉出摘元方治產後熱入血室發狂四物湯和靛水服華佗中藏經治肺熱咳嗽咯血干靛花杏仁牡蠣粉各一兩研勻黃蠟化和作三十餅每以一餅用於柿半枚夾定濕紙裹煨香嚼食粥飲下活人書治熱病發狂靛花和水服古今錄驗治諸毒蟲傷靛花末雄黃末減半毒輕則津唾調搽重則內服外搽奇疾方治應聲蟲腹中有蟲隨人言語作聲靛花溫飲不計次數此方較舊服雷丸方更驗也又解鱉毒靛花水頻飲車前葉實汁能清水道之熱治淋閉利小便分清濁止水泄解肝熱明目治熱眼久痛雲翳等病又治產難出詩經註疏凡有以上諸病及素患難產人均宜代茶多飲有葉用葉無葉用子桑葉汁詳見果類桑椹下性能逐水利濕損人津液中病即止不宜多飲木槿花葉皮汁綱目曰爾雅云椴木槿櫬木槿郭注云別二名也或呼曰及亦曰王蒸白曰椴赤日櫬詩謂之舜花其花顏色嬌豔朝開暮落性涼能退熱治腸風下血赤白痢及血痢久而不愈痢後熱渴風熱癮疹大腸燥結利小便消瘡腫令人得睡內熱則不睡木槿善清內熱若不睡而大便燥者渴者用之尤驗凡有諸病人宜代茶多飲又可洗痔瘡腫痛出直指方皮葉俱可熱瀉脫江洗後以白礬五倍子滑石末摻或用多年陳脂麻油調大黃末搽出救急方其花七月始開紅者是單瓣五出白者千瓣一種枝葉全似而花紅千瓣四月即花霜時方止名扶桑又名佛桑又名朱槿取其花或葉同木芙蓉牛蒡葉無則以生大黃末代之和蜜少許同搗可敷癰腫熱癤見綱目脂麻汁漢時始自胡地入中國故又名胡麻葉名青蘘見菜類莖名麻一名麻稭有黑白二類四稜六八稜諸種花有紫白二色綱目以為隨土地之肥瘠而變非也種各不同也又有一莖獨上者有分枝四散者綱目以為隨苗之稀稠而變亦非也白者獨上黑者分枝也證類本草曰俗傳胡麻須夫婦同種則茂故唐人詩曰蓬髩荊釵世所稀布裙猶是嫁時衣胡麻好種無人種合是歸時底不歸性能解毒又去風不拘黑白又極多油故能潤燥上治乾咳下潤大腸若咳而痰清及大便溏滑者忌之而食性本草云初食則滑久食則否誤也食鑑本草曰生者性涼而解毒炒者性熱而發病蒸者性溫而補益然入藥可生用或蒸用陶隱居曰蒸不熟令人發落炮炙論曰宜酒拌濕從已至亥為率點茶或作果餡或下酒下飯均須炒不炒不香也大抵炒者必熱一定之理而攤晾去火氣或隔一二日方食亦不甚熱食療本草曰生食能滑腸胃去浮風潤肌膚所以能去風者總因其潤也食後生啖一合宜研極細無一粒完者方可凡病人食脂麻俱宜如此此與諸米正相反米完者作粥飯則益人碾粉作粟糕則困脾胃脂麻碾粉則無害完者則敗脾作瀉乳母之子多食之孩子永不生病不生癰疽疔腫及皮膚諸風病也又生兒屢患痘殤者其母尤宜多食之生嚼敷瘡癤又云久食抽人肌肉脾胃燥熱之人食之則解毒潤肌肉無燥熱或中州有濕之人久食則滑泄敗脾胃故云抽肌肉者令人瘦也其汁停久者飲之發霍亂炒研點茶閩廣最尚客至無此不為恭敬日華本草曰潤養肺氣乾咳無痰及老人痰火久嗽此茶最妙延壽書曰病風人久食則步履端正語言不蹇經驗方曰婦人乳少鹽炒脂麻多食三因方曰誤吞麥芒在咽曰豆賊在喉曰屍咽脂麻茶常飲外臺方曰小兒初生預備紅色或青色綢絹未見水者甘草汁蘸濕兒出胎時急用此絹裹指入兒口中拭去汙血生嚼脂麻同淡橄欖肉搗爛絹包與兒吮之解下胎毒令兒無病可免痘瘡湯火傷灼生研脂麻塗肘後治婦人陰癢生瘡同脂麻之用如此而服食家有云服之不飢可以辟穀者有云長生不死者皆荒誕之言也而本經亦有補虛羸傷中益氣填腦髓久服輕身不老之說疑其另是一物蓋本經所說名巨勝後人云即胡麻若果即胡麻本經乃上古之文漢時始入中國之說又當作何解乎小麥汁煮麥熟為度淋家汗家渴家宜代茶多飲大麥汁腫脹病宜代茶多飲亦治淋治渴黑豆汁能解毒凡誤服毒藥及癰疽等毒同甘草煎汁代茶毒消即止過多能敗脾作瀉余見穀類綠豆汁扁豆汁粳米汁糯米汁粟米汁秫米汁見穀類諸飲諸泔條下紫蘇葉汁其味辛故能發表氣香故能理氣色紫故能調血凡肺寒咳嗽胸膈脹滿痰氣喘急及婦人氣滯血中脹滿疼痛胎前產後一切氣血不調之症均宜代茶飲發散肺寒宜同薑宜同薑蔥煎汁綱目曰同橘皮砂仁則行氣安胎此三味乃治胎氣作脹若欲安胎宜同歸地阿膠杜仲等同藿香烏藥則溫中止痛此亦僅能理氣若欲溫中宜同薑桂砂仁白蔻等同麻黃香附則發汗解肌麻黃固能發汗香附亦僅理氣若欲解肌宜同白芷葛根薑蔥等同木瓜厚朴則散濕解暑治霍亂腳氣此四病非紫蘇所能治濕宜木瓜蒼朮暑宜利水分消霍亂宜安中理氣腳氣宜祛風勝濕同川芎當歸則和血散血同桔梗枳殼則利膈寬腸同杏仁萊菔子則消痰定喘此三語確當肘後方曰傷寒氣喘不止紫蘇葉煎汁稍稍飲之霍亂脹滿不得吐下生紫蘇葉搗汁飲無則以乾者煎汁加陳皮枳殼亦治痢疾脹痛永類鈴方曰金瘡跌撲血出不止紫蘇葉搗敷無則以乾者研末摻必效方曰同生薑半夏治咽喉寒痛同桔梗牛蒡子治咽喉熱痛千金方治瘋狗蛇虺咬傷紫蘇葉嚼封之同生荊芥自嚼尤佳一日十餘易金匱要略曰食蟹中毒紫蘇煎汁二升頻服一般魚蝦毒俱可解外科精義曰懸癰潰爛紫蘇搗封雖腎囊全潰腎子空懸者亦可收功紫蘇葉皺而色紫似人之腎囊此醫家用形之理也凡此皆調氣調血之效然氣味俱厚能耗人真氣凡作飲代茶病去即止不宜久服綱目曰散風寒調和血氣宜用葉清利上下潤燥定喘宜用子至於藥性本草謂煮粥長食令人肥白身香日華本草謂補虛勞肥健人皆誤矣又不可同鯉魚食薄荷汁綱目曰食性本草作菝楊子云甘泉賦作茇萿呂忱字林作茇䒷千金方作番荷番古鄱字雖處處皆有蘇產者特良藥中非蘇產者勿用其味甚辛而性反涼不惟不助熱轉能散熱暑熱症之宜汗解者時行陰陽二毒頭痛如劈者及頭腦風熱舌胎語春入藥代茶均不可少又為口齒咽喉聖藥同甘草煎汁代茶然性專於散未免耗氣不可多飲藥性本草曰久病新愈食之令人虛汗不止虛弱人久食發消渴外臺方凡浴頭面水入耳致濕癢不已鮮薄荷汁滴入即愈無鮮者用干藥研末吹之萊菔汁綱目曰爾雅曰突蘆葩邢疏曰紫花菘俗名溫菘大者為雹突吾鄉於諸物之大者皆曰雹頭蓋本諸此又名蘆菔廣韻曰魯人名秦人名蘿蔔農書曰四時可種春生者小名破地錐夏曰夏生秋曰蘿卡冬日土酥圖經曰有大小二種小者重一二斤山東河朔大者可至一秤有長圓二類紅白二色其紅者皮紅肉白色如握丹然味短肉硬不堪啖漢書注曰南人呼為蘿胸埤雅曰萊菔性能溫中利氣快膈寬腸生辛而升食則噯氣熟甘而降食則泄氣大抵此物熟食甘多辛少故同豬肉煮最宜又解小麥毒消豆腐積延壽書云解豆腐毒非也本草會編云消豆腐積則是豆腐醃熏乾硬及肆中所售腐乾皆難消化但煮萊菔隨意食生者亦可然味雖甘而紋形如車毅老則中空似木通防已故性主行而不主補藥中原有用形之理木通防已惟中空故能行上下走經絡唐本草謂其肥健人日華子謂其治勞嗽皆非也而朱震亨謬云屬土有金與水此六字實實費解煮食過多往往停滯成溢飲夫消耗過甚成中虛則有之豈反停滯乎古語云上床蘿卡下床姜正取其消食也在震亨開口必欲扯入痰字故捏造溢飲等字乃醫家之邪魔外道切勿信之其奈後世愚夫惑於其說名之曰土人參而凡一切氣滯脹滿之病畏不敢食可笑可怪楊文公談苑云種芋三十畝可省米三十斛種蘿卡三十畝計益米三十斛可知此物果能消也生食止消渴除痰癖開胸利膈治噤口痢杏云治痢數十年不論噤口與否必用生萊菔搗汁和藥無則以干萊菔絲煎汁代茶其譁口者生萊菔汁生苦蕒汁和熱水服往往得效熱甚者加梨汁胃口不納者略加熟薤汁外用大蒜敷足心或田螺敷臍下無則以干萊菔絲煮汁多飲獲效者不止十人之九又普濟方治痢疾裡急後重及諸滯脹痛痢後腸痛並用生萊菔汁和煉蜜飲又治喉痹腫痛和皂角末少許服吐之涉湖方治食物作酸生食萊菔或梗葉俱可又治滿口爛瘡生萊菔汁頻漱取涎吐之普濟方治喉痹脹痛生萊菔汁同牙皂末服取吐摘元方治大腸脫肛腸中有滯氣重墜服升補收澀藥不效者生萊菔每日搗敷臍中折肱漫錄治翻花諸痔萊菔煎湯每日洗急救方解中煤炭煙毒搗汁灌移向風吹即活如聖方治偏正頭痛仰臥凳上以鼻孔向天萊菔汁滴鼻中凡中氣虛弱人勿生食熟者亦不宜多其醬藏糟藏及隔年蘿卡絲性味平和百病不和百病不忌惟服地黃人忌食子治肺喘咳嗽行氣消腫生研末溫水調服二三錢能湧吐凡傷寒熱在膈上反復顛倒心中懊憹即梔子症及卒中風痰不省人事攪腸痧痛上下不通諸危急症並宜用之若服後如人行半里不吐宜再服或用雞翅毛探之張景岳曰此物能湧吐又能行氣凡停痰滯飲吐之不盡者必下行腸胃而去其功殆勝於瓜蒂藜蘆誠確論也又凡諸般食物不消莫如以此吐之較消導方更捷更穩又梔子症用此莫如即以梔子豉湯調之又折肱漫錄云有僕婦患小便不通諸藥無效一醫以白蘿卡子炒香白湯服數錢立通此亦理之可信者也以上用萊菔子諸方治痰氣宜炒湧吐宜生芋汁綱目曰史記卓文君曰南山之下野有蹲鴟至死不飢注曰芋也一名土芝其大者後漢書名芋渠又名芋魁別錄曰寬腸胃充肌膚唐本草曰冷啖或冷飲其汁療煩熱止熱渴拾遺曰久食令人肥白開胃通腸閉產婦食之破瘀血飲汁止血渴產後下血過多血虛發熱而渴大便難無外感症為血渴日華本草曰破宿血和魚羹食鱖魚鱧魚最佳甚下氣調中補虛凡脾虛不能攝氣因而作腫服行氣導滯藥則更虛更腫遵補其脾又壅而更腫惟芋性能益脾而質滑食之即消乃治虛腫之妙品衍義曰多食難在化滯氣困脾此因過食致害凡物皆有不可不知莖葉俱可食亦能除煩止渴又療妊婦心煩迷悶胎動不安煮汁飲又同鹽搗敷蛇蟲咬同醋搗消癰腫出日華本草又可擦蜂螫出衍義又生芋搗爛敷軟癤出簡便方凡此皆芋實有之功而不獨有功於病也培壅足者畝收一二百斤又耐水耐旱長啖不厭粒食可無其功乃在百穀之上不知世人何故不肯種之偶一歉收即啼飢號寒轉死溝壑不大可怪哉陶隱居曰芋掘取不盡遺種自生者名相芋又別有野芋並殺人慎不可食又有一種土芋唐本草曰蔓生根如小芋肉白皮黃梁漢人呼黃獨拾遺曰食之去熱嗽甘美不飢厚人腸胃可代谷杜詩曰長鑱長鑱白木柄我今托子以為命黃獨無苗山雪盛短褐單衣不掩脛此非野芋一種且蔓生不類芋因根形似故名土芋無毒且益人佳品也冬瓜汁本經曰白瓜又名水芝廣雅曰地芝綱目曰冬瓜者以其冬熟也齊民要術曰十月種者結瓜肥好二說皆誤此物夏時天氣稍涼瓜即黃落不成可以冬種冬熟乎蓏屬有南瓜有西瓜南瓜之形扁者或呼北瓜則冬者東之訛也必曰冬種附會無理其味甘性涼能除煩止渴退熱解暑和中益氣利小便消腫脹生搗汁飲治大熱大渴又治熱痢噤口生冬瓜汁生萊菔汁和合飲甚者加苦蕒汁梨汁古今錄驗方治產後久病津枯口燥四肢浮腫冬瓜一枚黃土泥之煨熟絞汁飲兵部手集治水腫危急冬瓜任意食愈多愈妙聖濟總錄曰水腫煩渴小便少者冬瓜內白瓤煮汁淡飲以多為妙如嫌味淡可略加醋不得加鹽加糖楊氏家藏方治十種水氣浮腫喘急冬瓜一枚切蓋納赤小豆三五升於內仍合蓋竹籤簽定黃土包好如包鹽蛋糯糠火煨極熟切片同豆焙乾為末水丸每服四五錢煎冬瓜子湯下日三服至小便利則漸減以愈為度肘後方治發背熱腫冬瓜截去頭合之予意不如搗爛敷之小品方治食魚中毒煮東瓜汁飲凡熱病後及平人注夏與體肥畏熱者宜長食出食療本草外用切片蘸滑石末摩疿子甚佳又海上名方治積熱瀉利冬瓜葉嫩心拖面煎餅食無葉用瓜又藤搗汁服解木耳毒用糖霜收者名冬瓜餞病人宜食又冬爪內瓤常用洗面令人白淨梅汁古作又作桌又作某象子在木上之形後人作梅然書之鹽梅詩之標梅皆從木每則其來亦古矣爾雅曰梅柟孫炎正義曰荊州曰梅揚州曰柟綱目曰梅實酢可以媒合眾味故名梅書曰若作和羹爾維鹽梅埠雅曰梅入北方變為杏故詩疏曰杏類也此說殊不然橘逾准而為枳形既相似花實又復同時謂之同類則可梅杏形既不似花實早晚更極相懸杏花在開桃花之殿梅花早者初冬即放宋人句曰十月先開嶺上梅遲亦不過冬至前後杜工部冬至詩曰岸容待臘將舒柳山意沖寒欲放梅惟其受氣各殊故榮枯節候各異徒以其變杏謂為同類則物之易地易時而變者多不可以理測如雀蛤雉蜃鼠鴽之屬皆可云同類乎至因梅字謂反梅為杏反杏為梅尤為拘泥範石湖梅譜曰江梅不經栽接花小而香子小而硬消梅多液無渣綠萼梅枝跗皆綠重葉梅枝葉重疊結實多雙紅梅花紅如杏杏梅色淡實扁而斑鴛鴦梅一蒂雙實雖種類甚多惟白花單瓣者結子最繁至於花色俗競繁華惟紅梅是豔不知白花五出者玉骨冰肌寒香冷豔其品尤絕高也高青邱詩曰瓊姿只合在瑤臺誰向江南處處栽雪滿山中高士臥月明林下美人來林和靖詩曰疏影橫斜水清淺暗香浮動月黃昏逸韻孤芳復乎不可尚已其子充果可以香口然味太酸極不益人日華本草曰多食損齒傷筋素問曰酸走筋蝕脾胃梅能消肉本經曰去死肌蝕惡肉脾主肌肉故外消肌肉者必內傷脾胃發膈上痰熱酸則聚飲故發痰酸為木味木生火故發熱蜜餞糖藏皆不為美熱病及表病人切忌作飲代茶不可過酸拾遺曰能收斂肺氣凡久嗽久痢宜之同乾薑止冷痢同黃連止熱痢又生津止渴凡霍亂吐下必煩及受暑吐瀉汗出但渴者皆津液受傷也無不宜之同粳米或糯米煮什米熟為度病止即停不宜過飲惟暑月力作及注夏人汗常大泄不拘粥飲茶湯中用數枚同煮微帶酸味長飲極佳入藥煙燻為烏梅鹽醃為白梅能制蟲仲景治蛔厥食鑑本草治蛔蟲上行皆用之又拾遺用止吐逆濃汁頻飲一匕又湧吐去涎聖濟總錄用治喉痹乳蛾白梅去核包白礬半分含什甚者加炒鹽牙皂末各少許搗為丸噙汁咽又蝕瘡瘍久爛死肌惡肉劉涓子鬼遺方用烏梅燒存性研敷又止血聖惠方治血痢腹痛烏梅肉黃連末同搗為丸米飲下食療本草治血崩不止烏梅肉燒存性研米飲下又治小便溺血方同上酒下又解魚毒硫黃毒水煎濃汁又圖經治乳癰腫毒食物本草治刀傷血出均用白鹽梅搗敷又刺在肉中搗敷即出深不能出亦不作膿出食療本草又解馬汗入瘡毒刺破擠去紫血烏梅和醋搗敷出經驗方又開牙關緊閉凡中風驚癇喉痹痰厥等症牙關不開藥不能入梅肉擦牙齦涎出即開其葉夏月衣生黴點煎湯洗即去並出綱目春夏山水暴漲飲之令人吐瀉頭痛惡寒心煩拘急日輕夜重梅葉搗汁和開水頻飲出肘後方橄欖汁綱目曰橄欖雖熟其色亦青故梅聖俞集名青果初食苦澀回味乃甘故王稹農書名諫果記事珠名忠果比之忠言逆耳久乃利於行也一種方橄欖出廣西西江峒中有三角或四角開寶本草曰樹甚高端直可愛結子如河子無稜瓣食療本草曰南州異物志云閩廣諸郡沿海浦嶼間皆有葉如櫸柳二月開花八月成實兩頭尖核亦兩頭尖而有稜核內有三竅竅中有仁可食圖經曰其樹高峻不可梯緣採取者但刻根下方寸許納鹽於中一夕子皆自落樹亦無損枝節間有脂膏如桃膠南人採取和枝葉煎汁可以船堅如油漆性善消酒毒解一切魚鱉毒生者最佳無生者則用鹽醃者須加數倍凡鯸鮐魚河豚鮎魚黃䰲等此皆有毒之魚入五七枚同煮最妙中魚鱉毒急嚼食或搗汁煎飲出開寶本草又治魚骨哽咽久不下出衍義又解百毒出圖經本草作飲代茶能生津液止煩渴治咽喉痛出綱目集效方云小兒初生用橄欖一枚燒存性和硃砂一分研末另嚼生脂麻一口唾和為丸如棗核大絹包安兒口中待咂一個時辰取下腸胃穢毒令兒少疾出痘亦稀此方不用硃砂以二三年好徽墨代之尤妙蓋墨乃油煙色黑善解血熱兒有胎毒母血熱也能一月之內每日用之其功更大以上諸方無橄欖均可以核代之又核磨汁點目可去翳按橄欖能解魚毒而諸書皆云其木作揖拔著魚背即浮出則是江邊漁子可無須罾釣矣恐無此理又延壽書云食橄欖必過白露始不發店瘧也是此物能發瘧患瘧人不食為是梨汁爾雅曰梨山樆疏曰人植之曰梨野生曰樆圖經曰處處皆有種類殊多乳梨皮厚肉實味極長鵝梨皮薄漿多味差短香則過之其餘水梨消梨紫糜梨赤梨青梨茅梨甘棠梨御兒梨之類俱不入藥一種桑梨惟堪蒸煮食之綱目曰梨樹高二三丈尖葉滑膩有細齒二月開白花六出如雪上已無風則結實佳故古諺曰上已有風梨有蠢中秋無月蚌無胎齊民要術云梨每顆十餘子種之惟一二生梨余皆生杜杜棠梨也花葉似梨而小梨品甚多必棠梨或桑樹接者子乃早而佳有青黃紅紫四色乳梨即雪梨鵝梨即綿梨消梨即香水梨也俱為上品御兒梨一作語兒地名也在蘇州嘉興縣見漢書注今嘉興縣不隸蘇州其他青皮早谷半斤沙糜諸品皆粗澀不堪只可蒸煮一種醋梨必換水煮熟則稍甘昔人言梨皆以常山真定山陽鉅野雎陽臨淄鉅鹿宏農京兆鄴都洛陽為美蓋梨性宜北土南方僅宣城稍佳耳吾鄉南安贛州一種瓜梨皮厚必削去始可食味則甘美不亞北產若徽歙所出則極淡不堪啖故史記云淮北榮南河濟之間千樹梨其人與千戶侯等按冬至陽生而後自梅為始凡花多五出陽數也梨花獨六出其得陰氣可知故梨性寒而豔陽天氣麗紫嫣紅爭妍鬥巧而梨花獨全白其稟金氣可知故梨性清肅下行而降肺火凡秋後熱痢口乾生梨汁同萊菔汁頻飲時行熱病噤口熱痢癰疽熱渴生梨汁和生蔗汁飲熱嗽心煩喉腥帶血咽喉熱痛生飲梨汁或和煉熟蜜少許或切片同煉熟蜜蒸半熟食皆有起死之功較一切苦寒敗胃之藥驗而且穩觀類編所載宋時有病懨懨無聊者楊吉老斷其三年當以疽死後遇高僧教其多食消梨梨盡則預儲乾者泡湯飲汁食渣期年顏貌腴澤脈息和平益陰退熱夫豈小補云乎哉食療本草曰熱結胸中滯澀者最宜普濟方曰飲水梨汁和熟蜜熬熱甚者不必熬熱水或冷水不時調服圖經謂其不入藥用衍義謂其不能卻疾非確論也惟開寶本草云多食令人寒中萎困金瘡乳婦血虛者尤不宜食則持平之論肺虛寒嗽痰清小便色白大便溏滑背心畏寒及脾虛飲食不化腹痛嘔泄諸症更不宜食蓋有一利必有一害何物可以肆食何物不對病可以誤食乎若味微酸或澀者即為劣物病人切忌一種極澀多渣無液皮生黑點者俗名糠頭梨澀腸難化更不可食葉煮什飲止霍亂吐瀉木鋸為版片可以鋟字與棗木同古今載籍藉以流傳為用更大杏云生平癖嗜讀書於歷算岐黃二家之學尤喜鑽研間有管窺悉已命筆今此書已付梓人此外醫學有四診述古傷寒則例醫家三法歷學算學諸稿亦稍其梗概未知何日得謀剞劂其為壽之梨棗乎抑災梨禍棗乎昔司馬長卿慕人千載以前鄙意乃竊效楊子云慕人千載以後矣梨乎棗乎其於我有緣乎棗汁綱目曰埤雅大曰棗小曰棘棘酸棗也棗樹高故重朿棘樹低故並朿朿音刺如芒刺之刺非約束之束二木皆有刺六書所謂會意也古有巧對云棗棘為薪切斷劈開成四束命意雖巧而識字未真圖經云棗處處皆有青州者特佳晉絳者雖大而味不及江南所出堅燥無脂其種甚多郭注爾雅云壺棗大而銳壺猶瓠也邊要棗細腰今謂轆轤棗白棗子白乃熟洗大棗出河東猗氏縣大如雞卵遵羊棗實小紫黑俗名羊屎棗即曾皙所嗜味不甚佳故盂子曰羊棗所獨也酸棗木小而實酢還味棗其味短橛泄苦棗其味苦皙無實棗楊徹齊棗煮填棗俱未詳棗木四月生葉五月開小白花微青爾雅所載之外郭義恭廣志有狗牙雞心牛頭羊肉獼猴細腰赤心三星駢白之名又有木棗氏棗桂棗夕棗灌棗墟棗蒸棗白棗丹棗棠棗及安邑信都諸棗谷城紫棗長二寸密雲小棗核細味甘齊民要術云收棗須待全赤日日曝而撼之則紅皺皮厚味長半赤者干即色黃輕虛味短按棗產處既多種又各異收藏之法又復不同其性必不能畫一而其安中養脾胃之大致則不甚相懸諸本草謂入藥必須青州所出未免拘泥大抵肉厚味長者力厚肉虛味短者力薄隨症隨方損益之以適其宜可矣其養脾胃補氣生津液主大驚凡卒遇大驚令人神氣蕭縮氣血分離用數十枚煎湯飲或干食或和龍眼煎更佳得睡即安四肢重脾主四肢棗能健脾別錄曰除煩悶療心懸日華本草曰潤脾肺止虛嗽用藥法象曰和陰陽調榮衛婦人臟躁悲傷哭泣狀若鬼神數欠者呵欠大棗十枚似乎太少當用二三十枚小麥一升甘草二兩水煎服又解誤食或多食花椒毒令人氣閉不能呼吸但食棗即愈出王璆百選方又小兒患秋痢脾胃素虛者與蛀棗食之出食療本草其為果餌也左傳曰女贄不過榛慄棗剺以告虔也用以代茶百病脾胃不足津液短少者均宜每日棗一二十枚煎汁飲心脾二家虛弱無火者同龍眼煎尤妙然味過於甘性偏於壅多食助脹生蟲損齒滯膈凡中滿蟲病齒病切忌之生棗未經蒸煮性尤劣孫氏曰人多食令熱渴膨脹動臟腑損脾元助濕熱凡羸瘦人切勿食之其木與梨木同可鋟字印書有功文教較他木之為棟梁棺槨都用尤大矣龍眼汁荔枝以粵東為勝閩中次之龍眼則閩中者絕佳福州所產殼薄如紙核小如豆雖焙乾肉尚能滿殼圖經曰荔枝才過龍眼即生故南人呼荔奴南方草木狀名川彈子又名驪珠又名鮫淚取其形之圓正如珠也蜀都賦名龍目閩小記曰樹似荔枝枝葉略小凌冬不調然性極畏寒惟嶺外無霜雪之地可種嶺以北則絕無結子甚繁惟畏一種小蟲生枝葉間尖喙硬殼鑽破其殼則墜落不成彼人名曰石背蟲周棟園先生初至閩廳事前龍眼一株實離離滿樹問書吏曰今年龍眼必熟吏云石背多恐不熟曰十倍多反不熟乎吏曰石背多曰十倍多猶不滿爾意欲百倍千倍乎吏頓足以手書空曰石背非十倍細詢之始為捧腹綱目曰食品以荔枝為美滋益則龍眼為良荔枝性熱龍眼性平也嚴用和濟生方歸脾湯用之治思慮勞傷心脾怔忡健忘虛煩不眠自汗驚悸及久郁傷脾木來乘土心痛等症大有殊功按龍眼雖較荔枝稍為性平然生於炎輒秉亢陽之氣畢竟性熱若上文所列諸症稍有火者服之反能加劇惟心脾血分虛而火不足者宜服歸脾湯宜食龍眼宜煎汁代茶若婦人憂鬱小兒偶被大驚致令神氣失守尤亟宜煎湯飲或食之也柿汁詳果類橘餅汁其性順氣和中快膈凡喘嗽脹滿痰氣等症之屬實者代茶最宜如屬氣虛慎不可用佛手片金橘香櫞條等同此以上代茶之物雖有多種而因病制宜見諸家木草者尚多不能枚舉明物理者臨症自有變通一可助藥成功其功實大於藥餌一可緣此少飲茶汁免其消伐至若不論有病無病可以長飲代茶者性味皆極醇良功能實非小補安得舉世盡廢茶葉而代以諸物則卻病長年之益可坐而致矣又古不專以茶代飲故爾雅註疏但云可作羹飲並代茶二字無之由是以觀茶經茶錄明理人不屑掛諸齒頰矣檳榔汁綱目曰齊徐之才藥對名賓門司馬相如上林賦曰仁頻顏師古注曰即檳榔又名洗瘴丹有數種尖圓如雞心者為檳榔圓而小者為山檳榔又名藥子圓長而大者為豬檳榔又名大腹子圖經以味甘者為山檳榔澀者為豬檳榔炮炙論以尖者為檳圓者為榔性能下氣利臟腑御瘴治裡急後重除心腹脹滿南人用當果食無日不啖必以扶留葉又名盧都葉古賁或瓦屋子灰同啖皆蚌名見魚蟲類吐出紅水如鮮血乃滑美不澀羅大經鶴林玉露甚言其功吳興章傑瘴說又言久啖必有害東陽盧和曰檳榔本以祛瘴有瘴誠不可缺無瘴而食之能無開門延寇之禍乎按檳榔閩粵人用以當茶非當果也凡客至可不設茶先出此為敬而世俗女子受聘謂之吃茶以盤盒中有茶葉也閩粵則概用檳榔不用茶葉非當茶乎蠻煙瘴寸雨之地誠不可少也又嶺表錄異云檳榔出自舶上難得真者交廣所生皆大腹子也然食者不甚分別並有益無損是其品類雖多功用等耳菸葉自有明中葉以前中國無吃煙者成化而後自東洋呂宋國闌入中土名淡巴姑巴一作把彼處番語也其國近臺灣初入時盛於福建而後漸及於南北諸省故天下貨煙之人福省為多蒔煙之地亦福省為上全閩山多土少素號貧區近一二百年漸致富厚不可謂非菸葉之力也今嗜者日眾上自公卿大夫下而輿抬負販鮮有不吃即至閨闥婦人亦十之七八每一城市村鎮每歲賣煙之錢較鹽數倍無怪閩人之坐茲致富嗜之者云寧可無飯不可無煙嘗讀王漁洋先生池北偶談云某年與韓慕廬先生同典會試公在闈中酒盞煙筒不去於手戲詢之曰煙與酒皆公熊魚之嗜倘必不得已而去於斯二者何先公沈思良久曰去酒此正與寧無飯不可無煙之意同也論其味辛氣烈自非和平之物且他物雖烈不過性惡損人而已此則燃之以火熏其喉舌以理揆之其害當不崇朝而見而嗜之者終身不斷未嘗不高登耄耋長育子孫世有酒人多成酒病未有成煙病曾作何形症者不可解也其盛自明末隆萬時始國初曾奉嚴禁然天下之大吃煙者多未能遽止也至康熙十六年御史成其範因星變上疏請兵討吳逆三桂朝廷允其詳發兵從川黔而進一夜兵宿貴州山中忽受山嵐瘴氣病者多人惟嗜煙者不染以故瘴癘之區在古最惡宋人諺曰春循梅新與死為鄰高竇雷化說著便怕今不甚為害者賴有此也緣此遂弛菸禁但敕有司每春出示凡新墾山地始許種煙成熟地畝不得擅種而已此物最宜新墾之地其色香味俱高絕以吾鄱而論蒔煙畝可得二三十金而煙宜荒土故人樂於開墾近五十年來野無曠土者煙之力也其性既能闢瘴癘則可以寬中調氣下食醒酒故每食後酒後吃煙倍黨腹內寬舒精神疏爽且又能辟惡氣凡醫人入傷寒熱病時行瘟疫之房必須吃煙令從鼻出可以不染煙筒中油煙屎能殺一切惡蟲毒被蛇咬者急用冷水洗淨以此塗之少頃又洗又塗痛減為度刨煙時榨出油可塗風瘡疥癩及豬犬牛馬癩瘡近二三十年另創一種吃法用銅製管大其末如喇叭狀內貯少水吸菸從水中過一吸輒吹去又入煙吸而吹之少者八九吸多或一二十吸煙俱未燼滿地火點有若列星煙縷縷飛騰無論暴珍天物又最為火燭之媒且其吹吸形狀醜惡對之令人慾嘔吃水煙者不曾知恥也初乃西人作湧故賣者曰蘭州水煙後乃處處有之然亦不過優伶及衙門長隨門役等人一見水煙則滿地吹之以示桃達不羈之狀此輩本無恥之人不足深責詎意十數年來農工商賈吃者大半即給紳士大夫亦被其染漸至婦女無所避忌古稱男女食不同器今吃水煙者豈但同器較共牢合吾尤過之矣嗟乎此非甚不得已之事何遂蕩檢逾閑至此極也又有一種鴉片煙鴉片本名啞芙蓉後訛為鴉又書作阿乃罌粟殼上之津液凝結而成本腎家澀精興陽補藥為房中術所必用此煙實非鴉片所造假其名耳倡自閩粵功令本有嚴禁彼處凶頑暋不畏也或三五人十餘人群聚而吃誓同生死易室宣淫發覺到官則逞凶拒捕被獲則驕首就戮彼乃云此煙一吸其樂逾於登仙雖死不悔也彼處淫娼吃此煙雖日交數十人而不倦云其樂較男子尤過之也近乃漸及各省亦尚止衙門長隨娼優等類所幸者其價甚昂且一吃不能復止不吃則死計每日所需非五七百文不足將來此風縱如水煙之盛必不能人人皆吃一不足慮也又吃此煙者初則壯健非常三數年漸漸黧瘦不久必髓竭精枯而死坐擁厚貲而求快樂詎知乃以求死二不足慮翻足快也且一罹法網則刑典隨之三不足慮尤足快也世傳此煙乃遠年塚墓棺底土淋汁所造借人之精氣以補人故其效大而且遠此語殊不可信閩粵售者甚多彼處墳塋豈盡任人刨挖其子孫絕不照管官府全無覺察且棺底土有何精氣縱有亦是死氣何能如此之補又俗傳其灰能止久痢夫痢而至於邪盡當用補澀方藥甚多何必弄巧逞奇用及此物跡是以觀補而至於鴉片煙頃刻使人壯健快樂逾干登仙補之極矣而數年即死富貴之家遇病惟信薛立齋張景岳之言不肯去邪惟喜補塞豈知其害較克伐尤慘也宜憬然悟矣吃邪片煙者身本無病且數年必死若有病宜散宜攻而補以塞之其死乃在一日半日遲亦不過三五日欲求如邪片煙之偷息數年故可得已故曰慘也又有一種鼻菸名雖為煙實不用火以辛香藥碾為細末置小餅內就鼻吸之頗覺爽快然辛必熱香必竄總為有損無益且鼻通於腦素有內熱之人斷不宜近之也花椒末樂雅曰檓大椒郭注云椒樹叢一實大者為檓詩椒聊之實繁衍盈升陸疏云樹似茱萸有針刺葉堅而滑澤蜀人作茶吳人作茗皆合煮以為香成臬諸山有竹葉椒樹如蜀椒熱毒不宜入藥惟堪入食料蒸雞豚辛香可食然不宜人綱目曰秦椒花椒也始產於秦今處處有之葉對生尖而有刺四月開細花五月結實生育熟紅椒以色紅者為上故本草曰椒紅俗呼大紅袍粒大其目雖黑而不甚光椒外面皮肉作兩瓣包核於內老則綻開皮紅核黑似人目內黑睛故名椒目不開者為閉口椒有大毒能殺人藥中食中均宜揀去中其毒者食棗解之蜀產者名川椒粒差小皮紅目極光黑氣味亦佳按椒性熱而有毒本經謂除風治寒痹下氣溫中則是又云久服輕身耐老令人頭不白延年通神則大不可信別錄云治吐逆疝瘕去老血發汗殺魚蟲毒食療本草曰主上氣咳嗽久風濕痹藥性本草曰治惡風遍身四肢痛痹女有月閉不通行血藥內加此助之腹中冷痛日華本草曰暖腰膝縮小便療陰汗去下焦肝腎沉寒皆不可謂無功然中病即止不宜過服過服則令人氣閉與閉口椒同或發一切熱病如吐血衄血溲血便血及瘡瘍癰毒等症其入食料雖辛香有味又解食毒而熱毒之害則同不宜多食久食素患陰虛內熱及傷寒熱病癰家痘家血家渴家汗家女人崩漏孕家皆禁食上清訣曰凡吃飯過飽心腦痞悶水吞生椒一二十枚即消一切肉食及粢糕之類同治俗醫不知溫中消食之理專用山楂麥芽神麯傷其脾胃致令清愈脹近又創造焦查將山查炒成炭尤可笑可惡證治要訣曰凡嘔吐服藥不納者必有蛔在膈間但於藥中加川椒少許即蟲伏而藥可受胃熱者同黃連用辛苦皆蟲所畏也本事方曰上逆作喘或呃噎者宜於補腎藥中微加川椒引之歸下蓋川椒善溫下焦故千金方治冷氣入陰囊陰莖縮疼痛欲死川椒一二升熱水濕之布裹置囊下及小腹蒸之冷即易更宜內服溫補肝腎之藥亦不可無川椒如卒急不得川椒用胡椒或蔥薑韭和麥麩炒熱俱可又治久冷下痢川椒醋浸焙研末小麥麩炒黃色下水煎粥入椒未一匕食斗門方治腹內虛冷令人不思飲食或食而難化或時作微痛或清泄不止川椒漿水浸一宿每新汲水吞十數枚此大誤也豈有飲冷水治冷疾之理宜用開水米飲更佳又不如同白朮甘草酒炒芍藥研末米飲下更佳又治虛冷少氣呼吸微弱無力也乃下元氣海虛寒所致川椒一兩酒三升浸三日隨量飲數杯更宜速進脾腎二家補藥獨行方治諸瘡中風令人口噤頭搖四肢搐溺角弓反張如破腦傷風狀椒末一升酒拌濕以面作餅裹椒末如餡勿令漏氣分二裹灰火內煨熟取出刺作孔對瘡口罨之使椒氣射入冷即易須臾瘡中水出遍身冷汗立瘥仍宜內服祛風托裡酒藥如羌獨荊防白芷甘草歸耆乳沒蜈蚣山甲珠蟬蛻等破腦傷風亦宜此法物類相感志曰凡生漆瘡者令人身腫潰爛寒熱甚者眉發俱落但以川椒末唾調塗鼻孔內外即不生已生者煎湯浴之椒目性能利水千金方治水腫脹滿椒目略炒勿太熟研末每酒服方寸匕胡椒證類本草曰西陽雜俎云胡椒出摩伽佗國名昧履支蔓生極柔弱葉長寸半有細條與葉齊條條結子兩兩相對其葉晝開夜合合則裹子於內綱目曰今南方諸國及滇甫海南皆有蔓生附樹或作柵引之葉如扁豆葉正月開黃白花結子累累纏藤而生生青熟紅青者更辣五月採曝皮皺如梧桐子遍中國食品皆用之味極辛性大熱能走泄真氣助火發瘡傷目海藥本草曰多食損肺令人吐血按胡椒之熱較花椒尤甚食料中些微用作調和及不常用尚無大害若多而且久其害不可勝言平素陰虛內熱及一切血疾目疾咽喉瘡瘍瘟疫傷寒等病女子胎孕崩漏即分毫不宜入口而嗜之者惟取一時之適口不悟其禍乃在終身蓋積熱傷陰暫時不覺積之既久或血疾纏綿或目成瞽廢莫不以為病使之然烏知致病者此也獨傷寒及時行瘟疫誤食胡椒生薑辣枚子同內劫營陰領邪深入少則助熱留邪久而不愈愈後且有時熱時止肌膚清削盜汗不眠諸病皆辛熱傷營之症所以古昔經方原有竹葉石膏成法此在秦漢間世無胡椒辣枚子之禍且有此方何況今日乃今之聾瞽全然不知只識四君六君八珍十全大補等方愈補愈傷則十人中死者又復五六誠生民之大厄也多則必成不起然其死在當時者少在一旬或二旬前後者多醫者不知根究及此病者更誰知歸咎於此也尤可惡者俗傳胡椒索麵之方但有感冒不論是寒是熱皆肆食之以為發散如系寒邪溫散固所當用而胡椒只能溫中不能發表說在菜類蔥穀類小玫面索二條倘為熱病反加以熱物害更何如數十年中屢見食此過多一二日即死者未死時必唇焦舌黑津液全無此靈樞所謂陰竭也陰竭者血死也血既枯而死更有何藥使之復生又必昏冒無知此華佗所謂胃爛也胃俗名肚子既為熱物蒸爛更有何藥能令再生一肚且死後必遍身青紫與中砒毒無殊可慘也又有一可笑可惡之方愚蠢之婦競傳胡椒炒雞可以調經可以種子豈經水不調與不孕盡屬血寒即使果寒溫暖血室雞己足矣何必助這以椒不寒而多食此必致血枯經絕俗名乾血勞或熱漏熱崩虛而崩漏者可治熱而崩漏者難為或成熱勞吐血性極傷肺故也豈非無病求病不死求死乎胡椒之害大概如此至於一切寒病本草載有多方未必盡無功效然其性太偏不如花椒之穩方概不錄芥末白芥子生研末取辣入食料辛辣如芥苔芥菜嫩心也頗爽口宜拌豬羊腸肚食然性熱而散耗氣助火食不可多不可久素有內熱血疾目疾咽喉瘡瘍痘後孕婦俱禁食千金方用治痰在胸脅咳嗽支滿上氣多唾每橘皮湯下芥末二三分又利氣散結凡結核在項下耳前後胸脅者藥中均不可無此體虛者炒用余見菜類諸香料其類不一用處亦廣不拘肉食菜食果餌中均可加入雖辛香者總不免於耗熱然所用不多無甚損益獨浸酒飲虛人忌之又薑桂古入併入食料所謂老而愈辣也今因價昂用桂者少蓼屢見於禮記今亦不聞有用者至若砂仁白豆蔻益智仁草果蓽澄茄吳茱萸鹽麩子蓽撥等皆入食品有癖嗜之者多則耗氣助火少亦無甚損益也
