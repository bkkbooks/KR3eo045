body:
  text: 調疾飲食辨卷之五鳥獸類古聖王制物以前民用而物亦得並生於天地之間誠以取有時用有節仁人君子為天地惜生即為我身惜福而周禮疱人供六畜六禽六獸凡以為祭禮賓客辨其死生鮮薨非為朵頤也故夫不麛不卵不殺胎不殲夭不覆巢仁之至義之盡矣若乃豢養之物生殺隨心無故不宰之謂何微獨虧仁亦且越分而其為用於病不得已也藉以肆其殘殺是我欲求生彼先死醫者而出於此夫豈愛人以德歟即貴人賤畜之理亦豈如是歟雞綱目曰爾雅云雞大者曰蜀未成雞日內高三尺曰雉之暮子為戮郭注曰今呼小雞亦曰戮廣志曰小者曰荊其雛曰此誤也即字爾雅云生哺注曰鳥子須母哺之生噣難注曰能自食雞不須母哺當名雛不當曰韓詩外傳曰雞有五德平頭戴冠文也足傳距武也遇敵敢鬥勇也見食相告仁也夜不失時信也其鳴聲最長大故中孚之上九曰翰音登於天注曰雞肥則聲長或曰雞鳴必振其羽是音隨翰出也春秋題辭曰雞為積陽故陽出雞鳴以類感也朝鮮雞尾長三四尺南越長鳴雞晝夜蹄叫南海石雞潮至則鳴蜀中鴉雞楚中傖雞並高三四尺吾鄉泰和雞亦然江南矮雞腳二寸在卦屬巽故善動風朱震亨乃云屬土扯入濕字痰字狗屁不通在星應昂凡群雞夜鳴為荒雞主不祥黃昏獨啼主有天恩此更不祥主有死喪老雞能人言雌雞雄鳴雄雞生卵並殺之則已皆極不祥宜反躬思過修德弭災未必殺雞則已而雌雞雄鳴更不祥之至書牧誓曰牝雞無晨牝雞之晨惟家之索按此物質稟陽精性屬風木易林曰巽為雞淮南萬畢術言焚其羽可致風性專補血暖肝凡肝虛血少及胎産後血分虛寒宜食三年拾遺曰雄雞三年者能為鬼神所役閹雞或雌雞老雞有毒殺人見洗冤録愚俗反云大補雖不盡死致病則多矣故食雞必取三年以內亦主男子肝腎陽虛傷中羸弱雄雞有毒病人忌食而古方有用之者誤也姚僧坦方治男女諸虛及産後虛弱同生地黃飴糖煮食勿用鹽既取其補血用飴糖不如用鹽食療本草曰煮宜極爛不則反損人然動風助火發毒生蟲凡內外諸病無不忌之平素好食雞者若無吐衄血痔風損必有目疾血熱則生風肝熱則傷目而內則云濡雞醢醬實蓼雞性本熱可助之以蓼乎此與今之愚婦用胡椒炒雞治月事不調者何異古人不可盡信如此血治鬼擊卒死用大雄雞破開拓心下取血滴口中縊死心中猶溫者男用雌女用雄雞血灌數匕俱出肘後方觸犯土木神煞腹中急痛唇面手足爪青雄雞血塗太陽眉心金瘡腸出納入塗瘡口出生生編臨桂雜志曰一人夜炊有蜈蚣在吹筒內驚竄入喉漸下胸膈用生雞血灌之更飲菜子油一二錢少頃必和油血吐出續飲雄黃水解其毒或用生雞卵取白吞數枚復啖生油一碗亦必吐出肝治肝虛目暗常入粥食出養老書加沙苑蒺藜尤妙小兒疳眼緊閉不開久之必瞽男用雌女用雄雞肝焙研末另研草決明石決明萆薢蔓荊子末各七分和勻分數次服出祕授奇方雞一身惟肝能治疳明目且無毒內則僅云不可食亦誤膽點熱眼流淚塵沙眯目卵極傷目又難克化癰瘍瘡腫目疾及中寒人宜終身戒諸禽卵同卵黃傷寒少陰病心煩不得臥黃連阿膠湯用之取其養陰也此症難辨方又宜加減故不録又治娠妊傷胎血下不止血盡則子死難出普濟方用雞子黃十四枚煮熟捻為細粉入好酒內再煮二三沸服未瘥再作又解誤服斑蝥芫青毒欲死者生雞鴨卵鴨卵尤佳連灌五六枚得吐即愈劉禹鍚傳信方治瘡瘍久不收口用五枚煮熟去白亂髮如雞子大一團共熬候焦盡油出取油去火毒塗瘡上摻以苦參細末熱甚者不如大黃或滑石末如無熱但不能生肌不如海螵蛸耳疳出汁此油塗出談野翁方卵白治産後血運身痙目上不知人雞子白去黃入醋少許調荊芥末二錢服出衍義面生瘡皰醋浸雞子密封二七日殼軟取白塗出肘後方黯䵟醜陋酒浸雞子密封四七日每夜以一枚取白塗面出普濟方凡諸禽卵其白性冷故食之寒中難化又可解熱毒塗瘡腫手指上生蛇頭疔以諸卵開一小孔入白礬末二錢蜈蚣末三分雄黃末三分套患指上麵糊封口須臾卵熱如火易之至三枚愈矣鴨卵尤佳抱出雞子殼治痘瘡倒陷便血昏沉惡症新瓦焙存性去膜研酒服二錢並塗風池胸背下疳蝕爛外腎癰瘡俱用陳香油調塗出醫林正宗抱出雞卵殼中皮俗名鳳凰衣治久咳氣結同麻黃紫苑研末服出名醫別録膍胵內黃衣膍胵即脾黃內黃衣即胃凡羽族脾胃皆緊相黏著俗名為肫俗名雞內金別録云止小便頻數日華子云治泄精溺血崩帶腸風其味本澀尚可信也綱目用治喉痹乳蛾千金方用治反胃及噤口痢疾經驗方用治走馬牙疳又治發背攝生方用治疣目治骨哽欲醫用消食積皆極無理方亦不驗不録雞屎素問作矢有雞矢醴以雞矢炒香煎酒服治鼓脹朝食不能暮食後人附益至主百十餘病甚屬無謂方概不録燖雞湯經驗方用治消渴濾澄服不過二雞愈小兒頭生瘡癤久不愈連洗數次即愈夏子益奇疾方云肉壞怪病口鼻出腥臭水盛碗內變為鐵色魚蝦走跳捉之化為水但多食雞肉即愈寒瘡怪病遍身生瘡如貓眼有光無膿血痛癢不常但多食雞魚蔥韭自愈肘後方治打傷胸肋四肢烏雞連毛搗入醋和勻敷新布緊札之乾坤生意用反毛雞治反胃綱目曰泰和一二十年老雞能發痘瘡並無理此二方本不應録出因恐人誤用故存之以糾其謬也又古有雞卜又有雞骨占年之法又食蟲蟻為人除害是小物含靈且有功也若為口腹殺之非吉祥之事也又按諸凡禽獸即各有一定之性必不因毛色而異但純色者佳駁色者劣耳而各本草皆言雞黃色補脾白色補肺黑色補腎是禽獸本無一定之性因羽毛之五色而入五臟然則斑駁者具二三色將分入二三臟乎抑一無所入乎且野生之物形色皆有一定何以不聞鷺能補肺鴉能補腎乎語有似是而非者此類是也雉漢呂后名雉改呼野雞文彩五色故又名華蟲其名曰雖詩曰有鷕雉鳴雌雄相誘曰雊月令季冬之月雉雊詩雉之朝雊尚求其雌書高宗彤日越有雊雄左傳少皥以鳥名官五雉為五工正注曰五方之雉有五種東方曰鶅西方曰鷷南方曰鸐爾雅南方曰北方曰鵗伊洛而南素質五采成章曰翠翠與鸐最華美故以飾後夫人之服禮玉藻王后禕衣夫人揄狄與鸐同注曰禕即翬也禕衣元質而畫翠揄狄青質而畫狄駱賓王檄踐元后於翠狄江淮而南青質五色曰鷂朱黃小冠日黃色自呼日鳪長尾走且鳴日鷮詩依彼平林有集為鷮注尾長五六尺白日鵫黑日海又有雗山澤諸種爾雅翼曰澤雉十步一啄百部一飲分守疆界不相侵越抱朴子曰南越多白雉然則成王時越裳氏今安南即交趾國貢此乃貢土物非獻祥瑞也禮記雉曰疏趾注雉肥則足開又菰食雉羹注二物相宜又夏宜注於雉乾魚埤雅曰蛇交雉則生蜃月令孟冬雉入大水為蜃類書曰蛇交雉則生即蜃也俊靈機要曰正月蛇與雉交生卵遇雷入土為蛇經二三百年成蛟述異記曰江淮中有獸名能蛇所化也冬則為雉夏復為蛇晉時武庫有雉張華曰蛇所化也視之果得蛇蛻此物既化蛇化蜃又與蛇交而生生蜃有毒甚矣平人且不宜食況病人乎動風發毒助火生蟲之害較家雞殆過焉食療本草曰與菌菌木耳同食令人立下血或生痔收荍麥食生肥蟲同蔥食生寸白蟲自死爪甲不伸者殺人此諸禽所同而雉為甚鶩說文曰鴨爾雅曰舒鳧廣雅曰𩿣鷗衍義曰王勃膝王閣序落霞與孤騖齊飛飛野鴨綱目曰曲禮執匹注雙騖周禮庶人執騖尸子曰野鴨為鳧家鴨為騖騖不能飛如庶人卑末守耕稼而已故以為贄豈野鴨乎左傳公膳曰雙雞饔人竊更之以騖亦豈野鴨乎且離騷云將與騏驥並軌乎將與雞騖爭食寧昂昂若千里駒乎將泛泛若水中之鳧乎鳧騖並舉將俱為野鴨乎其性善清肺金除內熱故治虛勞咳嗽吐血同海參煮食又善浮水故治水腫老者愈加雄者亦可血乘熱生飲解野葛砒霜生金毒又治中惡卒死及血痢熱在腸中久不愈滾酒服出摘元方卵難克化傷目生膿發毒過於雞卵鹽藏糟藏灰包石灰包其法多端總之無益又合桑椹令人生子不順婦人切戒抱卵聞礱磨聲則毈而不成屎名鴨通馬屎亦名通可和雞子白塗惡瘡腫毒出食療本草格古編曰水中砂內産金不可撈取鴨屎內淘之鳧詩疏曰野鴨又名野騖爾雅曰沉鳧後人或作晨鳧謂其飛必以晨也食療本草曰冬月食之能補中益氣蓋其飛之徑疾凡羽族皆莫能比由力大筋強故能補益天文測食篇曰月一日夜行二萬六千里與飛鳧同算比喻雖極無理然可知鳧飛之速矣日華子曰不可合胡桃木耳豆豉食則亦未嘗不熱也鵝一名家雁爾雅名舒雁郭注曰江東呼為其鳴應更性惟食草不食生蟲而綱目謂善啖蛇蚓能制射工水蟲名含沙射人影能令人病故以事誣人者謂之影射闢蟲虺未必然也別録曰利五臟食療本草曰性冷解熱毒韓醫通曰疏風均大誤綱目曰鵝氣味俱厚發風發瘡莫此為甚火熏尤毒則正論也又鵝鴨臎尾肉皆不可食內則作翠曰舒雁野鳧翠勿食鴨翠不過腥臊鵝翠則最毒卵傷目難化困脾生膿發毒較雞鴨卵尤甚食療亦云補中益氣悉屬謬言凡有病人概宜嚴戒一種野鵝爾雅名鵱鷜性較家鵝略平雁大者曰鴻亦曰陽鳥禹貢彭蠡既瀦陽鳥攸居其腳趾間有幕相連爾雅曰鳧雁醜其足蹼注曰蹼屬相著凡水禽如鵝騖之類足多蹼故云鳧雁醜其踵企注曰飛則伸腳鳥雀醜其掌縮注曰飛則縮腳其棲宿常在淺水詩九章鴻飛遵渚鴻飛遵陸禽經曰以水言自北而南以山言自南而北注曰皆雁字冬則南北集於水故字從干夏則北翥集於山岸故字從岸雁有四德寒則南來熱則北往信也飛有序而前鳴後和禮也失偶不再配節也夜則群宿而一奴巡警晝則銜蘆以避繒繳知也其南也止於衡陽衡山以南兩粵嶺海滇黔之地則無雁故王勃滕王閣序曰雁陳驚寒聲斷衡陽之浦楊升庵黃夫人詩曰雁飛曾不到衡陽錦字何由寄永昌其北也歷朝使命往來往往遠涉窮荒絶漠無人曾見雁在何處度暑山海經云雁門山雁出其間在高柳北今山西梁州記云梁州界有雁塞山山有大池雁集其間故名然亦非度暑之地其傳書也始自漢人之訛胸奴雲天子於苑中射雁得蘇武所寄帛書云云與鯉魚傳書全屬子虛烏有後世遂用為故典凡音書得達曰鱗鴻有便否則曰雁杳魚沉古詩云天上多鴻雁河中足鯉魚其行肩隨有序故兄弟曰雁行其不再配故婚姻之禮納采奠雁詩曰雍雍鳴雁旭日始旦士而歸妻逮水未泮其飛極高不可射取之多畜媒誘之或俟其棲宿以矰繳火器得之故楊子法言曰鴻飛冥冥弋人何纂焉或作何慕而國策楚人之告頃襄王鶀雁青首羅張而射之可以囊載左縈而右拂之泗上諸侯可一旦而盡蓋喻耳左傳衛懿公戒孫文子寧惠子食戒約也日旰不召而射雁於囿中亦極言其嬉遊無度語言不信與孟子之譏學奕不專心馳於外意同也至於將翱將翔戈鳧與雁乃就昧旦時飛鳴入耳者以相勸勉蓋詩家即景生情之筆可射不可射不必論矣又曲禮凡贄大夫雁取其知時而有序也又白雁古以為珍左傳曹伯陽好田弋鄙人公孫疆獻白雁使為司城或以為瑞明世宗西內營齊媚臣屢獻白鹿白雁然談苑云北方有白雁小於常雁秋深則至故元順帝既失燕都旋輿大漠其中國之舊臣焰以詩曰金輿玉輅無消息腸斷西風白雁飛明人白雁詩曰錦瑟夜調水作柱玉關晨度雪沾衣天涯兄弟離群久皓首江湖猶未歸是又自有種類非珍非瑞也諸史四夷列傳有五色雁區區白雁何瑞何珍肉利藏腑壯筋骨鮮者煙燻者俱佳肪和豆黃作丸補勞瘦肪脂膏也豆黃用黑豆蒸熟罨生黃衣為末雁油調作丸極補瘦人肥人忌服無雁油豬板油亦可淮南萬畢術曰鴻毛作囊可以渡江果爾似較勝中流一瓠也又道家以雁為天厭戒勿食解者以為因其行有序非也蓋以其失偶不再配食其一則其一孤飛獨宿為可憫耳古詩云莫打南來雁從他向北飛打時雙打取莫遣兩分離誦之心惻也天鵝一名鵠大於雁僧贊寧曰凡物大者皆以天名也爾雅翼曰即鶴非也鵠亦大於鶴杜詩黃鵠高於五尺童有黃白蒼諸色其飛更高不可射楚辭曰黃鵠一舉兮知山川之紆曲再舉兮識天地之盈虛史記陳涉世家曰燕雀安知鴻鵠之志皆言其飛之高遠也而射者取以為的云設鵠命中中庸曰失諸正鴿蓋舉難射者以為期也飲膳正要曰一種大金頭鵝最佳一種小者又一種最小者僅如鳧騖皆不及綱目曰食之益氣力利藏腑按此物似鵝而食魚蝦恐不免亦有小毒凡患風損瘡瘍人不食為是絨毛可貼金瘡可為服飾名天鵝絨竹雞下下品其鳴曰泥滑滑蜀人呼雞頭鶻拾遺名山菌子菌乃毒物觀其名知其性矣性一無可取又多食半夏苗故有毒唐小說曰崔魏公常中其毒暴死太醫梁新搗薑汁灌之始蘇又諺云家有竹雞啼白蟻化為泥或云能闢蜰蟲即壁蝨皆不足信也鷓鴣禽經曰越雉飛必南翥注曰雖東西回翔開翅之始必南向江廣閩蜀俱有似母雞頭類鶉臆前有白圓點背毛紫赤鄭谷以詠鷓鴣詩得名呼鄭鷓鴣其詩曰暖戲煙蕪錦翼齊品流應得近山雞山雞即難錦雞也未免過譽其鳴曰鉤輈格磔又曰行不得也哥哥唐本草曰能解野葛菌子生金毒日華子曰治蟲毒欲死食療本草曰利五臟益心力似為佳物然亦喜食半夏苗宋楊元之因多食致咽喉生瘡膿血不止楊吉老令啖姜至一斤乃愈此法不佳學者勿為所誤必清涼解毒佐以姜乃可則亦不宜輕食也鶉綱目曰鶉無常居有常匹隨地而安故莊子曰聖人鶉居其行遇小草亦旋辟之可謂淳矣子曰鳼俗呼鵪鶉乃田鼠所化之鴽極小子名鷃名又名禮曰鶉羹鴽釀之蓼爾雅曰鴽鴾母注曰也鶉乃蝦蟆所化爾雅曰鷯鶉其雄鶛牝痺注曰屬則非一物可知鶉體稍大頭細尾禿有圓斑點夜則群飛晝則草伏人或畜以賭鬥化鴽化鶉雖古有其語然實各有種類非盡由變化嘉祐本草曰補五臟實筋骨耐寒暑消結熱衍義曰小兒患疳及熱利五色食之良董炳集驗方魏秀才妻病大腹水腫偶食鶉遂小便出白液而愈但此鳥稟性淳良與人無害若無以上諸病不宜戕害之也鴿綱目曰張九齡以鴿傳書名曰飛奴人家畜之亦有野鴿毛羽有青白皂緑斑駁諸色眼目有大小黃赤緑數等性能暖腎益精調中補氣血又能解毒治惡瘡癬疥性熱之物豈能解毒大誤血熱飲解百藥及諸蟲毒此則或然血乃陰液也卵解痘毒尤不可信凡卵皆生膿發毒然性偏補陽脾腎有火及痘瘡血熱者切忌屎名左盤龍治陰毒腹痛服薑附不效者炒黃熱酒泡服頗佳雀綱目曰棲宿檐瓦故名瓦雀酬酢階除故名賓雀老而斑為麻雀小而黃口為黃雀其行躍而不步故凡有喜慶自謙曰雀躍其視驚瞿其目夜盲月令季秋雀入大水為蛤臨海異物志云南海有黃雀魚常以六月化為雀十月入海復化為魚則化蛤者殆此類歟若家雀則未嘗變化肉與卵雖能壯陽道暖腰腎補精血然非多食不能取效此物甚小不戕若干物命始能一縱淫欲仁者必不為也若為子嗣起見則壯陽補腎之藥極多更不宜先自敗德壞其積福之基糞名白丁香可點頑瘡不潰蝕爛瘡死肌惡肉又點目蝕胬肉去螺旋斑鳩有二種一種有斑者名斑鳩尾短故又名斑佳音追鳥尾禿為佳範汪方作錦鳩爾雅曰佳其郭注曰祐鳩一種無斑者為鵓鳩又名𪆴綱目曰又名荊鳩楚鳩役鳩糠鳩又名郎臬闢皋爾雅曰鶌鳩鶻鵃掌禹鍚曰春分化為黃褐侯鳥名似斑鳩毛緑色秋復為斑佳誤也此鳥不能變化春暮將雛雌雄拍翅作聲相誘故月令季春鳴鳩拂其羽性而孝能反哺有定匹必雙棲並宿天將雨則雄逐其雌霽則呼而反之拙於為巢僅架數莖往往墮卵警於避禍巢幽篁密樹人偶見之即銜其於或卵而去其食不噎故古禮羅氏獻鳩以養國老仲秋送年老者以鳩杖王右丞詩曰鳩形將刻杖龜殼用支床示祝老人健飯之意故名祝鳩一名鷦鳩左傳昭十七年郯子來朝昭子問焉曰我先祖少氏以鳥紀官祝鳩司徒鴡鳩司馬鳲鳩司空爽鳩司寇鶻鳩司土五鳩以鳩氏聚民可見鳩有多種注家以爽鳩鶻鳩為鷹鵰嘉祐本草曰食之明目益氣助陰陽恐此鳥在處所産不多用為補益必非一二枚所能枉傷物命而已周禮一書至未可信也宜存又有一種黑色似鸐鵒而小亦名鳩月令仲春鷹化為鳩晴霽則無聲陰晦則鳴曰滴流流雨必至詩賦中所謂鳩喚雨者是也明人之譏萬安曰春來風雨尋常事莫把天恩作己恩詠鳩句也非斑鳩鵓鳩之同類也鸊鷉爾雅曰須羸食療本草曰刁鴨日用本草曰䴇𩾚綱目曰油鴨則非油鴨亦生於水善沒不善鳴冬月肥脂肉腥臊無味油塗刀劍不鏽此鳥名扎鳥子飲膳正要曰水扎鳥饜暮肥美油不可塗刀劍善鳴宋人詩曰緑陰鳴扎鳥靜頻嘶而英華集云馬銜苜蓿葉劍瑩鸊鷉膏郭注爾雅亦曰膏中瑩刀皆誤以油鴨為鸊鷉南方最多北方亦有郅支單于之地有水名鸊鷉泉李義山上契苾何力詩曰日晚鸊鷉泉畔獵路人遙識郅都鷹或作鸊鵜羅鄴詩曰臘晴江暖鸊鵜飛誤鵜亦水鳥另是一種詩維鵜在梁注曰淘河大鳥也鸊鶷性能滋補然食魚蝦不免於熱陰虛血熱及諸熱病忌之且每歲惟暮春一二十日可得俗云此時眼瞎過此則高飛不可羅致性雖滋補不能長食況熱則有毒其身又小一簋須費十餘命補物甚多何必此也以上鳥類豕綱目曰牡曰豭牝曰豝曰䝏牡去勢曰豶四蹢豬蹄曰蹢詩曰有豕白蹢曰豥高五尺曰䝈其子曰豚亦作㹠曰爾雅曰彘子豬一子曰特二子曰師三子曰㠟末子曰麼生三月曰豨幽冀統名豭關東西曰彘吳楚曰豨漢陽以大者為豝野豬亦曰豝日㠟詩一發五豝一發五㠟齊徐以小者為䝒內則曰剛鬣又曰腯肥古今注曰參軍此物性本無毒不甚害人然除潤燥澤肌膚而外亦無大益乃諸書甚言其害千金方又云能補腎氣虛竭悉屬過情汪訒庵本草備要為持平之論訒庵曰別録云豬肉閉血脈弱筋骨虛人肌陶隱居云豬為用最多惟肉不可食孫思邈曰久食令人少子發宿病筋骨碎痛孟詵云久食殺藥此則誠然動風發疾韓云凡肉皆補惟豬肉無補李時珍云雲南豬味厚汁濃其毒尤甚然今人常食內滋外腴子孫繁衍未見為害又云合黃豆蕎麥葵菜吳茱萸牛肉羊肝龜鱉鯽魚雞卵食皆有毒而肴饌中合食者甚多亦未見為害也大抵肉能補肉故豐肌體澤皮膚又能潤腸胃生津液惟多食生痰生濕動風助熱傷風寒及諸病初起為大忌耳傷寒忌之者以其補肌固表油膩黏纏表邪不能解散也格言病初愈忌之者病字亦指傷寒外感內傷本不忌肉腸胃久枯熱久則津枯難受肥濃厚味也內經熱病論云熱病雖愈食肉則復多食則遺犯者甚多有因而致死者切戒病後食肉毋早毋多也然此乃通言諸禽獸肉非專指豬肉又豬肉惟助風寒濕痰若燥痰乾咳老人久咳正需滋潤亦不忌也訒庵此說可云正當詳明然病人總不宜肆食至於脾虛久泄及夏月水瀉或藥中用烏梅桔梗者均切忌又不可同胡荽食能爛人臍又豬黃膘者皮肉皆黃及肉中有米粒者平人病人均不可食說文曰豕食於星下則生息米故肉米一名星而內則豕望視而交睫腥言其氣腥耳注家因食於星下之說以腥字去月旁附會息米之星大誤信如其言請問牛夜鳴則庮羊冷毛而毳膻狗赤股而躁臊鳥色而沙鳴郁馬黑脊而般臂漏五句當作何解豬頭肉難克化病人忌食脂腹內板油能潤燥治肺熱久咳暴瘖煉去渣入白蜜等分再煉不時挑服一匕老人枯瘦大便常結津液素少者亦可常服出萬氏方胎干難産漿水先下兒不下故胎干攪熱酒多服亦治衣不下出徐之才藥對五種疸黃便燥結者豬脂一味溫熱服日三得利乃愈出肘後方又能殺蟲治食發成瘕心腹作痛咽間如蟲上下嗜食香油者酒煎豬油日三服出食醫心鏡婦人胃氣下泄陰吹甚喧醫匱豬膏發煎用豬油人發同煎至發焦撈去之頻服此症有因子宮熱者勿服此方發背髮乳諸急毒新鮮豬油切薄片冷水浸貼日易四五十片出急救方熬膏和紫草白蠟黃丹貼諸瘡久不斂口出外科大成腦髓孫氏食忌曰損男子陽道臨房不能行事酒後尤忌亦敗女子胎元孕婦更忌禮曰食豚去腦諸畜諸獸諸禽腦髓亦然血多食令人作泄然有三用一治中滿腹脹朝食不能暮食李樓奇方用不見鹽水豬血候凝漉成片者曬乾為末酒服取泄一治卒下血不止千金方用酒炒豬血食炒宜老一解射網毒即草烏跌打醫人往往妄用毒人至死肘後方用豬血乘熱生飲他禽獸血俱可心血能治驚癇一切心經藥均可用為嚮導尾血能發痘瘡肘後方治中惡卒死飲以㹠尾血並縛㹠作枕蹄豭豬前足良能下乳汁見四卷乳能預防驚癇生兒屢患此者未彌月時勿俟病發飲之可免取豬乳法預先訓養母豬俊豚飲乳時倒提後足擠之非此法不能得也舌能開胃口添飲食內傷食物無味者宜之百獸舌皆佳石子即牡豬外腎不俟滿月割去故名豚卵能除陰莖中痛及陰陽易小兒急痛熱酒生吞二枚豬小者可吞五六枚或十枚其餘則心補心主虛汗驚悸多夢怔忡肺補肺主虛勞咳嗽肺癰肺痿肝補肝主肝虛目暗黃瘦疳勞腎補腎主耳聾腰痛陰痿遺精及産後蓐勞諸虛脬補脬主夢中遺溺産後溺床及便溺床症又可浮水明紀載建文四年北兵至江滸舟皆拘於南岸不得渡有軍士出干豬脬十餘納氣其中環繫腰脛泅水而渡奪南舟以濟胃補胃主氣虛泄瀉飲食減少筋補筋主膝脛無力酒煮常食肉補肉見前汪論而有不盡然者脾傷脾連帖即脾也敗人中氣令人泄𦚠傷𦚠又作胰亦令人泄此物形如薄絮本草皆云腎間脂膜非也乃腸外脂膜極敗腎陽腎為胃關故令人泄諸獸𦚠同腸傷腸煮不爛或食多亦令人泄髓傷髓血傷血並見前則不可例論也又多年䝏豬及艾豭皆極損人且無味病人切戒艾老也左傳曰曷歸吾艾豭則言其善淫也醃熏者名火肉味甚佳而性滑大便閉結宜之不結忌之李樓奇方用火肉煨熟食簡便單方用多年火腿腳骨煮汁飲均可治噤口痢洗冤録治箭鏃不出刮人爪甲末同肥火肉搗敷經宿即出鮮者切薄片貼湯火傷及瘡瘍不能斂口炙熱貼打傷青腫均外治妙方並出千金方膽元和紀用經曰小兒初生以豬膽汁入湯浴之不患瘡毒又點洗熱眼腫痛又可導大腸熱閉用竹筒插入肛門灌之膽皮搓為兩股繩焙乾燈上燒灰可點熱翳羊綱目曰白牡羊曰羝曰羒牝曰𦍺曰牂黑牡羊曰羭曰羖多毛曰羖䍽圖經曰毛長尺余北人引羊以此為首羊頭衍義曰生陝西河東毛長而狠健入藥供饌在諸羊上每二歲一剪其毛為膻物名綿羊胡羊曰羺無角曰𦏆曰𦏆角不齊曰觤三曰羷去勢曰羯黃腹曰羳其子曰羔生五月曰羜六月曰七月曰未足歲曰䍮六尺日羬內則曰柔毛古今注日長髯主簿性本淳良不知史記項羽本紀宋義下令軍中何以曰猛如虎狠如羊又哈密衛大尾羊羊尾重一二十斤唐書四夷列傳曰靈羊云可療毒方國志云大食國胡羊尾如扇每春割取其脂復滿又割不割則脹死水東日記云莊浪衛近雪山亦有名叨羊廣志云西北一種羊大如驢臨洮亦有大羊名洮羊一種𦍧羊皮蹄堅利如刃可割黍一種封羊背有肉峰如駝名駝羊出涼州又有一種地生羊劉郁使西域記云種羊臍於上溉以水聞雷即生臍與地連驚以木聲臍斷便能行齧草淵穎集云種脛骨一云種角北戶録但云羔生土中不言所種何物又有獖羊乃土之精季桓子嘗掘地得之以問孔子按羊種類雖多惟以北産為勝蓋其性喜寒惡熱大江以南則生息寡北地則繁孕四月而生歲可三産皮可裘毛可為氈罽又績為氆氌譁嘰等物衣被天下肉性暖益脾胃實腠理北地苦寒非食此不能御凍久食令人肥白又補産後諸虛金匱當歸生薑羊肉湯為産後虛寒心腹急痛之聖藥羊肉一斤水一斗煮取六升入當歸五兩黃耆八兩生薑六兩煮至二升分四服漢時三兩只得今時一兩三升變得一升今貨布及大泉五十五銖半兩等錢幣內有存者可考也胡洽方去黃耆千金方加芍藥寒不甚者姜宜減半微有熱即禁用又主病後肌肉不生精神不復久瘧後尤宜又同花椒茴香食治寒疝氣痛及一切陽分虛寒之病但不可同蕎麥食一種毛結不解羸瘦者其氣味亦不佳內則曰羊冷毛而毳膻究之羊肉膻唐薛緯詩曰一揲膻根數十皴文海披沙注云羊肉也脂同肉性血生飲治産後血悶欲死解丹石硫黃砒信野葛胡蔓草即水繭諸毒並生飲乳潤心肺解消渴補虛勞益精血經驗方云中蜘蛛毒遍身生絲羊乳一升飲之亦治反胃燥結腦髓損人心補心肺補肺腎補腎肝補肝其治肝虛目疾遠勝豬肝唐本草云熱病後失明羊肝七枚生食神效膽點目過於豬膽胃補胃脬補脬舌開胃進食𦚟損人李杲曰人參補氣羊肉補形故凡虛病平日體瘦者宜肥者忌性極暖故虛寒者宜虛熱者忌食之之時秋分以後宜春分以後忌熱病後天行病後患瘡瘍及孕婦胎宮最不宜熱均切戒又羊肉既補形體故壅經絡凡皮膚筋骨有風損者一生不可食又忌銅器煮生食為膾外臺方治虛寒反胃和蒜薤食又治腎虛陽痿每食半斤三日一度論語曰膾不厭細內則曰肉腥細者為膾大者為軒少儀曰牛與羊魚之腥聶而切之為膾其性不免有害不宜多食詳魚膾條紫桃軒雜綴謂羊腸干之徑韌可作彈絮弓弦此物能知母恩跪而飲乳則人有愧之者矣見人欲殺即銜刀跪哀鳴乞免其情又可慘矣凡市肆已殺者非為一人我雖不食彼亦不能復生若僅充一已之疱仁人君子必不忍肆其屠割也宋仁宗忍飢戒殺史冊傳為千古美談彼帝王也且猶如此我輩薄福貧儒敢不效之牛稼穡之本也天子無故不忍宰祭禮非天神不敢歆豈供叨餮之口乎殺牛者一生困厄後代凋零縱不滅絶亦不昌不食牛肉者鬼神敬之凶禍遠之凡遇天行瘟疫自古不入不食牛肉之家宣室志曰夜叉錯居人間則生疫病惟畏不食牛肉之人杏云一生治氣候病留心訪問此語確乎可信乃今之戒食牛犬者曰牢字從牛獄字從犬不食牛犬牢獄永遠夫食牛犬者多矣豈人人盡罹犴狴言其反覺無徵令人不信在為是說者從字形發論必自以為巧思不知牢獄本古人預閒牲畜之物故從牛從犬國策曰亡羊而補牢詩曰執豕於牢晉書天文志曰婁三星為天獄主苑牧犧牲故牛羊古即謂之牲牢有太牢少牢之分非專以禁閉罪人為牢獄也肉健脾胃治虛痢止涎唾不可謂不效而雖驗不穩脾胃雖虛而有濕虛痢邪氣未盡涎唾雖多不關中氣不攝皆忌食牛肉故云不穩至朱震亨倒倉法無理不通乃自明以後醫書群附和之我朝先輩謂其於人腹中作把戲見說鈴獨其乳最佳能補虛羸治消渴解熱毒潤肌膚滋大腸治氣痢黃疸反胃及一切燥涸不症朱震亨曰凡病燥結宜牛羊乳不宜用人乳人乳有飲食之毒七情之火也不謂震亨能作此語與李杲云羊肉補形同一偶中然患風損人血虛又不可用此牛羊總動風也其種類有二一種名水牛又曰吳牛性宜水而畏熱故曰吳牛喘月誤以為日也一種名𤚩牛肉與乳俱𤚩牛佳水牛劣本草反雲水牛佳大誤綱目曰𤚩牛小水牛大𤚩牛有黃黑赤白駁數色水牛惟蒼色間有白者鬱林人曰周留然則古犧牛尚黑尚白尚赤皆𤚩牛也豈反以不美者供祭乎肉嫩者佳老則無味故王制祭天地之牛角繭栗宗廟之牛角握廣南有稷牛即爾雅注之果下牛一名牛王會編曰紈牙曲禮名一元大武牡者曰特曰牯曰犅曰㹍牝者曰㸺曰牸七尺曰犉南牛曰𤙬北牛曰𤚩黑曰白曰赤曰𤙡駁曰犁去勢曰犍曰犗無角曰童牛子曰犢二歲曰㸽說文二歲曰㸬三歲曰犙四歲曰牭五歲曰𤘦六歲曰䖚說文牛鳴曰牷呂忱字林曰牛鳴曰爾雅有犦犩犣諸種皆野獸之似牛者實非牛也易傳曰坤為牛又曰服牛乘馬引重致遠蓋取諸隨世本曰黃帝臣胲作服牛古人之於牛但供犧牲服輗軏而已其用於耕不知始自何時或謂左傳公孫枝兩手秉兩耒而耕則當時尚無耕牛其用當在秦漢以後然聖門冉耕字伯牛司馬牛名犁則秦漢時已有之矣又觀莊子犧牛耕牛之喻知古人宰殺者惟犧牛耕牛必不殺也不然盡力南畝不免於屠被文繡饜芻藁亦不過一割是耕牛不及犧牛遠矣漆園何故羡之純色曰犧曲禮曰天子祭以犧牛必合本朝所尚之色也夏尚殷尚周尚𤙡諸侯以肥牛但取肥腯不擇毛色也大夫以索牛求得即是故左傳齊侯伐萊萊人賂以索馬牛杜注揀擇佳者為索或曰以繩繫馬牛非也纂文曰牛羊無角為汙角長為吳牛角長者可為功其值可抵一牛考工記曰角長二尺有五寸謂之牛戴牛周官作載牛曰牛人掌養國之公牛祭祀供享牛求牛賓客供積膳牛軍事供犒牛喪事供奠牛軍旅供兵車之牛牛角長二尺五寸三色不失謂之載牛本朝於內務府衙門置慶豐司專司牧政設內三圈於西華門外養牛十有二牛六牡牛三青牛一乳牛無定數視用乳之多寡設外三圈於南苑養扇牛八乳牛同內圈又專供乳餅之牛百別為一圈又設牛羊牧群於張家口外養牛三萬以百二十為一群養二十一萬以四百為一群設羊群百一十於達里岡崖每群以五百為率設牛群五於養什木每群扇牛五牡牛五乳牛九十內圈不足取諸外圈外圈不足取諸張家口外凡京城內外各圈設廄長廄副等官廄丁司芻司菽牡丁等役張家口外設總管副管效力芼貼式協領等官大內四季警神供全牛以至犒賚牛羊均由內外各牧所供奉凡芻菽由各廄長冊呈本司移會計司令各黃莊供給供給不敷於戶部支領或動帑採買芻計束菽計升每歲於三月十五日後四月初一日前出牧於南苑寬間豐草之地停給芻菽至九月二十五日後十月十五日前各歸原圈飼養惟內圈牛及烏珠穆秦羊長給芻菽不令出牧凡內外各圈視牛犢斃損之多寡以為功過遊牧諸群每三年三牛孳生一犢三年三羊孳生二羔闕少者治罪凡牛皮羊毛交武備院羊皮及牛羊變價銀交廣儲司庫均無定額惟遊牧總管歲交牛皮八百小牛皮二千犢皮二百此本朝牧政大略凡相牛法眼欲大脛欲長股欲闊尾欲長毛欲密齒欲白耳角欲相近面短尾豎毛赤並短壽角冷有病鼻上白畏熱眼下旋毛妨主耳後旋毛招賊溺不前射無力後胯間窄狹行遲內則曰牛夜鳴則庮臭也相牛經曰牛歧胡壽注曰牽兩腋分為三眼大眼去角近眼中有白脈貫瞳頭骨長大皆行騪壁堂頭闊腳股間倚頭如絆馬驟而正未詳膺庭欲廣胸前夭關欲成未詳俊骨欲垂脊骨當腰處前低後高捶頭欲高未詳百體欲緊蘭株欲大尾根骨豐嶽欲大膝骨垂星欲有怒肉蹄上肉突起能覆蹄力柱欲而成力柱骨當軏處成圓也懸蹄欲如八字蹄後陰虹屬頸千牡牛自陰旁起雙筋至頸者良千未詳陽鹽欲廣尾前至兩腋骨牛常作欲鳴不鳴者腹內有黃也綱目曰馬病長臥者死陽敗也牛病長立者死陰敗也馬起先前足臥先後足從陽也牛起先後足臥先前足從陰也疥牛食之成癩獨肝白首者並殺人瘟牛肉令人生疔死皮熬膠即別録之阿膠又名黃明膠性大補血分今惟用以黏物牛腹中有黃則羸瘦其氣香味苦專治熱痰退肝膽熱膽入生南星末陰乾可代牛黃角退熱涼血化斑可代犀角諸獸角同屎治惡犬咬傷痛極旋痾出熱屎敷之即止又治爛瘡不斂及痘瘡潰爛乾者燒灰摻之即結痂並出千金方硝牛皮灶突上煙膠和樟腦硫黃青靛調塗治禿瘡出近效方犬牛雖能耕種而無戀主之枕犬則盡忠所事不以盛衰改節不以貧富易心且也赴湯蹈火以殉主難彰彰奇蹟載籍頻書食其食者死其事人且愧焉牛敢比乎即或平居無事而警夜司閽皆出於絶無所為又或山居野處微獨宵小潛蹤即狐魅亦因之斂跡折衝禦侮為勞極不小矣帷蓋之恩宜與馬同其厚也禮曰敝蓋不棄為埋狗也畜而有功於人即自死猶不忍食之若乃刀鋸屠焉鼎鑊烹焉罪豈應得而本草盛言其有功於病恐亦饞心涎口之談至術家取犬血以厭精魅更屬不然夫精魅之敢幹與否視乎其人何關犬血而名號頗多見傳記者皆足以資考訂也本經曰狗星禽圖亦曰婁金狗齊俗呼地羊爾雅曰犬生一子曰亦曰𤢭二子曰師三子曰從絶有力曰狣未成毫曰狗說文曰多毛曰亦曰龐詩召南無使也吠猛能逐虎曰研虎薈載遼興宗出獵遇三虎縱犬獲之吠不止曰鎚長喙曰獫短喙曰猲詩秦風載獫歇驕去勢曰猗高四尺曰獒書西旅底貢厥獒太保乃作旅獒小而善獵為盧說文作詩疏曰田犬上黨者為最故曰韓盧詩齊風盧令令盧重盧重環廣雅曰殷曰虞晉曰獒提彌明之衛趙盾晉人曰君之獒不若臣之獒楚茹黃韓盧宋亦作鵲其食不避穢臥不擇地為物苟且故韓非子曰蠅營狗苟其鳴曰吠噬曰咋張牙而吠作欲噬狀曰狺說文作㹞人以聲使之搏噬曰嗾狂犬曰猘亦曰瘛左傳衛子木曰國狗之瘛無不噬也又宋人逐瘛犬入於華臣之室國人從之華臣疑其攻己遂奔陳後漢書曰帝高辛氏有狗名魚止瓠文五色時犬戎兵強募能得犬戎吳將軍首者妻以少女魚止瓠得之於是少女從魚止瓠生男女十二人後子孫繁盛內則曰狗赤股而躁臊凡熱病後即傷寒食犬肉死犬有病者瘦骨立者赤眼者猘者自死者並毒人至死犬老而瘦腹中生痞名狗寶本草云能治隔噎然試之不驗拾遺曰十年青盲取白犬生子目未開時乳頻點狗子目開即愈如此其神未經試驗然點一切肝虛目疾則屢用有效也溺及膽汁點洗熱眼亦勝於諸溺諸膽屎可敷疔瘡惡腫出聖惠方頭骨和貓頭骨煅研能治瘡瘍久不收口身上蠅五七枚擂酒服或和保元湯能托痘瘡不起冬月在狗耳中並出易簡方大唐雜録謂春州人以狗腸為琵琶弦聲甚姜楚未知果否馬其名見傳記者極多不能盡載易傳曰乾為馬為駁馬疏曰有牙如鋸能食虎豹按此說出爾雅曰駁如馬能食虎豹云如馬則明明非馬然則能食虎豹者另是一物易所謂駁馬者毛色斑駁也注家誤引鋸爾雅作倨古字通用也又曰坤元亨利牝馬之貞王粥文言注以為隨事取象不知何義或謂馬孕則不再交此亦諸獸所同綱目曰牡曰騭牝曰騇曰課曰草去勢曰騸一歲曰䭴二歲曰駒三歲曰騑四歲曰駣八歲曰善行曰駿行鈍曰駑有德曰驥八尺曰駥天文圖說辰為馬精歸有光曰龍與馬同氣也周禮瘦人馬八尺以上為龍七尺以上為六尺以上為馬六馬注玉輅駕種馬戎輅駕戎馬金輅駕齊馬象輅駕道馬田輅駕田馬駑馬給宮中之役史記大宛列傳漢得大宛汗血馬名天馬漢書曰元狩二年馬生余吾水中元鼎四年馬生渥窪水中此蓋野馬之良者獻者神其說故云從水中出也又伯樂善相馬能得其神駿於牝牡驥黃之外故云伯樂一過冀北而馬群遂空相馬經曰馬頭為王欲方目為丞相欲明脊為將軍欲強腹為城郭欲張四下為令欲長眼欲高框鼻孔欲大鼻頭有王字火字口中赤膝骨圓而張兩耳相去近前豎尖而厚皆良馬也又有三羸大頭小頸一弱脊大腹二小頸大蹄三又有五駑大頭緩耳一緩軟也長頸不折二短上長下三身短足長大胳短脅四淺髖薄髀五後漢書武帝時善相馬者東門京作銅馬法獻之詔立於魯班門外更名金馬門國憲家猷曰馬口中黑者曰銜烏短壽白額入口者曰梅雁亦曰的盧妨主爾雅曰馬回毛在膺宜乘郭注引伯樂相馬法曰旋毛在腹下如乳者千里馬其在肘後減陽在千茀方在背闋廣郭注邢疏亦不能悉又蠶亦與馬同氣故周禮禁原蠶原再養也一名晚蠶物不能兩大蠶多則馬耗故禁之也馬疲曰虺聵乃人病之通名非專言馬病又古人用馬宗廟齊毫尚純戎事齊力尚疾並見爾雅又惟駕車不單騎至趙武靈王胡服行邊始習用單騎法駕車一車四馬故馬以駟名天文圖說房星為天駟亦以四數論語有馬千駟欲知馬之老少但視其齒穀梁傳荀息左手掌馬右手奉璧曰璧則猶是也而馬齒加長矣性極有毒鞍下肉尤毒別録謂能補虛大誤凡洗血不淨者蓋釜煮者能令人病無夜眼者黑頭者自死者並殺人秦穆公曰食馬肉不飲酒殺人食療本草曰中馬肉毒飲清酒則解飲濁酒則加綱目曰飲菜蔔汁食杏仁皆可解乳性涼能清熱然多飲令人瘦亦劣物也漢時以馬乳造酒置挏馬之官今口外諸處尚有之明人擬遼宮辭曰磔犬燒羊挏乳酒君臣團坐笑傳懷血與汗均有大毒入人肉則死患瘡毒者觸其氣則劇陶隱居曰馬汗馬毛並尿屎患瘡毒人概不宜近總宜熱飲甘醇美酒取醉取汗博濟方曰以黃丹炒令紫色白礬末等分水調塗瘡口靈苑方曰生烏頭末塗多飲熱醇酒瘡中出黃水即愈谷水酒條食療本草曰馬汗氣人瘡欲死者燒粟稈淋汁浸洗俗傳肺最毒而肝實有大毒綱目曰漢武帝云食肉無食馬肝韋莊云食馬留肝又文成侯食馬肝而死大抵馬本毒物不獨肝與肺不可食也其為用有功軍國杜工部詩云所向無空闊真堪托死生明人詩曰力盡猶騰踔功高几潰圍故禮曰敝帷不棄為埋馬也本朝馬政隸兵部車駕司凡八旗馬每歲季春由部以出牧之數具奏並列副都統名請每翼簡用一人掌出牧事每旗視馬多寡撥委官兵陸續領赴口外牧場牧養聽副都統管轄調動至八九月歸牧回京由都察院驗肥瘠副都統及官兵議敘議處有差出牧橐駝亦如之陝西甘州涼州西寧肅州各設牧場以遊擊為總統場分五群各以千把總為牧長外委為牧副兵為牧丁每群牧馬二百四十匹歲課孳生三馬得一至三歲齊其母橐駝五駝得一五歲齊母計其盈虧為賞罰差為三等凡直省營馬提督二十匹總兵十有六副將十有二參將八遊擊六都司守備各四千總把總各二兵自馬步各半至馬一步九每兵一匹芻選秣之數謂之馬乾具冊報部歲終奏銷官兵每用朋扣俸餉存營馬闕動支買補報斃各限以數福建歲准九百三十五匹廣東九百二十一匹直隸及余省均不得過十分之三又限以年江南江西福建浙江湖北湖南四川廣東廣西雲南貴州俱三年直隸山東山西河南陝西甘肅俱五年未及期斃者責賠其買補各按省按年定價有差具冊報部題銷此營馬之制若上用之馬於內務府設上駟院特簡大臣兼管院事無定郎卿二人掌群牧之政所屬左司郎中侍衛員外郎主事掌賞罰右司侍衛員外郎主事掌俸餉芻菽堂主事掌章奏文移筆貼式掌譯又侍衛二十一人掌侍直內八人兼試御馬司鞍長二人司鞍八人司轡二十人皇子每位司鞍二人司轡八人掌服駕凡圉牧設內廄於皇城外外廄於南苑設牧群於盛京及張家口外內廄御馬副馬川馬各一廄均無定數仗馬一廄七十匹公馬五廄廄各二匹附橐駝十匹架車馬二廄廄各馬五十匹騾五十匹外廄御馬內馬克卸馬之選及皇子乘騎謂之內馬凡六廄內挏馬取乳之馬一群騰馬四牝馬三十有六余無定數安西公馬一廄二百匹應差巡馬二百十匹附各廄大淩河牧馬二十四群扇馬十群每君附駝三匹張家口外上都達布遜諾爾牧馬百三十四群扇馬二十四群扇駝六群達里岡崖牝馬六十群走馬一群牝駝十有六群烏良海牝馬三群以上各牧群每群馬自二百匹至五百匹駝自百匹至二百匹不等凡典牧設正副牧長牧副等官牧丁百名內外廄每廄設廄長廄副等官廄丁二十人草夫自十四人至四十四人不等共五百八十六人駕車馬二廄各廄驍騎四十人大淩河設總管翼領效力筆貼式等官每群設正副牧長牧副扇馬每群牧丁二十人牝馬各十五人上都達布遜諾爾設總管副管翼領筆貼式達里岡崖設翼領效力筆貼式每群設牧長牧副每廄群牧丁十人馬群七人凡捍牧專司巡群緝匪以防盜竊各設防禦驍騎校護軍校等官護軍共四百四十餘人凡考牧內外廄院卿歲一按視各牧群三歲一驗駝群六歲一驗各具生息耗損實數以聞聞惟院囿挏馬歲閲三歲一奏不議賞罰其餘通計百匹內疲瘠斃損一二匹廄牧長副議賞三四匹免議五六匹議罰六匹以上議賠生息上都達布遜諾爾達里岡崖每三歲牝馬三匹額生駒一大淩河每三歲牝馬五匹額生駒二浮額百六十匹以上八十匹以下一匹以上闕額百匹以上五十匹以上一匹以上分為三等牧長牧副賞罰有差凡出牧歲四月朔以內外廄公馬四百匹就草張家口外九月望回廄南苑六廄巡群馬以九十匹挏馬全群即南苑就草出入期亦如之凡芻菽黑豆穀草均令各莊輸納倉米由會計司行戶部支取如豆穀草不敷用由會計司轉行廣儲司支銀和買歲於秋季預計一年應用之數行取分給凡供直馬日以內廄御馬四齊其毛具鞍轡立院門外行幸駐以御馬六立園門右直班侍衛司鞍司轡咸侍恭遇車駕巡幸日以十馬備上乘御由掌御馬大臣奏請於御馬內擇其最良者以從其需用駕車馬公馬及橐駝之數附疏以聞凡用馬歲四孟月敬神用青白馬二皇子婚禮薦幣以馬既婚乃給乘馬公主釐降薦市以馬駝生於彌月以馬克賞分封王貝勒貝子給馬駝公給馬直省將軍都統副都統總督巡撫提督總兵入覲各賜馬朝鮮國使臣來朝如之均選公馬之良者給用凡禱馬歲春秋二季禱馬於神系絳帛於御馬三十匹以為識大淩河扇馬系青帛者亦三十匹牝馬群系絳帛者一千三百匹青帛者百七十六匹仗馬廄附養四色馬四十匹堂子青馬天命黑馬香初黃馬蒙古花馬堂子率以十匹詣神前受釐系緑帛凡馬醫設醫長蒙古二人醫師蒙古十有八人癩醫六人獸醫漢十有六人主治馬駝之疾由本院行所司支取藥物歲終會計次年二月奏銷凡京師各廄及在外牧群馬駝皮革均由各衙門送院用左司印記轉交武備院核收無定額驢衍義云驢肉動風肥者尤甚日華子云止一切風誤也食療本草曰脂和生花椒搗綿裹塞耳治老聾千金方曰和鹽少許注目眥治胬肉日三次一月瘥綱目曰熱驢血和麻油一盞攪去沫煮熟即成白色能利大小腸潤燥結李樓奇方曰生驢皮朴硝醃過燒灰油調搽中皮癬名一掃光煞膠入補血藥在處皆可用山東東阿者為最故名阿膠後世醫書謂齊水為地之經脈至東阿潛行地下故阿井之水作膠大補女人經血若無好阿膠不如牛膠蓋阿膠本用牛皮不用驢皮別録云阿膠出東阿縣煮牛皮作之圖經云牛膠只取黏物製作不精耳今之阿膠製作更極不精錦囊詩曰系蟹懸門除鬼疾畫驢掛壁止兒啼注云小兒夜間拗哭素紙墨畫大驢倒懸臥室即止厭勝之求理所有也驟綱目曰古作騾其類有五牡驢交馬而生為騾牡馬交驢而生為駃騠牡驢交牛而生為𩢷牡牛交驢而生為䮰𩦺牡牛交馬而生為駏驉今通呼為騾其肉有毒不宜食又凡牛馬驢犬羊等肉孕婦概不宜食騾則後有鎖骨不能開故不孳孕婦女尤不宜食不拘有娠無娠食之必有産厄又呂氏春秋載趙簡子殺白騾療其臣陽城渠胥之疾不信何疾總屬幻談醫家勿為所誤駝史記大宛列傳作他漢書西域傳曰鄯善國多馲駝又作橐駝後訛為駱駝又作駱駝綱目曰駝馬身羊頭長項垂耳腳三節背有兩肉峰如鞍性耐寒惡熱糞煙如狼煙直上能負千斤日行二三百里又能知泉源水脈凡伏流人所不知視駝足踏處掘之即得水夏日熱風將至駝先聚鳴埋口鼻於地避之其臥而腹不著地屈足露明者為明駝最能行遠於聞有風腳駝疾如風日行千里西域傳云大月氏獨峰駝背上一峰隆起若封土然故呼封牛亦曰𤛑牛穆天子傳曰物牛爾雅曰犦牛北史曰滑國有兩腳駝按馬鞍下牛軛下肉均有毒而獨峰駝峰絶美為八珍珠味之一其餘駝肉性可療久痔開寶本草曰炙熱摩頑痹風癢惡瘡毒腫去死肌舒筋皮攣縮治筋骨踠損曰華子曰敷一切風疾皮膚痹急惡瘡漏爛長食壯筋骨潤皮膚乳補中益氣滋血脈佳物也虎綱目曰楊雄方言云陳魏之間名李父江淮南雄曰李耳或曰䖘𤺊關東西曰伯都左傳作於菟漢書作烏山彳黑攴肘後方曰大蟲蜀中呼老蟲爾雅曰虎竊毛淺也謂之貓黑色曰白色曰甝似虎而五指曰貙似虎而非真曰彪彪乃虎子盧蒲癸之卜慶封曰虎離穴彪見血似虎而有角曰虒叢山密蒨皆有為山獸之雄故呼山君胸有威骨形如乙字其出則風先之易文言曰風從虎怒則威張詩曰闞如虓虎性貪頤六四曰虎視耽耽其欲逐逐若平時無虎之地忽有虎久停不去主水旱諺云虎踏荒古詩云寅年足虎狠故禳虎青詞曰雖是寅年之足或有數存去其乙字之威尚祈神力虎為西方金神性大熱故易卦通驗云立秋虎始嘯月令仲冬虎始交食療本草曰食之已瘧闢精魅入山虎見畏之而已他無所長骨熬膠治風損痹痛筋骨無力虛寒者頗效若內熱及平素肺熱咳嗽者服之即劇蓋其性熱而屬金故專助肺火也其腎不近腰脊故擊之則折俗云銅頭鐵額豆腐腰禽蟲述曰象口隱於鼻虎腎懸於腹虎害人之獸然山中他獸害稼虎至則斂跡是亦有功農事故先王有祭虎迎貓之禮也貓似虎而小首似貓能噬獸不噬人詩曰有貓有虎是也郊特性曰迎貓為其食田鼠也迎虎為其食田豕也按古者大蠟八蠟之祭也主先嗇而祭司嗇祭百種以報嗇先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八聖人之重民事如此然虎噬獸乃至敢於噬人較他獸之害稼尤為可惡豈可迎之本朝設立三旗虎槍營以公侯領侍衛內大臣一人為總統以內大臣都統前鋒護軍統領副都統侍衛叄六人旗為總領三旗各以二百人為虎槍各以七人為長七人為副長恭遇車駕巡狩日以十人佩虎於前導侍衛前行走安營後偵虎豹出入備伏弩箭犁刃行田遇大獸則列槍從之奉旨殺虎或追蹤或尋山得實具奏有旨則殺虎以獻如差往畿輔近地或口外殺虎量地遠近奏請簡總統或總領酌帶虎槍人隨往所以重除民害觀此先王為小利而迎大害非善政矣豹禽蟲述曰虎生三子一名豹果爾宜豹少虎多今山中乃豹多恐別是一種也綱目曰形似虎而小白麵團頭文如金錢或如艾葉甚華美列女傳曰南山之豹隱霧雨以澤其衣毛故以喻潛修之學者西域有金錢豹文如金錢海中有水豹夢溪筆談曰秦人呼豹為程列子曰青寧生程程生馬甚不可信東人呼失利孫又曰失刺孫今口外一種裘與此同名異物而溫厚華美過之價亦極昂本朝曾有御史請禁三品以下不得服用王漁洋先生戲作絶句云京堂詹翰兩衙門齊脫貂裘猞利孫昨夜明月風露冷滿朝誰不怨葵尊上疏御史之別號也見分甘余話字作猞不作失革九五曰大人虎變其文炳也君子豹變其文蔚也本草衍義曰此聖人假喻非果能變形也至詩之赤豹山海經之元豹爾雅之白豹皆不常有其胎至美為八珍味之一別録曰豹肉能安五臟續絶傷輕身益氣冬食尤佳日華子曰壯筋骨強志氣耐寒暑令人猛健食療本草曰令人志氣粗豪其有益審矣若夫虎豹皮毛之為服飾郊特牲曰虎豹之皮示服猛也玉藻曰君羔幦虎大夫士鹿幦豹犆君之右虎裘注幦覆軾也犆緑也俗名鑲邊又唐風有豹裘豹祛左傳楚靈王著豹舄衛莊公為虎幄又古人以飾講席名曰臬比唐戴叔倫詩曰猊座翻蕭瑟臬比喜接連莊子作臬毗亦用以戰左傳公子偃自雱門蒙臬比以犯齊師又胥臣蒙馬以虎皮戰楚究之此物僅可美觀不宜常用起居雜記曰虎豹皮上睡令人神驚毛入瘡有大毒象北戶録名伽耶拾遺曰象具十二生肖肉惟鼻是其本肉煮食糟食皆美其腋下毛白處名象白為八珍味之一綱目曰象出交廣雲南山中及西域諸國力能負重內典曰水行龍力大陸行象力大酋長則飾而乘之春秋遠鬥樞曰搖光之精散而為象足之所履能知地中虛實故天子鹵簿用為前導又可用以戰左傳定公四年吳師及郢楚子使針尹固執燧象以奔吳師以火驅象行明傅友德伐雲南元梁王把匝刺瓦爾密驅象陳如城以戰大宛轉云身毒國人乘象以戰有灰白二色形體臃腫身長丈餘高稱之目才若豕四足如柱無指而有爪甲耳下軃鼻大如臂長至地其端甚深可以開合中有肉爪能拾針芥飲食皆以鼻捲入口一身之力全在於此故傷之則死耳後有穴內空皮薄刺之亦死他處皮肉割之閲宿則創復合故外科用以生肌性畏鼠見地有鼠跡即終日不敢動又畏豬山中有象最害田禾島夷縛豚於樹使喔喔不絶聲象則怖而遠遁明威寧伯王越平兩廣夷人乘象以戰乃不見小豚數千縱之象果披靡口有食齒兩吻另出兩牙夾鼻雄者長六七尺雌亦尺余其牙遇雷則生紋理落則自埋之人取以為器八材之中居其一珠象玉石金木草羽詩泮水章元龜象齒通鑑前編曰紂為象箸箕子嘆曰必且為玉杯其來古矣至於象床象尊象邸象揥象弭象輅象笏皆載籍所傳獨象箸遇飲食有毒則變黑是有大用不比他器僅美觀也交牝在水中以胸相貼與他獸異說文曰三年一乳或云五歲始産壽可一二千歲解人事識人言安祿山命元宗舞象擎杯進酒象擲杯跳躍掀翻御案元季五象不拜明太祖李自成兵破北都過象房群象哀鳴淚下如雨肉味雖不惡然多食令人體重日華本草曰煮汁飲能通小便燒灰服又能縮小便其膽不居腹內宋太宗後苑象斃剖之不得其膽徐鉉曰在前左足索之果然問何以知之曰象膽隨四時而移春在前左足夏在右足秋後左冬後右此時二月故知在前左也其說蓋本於春秋運鬥樞也野豬綱目曰形似豬大牙長出口外數寸能與虎鬥有重數百斤者性能益五臟令人肥日華子曰炙食治腸風下血不過十頓愈脂煉淨和酒日三服令婦人多乳豪豬綱目曰唐本草作蒿豬星經圖曰壁水貐故又呼豲貐通志曰山豬又曰豬郭璞曰吳楚呼鸞豬無雌雄自為牝牡極害稼項脊有棘鬣能激以射入肉有毒有無益熊述異記在陸曰熊在水曰能綱目曰俗呼豬熊小者為狗熊羆為馬熊人熊狒狒亦名人熊俗呼野人與此不同狀如大豕毛黑豎目人足春夏膘肥每升木自投於地以取快為跌膘莊子熊經鳥申是也冬月蟄藏不食飢則舐其掌故掌尤美名熊蹯為八珍味之一胸前有脂白如玉味亦美臑之難熟故楚成王遇弒冀得外救請待熊蹯熟食之而死也劉向新序曰紂以熊蹯不熟而殺疱人左傳曰晉靈公以熊蹯不熟而殺宰夫其行雖遠必有跧伏之所在石岩枯木山中人名熊館搜神記曰熊居樹穴中人擊樹呼子路則出不呼則不動熊與羆皆壯毅之物故書以喻不二心之臣而詩以為男子之祥也肉補虛羸治風痹筋骨不仁殺勞蟲強志氣脂與肉同劉河間曰熊肉振羸兔目明視取其有餘以補不足此言甚當凡用補者理均如是也羆頭高腳長敢猛多力能拔樹木虎亦畏之遇人則立而攫或云即雄熊詩疏謂之黃熊爾雅曰羆如熊黃白文肉粗而味稍減功用則同按熊肉之補過於鹿惟素有痼疾人食之即終身不愈一種小而黃赤者名魋爾雅曰竊毛而黃郭注曰赤黃色故又名赤熊性亦倣佛鹿爾雅曰鹿牡麚牝麀其子麛亦曰其跡速絶有力淡寮方曰斑龍綱目曰牡者有角夏至則解黃質白斑牝者無角小而無斑毛雜黃白孕六月而生性淫一牡常交數牝述異記曰鹿千歲而蒼又五百歲而白又五百歲而元周語穆公徵犬戎得四白鹿以歸名苑曰鹿之大者曰麈尾生長毛群鹿隨之視其尾為準故晉人揮麈清談肉補中益氣強五藏起虛羸調血脈尾肉尤佳為八珍味之一頭肉主陽虛夜夢鬼交蹄肉主諸風腳膝疼痛肝腎虧損下元痿弱血大補陰虛止腰疼鼻衄添精益血治肺痿吐血崩中漏下又解一切金石藥毒均宜乘熱生飲腎壯陽補腎筋壯筋骨續絶傷角熬膠治肝腎虧損精虛血少或細銼炒黃色碾為粉名鹿角霜亦補肝腎又能發痘消腫毒治女人白濁角下茸為補肝腎之首蓋鹿臥則運尾閭通督脈蜷曲如環督主一身之陽故性屬陽而多壽陽虛最宜然血肉有情之物與金石草木燥熱之性迥殊即或陰陽兩虛亦不忌麋爾雅曰麋牡麔牝麎其子其跡躔絶有力狄綱目曰鹿居山性陽故夏至陽極而角解麋居澤性陰故冬至陰極而角解麋似鹿毛青黑肉蹄目下有兩竅為夜目淮南子曰孕女見麋子生四目孕女論胎教之理本不宜見異形諸物而子生四目則諸史所載人疴未之或見也周禮方相氏黃金四目先儒以為劉歆杜撰其血肉脂膏茸角性與鹿同而鹿補陽既不害於陰麋補陰亦何害於陽乃別録云麋脂不可近陰令陰痿孟詵云麋肉多食令人房事軟弱使果如此何以又曰添精暖腎乎綱目反以二說為是非見理之言也且鹿補陽之物宜強陰而鹿茸鹿脂鹿齒諸本草亦有痿陰之語又當作何解陶隱居於麋脂則曰當作令陰不痿亦屬強為之說夫麋性誠補未必近陰即可不痿我輩讀古人書其合理者從之不合理者置之不必過信過疑自蹈塵霧孟子所以有不如無書之嘆也又麋鹿皆能害稼故春秋莊公十七書年多麋麞爾雅曰麕又作麏牡麌牝麜其子其跡解絶有力豜大者曰麃故又曰麠大麃牛尾一角漢武帝郊雍得之漢書郊祀志遂以為麟諛辭也綱目曰麞似鹿而小無角黃黑色雄者有牙出口外無香有香者麝也肉補五臟壯筋骨同鹿肉而力小又能通乳全麞酒煮每頓食又能祛風拾遺曰人心粗莽麞心肝焙乾為末酒服一具即膽小若素怯者服之則轉怯不知所為竊謂人之勇怯由於賦界欲變化之當以禮教豈藥物所能轉移乎如果不虛施之不可化誨之悍婦可以濟禮教之窮矣麂綱目曰似麞而小牡者有短角黧色腳矮而力徑善跳越肉性與麞同又能治五痔皮作靴襪極佳諺云公麞母麂謂麂即牝麞大誤一種稍大者名麖一種大而毛長者名爾雅云旄毛狗足山海經云女幾之山多麖麂今市肆所售鹿筋蹄腳甚小多是麞麂等筋既亦能壯筋骨凡腰膝疼痛下元痿弱者宜多食又道書謂麋鹿麞麂皆無魂殺之不知尋冤仇對報幻談也君子之於禽獸不忍妄殺耳豈畏其魂哉又豈欺其無魂而肆殺哉麝爾雅曰射父麕足俗呼香麞形似也其香能通竅消瓜果積肉食之不畏蛇蟲出食療本草消腹中症塊出本草綱目狐綱目曰有黃黑白三色聲如嬰兒氣極臊烈腋毛純白曰狐白集以為裘極華極暖故有天子狐白裘諸侯狐青裘之制然白處甚少欲成一裘須千狐之腋故合衆美以成一事謂之集腋又國策曰千羊之皮不如一狐之腋言可貴之物不論大小也白虎通曰九尾狐見主王者子孫繁息德至鳥魯則見說文曰狐有三德其色中和小前大後死則首丘廣志狐死首丘豹死首山或云狐知上伏不度阡陌或云狐善聽冰故北方每冬河凍每旦必視狐跡徑過不返車馬始可通行若至中流以回冰猶未堅履之必陷或云狐有媚珠明神宗時妖賊王希賢遇獵者逐狐覆庇之狐德之贈以珠其後聚衆謀叛遇不可招致之人則持珠玩弄凝想其人必聞異香無不傾心投順謂之聞教一說狐斷昆贈希賢非珠也或云能擊尾出火故史記陳涉世家使人篝火作狐鳴以惑衆此狐典最古者至於大禹之娶塗山散宜生之青翰抑又古矣或云狐魅畏狗此道力尚淺者或云狐至百歲禮北斗化為人或云狐三百歲為天狐天神敬之或云狐能修煉成道者名狐生而靈異至三十歲則能幻化他種狐不能也或云狐以積功纍行成道者乃得仙然事極難非數百年不可其幻媚採補者捷徑法也但可修成內丹長生不死耳然人乘其睡竊而吞之則人得壽而狐死或云狐千歲為淫婦百歲為美女出玄中記或云狐乃先古之淫婦名阿紫故今猶以自稱其性多疑故臨事不決曰狐疑其心精進猛勇不甘以獸自待必欲學人往往成人且必欲學仙往往成真得道長仍故我之人倘能如此何學問之足道哉北方最多北人語曰無狐魅不成村南方亦間有其居處有親疏眷屬其待人知恩仇報復豫所知靜處一室總不為禍崇者數處所見呈幻惑令人笑令人怒令人敬令人思令人無可奈何者數事總由德不勝妖於狐奚責或以宿緣宿冤所結於狐奚仇奚恩昔有能詩之狐與俗子交好或詰之狐應以詩曰久陪香案儕仙吏偶躡塵魅阮郎可謂善於解嘲必欲克疱恐遭惡謔獵人不必慕之也貍俗呼野貓字林曰豾貍爾雅曰貍其足蹯有掌曰蹯其跡𠫗印地有指爪痕曰𠫗綱目曰有數種一種毛雜黃黑圓頭大尾者為貓貍其頭面斑文拉雜如鬼原壤歌曰貍首之斑然者是也善竊雞鴨氣臊臭不中食一種斑如貙虎尖頭方口者為虎貍肉不臊可食一種似虎貍尾有黑白錢文相間者為九節貍皮可為裘宋史安陸州貢野貓花貓者是也一種文如豹作麝香氣者為香貍即靈貓也一種白麵尾如牛者為牛尾貍亦曰玉面貍味絶佳冬食尤美俗諺曰天上龍肉地下貍肉洪容齊所謂沙地馬蹄鱉雪天牛尾貓蓋江西土産也一種最小黃斑色者名犱亦可食能治腸風痔瘻及鼠痿圖經曰作羹臛食不過三頓愈按貍亦能為魅但伎倆不及狐耳內則曰食貍去脊不知何義貉綱目曰狀如貍頭鋭鼻尖斑色毛深厚可為裘性好睡與獾同穴而各處圖經曰能補元臟虛寒及女子虛憊考工記曰貉逾汶則死地氣使然也猯一名獾㹠一名豬獾爾雅曰貒子䝏綱目曰形似小豬體肥行鈍耳聾見人乃走唐本草曰水脹垂死者作羹食大效食療本草曰赤白久痢煮熟露一宿空腹和醬食一頓即瘥瘦人食之長肌肉衍義亦曰最益瘦人日用本草曰治咳逆勞熱獾即狗獾爾雅曰貈子貆郭注曰雌者為詩不狩不獵胡瞻爾庭有懸貆兮蜀人呼天狗綱目曰形似小狗而肥尖喙短足深毛褐色可為裘性近豬獾而又能殺疳蟲小兒羸弱宜之豺爾雅曰豺狗足綱目狀如狗胡俗名豺狗前矮後高長尾黃褐色牙如錐體細瘦而猛健虎亦畏之聲如犬吠人惡之以為不祥爾雅翼曰俗傳狗為豺之舅見狗輒跪埤雅曰豺體極瘦故俗云骨瘦如豺後人誤作柴肉臊臭且能損精神消肌肉極不宜食按豺肉固不佳然山中有虎豺則俊於路遇孤行客或前導或後隨之虎不敢出至無虎處乃別去是乃仁獸大有功於人者也古以豺狼比惡人狼則當受豺則誣也孟子亦曰嫂溺不援是豺狼也不以辭害意可矣狼又名毛狗爾雅曰狼牡獾牝狼其子徼絶有力迅綱目曰形如狗鋭頭尖喙高前廣後毛雜黃黑亦有蒼灰色者聲能大能小能作兒啼以魅人善竊雞鴨北方狼能食人故史記項羽本紀曰貪如狼其腸直鳴則後竅皆沸故糞為烽燧直上不撓老則其胡如袋礙行步故東人之於周公有跋胡疐尾之詠又狼短後足不利上山狽短前足不利下山相負而行則兩便故相比為奸曰狼狽又倉猝失措亦曰狼狽唐書德宗本紀涇原兵過京師怒賞薄作亂擁朱泚為主劫瓊林大盈庫帝召禁軍無應者狼狽出奔奉天飲膳正要曰狼肉補五臟厚腸胃腹有冷積者宜之膏能潤燥塗惡瘡惟腸不佳內則曰食狼去腸續博物志云唐時有物名狼筋又作狼中狀如大蝸兩頭光黃色有段祐失金帛集奴婢於庭焚之一婢臉瞤動拾遺曰腳攣縮乃竊物者此術者所為未必實有其物爾雅翼謂為狼䏶中筋誤矣狼乃獸類腹中安得有䏶也兔內則曰兔曰明視爾雅曰兔子嬔俗呼其跡迒絶有力欣狡兔日曰毚詩躍躍毚兔遇犬獲之事類合璧曰兔大如貓形似鼠尾短耳大而鋭上唇缺而無脾前足短尻有九竅舐雄豪而孕五月而吐子大者名王廷相雅述曰兔以潦為鱉鱉以旱為兔熒惑不明則雉生兔似未可信拾遺曰久食絶人血脈損元氣敗陽道性冷故也然綱目謂能涼血解熱毒利大腸藥性本草謂能稀痘痘瘡毒盛及痘後餘毒均宜食劉純治例曰反胃結腸甚者食兔肉極佳大抵內熱則宜內寒則忌又綱目曰兔血解胎中熱毒可催生和熱酒生飲肝退肝熱補肝虛為明目聖藥食療本草曰生食更佳屎名望月砂亦解肝熱為明目去翳之妙品內則食兔去尻鼠綱目曰鼠壽長故稱老鼠嶺南人食而諱之稱家鹿尖喙善穴故稱䶆鼠性多疑故史記曰首鼠首無定向持兩端也有齒無牙前門曰齒兩吻曰牙前爪四偶數屬陰後爪五奇數屬陽鬍子時取象於鼠前四刻為昨夜之陰後四刻為今日之陽也孕一月而生多者六七子獠人取初生未生毛者蜜養之用獻親賓食之聲猶唧唧名蜜唧食療本草曰牡鼠肉牝者無用和五味食治小兒疳瘦圖經曰主骨蒸勞極四肢勞瘦蓋性能通腎又善緣善穿凡腎虛耳聾及骨屬屈伸不利者食此皆有裨益惟骨能令人瘦不可食然可治齒落不生及小兒齒遲拾遺用雄鼠脊骨研末頻擦之炮炙論曰長齒生牙賴雄鼠之脊骨膽滴目治青盲不見滴耳治聾外科大成云老聾者耳內有蟲滴鼠膽則可取而出未知果否或云鼠膽隨死輒消不易得者誤說也抱朴子曰鼠三百歲善憑人而卜名仲能能知一年吉凶及千里外事一種名䶆𪕭最害禾稼能化鯉魚鯉魚亦能化此孫愐曰小鼠也相銜而行秦時有鼠數十萬相銜害稼十六國時數十萬相銜渡江食禾稻殆盡按此害之水處常有但不若是之多耳故老言康熙戊戌吾鄱亦有此鼠大害禾豆一夕遇雷雨盡化鯉魚網之有魚首鼠身者有全身皆魚而鼠足猶在者一種名地鼠又名鼩鼱穴居洲渚大為蘆荻之害一種名田鼠又名隱鼠又名蚡鼠又名鼴鼠最善穴能壅土成坌既害稼又極害堤堰月令季春田鼠化為鴽夏小正八月鴽為鼠是二物交化如鷹鳩也劉青田詠貓詩曰碧眼烏圓食有魚仰看蝴蝶坐階除東風漾漾吹花影一任春來鼠化鴽隆慶辛末夏秋大水蘄黃瀕江之地蚡鼠遍野皆䲙魚所化食蘆稼盡劉積霏雪録曰䲙魚能化蚡鼠蚡鼠亦化䲙魚一種名石鼠周易作碩鼠廣雅作鼠埤雅作雀鼠唐韻作鼠居樹孔中耳似兔尾有長毛人取以飾帽青黃色間有白者善鳴能跳接樹枝如飛鳥又能人立交前足而舞好食粟豆亦食花食嗚廊呼椒鼠或馴養之冬月偎人懷袖可撲家鼠範石湖桂海虞衡志云賓州石鼠專食山豆根其肝可治咽喉𥽇痹一種名竹䶉又名竹㹠生竹林食竹根穴居大如兔肉肥美能補中益氣解毒一種名土撥鼠即唐書之鼤鼥鼠唐韻謂之𪖈鼥蒙古呼答刺不花拾遺曰生西番形如獺肉甚肥美能治瘻瘡飲膳正要曰雖肥而味短難克化動風二說未知孰是一種名鼵鼠禹貢導渭自鳥鼠同穴即此郭璞曰在今隴西首陽山之西南鳥名䳜狀如家雀黃黑色鼠名鼵狀如家鼠而微黃尾短鳥居穴外鼠居穴內一種名黃鼠韓文作禮鼠又曰拱鼠見人則交其前足如拱揖狀乃走詩所謂相鼠有體人而無禮者也又名鼲鼠遼人呼貔貍或曰毗離或曰毗令邦出遼東太原大同延安綏德及沙漠諸地黃色短足善走極肥穴居也土窖如床榻牝牡同居秋時蓄粟豆草木之實以御冬各為小窖別貯之人以水灌穴捕之味美而脆性能潤肺生津熬膏貼瘡腫解毒止痛皮可為裘遼金元時飼以羊乳用供上膳或千里饋遺按此鼠所儲榛栗皆先食劣者而蓄其佳者人或掘而取之則此鼠之食自懸樹枝以死其情大可慘矣官府禁不許取卒不能禁夫一鼠所儲之物能值幾何而乃忍心冒禁取之人心殘惡鄙瑣至於此極道書云聖人躬修至德能使萬物尊我親物今乃以至微之利使其仇我恨我匪獨虧愛物之仁實亦不自愛矣一種名即爾雅之比肩獸與邛邛巨虛比者又名蹶塞北謂之跳兔形色皆似兔長尾尾端有毛躍而不步前足僅寸後足逾尺一跳六七步止即蹶僕土人掘食性無考一種名貂鼠爾雅翼作栗鼠又作松狗以其好食栗及松皮也說文曰出丁零國或云即元史之東印度國耶律文正公遇冉端之地非也印度在西域今口外諸處及盛京朝鮮皆有之肉味甘平性亦滋補皮為裘極佳又耐久國策蘇秦黑貂之裘敝黃金百兩盡蓋極言候命之久也有黃紫黑白諸色綱目曰得風更暖著水不濡遇雪即消佛面如焰拭眯立出珍物也漢制侍中冠金璫飾首前插貂尾加以附蟬取其內徑而外溫故曰金貂陸放翁詩曰食肉定知無骨相珥貂空自謊頭顱是也一種名鼪鼠一名鼬鼠一名地猴一名鼠一名鼠狼黃色身尾長尺有咫極臊臭不可食但能食大蛇又撲鼠最健莊子所謂騏驥不如貍鼪者也一名鼷鼠又曰甘口鼠極細小僅如拇指齧人不痛善食人畜皮膚成瘡故爾雅云有螫毒左傳云食郊牛角者即此物此鼠之最小者一種名鼴鼠又名偃鼠又名鼠母陶隱居曰大如水牛形似豬足似象灰赤色胸尾皆白有力而鈍一名隱鼠肉味似牛其精溺一滴落地即成一小鼠拾遺曰此是獸類非鼠也陶言精溺成鼠遍訪山人無其事按異物志云鼠母頭足似鼠口鋭蒼色大如牛而畏狗見則有水災晉書云宣城郡出隱鼠大如牛形似鼠腳類象而馬蹄灰赤色胸尾白有力而鈍金樓子云晉寧縣境出大鼠狀如牛謂之偃牛毛落田間悉成小鼠梁書倭國即日本國有山鼠如牛又有大蛇能吞之皆與陶說大同小異又爾雅云鼠似鼠而馬蹄一歲千斤秦人謂之小驢即此物也陳氏以陶說為謬不知陶蓋有所本也且出則有災非歲歲常有之事可徵信于山人乎莊子亦曰僵鼠飲河不過滿腹可云非鼠之儔乎此鼠之最大者一種名鼨鼠大如拳文如豹漢武帝曾獲得以問終軍者一種名鼠說文曰一名瘑鼠亦有斑文以上皆本草綱目所載考據可謂詳矣又曰爾雅說文鼠類鼸鼶鼮鼣鼭鼤䶅䶈八種皆無考證語林唐辛怡諫為職方獲異鼠大如拳豹首虎臆怡諫以為鼮鼠盧若虛曰非也此說文所謂鼨鼠豹文而形小又漢世祖會靈臺得鼠如豹文光熒澤竇儀曰此鼮鼠也見爾雅然則八種之中鼮鼠曾有考證古人記載後世未能悉知後世所知古亦未能盡載可見學問無窮也蝟綱目曰爾雅曰匯毛刺俗名刺老鼠陶隱居曰此物能跳入虎耳而見鵲即仰腹受啄陰符經曰禽之制在氣不論大小也淮南子曰蝟使虎申蛇令豹止皮主五痔及腸風下血外臺方用治狾犬傷同人發等分燒灰水服內宜酒煮食療本草曰肥下焦理胃氣令人能食拾遺曰反胃宜食之亦主痔血骨誤食令人肌肉消削骨節縮小膽能止淚董炳集驗方治痘後風熱兩瞼紅爛眵淚不止點入眼甚癢數次即愈此方較勝於烏鴉膽也猩猩古作狌綱目曰自爾雅逸周書而下說猩猩者數十家並云能言禮記亦曰能言爾雅曰猩猩小而好啼郭注亦曰能言而郭義恭廣志云不能言山海經云能識人言爾雅翼曰古今說猩猩者如豕如狗如猴今之說猩猩者與狒狒不相遠云如婦人被髮袒足群行遇人則以手掩其陰亦謂之野人按狒狒食人猩猩不食人猩猩出哀牢夷交趾封溪諸處狀如狗及獼猴耳如豕人面人足黃毛長髮聲如兒啼亦如犬人以酒及木展置道側誘之即呼人祖先姓名而罵頃復嘗酒著屐醉中傾跌因而被擒檻養之將烹則推其肥者泣而遣之見酒與展何以即知主者姓名且知其祖先至神至怪卒以貪酒致敗所謂猩猩知往而不知來也又有獸名格形似猩猩見人不驚避常至人家與人狎處苟欲害之才舉念即疾走不復來此則非猩猩所能及矣血染紅不黯然必先問其數許多則多許少則少殺時不勝捶掠許至一斗乃已蓋嘗思之此物遇人能掩其陰知有禮也臨訣而泣知有義也至於見酒與展能識主者姓名且知其祖先則智在物先也死後流血多寡聽其自主尤怪而又怪也且許多必多許少必少亦不可謂非信也又且不為人害何忍食之乃以血之有用肉之適口卒不免於殺身悲夫語云士不幸而有才女不幸而有貌古詩云翠死因毛貴龜亡為殼靈不如無用物安樂過平生讀說猩猩書不禁惘然也王漁洋之吊淮陰侯曰到頭鍾室恨功狗竟何如杜工部之吊王昭君曰千載琵琶作胡語分明怨恨曲中論皆可為猩猩惜也呂氏春秋曰肉之美者猩猩之唇獾灌之炙綱目曰食之不昧猩猩猶惺惺也不愧其名不飢令人善走窮年無厭可以辟穀出逸書山海經水經自猩猩而外獸之形似人者本草綱目有寓類言其似人而寄於獸也爾雅於猩猩猿猱之類亦曰寓屬邢疏以為因其寄寓木上故曰寓一曰獼猴史記曰沐猴性好拭面如沐也說文曰為猴為字篆文象形也莊子曰狙格古論曰胡孫俗作猢猻柳文曰王孫倦遊録曰馬留眼如愁胡而頰陷有藏食處也故俗云尖咀縮腮尾短無毛手足如人聲嗝嗝若咳毛詩草蟲經曰鳴𧐟𧐟而悲性躁動生相聚死則群守之冀其復生亦知埋葬埋必露尾仍守之不去風過尾搖以為復生也急出之出而又埋埋而又出至腐敗乃已此雖至愚亦見其情之摯矣唐紀昭宗有弄猴稱供奉每朝賀必隨百官行禮後朱溫篡位猴於班部中望見即奮躍上殿擊之被殺降賊諸臣愧之又有翁弄猴乞食於長安市久之翁死猴守之不去人咸義之為葬其尸乃去雄者稍大馴養者知與人合手爪取物甚捷而不能解結類也人以繩對之作結則駭愕如失魂魄又最畏蛇畜馬之家必畜牝猴雲天癸落草上馬食之無疫或云馬晝行勞苦夜倦多眠血凝聚蹄甲成雞眼則行步畏疼不堪馳驟猴性好動置廄中擾馬使不久眠非取其天癸也一種似猴多髯者為豦爾雅曰迅頭山海經名舉父郭注曰大如狗黃黑色好奮頭舉石擲人一種似猴而大者為善攝持人物純牡無牝故又名父亦名猳獸之牡者為猳攝入婦女為偶生子山堂肆考曰猴至百歲變為誤也神異經云西方有獸為蟕大如驢狀如猴純牝無牡常俟要路執男子合之而孕此亦類而牝牡相反者一種大而尾長赤目者為禹爾雅翼曰義獸也人撲其一則舉群啼而相赴雖殺之不去大者名然禺小者名名蜼或作𤢹又作狖又作狖𪕏南人名曰仙猴郭璞曰果然俗作猓然出西南山中居樹上老者居其巔少者以次而下得食傳遞而上先讓老者老者食之以次及少者若食少則少者不食不使老者飢也狀如猿白麵黑頰多髯而毛彩斑斕鼻仰向天尾長於身末分兩歧雨則以歧塞鼻故爾雅曰蜼仰鼻而長尾其行也老者前少者後食相讓居相愛生相聚死相赴柳子所謂仁義禮讓孝慈故古者畫蜼為宗彝也或言即猶豫之猶蓋其性多疑見人則登木上下不定故以比心疑不決者然爾雅云猶如鹿邢疏曰屬則猶非蜼可知一種名蒙頌又名蒙貴爾雅曰猱狀乃蜼之最小者出交趾紫黑色畜以撲鼠勝於畜貓一種名猢說文作鼊黑身白腰如束帶手有長白毛如執笏蜀地志云猢似猴而最捷騰越樹枝如飛鳥一種似猴而金尾者名狨又名猱詩曰毋教猱升木古文作談苑云出川陝山中名金線狨輕捷善緣木甚愛其尾中射則自齧壞之宋時三品以上許用狨座者此也一種似猴而長臂者為猿又作猿出川廣有青白元黃緋數種或言其兩臂可以相通故又名通臂猿誤也其性靜而仁慈善行氣導引故多壽常居樹上著地即泄瀉死其鳴聲悽切入人肝脾動人羈旅之思一鳴三聲末後一聲尤慘故杜詩曰聽猿實下三聲淚故明詩曰巫峽江陵一水分猿啼兩岸夜成群遙知月下孤臣淚才過三聲不可聞王詢手記曰廣人言猿初生純雄無雌毛黑老則變黃潰去陰囊轉雄為雌與黑者交而孕數百歲又變白綱目以為與列子貐變為猿莊子獱狚以猿為雌之說相合語當不妄宋王仁裕畜一猿名野賓久而作詩放之末聯曰三秋果熟松梢健任抱高枝徹曉吟後過璠冢遇一猿躍而前迎呼野賓即噭應哀鳴不忍去仁裕作詩傷日璠冢祠前漢水濱山猿連臂下嶙峋漸來仔細覓前客認得依稀是野賓目宿久無羈紲夢林棲那復稻粱身數聲腸斷連雲叫知是難忘舊主人一種似猴而大能食猿猴者為獨猿猴見之皆跪戰栗不敢仰視獨一一揣摩擇最肥者以片石置其頂即俯伏待啖不敢動不敢鳴共性獨他獸不敢與之為伍又殘賊其同類獨夫之義蓋取諸此一種似猴而大又似人者爾雅曰狒狒又作說文曰又作山海經曰梟羊方輿志曰野人俗呼人熊披髮迅走能食人宋建武中獠人進雌雄二頭人面紅赤色有尾能人言帝問土人丁鑾鑾曰善知生死力負千鉤反踵無膝睡則倚樹獲人則握其臂先笑而後食之上唇甚長笑則反掩其目人以竹筒貫臂誘之俟其笑抽手以錐釘其唇著額而後取之郭贊曰狒狒怪獸披髮摻竹獲人則笑唇蔽其目終亦號咷反為我戮其髮長可為髲血堪染緋飲之使人見鬼一種名上黃下黑食母一種似狒狒而性善不食人者力能伏虎豹聲似人言語然啁哳不可辨雄曰山丈好摺扇雌曰山姑好花粉海録雜事亦有山丈山姑乃獨足鬼妖物也與此不同人遇而饋之晝則闢除猛獸導人行夜則引入巢穴宿虎狼不敢窺至於述異記之山都能變化隱形神異經之山操即山魈犯之使人發寒熱惟畏爆竹煿聲北山經之山𤟤見則天下大風幽明録之木客能與人交易而不見其形死亦殯殮舊云鄱陽山中多木客或云贛州興國山中亦有乃秦時造阿房宮採木之匠與野獸交而孕育者今吾鄉絶不聞有此以及周禮之良方國語之罔兩皆怪物也又如白澤圖之彭候生於千歲之木狀如黑狗食之使人志壯江鄰幾雜志之封肉似小兒手無指身無血食之使人多力山海經之視肉狀如牛肝有兩目食之不盡復生如初尤希奇不經見雖有功用難深信也以上並見本草綱目而微有不同者則杏云雜採諸書補之也惟獼猴以下數種綱目並詳其性味以豫論之猛獸之攻為其害獸猛鳥之攻為其害禽如豦也獨也也狒狒也盡族而殲之不為忍也所以聖人仁育萬物而不廢秋官者殺所當殺也若乃如果然之仁讓孝慈山姑山丈之利濟行旅通臂猿之育德潛修以及擊賊之忠守尸之義戀主之忱人且不能學之敢殺之食之乎即如獼猴蒙頌猢金尾狨之類大都與人無害與世無爭蟕之與乃至與人相亂似乎大害於人而一無雌不以雌獸匹一無雄不與雄獸偶必合以人者誠造物弄奇自開闢以至於今未之或改而其種未絶也蓋嘗思之以馬牛驢雜合之種且不能滋息況獸與人合僅可以長存理誠難測故云造物弄奇且也犬戎見諸周紀廩君載在漢書今西藏之中有馬哈沁荒彝而外有垂尾之民其先皆獸種也夫又安知千百年後此等似人之形過人之德之獸不胥入於人類乎獵而食之惡乎其可夫束草象人以葬仲尼且謂其無後況生而肖人形具人性者乎語云善獵者必不善終莊子云有機心者必有機事舉凡鳥獸蟲魚何物不知貪生何物可以輕殺是又不論似人與否也或曰搜苗獮狩聖世之經何乃以獵為大戒不知四時之狩所以講武非為從禽故寧範我馳驅不憂終日無獲且深林大藪醜類必多慮其為害於人物驅而殺之是即秋官冥氏翨氏之遺意焉不可援以為例也吾鄉有善火槍者百發百中年五十餘病譫語自云有千百鳥啄其頭目胸背又有千百獸噆其脛股陰囊呼號痛楚晝夜不休至十餘日九竅流血而死鄰邑萬年王姓者善火槍無虛發一日攜槍擊飛鳥槍喑不鳴火繩亦滅遙見隔隴有人工作就與語倚槍於肩槍忽轟然一發槍子從右耳根入左腦出入處孔僅如錐出處擊去腦骨一片大如盞其人倒地爬搔泥土至成坑坎手爪爬至見骨墮落數枚亦不自知血流鬥許閲數十刻乃死槍子中人如遇霹靂聲發即死不能移一步不能出一聲此獨可延數十刻之久者蓋其生平快意於鉛子者甚多鬼神故遲其死使備嘗此中之況味也數十年前有善設機械獲禽獸者一日見墓間有獸穴設套筒於穴口初更往視套筒已發被野獸拖入穴內乃臥地入手牽之不意穴內有人執其手向內曳手冷如冰其人急向外曳極力不能出同伴者助之始出燭之自指至臂黑如煙煤一臂遂庭久之雙臂俱廢終身不復能設機械矣三十年前郡城石灰巷牆圮數丈壓死五人其三人不知誰何二人者豫所素識蓋善設機械獲鳥獸之人也此牆亦天之機械也彼適遇之漆園之戒信矣夫震肉此六畜為天雷震死者綱目曰雷書云食震肉令人成大風病語甚有理拾遺曰小兒夜驚及大人因驚失心者作脯食之良病由驚得及治以雷是或一道也酪一名湩諸乳之總稱也綱目曰諸畜乳皆可造酪臞仙神隱曰造法用乳半勺鍋內炒過入余乳熬數十沸常以勺縱橫攪傾出罐盛待冷掠取浮皮作酥入舊酪少許紙封罐口即成酪又以酪曝之掠去浮皮再曝再掠至皮盡入鍋略炒又曝至干可作塊名乾酪日華子曰性能止煩渴解熱悶及心膈熱痛綱目曰潤燥利大腸生精血補虛損壯顏色又消熱腫止熱痛以酪熬熱入鹽少許摩之食療本草曰內寒及患痢人忌食又不可同醋食酥一名酥油塞北名馬思哥油南方無酥用油作餅餌亦曰起酥誤也凡藥有用酥炙者宜以乳代切勿因起酥二字誤用油也神隱書曰造法用造酩所掠浮皮再熬候油出去渣又略熬即成此乃酪之精華酪所主病此皆能治又能除肺熱止熱咳吐血又止急痛心腹痛則飲之瘡瘍痛則摩之唐本草曰性與酪異非也醍醐世間味美莫過於此故釋氏以喻悟道後之景象曰醍醐灌頂甘露灑心衍義曰酪面浮皮為酥酥熬之面上如油者為醍醐唐本草曰好酥一石只得三四升孫氏曰能填精髓久服延年本草會編酥酪醍醐性皆潤滑宜於血虛血熱枯燥之人功不甚相遠俱不可同生魚鯗生肉膾食能變蟲諸鳥有毒鳥死目閉足縮不伸爪拳不開白鳥黑首黑鳥白首三足四距六趾四翼異形異色五色備諸獸有毒牛獨肝羊獨角黑牛白頭黑羊白頭豬牛羊心肝有孔白馬黑頭白馬青蹄馬無夜眼馬鞍下黑肉馬肺馬肝馬血馬生角牛肝狗腸牛軛下黑肉牛馬生疔死六畜瘟死疥癩死獸自死首北向死而口不閉狾犬犬有懸蹄鹿白臆鹿文如豹諸畜帶龍形獸歧尾獸足赤獸並頭諸畜肉中有米星禽獸肝青肉亦勿食中毒箭死米甕中肉脯凡脯不宜安放米甕脯沾茅屋漏郁肉煮肉熟未冷用密器蓋不透風者為郁肉諸肉熟血不斷祭肉自動諸臟腑著草自動脯曝不燥生肉不斂水得鹽醋不變色煮不熟煮熟不斂水墮地不沾泥落水浮肉經宿尚暖與犬犬不食凡肉疑有毒以此法試之極驗極穩以上並不可食殺人病人令人生惡疔大毒或發舊病終身不愈諸心損心肝損肝此二者言多食久食之害諸脾損脾諸胰滑腸作泄諸髓敗陽損精諸血敗血傷血臭脯痿人陰傷女子胎令人生水病此五者不論多寡久暫總不宜食春不食肝夏不食心秋不食肺冬不食腎四季不食脾此不必拘惟脾總不宜食解諸毒法不拘自死瘟死等物總解諸肉毒六畜干屎末伏龍肝末黃檗末赤小豆燒末東壁土末苦參末生白扁豆末並水調服不拘分兩淡豆豉開水浸擂布中絞汁飲人乳以多為妙人頭垢一錢水調服入喉即吐能起死人女人發上有油其頭垢不可用真阿魏開水化服亦妙馬肉毒美酒最佳次則嚼生杏仁飲菜蔔蘆根汁甘草汁馬肝毒豬骨灰牡鼠屎狗屎灰豆豉末人頭垢並水服食馬牛肉生疔此旦生夕死之症冬菊花煎酒最妙無花用葉無葉用根次則澤蘭葉或根煎酒石菖蒲根葉搗沖熱酒又次則甘草煎濃湯豬牙灰水服牛肉毒豬脂化開水飲甘草汁豬牙灰水服獨肝牛毒人乳多飲狗肉毒生杏仁研水服羊肉毒甘草煎濃汁服豬肉毒生韭汁皮硝化水濃細茶俱可漏脯郁肉米甕肉毒黑大豆汁冷飲藥箭肉毒先服鹽湯一二盞後煮黑豆濃汁盡飲食肉過傷本畜骨灰水服生韭汁芫荽煎汁無則用子宜多飲善治中毒下血不止濃細茶阿魏煎汁俱可食肉不消還飲本汁食本獸腦均非佳法莫如生韭汁濃茶阿魏或人頭垢吐之尤妙或山查同白糖煎濃汁頻飲亦佳食諸卵不消飲白糖水真米醋以上並出本草綱目其不同者杏云所訂補也調疾飲食辨卷之六魚蟲類古者人掌以時魚鱉人掌取互物以時簎魚鱉龜蜃川衡掌川澤之禁祭祀賓客供其魚蜃蛤不妄取也故宣公夏濫於泗淵里革斷其罟而棄之以為山不槎蘖澤不伐夭魚禁鯤鮞獸長鳥翼卵蟲舍蚔蝝古之訓也後世則不然既已焚林而狩即無妨竭澤而漁羅無日不施遑問水蟲之孕哉雖然雀鷃蜩𧍙並列賓筵蚔醢同登鼎俎後人且不若是其饞古人貪而無藝一至此乎是記為病人而設常食之品可以供我朵頤因病而施更且借為藥物其餘一概略之不謀與庖丁作食譜也鯉魚為諸魚之長其脊鱗三十六片鯉三十六鱗為老陰龍下一鱗為老陽故皆能變化老變而少不變也段成式寄溫庭筠詩云三十六鱗充使時數番猶得表相思宋景文詩云君軒戀結蕭蕭馬尺素愁憑六六魚並用鯉魚傳書故事也極大不過三十六斤陰數之盡能變至陽故飛越江河上龍門即化為龍漢書地理志注曰交州有龍門水深百尋魚躍過此雷為燒尾即化為龍不得過者腮點額而已故唐人比進士登科為登龍門後漢書李膺負重名被其接見者謂之登龍門注龍門在絳州按龍門見禹貢本河流入中國之所故唐人有河鯉登龍門詩作蜂州者是然鯉魚化龍亦無人確見其在何處交州近海或別有一龍門亦未可知然潦歲鼠能化鯉旱歲鯉亦化鼠此則不可解也綱目曰古今注云袞州人呼赤鯉為元駒白鯉為黃驥黃鯉為黃騅因古有仙人琴高乘鯉魚飛升之說故命以馬名也性能逐水消腫利小便東陽方治水腫醋煮鯉魚食外臺方同赤小豆煮食飲汁盡日一作醫方摘要要一斤重者凡用鯉魚治病必滿一斤小則無力破開不見水及鹽以生白礬二錢研末入腹內火紙包裹陳米醋和黃土泥之煨熟食蓋魚生於水故能治水凡魚皆然鯉力為大元儒劉因曰不能有以勝彼之氣即不能生於其氣之中而物之與是氣俱生者夫固必使有用於是氣也又治久腫惡風入腹及女人産門牝戶翻腫腹內掣痛噓吸短氣咳嗽者外臺方用一尺五寸大鯉魚入人尿浸一宿平旦以舊木篦從頭貫至尾煮熟去皮空心頓食勿用鹽鯉性動風今反用以治風洵屬奇劑然助熱生風發瘡發毒凡風損瘡瘍瘧痢及一切熱病天行病後痘後或陰虛火旺並宿有癥瘕之人概宜嚴戒食療本草曰鯉魚脊上兩筋及黑血並有毒溪澗中者毒在腦俱不可食中其毒者浮萍煎汁飲出折肱漫録又煎炙煙入目能損明陶隱居曰山上水中者慎不可食膽滴目治赤腫滴耳治聾齒治石淋小便內溺出砂石古今録驗方用鯉魚齒一升研末三年陳醋和服分三日服盡外臺方用酒服蓋尿中砂石乃膀胱熱氣所結自無形而之有形也用鯉魚齒亦是通調水道之意鯇魚一名草魚一名鰀魚爾雅注作魚俗呼晚魚春時鯉魚散子淺水中水退子干不以時出復漲始生者為晚形似鯉身稍圓性較鯉魚稍不毒然魚皆熱動風發毒之害亦不能無綱目曰暖胃和中延壽書曰能發諸瘡合二說觀之始為定論青魚亦作鯖古之所謂五侯鯖者是也大者名鱗形似鯇而背青較鯇又稍佳能止冷瀉治腳氣腳弱濕痹益氣力然魚性總熱亦不宜久食膽同黃連末點眼治赤腫同膽礬點喉吐喉痹痰涎在諸魚膽之上開寶本草曰眼睛汁注目能夜視綱目曰頭中魫骨蒸熟色如琥珀大者可作飲器能解蠱毒鯔魚形似青魚背色更深故名鯔其子滿腹粵人呼子魚性喜食泥肉味肥美開寶本草曰開胃利五臟令人肥健然亦不免於熱陰虛熱病人不宜白魚一作鮊又名魚當作髚形扁腹窄白色細鱗有光頭尾向上火之象也善躍火之性也武王白魚入舟即此動風助火發毒生膿較他魚尤甚日用本草曰調五臟理經絡日華子曰補肝明目助血脈皆誤也又云隔宿者令人腹冷更為非理魚者熱中內經明訓無令人腹冷之理綱目既知其非復云比他魚似可食是為見理不真也鱤魚一名黃頰魚又曰𩹴魚綱目曰貪食無厭曰𩹴此魚啖魚最毒也又名鰥魚性好獨行也詩曰其魚魴鰥又其遊行覓食雖夜不停故警夜木梆刻作此行山海經曰姑兒之山多鱤魚頭似鯇而口大頰似鮎而色黃鱗似鱒而稍細大者可一二百斤力量猛觸箔即穿躍可至尋丈食之已嘔止冷瀉暖中益胃按此諸有鱗魚皆有之功中寒人宜之者也然性熱已在言外矣鯽魚綱目曰又名鮒魚呂氏春秋曰魚之美者洞庭之鮒埤雅曰鯽即也鮒附也此魚旅行相即而相附也形似小鯉腹稍闊生肥水者脊微黑味甚佳頭味尤勝性喜偎泥故能益胃治久虛冷痢冷瀉蜀本草云夏月熱利亦可食蓋此魚食草夏月草茂食足味更美耳朱震亨曰諸魚屬火獨鯽屬土故能調胃寬腸多食亦能動火夫調胃寬腸信有之屬土之說豈其然乎若因其偎泥則凡鮎鱯之類皆偎泥皆屬土乎既且屬土何以又動火乎又胯上便毒同山藥搗敷出醫林要集手足瘭疽纍纍如赤豆掐之汁出大鯽魚一尾亂髮如雞子大一團豬脂一升同煎膏塗出千金方外科有鯽魚膏凡疔疽皆用張鼎曰藥中用麥門冬者忌食䲙魚本草作鰟魮鯽吾鄉直呼鰟魮魚不以鯽名也綱目曰形似小鯿非鯽類甚薄無肉魚之最下者或謂即爾雅之鱖鯞郭注曰妾魚婢魚似鮒子而黑古今注曰青衣魚皆賤之之辭也味既不佳性又無取動風發毒助火在諸魚之上凡有纖微瘡毒食之即發又復生蟲百病不宜也又能化鼠害稼魴魚爾雅曰魴魾又名鯿魚綱目曰魴方也鯿扁也其狀方其形扁也小頭縮項蘇長公退庵詩曰百丈休牽上瀨船一鉤獨釣縮頭穹脊闊腹扁身細鱗其色青白腹內有肪味最鮮美又有一種脊更隆有鬣連尾如鯿蝠翼黑質赤章色如因火名火燒鯿較白鯿更大有二三十斤者故詩曰魴魚頳尾注家必欲牽合正意曰魚勞則尾赤不知本有此種且詩人感物造端名曰興體可以關合正意者固多其不相關合者亦不少何必強為之說哉食療本草曰調胃助脾止冷瀉令人能食熱病及疳痢人忌之鱮魚又名鰱綱目曰酒之美者曰鱮魚之美者曰鱮埤雅曰性好群行相與也故曰草一口土相連也故曰鰱狀如鱅而頭小細鱗肥腹色白能溫中開胃止冷瀉多食令人熱渴又發瘡疥熱病忌之鱅魚形全似鰱但頭大而且肥俗誤呼鰱胖頭蓋緣詩疏有鱮似魴而大頭之語故沿誤也不知鰱乃鱮魚頭不胖色白此魚色微青頭胖一名饈魚鄭康成詩注作溶魚性與鰱不甚相遠熱病風損瘡瘍均忌又此魚目旁有曲骨如乙字禮記曰食魚去乙或曰魚腸名鯝又名乙禮所謂去乙者去腸也泛指諸魚非專謂鱅也其理較優性惟食草不食小魚山居鑿池畜養苗盡是此種極易長大為利亦溥也鱒魚又名鮅魚形似鯶而鱗細青質赤章身圓長有赤脈貫目故又名赤眼魚爾雅正義鱒好獨行自尊而必者故名性總不離乎熱綱目曰暖胃和中多食動風熱發瘡癬因其身有赤斑與癬相似故能髮癬此理須知鱖魚一名罽魚一名水豚綱目曰罽𦇧也其斑文如織𦇧也日華子曰味如豚故名水豚開寶本草曰昔有仙人劉憑嘗食石桂魚桂鱖同音當即是此鱖魚之色黑者目光如漆俗呼石鱖其色白者目不光俗呼泥鱖則石桂乃石鱖之訛審矣其形扁腹闊大口細鱗背有鬐鬣厚皮緊肉肉中無細刺肚味亦佳善啖小魚夏居石穴冬則偎泥罧魚之沉下者也故性不甚熱魚之善躍與浮游水面者熱最甚鱤魚白魚鰷魚鱭魚之屬是也不善躍而游水者熱稍平青魚鯽魚魴魚鯇魚之屬是也其不能躍而沉水底偎泥者熱最輕或竟不熱鱖魚魚鱧魚鰍魚之屬是也考魚性者當以此為率他魚皆貴大此則小者最佳至二三斤以上則氣膻味減性能補虛勞益脾胃出食療本草又去腹中惡血殺腹內小蟲出開寶本草又治腸風瀉血出日華本草凡有以上諸虛諸病人宜食又張杲醫說云越州邵氏女病勞瘵纍年偶食鱖魚羹遂愈正與補虛殺蟲之說相合又其尾貼小兒軟癤甚效又與去惡血之言相合誠水族之良也魚俗作鯮俗書等字皆省作宗不可從生江湖水深闊處似鱤魚體圓厚長身細鱗背黃腹白善啖小魚其喙甚長如吹喇叭之狀故呼喇叭食療本草曰補五臟益筋骨和脾胃止冷瀉曝乾更香美按此物雖佳陰虛熱病亦不宜過食魚總熱也鱸魚綱目曰鱸出吳中淞江龍盛長僅數寸似鱖而色白有黑點巨口細鱗四腮故呼四腮魚南郡記曰吳人獻鱸魚羹於隋煬帝帝曰金齏玉鱠東南佳味也嘉定本草曰補五臟益筋骨和腸胃治水氣衍義曰益肝腎食療曰能安胎中其毒蘆根汁解之禹錫曰多食發痃癖瘡腫又不可同乳酪食按諸家說鱸魚似乎甚美何以有毒何以發病傷人非熱中之明驗乎縱能滋補病人總不宜也鰣魚食鑑本草曰初夏時有余月則無故名綱目曰出江東每四月鱭魚出後即出人甚珍之應天府今江寧府以充御貢似魴稍狹白色如銀肉中細刺極多漁人以絲網沉水取之一鱗掛絲即不復動禽蟲述曰鰣魚胃絲而不動護其鱗也故其美在鱗味甚肥然過肥令人嫌厭彭淵材至以鰣魚多刺為三恨之一文人遊戲之筆也其性一無可取能發痼疾動疳蟲又能生疫病蜀人呼為瘟魚說鈴曰多出鰣魚之歲必有瘟疫非虛語也獨其油瓶盛埋土中塗湯火傷頗效鱭魚一名鮆一名望魚異物志云是鰽鳥所化腹中尚有鳥腎故又名鰽魚幻說也狀狹長如削木片亦如薄篾又如長薄尖刀故又名魛魚爾雅曰鮤鱴刀吾鄉名鱭花細鱗白色腹下快利如刀肉如紙薄細刺極多性能助火生風發瘡發疥亦發瘟疫凡纖微有病患人概不宜食又此魚出多一冬魚出必少來春病發必多是不惟害人且害其同類真劣物也鰷魚爾雅曰鮂黑鯔郭注曰即白鰷一名䱗魚吾鄉呼䱗子魚長僅數寸形狹而扁如柳葉好群行荀子曰鰷浮揚之魚也王右丞曰輕鰷出水言其浮游善躍也綱目曰暖胃止冷瀉然魚浮者熱必甚熱在上焦及口齒咽喉頭面耳目有病者不宜也鱵魚臨海異物志名銅哾魚俗名姜公魚云姜太公釣針所化吾鄉呼針公魚則姜乃針之訛耳形似鱠殘但不及其熒白啄前刺如針東山經曰𣲵水北注於湖中多針魚狀如鰷其啄如針食之無疫按此魚之闢瘟疫實有奇功若冬月多收淡乾者夏秋食之不惟無疫即痢疾盛行時亦不傳染已染者食之易愈又能消腫脹不拘氣腫水腫微加鹽醋蔥姜以愈為度鯊魚爾雅曰鯊鮀郭注曰吹沙一名沙鰮俗呼沙溝魚又名阿浪魚又名船碇魚綱目誤以杜父於為船碇曰大者僅四五寸小才一二寸體圓似鱔厚肉細鱗黃白色間黑斑點背有鬐刺甚硬其尾不歧小時即有子其肉食之暖中益氣據此說明系鮀魚非杜父也其性熱而有毒能動風助火發毒生蟲暖中誠有之益氣則未也又此與海中沙魚名同物異石首魚綱目曰嶺表録異作石頭魚拾遺記名鮸魚浙江省志名江魚臨海異物志名黃花魚乾者為鯗魚不用鹽醃淡曝為鯗一作鱗爾雅翼曰諸魚嘉乾者皆為謄石首最美故得專稱白者佳故呼白謄露風則變紅色朱味也生東南海中形似白魚扁身弱骨細鱗黃色如金首有白石二枚瑩潔如玉至秋化為冠鳧此鳧頭中亦有石故疑此魚所化其實非也腹中白鰾可作膠異物志云小者名䠓水其次名春來田九成遊覽志云每四月來自海洋綿亙數里其聲如雷海人以竹筒探水底聞聲乃下網截流取之潑以淡水皆圉圉無力初水來者甚佳二水三水魚漸小味漸減矣俗云來鰣去鯗謂春時泝流而上為鰣至四月上而返下為鯗誤也此與鰾魚形狀種類各異且鰣能發瘟疫此則能治病補虛性又大不相同開寶本草曰鮮者同蓴菜作羹開胃益氣非益氣調氣也性大能益血曝乾白鯗能消瓜果積及諸生冷食滯治下利及腹脹不消陸文量椒園雜記云痢疾最忌油膩生冷惟白鯗宜食蓋鯗飲鹹水性不熱且無脂不膩故無熱中之患而能消脹理脾胃也今人食鯗必和豬肉煮味極鮮肥若以治痢宜單煮加鹽醋不得見肉嘉魚一名丙穴魚左思蜀都賦云嘉魚出於丙穴李善注云丙日出穴或云穴向丙耳魚豈能擇日而出耶拾遺曰燕避戊己鶴知夜半見抱朴子於魚獨不知丙日耶綱目曰嘉美也河陽呼鮇魚言味美也蜀人呼拙魚言性鈍也按丙穴之說不一文選注曰在漢中沔縣有二所水經曰丙水出丙穴穴口向丙據此則丙日之說非也黃雀曰蜀中丙穴甚多嘉州雅州梁山大邑皆有不獨漢中也諸穴所向豈能畫一則向丙之說亦非也任豫益州記云嘉魚蜀郡處處有之狀如鯉鱗細如鱒肉肥美食乳泉出丙穴夔州府志云春社前出秋社後歸身長細鱗首有黑點肉白如玉食鹽泉味頗咸範石湖虞衡志曰梧州人為鮓以餉遠嶺表録異曰蒼梧戎縣出嘉魚似鱒而肥美是則粵西亦有之出於丙穴之說亦大不然也食療本草曰常於崖下食乳石沫故能滋補暖胃止冷瀉拾遺曰治腎虛消渴勞瘦虛損誤也魚性本熱加以乳石更熱內寒極宜內熱及瘡瘍宜戒之豈可反用以治虛勞消渴乎比目魚綱目曰比並也魚各一目相併而行也爾雅所謂東方有比目魚不比不行其名曰鰈是也北戶録謂之鰜吳都賦謂之魪上林賦謂之魼臨海志名婢風土記名奴南越志名版魚異物志名箬葉皆因形也俗呼鞋底魚食療本草曰補虛益氣力多食動氣按此魚多食難克化其性則能補血也鱧魚本經名蠡魚小者名鮦爾雅曰鱧郭注曰鮦也邢疏曰即䱰魚也又曰鯉大者鮦小者鮵埤雅曰元鱧圖經曰黑鱧又曰烏鱧又曰文魚吾鄉呼烏魚或曰墨魚詩注以為鯇魚大誤綱目曰首有七星夜朝北斗知君臣之禮故名與蛇通氣體圓細鱗黑色有斑絶似蝮蛇有舌有齒有肚背腹有鬣連尾尾不歧善啖小魚生止水者自食其子至盡冬時水涸不隨水去伏泥中可以陸處肉緊味短食品最劣道家以為水厭戒不可食衍義曰發痼疾食鑑曰有毒無益別録曰有瘡者食之令瘢白皆言其害也然本經曰療五痔治濕痹面目浮腫陶隱居曰和赤小豆煮消腫滿食療曰下大小便壅氣及腳氣風氣圖經曰主妊娠有水氣食醫心鏡曰一斤以上者煮汁和冬瓜蔥白食能救水氣將死其效皆不虛也醫方摘要曰除夕黃昏時用大烏魚一尾小者二三尾煮湯浴兒遍身七竅俱到可以免痘不可嫌腥洗去如不信留一手或一足勿洗出痘時此處必多此方云異人所傳未經試驗又治一切風瘡頑癬疥癩年久者用黑火柴頭魚一尾即鱧魚去腸肚以蒼耳葉填滿外以蒼耳子安鍋底略著水不如酒置魚於上慢火蒸熟去皮骨淡食勿用鹽醬日一作以愈為度出醫方集要其膽味甘不苦能治喉痹將死點少許即愈或水調灌之出靈苑方以上有鱗魚鰻鱺一名白一名蛇魚乾者名風鰻臭腐無味病人勿食說文曰鱺與鱧同趙闢公雜記曰此魚有雄無雌以影漫於鱧魚其子皆附鱧鬐而生或云鮎亦産鰻陶隱居云能上樹食藤花均屬幻談食療本草曰歙州出一種五色者最難得謬說也日用本草曰腹下有黑斑者夷堅續志曰背有白點者無腮者本草會編曰重二三斤者水行昂首者均不可食能殺人況五色乎爾雅邢疏亦有此說切勿為其所誤綱目曰鰻鱺所主傳尸鬼疰小兒疳勞蟲攻心痛女人陰瘡蟲癢一切風瘙如蟲行癧瘍瘡痿諸病及燒煙燻蚊令化為水熏氈裘闢蛀置箱篋斷蠹其功專在殺蟲去風耳與蛇同氣故主治亦同按日華本草曰治勞損暖腰膝起陽食療本草曰和五味食甚補益蓋凡物脂肥者皆補鰻鱺脂膏最厚性雖有毒卻能補虛冶瘵通經絡壯筋骨即稽神録所載金山漁者撈得病瘵女子食以鰻鱺遂愈之說亦由得力於補豈盡關殺蟲哉惟孕婦食之令兒多疾同銀杏食令人患軟風性有毒故也折肱漫録曰大鰻魚骨一條連頭新瓦煅存性為末砂糖攪淡薑湯下可治噤口痢理可信存以備急可也或不用姜以黃連湯下更穩魚俗作鱔非黃質黑章故稱黃劉向異苑作黃鰓形似蛇夏出冬蟄體多涎沫類鰻而無鬣小者佳大者有毒愈大愈毒能殺人亦類鰻綱目曰血治口眼喎斜同麝香少許左喎塗右右喎塗左正即洗去又治耳痛滴之又治痘後目翳又治目中出痘初見時急點之即可拔去大抵善穿穴無足而竄與蛇同性故能走經絡去風邪及口喎耳目諸竅之病按綱目之言是已然亦忘其能補拾遺曰補虛損益血氣通經絡壯筋骸祛風邪卻濕痹又治産後惡露淋瀝不止凡病在經絡及血分與筋無力陰虛血熱者宜之亦不免有毒夜以燈照通身浮水面者項下有白點者能跳躍嗛火者皆是蛇種蛇與交並殺人中其毒者食蟹解之出集見方天行病後尤不可食鰌魚俗作鰍非爾雅曰鰼鰍郭注曰泥鰍有二種一種似鱔青黑色背有鬐肉少刺多味亦短名刺鰍一種背青腹白無鬐刺亨小肉鬣肉厚味美名肉鰍綱目曰暖中益氣吳球曰調中收痔按鰌之功用不止此凡養陰益血通經絡攻瘡毒補虛羸壯筋骨之效均與鰻鱔同凡草作藤蔓者皆能走經絡治筋骨之病形相似也魚之有鰻鱔鰌三種其形亦同故俱能通經絡壯筋骨而鰻鱔之良者有益毒者害人鰌則有良無毒其品乃在鰻鱔之上石癰堅硬凡大癰大毒血不成膿痘不成漿俗醫用黃鱔鯉魚雞汁等毒物發之未免貽後日之患不如此魚加酒煮食飲其汁效更速而無弊也又普濟方治消渴沃焦散鰌魚陰乾去頭尾燒灰乾荷葉等分為末每服二錢日三服新汲水下又海鰌生海中初生未開目時即長數十丈或百餘丈而且風雷雲霧隨之然遊至淺水人力得而制之云味極肥美豫曾見其截骨一段長尺余大可盈拱重至數十斤此或別是一種神物因其形長而無鱗無足故命以鰌名非鰌類也至水經曰海鰌入穴則潮湧出穴則潮退出入有節故潮有時此極言海鰌之大不知潮隨月吸也鱠殘魚博物志曰吳王闔閭江行食鱠棄其餘於水化此魚或又作越王故名鱠殘又名王余或又作僧寶志皆幻說也外無鱗內無刺瑩白如銀故又名銀魚綱目曰出蘇松浙江等處大者長四五寸彼人尤重小者曝乾以貨四方按此魚吾鄉亦多有小者才寸余今市肆以江南泗州為最食鑑本草曰寬中益胃滋氣血養陰陽百病無忌春魚小魚也綱目以為鱊魚非也鱊魚亦見爾雅曰鱊鮬鱖鯞味不佳此魚味絶佳作臘名鵝毛脡淡干為臘性能滋氣血養陰陽和中益氣令人喜悅綱目曰北戶録云出恩州鹽藏不如淡曝其細如毛廣志曰武陽小魚大如針一斤千頭蜀人以為醬一統志曰廣東陽江縣最多興國州諸處亦有按此魚春末夏初多出或曰鱧魚苗大誤此自一種小魚非魚苗也俗呼魚亦誤乃魚苗之通稱見家語魚之大者為小者為是也鮧魚一名鮎魚俗作𩽴非一名鯷魚綱目曰鮎魚無鱗大頭偃額大口大腹背無鬐鬣有齒有須有胃多涎沫生流水者色青白即爾雅之鰋魚生止水者色青黃即爾雅之鮎魚大抵鰋與鮎一種二類又有八須者味較美陶隱居曰作補人蘇恭曰療水腫利小便均謬說也此魚煮時火候不足能戟人喉舌與鱯魚黃䰲鰟魮四種為水中至毒之物且背色青腹中子色全緑木之象也故最能動風發毒不拘內外寒熱虛實百病概不宜食瘡瘍風損尤切忌之平人亦勿多食同甘草煮殺人八須者更毒其尾可貼口跟喎斜此乃外治以風引風之意也圖經曰寒而有毒赤目赤腮及無腮者並殺人鱯魚一名𩸄魚一名䲚魚一名鮠魚又作鮰魚爾雅曰魾大鱯小者鮡性略似鮎而毒加甚秦人謂其發癩圖經曰能合人生癩發痼疾蓋氣腥而且膻故動風發毒為最平人病人概不宜食黃䰲魚綱目曰一名䱀䰲或析而呼之曰黃䱀黃䰲詩曰鱨注曰黃頰又名黃顙陸疏作黃楊形似小鮎色黃不似腮下有二橫骨兩旁各有一硬刺背有刺鬐刺皆鋸齒螫人極痛令人發寒熱以頭垢擦之立止兩須亦有八須者群遊作聲過罾釣出水時作聲如軋軋動風發毒無異鮎鱯日用本草謂其去風普濟方用治消渴均大謬綱目謂能消水腫又敷瘰癧惡瘡久不收口亦難深信總之有毒之物病人切忌鐵圍山叢談云食黃鱨魚不可用姜調和又不得犯荊芥可殺人中其毒多飲地漿解之杜父魚臨海異物志名伏念魚又名黃魚吾鄉亦呼黃見人則倒豎其身以首插入泥中綱目誤以為船碇說見前此魚僅長二三寸大頭闊口色青黃背上有鬐刺螫人皆類黃獨其尾歧身有黑斑為異亦有無斑者蓋黃之同類異種也三四月子滿腹肉味頗佳性則動風發毒拾遺曰能治小兒差頽陰核一大一小也用此魚擘開口咬其大者七下即消鱣魚綱目曰其脂色黃如蠟故食療名黃魚太平御覽名蠟魚肉色白故俗稱玉版魚脂肉皆夜視有光故異物志名含光魚生江淮河海深處無鱗大魚也狀似鱘色灰白背有骨印三行鼻長有須口近頷下其出常以二三月其居在磯石湍流其食張口聽其自入故云鱘鱑魚吃自來食其行在水底去地數寸漁人載糗糧於舟以小鉤千百況水取之一鉤著身擺播求脫所觸諸鉤皆著隨其奔逸止則牽掣使行至數日困憊乃逐漸曳至洲渚撈取小者近百斤大者長二三丈至千斤脂肉層層相間氣甚腥味肥美脊骨及鼻並鬐腮皆脆軟可食肚與子鹽藏作鯗俱佳鰾可作膠性能肥人利五臟多食難克化按凡物脂肥者皆補黃魚脂肉相間其利臟腑自不待言然過肥必壅且夜視有光者皆有毒瘡瘍風損人不宜食也鱘魚綱目曰一名鱏魚一名碧魚一名鮪魚一名鱘鰉月令季春天子薦鮪於寢廟周禮漁人薦王鮪爾雅曰鮥鮛鮪郭注云大者名王鮪小者名鮛鮪更小者名鮥子李奇漢書注曰周洛曰鮪蜀曰䱭鰽詩經疏義曰遼東登萊人名引魚又名牛魚又名扇魚飲膳正要曰遼人名乞里麻背如龍長一二丈生大水中春時出而浮水見日則目眩狀如鱣而背無骨印色青碧腹白鼻長等身口在頜下頰有青斑如梅花尾歧肉白味亞於鱣鬣骨不脆爾雅邢疏曰今登萊遼東人呼尉魚或呼仲明仲明者樂浪尉也溺死海中化此魚幻說也爾雅翼云鱘狀如鬵鼎上大下小大頭哆口似鐵兜鍪鰾可作膠亦能化龍按鱘首即化龍所謂鬵鼎兜鍪者皆比擬不切拾遺曰補虛益氣令人肥健食療曰煮汁飲治血淋然動風發毒久食令人心痛腰痛小兒食之成癥瘕及咳嗽同干筍食發癱瘓則其性雖滋補為害亦不淺也䱱魚一名人魚一名孩兒魚陶隱居曰似鯷而有四足聲如小兒其膏燃燈難消耗秦始皇驪山冢中人膏是也按冢中燈古用漆所謂蒼梧故隧漆燈明者舜陵也後世用魚油所謂隧道魚燈膏不燼者陳友諒墓也然漆易乾燥魚油易臭腐成水均不能耐久且諸史禮志皆不言其制度吾郡前明淮藩諸園寢乾隆戊子己丑間多遭匪竊刨挖並無隧燈形跡恐悉屬子虛也而唐人之詠雙檜所謂長明燈是前朝焰曾昭青青年少時者蓋指佛火而言其油可以添換與隧燈迥殊也綱目曰孩兒魚有二種皆類鮎鮠一種生江湖腹有翅如足腮頰軋軋如兒啼者䱱魚也一種生溪澗形聲皆同而能上樹者鯢魚也稽神録云謝仲玉見婦人出沒水中胸有兩大乳故似婦人腰以下皆魚者白鱀也吾鄉彭蠡湖亦有極膻不可食但可熬油耳述異記云查道使高麗見海沙中一婦人肘後有紅鬣者海中別種人魚非䱱鯢白鱀類也山海經云決水多人魚狀如鯷四足音如小兒食之無瘕疾又云休水北注於洛中多䱱魚狀如蜇而長距足白食之無蠱疾可以御兵鯢魚亦名人魚與海中鯨鯢名同物異綱目曰異物志云蜀人名魶魚秦人名鰨魚爾雅云大者曰蝦郭注云似鮎有四足前足似猴後足似狗聲如兒啼長八九尺蜀志云雅州西山峽水出魶魚似鮎有足能緣木山海經云決水有人魚狀如䱱食之已疫按䱱鯢二種古醫書本草皆不載惟拾遺有鯢魚綱目益以䱱魚皆據山海經著其功用而形既似鮎鮠又有聲又有足其有毒確矣病人不食為是慎勿過信古人至噬臍之悔也烏鯽魚一名海墨魚烏鍘之名本出素問後人訛為烏賊南越志附會其說云自浮水上飛烏見而啄之即卷取入水食之故名烏賊言其為烏之賊害也圖經曰腹中血及膽色如墨故名烏可書契卷以欺人逾年則跡滅惟存空紙故名賊亦屬附會又陶隱居蜀本草圖經皆言是鷂所化唐本草闢之甚是嘉佑本草反以為非云鸚烏似鵑夫此魚一歲所出不知幾千百億兆安得有許多𪇰烏爾雅翼亦云九月寒烏入水化此魚不言何鳥悉屬子虛拾遺謂秦王東遊棄算袋所化尤荒誕不經日華本草曰有兩長鬚遇風則以須下碇或掛石上如纜故又名纜魚日用本草曰鹽者名明鯗淡干名脯鯗不知海物本咸無須鹽料因出時遇陰雨不能即曝故以鹽收之腐臭無味圖經曰烏鰂形如革囊口在腹下八足聚於口旁兩須如帶甚長只有一骨形如小梭白脆如通草層層有紋其肉別録云益氣強志非也日華子云益血通月經則是凡陰虛血少及婦人胎前産後吐血便血諸症宜之惜煮之不爛血虛而中氣不足者但飲汁勿食其肉免致困脾煮宜酒既助其力又添滋味閩小記曰用黃泥包糠火煨熟芼以五味則糜爛可食骨名海螵蛸本經曰主女子赤白漏下經汁赤白者崩帶也漏下經汁者經水淋瀝不止或一月二三行也血閉陰蝕腫痛內服外敷寒熱癥瘕無子別録曰主驚氣入腹大驚卒恐氣血分離內經明訓治之不得其法則死補藥中必須如此切勿用辰砂金銀琥珀等重墜以速之所以然者驚傷膽此物補血補肝肝膽相連故同治腹痛環臍丈夫陰中腫痛令人有子又止瘡多膿汁不燥凡瘡瘍腫水多非此不能生肌合口外科聖藥日華本草曰療血崩最為要藥食療本草曰久服益精即本經主無子別録令人有子之理所以然者精由血化也又主眼中熱淚研末和諸膽汁點及一切浮翳和蜜點眼科內服之方亦不可少此凡羞明視物無力迎風冷淚青盲雀目及內障外障皆系肝虛丸藥中必須此物綱目曰主女子血枯方見後唾血下血不論男女跌傷出血金刃傷同傷時急以熱尿淋之海螵蛸細末敷瘡口即不腫痛不作膿以後不宜見水若已犯水洗及他藥者即不宜用此又治女人陰戶嫁痛交接後忽而腫痛名嫁痛雖屢産者亦有此病不必盡是新婚勿誤會嫁字云嫁痛者謂其痛由交媾如初嫁時景狀所以別於不因交媾而痛也蓋新婚非病不須治療此乃肝熱不治可成膿腫用此研末塗入戶內溺後又塗以愈為度同雞子黃塗小兒重舌鵝口同蒲黃末敷舌腫出血及牙縫出血同槐花末吹鼻止衄同麝香吹耳治聤耳多膿素問曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清冷也目眩時時前後血病名血枯得之年少時有所大脫血或醉入房中氣竭肝傷故月事衰少不來治之以四烏鰂骨一茹茜草也丸以雀卵飲以鮑魚汁乃治血枯第一神方經驗方治小便血溺同赤茯苓等分為末生地黃柏車前煎濃湯下每服三錢日三服聖惠方治卒然吐血研末米飲服二錢直指方治腸風臟毒內痔日久多食易飢先用海螵蛸炙黃為末每服一錢木賊湯下不如槐花後服黃連豬臟丸普濟方治療瘡惡腫初起者刺破擠盡惡血至鮮血出研末摻其疔自出經驗方治疳眼流淚同牡蠣等分研末每服三錢豬肝一兩煮食久服取效海上方治赤翳攀睛貫瞳海螵蛸一錢辰砂三分研細黃蠟少許化和臨臥以黍米大一丸揉入眥中天明溫水洗之名照水丹或不用黃蠟加豬膽皮燒灰頻點更效眼科祕籍海螵蛸爐甘石滑石等分點多年爛弦甚效癢者加真膽礬十之一楊氏家藏方海螵蛸半斤研末黃蠟三兩和作餅每用七八錢同豬肝二兩批開摻藥札定煮食之飲汁盡勿食蠟渣治青盲雀目均妙方也而其餘用又可殺蟲拾遺曰春夏時井中生小蟲投骨於中蟲盡死按此物既補血虛又主上下血熱妄行復治癥瘕血閉女子血閉月事不行久則不治必須此物為君隨症輔以他藥是其於血能行能止可謂通才乃張鼎云久服絶嗣無子吳瑞雲動風皆屬妄談切勿為其所誤柔魚圖經曰柔魚似烏鰂但無螵蛸越人重之而不著其性味豫意既無螵蛸便非同類雖養陰益血海物均有同功而力必不及烏鰂也章魚臨海異物志名𩸔又名章舉韓昌黎謂以怪自呈者即此圖經曰似烏鰂而差大更珍好綱目曰補血益氣閩粵人食其鮮者味如水母非也味如鮮烏鰂耳李九華曰章魚冷而不泄亦非也海物味鹹能養血故性平不熱何至於冷鮫魚綱目曰一名沙魚一名䱜魚一名鰒魚一名溜魚段成式云其力強健稱為河伯健兒唐本草云形似鱉無腳有尾非也此魚有數種形並似鯪鯉不似鱉青目紅頰背有長鬣腹有翅大者尾長數尺能傷人身如珍珠斑其文似鹿者名鹿沙一曰白沙能變鹿似虎者名虎沙一曰胡沙能變虎說鈴曰沙魚所變之虎其斑文直最善噬人惟初變時乍履砂石其足畏疼易於制伏鼻前有骨如斧能擊物壞舟者名鋸沙又名挺額又名䱜沈懷遠南越志云環雷魚䱜魚也長丈許腹有兩洞貯水養子一洞容二子朝從口出暮還入母腹拾遺亦云子隨母行驚即入母腹其肉食療云補五臟圖經云甚益人翅剝去外骨瑩白如料絲不受調和味殊淡皮可飾刀把粗糙堪揩木治骨角如木賊也別録云治心氣鬼疰蠱毒吐血此四種病實為靈藥又燒研水服解鯸鮧毒即河豚惟此物及蘆根橄欖木與核可解恐一時缺乏急覓刀劍有此皮為飾者炒研末服千金方治鬼疰鮫魚皮炙龍角犀角鹿角麝香蜈蚣雄黃硃砂乾薑蜀椒蘘荷根等分為末酒服方寸匕日三服亦可佩之按鬼疰最惡其症腹中作痛時發時止藥不能除禳不能解久則必死死則其骨肉一人繼病殺人愈多疰愈靈愈難制伏必至滅門惜龍角犀角難得豫意用羚羊角貍血外臺治尸疰有貍骨散方或虎睛虎爪等代之亦系血肉有情凡邪祟病非藏伏肝內非血肉腥膻不達病所非神靈威猛不能驅除故傷寒論有小紫胡加龍骨牡蠣法為後人治祟諸方之祖也江豚又名江豬又名水豬又名饞魚魏武帝食制名䰽䱐生海中者為海豚綱目誤以為鱀魚云胸有兩乳形似人不知鱀色白即爾雅之是鱁其逐波而行一浮一沉順風而拜胸有乳如婦人此物遠望如豬色黑無婦人乳逆風而拜同出同沒拾遺曰海豚生海中候風潮出沒形如豚鼻在腦上作聲噴水直上其子數萬隨母而行人取子系水中母自來就而取之江豚生江中形略小吾鄉彭蠡湖亦多有夏出冬蟄舟人候之以占風無風不出若風雨將至則先有數枚浮游水面其首所望處即雨陳自其方起逮風雨大至則千百齊出矣腹中有脂點燈照摴蒱賭博即明照讀書工作則暗故俗言懶婦所化肉味如水牛肉能治飛尸蠱毒瘴瘧作脯食油可摩惡瘡疥癬痔痿犬馬病疥海鷂魚此魚有肉翅能飛故名海鷂綱目曰形團似荷葉故名荷葉魚又名邵陽魚食鑑本草作少陽吾鄉呼邵荷皮又名石礪又名鯆魮魚又名鱝魚又名蕃魚生海中者圍七八尺生江湖者略小無鱗無足背青腹白口在腹下目在背心尾長有節陶隱居曰其肉不益人寧源曰能治白濁膏淋莖中澀痛按此魚極有毒除白濁外病人忌食一說此魚具十二生肖肉蛇肉在尾去尾則無毒大不然也尾刺如劍兩傍有鋸齒傷人至死海獺皮炙焦研末醋調敷可解外以海獺皮包之若候人溺處以尾刺釘其地令人陰腫痛發寒熱然則非僅惡毒亦妖物也可輕食乎河豚魚一作魨綱目曰炮炙論名鮭魚拾遺名嗔魚日華本草名鰗鮧魚食療名鯸鮧又作鯸鮐俗名氣包魚又名吹肚魚嚴有翼藝苑雌黃云河魨水族之奇味世傳其殺人余守丹陽宣城見土人戶戶食之但用菘菜蔞蒿荻芽同煮未有死者然魚之無腮無膽有聲音目能脡者皆殺人河魨備此數者可云無毒乎衍義河豚有大毒味雖美修治失法食之殺人厚生者宜遠之至言也陸雲士離亭燕詞曰三月桃花春水網撤江鮮初起不使纖塵沾鼎俎乳炙西施甚美下箸且徘徊此事不如己矣昨日傳聞西第醉飽翻成涕淚子孝臣忠千古事只是難拚一死口腹亦何為竟肯輕生如此此蓋因倪鴻寶先生有將無忠義事不及食河魨之句而作也憶乾隆丙子鄰居李姓者六人共食河豚一人食多毒先發急覓蘆根以昏夜不能卒得而死舌出口外遍身青黑腹脹即似河豚其五人毒後發皆得蘆根煮汁飲之瀉紫黑血鬥許而解然皆大病月餘世傳煮忌梁上塵落釜內又忌洗血不淨然食者皆知此忌而有死有不死與食菰子同中其毒者以蘆根荻芽橄欖木或核甘蔗槐化糞汁解之而可解不可解亦與食菰子同又食河豚魚不可服荊芥風藥夷堅志輟耕録均有其語延壽書云諸無鱗魚皆忌荊芥韋航細談亦云凡魚不論有鱗無鱗無不忌荊芥語皆有理物類相感志僅雲河豚宜同荊芥煮三五次換水再煮則無毒切勿輕同拾遺曰肝與子有大毒入口爛舌入腹爛腸無藥可解今人不敢食肝子則鹽醃貨之食而不死者固多死者亦時有但貪口腹者諱言之蘇長公云味美可值一死乃戲言耳開寶本草乃謂其有補虛療疾之用豈遂無他藥而以殺人之物治病醫家好奇之過乃至於此烏可訓乎稗史曰同鴨卵食則不毒未知果否以上無鱗魚鱁魚有二種一種工匠所用可作膠黏物者名魚鰾乃海魚腹內白脬中空如泡形似壺盧一種入食品者乃海魚之胃名魚肚唐韻夢溪筆談皆云魚腸腸胃相連魚大者或腸亦可食性能益氣補血壯筋骨續絶傷婦人血分素虛者崩中赤白帶下者胎漏每月下血者生兒屢患臍風者男子精虧血少者並宜食之以上諸病宜用魚肚又能散瘀血及折傷出血炒研末酒和生藕汁下産寶方治産後搐搦魚鰾一兩螺粉炒去粉研末分三服蟬蛻煎濃湯下不如當歸生地黃荊芥防風蟬蛻煎酒下事林廣記治産後血運魚鰾同蒲黃炒去蒲黃研末酒和童便調服三五錢亦宜加當歸荊芥以愈為度劉伯溫多能鄙事治經血逆行魚膠蛤粉炒新湖棉燒灰等分每服二錢秫米飲下危氏香膠散治破傷風搐魚膠同白芷末炒麝香少許研末蘇木煎酒調下每服二三錢仍用醋煮魚膠封瘡口保命集治破傷風寒熱口噤搐搦者加蜈蚣二條炒同研以羌獨荊防等分煎酒調下每服二錢此症口乾者不治經驗方治嘔血不止魚膠炒研末甘蔗節三十五枚搗取汁調服二錢直指方治便毒腫痛醋煮魚膠乘熱搗爛貼之又可貼露蜞即羊核又可貼小兒軟癤又普濟方用治折傷均妙方也以上諸方宜用魚鰾鮑魚禮記曰魚又曰又曰臘又曰鯗魏武帝食制名蕭折魚俗名乾魚又名法魚又名蝦魚不拘魚之種類淡曝不用鹽醃其氣腥臭如尸故秦始皇崩於沙丘後車載鮑魚以亂其臭禮鮑魚不登於俎昔文王使太公傅太子發太子嗜鮑魚公勿與曰豈有非禮而可以養太子者哉性能散血又能止血又能生血凡踠折瘀血在腹內四肢不散者女子崩中血不止者均宜煮什微加醋飲不得用鹽出別録又治女子血枯出素問又治水腫氣腫陳者良未隔冬者勿用隔兩冬者太陳亦勿用又同蔥豉酒煮食飲其汁能通乳出綱目雜蝦曝者尤良但雜鰟魮鮎鱯黃䰲鱭魚者均有毒僅供食料不堪療疾又孕婦不宜食李九華曰令子多疾又今市肆所售鮑魚用充海錯乃海魚之乾者亦屬佳品上文血分諸病亦能治之但不能消脹耳鹹魚又名䱒魚又名鰎魚咸甚者能劫血病人忌食微咸者好醋烹之能開胃進食病人宜之若用煙燻者名烘魚其氣芳馥更為佳品但鮎鱯鰟魮黃䰲鱭魚之類亦宜避之煎鹹魚之油能治小兒頭瘡出膿水微加醋烹俟魚熟取油塗甚妙糟魚凡物糟藏者皆能開胃進食糟魚更在諸品之上但雜蝦者則動風發毒癰瘍風損忌之若糟鮎鱯等則諸病忌之鮺魚俗作鮓大者曰鮺小者曰𩷒爾雅釋名鮺醞也以鹽糝醞釀面電也其性大不宜人今人率用紅曲稍易消他無益等也日用本草曰損人脾胃拾遺曰發瘡疥鮺內有發害人綱目曰不可同生胡荽葵菜豆藿麥醬食令人病同蜂蜜食令人暴死無鱗魚作鮺尤不堪食凡有病人概宜遠之也魚鱠又名魚生綱目曰旋烹不熟食猶害人況魚鱠肉生損人尤甚為癥瘕為痼疾為奇病皆所不免昔有食此致病者用藥下出鱠已變蟲形而本草拾遺暨食物本草謂其能治多病均不足信至汪穎謂親見一婦人病吞酸因食魚鱠而愈尤為無理大抵此物自古有之屢見經傳今北人常食未必人人皆病而現已有之病及大病久病新愈之人則斷斷不宜犯也魚子一名蘇一名䲑爾雅曰鯤魚子故國語云魚禁鯤鮞也性之良毒視乎其魚然多食久食令人作脹則諸魚子所同且不受調和既無宜又無味病人何必食之而聖濟總録治目翳用已生出在水中魚子半兩和藥亦好奇之過也以上魚雜魚膽諸魚膽並明目去翳又治喉痹又主魚骨哽咽青魚鯉魚為上而鱧魚膽乃能救喉痹將死洵妙藥也鮎鱯膽不可用魚魫綱目曰魚腦骨曰曰丁尾骨曰魩曰丙腸曰鯝曰乙身骨曰鯁曰刺脬曰鰾曰白翅曰鬐曰鬣子曰鮇曰䲑拾遺曰魚魫能消毒延壽書曰解蠱毒作器盛食遇蠱則裂青魚魫最良魚鱗綱目曰食魚中毒煩亂或成症積燒灰水服二錢別録曰治魚骨哽方同上魚油拾遺曰能治症癖腥臭魚油二斤盛銅器內炷火令暖隔紙尉症上晝夜勿息一法用舊棉絮一塊入魚油內浸透置症所尉斗炷火尉之日一作久尉取效又塗六畜疥癩然燈損人目以上四種非食品也以其出於魚而各有所用故附之魚後至歷朝漁者有稅曰魚課明代多設河伯所大使以徵之本朝澤梁無禁惟留江西二所廣東三所余皆裁革歲課三江兩湖閩粵共僅二萬四千四百一十二兩有奇龜非宜食之物而古人用以治病摘録於左色黑者良黃者劣故古今注名元衣督郵唐本草曰龜肉釀酒服治大風緩急四肢拘攣多年癱瘓不收便民食療方曰和蔥醬煮食補陰降火治虛勞咳血咯血咳嗽寒熱又主久嗽不瘥膽汁治痘後目腫及一切熱眼尿滴耳治聾點目退赤熱點舌下治中風不語甲補陰益血今人惟取下版熬膠用以龜運任脈故能補陰任脈行身之前故不用上甲而用下版也又治産難交骨不開子母祕録用龜甲燒存性研末酒服方寸匕摘元方用全具酥炙不如酒炙婦人發一握燒灰川芎當歸各一兩同研末每服七錢人行五里許再服必生蓋婦人胎産以衝任二脈為主交骨不開用龜版一取其通任脈一以骨治骨也龜版有縱橫縫生卵時其近後直縫自開卵始得出嘗目睹之始知古人制方用藥煞精理而陳飛霞雲陽開陰闔交骨不開宜用附桂等陽藥不宜用龜版陰藥是為不知醫理其性雖補陰卻偏於陰而消敗陽氣凡食龜肉服龜版膠必十分陰虛陽盛始可若陰陽兩虛切勿輕試且也麟鳳龜龍稱為四瑞亦曰四靈故其為物神靈而多壽其色黑元也其身介武也故北方龜蛇星象命名元武而凡有生之物生前有此軀殼死則如蛻去之龜則死猶戀形故其朽甲先王用以鑽灼而卜可以觀兆決疑藥中用之過劑往往成癥瘕生怪病戀形故也非甚不得已不宜妄殺也大戴禮曰甲蟲三百六十而龜為長其名號頗多爾雅龜有十種後人亦未能考其全綱目曰其形象離其神應坎上隆而文以法天下平而理以法地蛇頭龍頸外骨內肉腸屬於首能通任脈廣肩大腰卵生思抱其息以耳此說不然龜納鼻息故能通任若息以耳則與任脈不相涉矣雌雄交尾亦與蛇相匹或云大腰無雄者謬也古有大腰無雄細腰無雌之說謂龜鱉之類皆雌蜂蠆之類皆雄非定論也今人視其底以別雌雄抱朴子云千歲靈龜五色具焉如玉如石變化莫測或大或小或遊蓮葉之上或伏蓍叢之下至搜神記謂黃赭入山迷路為鄱陽故事恐屬子虛凡龜聞鐵聲則伏被蚊噆則死香油塗眼則入水不沉老桑煮則易爛故云禍桑樹以烹老龜皆物理相制也甲本經名神屋圖經曰漏天機上下甲俱全曰龜筒生於山者西秦最廣故又名龜一種名靈龜即爾雅之蟕蠵漢書謂之靈蠵又名蠵其大者名屓屭一作贔屭又名又作霸下多力人立背上可負以行今碑趺刻作此狀取其力能負重也或云此乃龍生九子之一非龜也甲黃而光瑩用嵌器物可亂玳瑁血治毒箭傷悶絶者和酒飲之出日華本草一種緑毛龜古以為神物南齊永明中有獻者今則可以畜養而得非神也蘄州以充方物養者取自溪澗畜水缸中飼以魚蝦冬則去水久久生毛中有金線脊骨三稜底如象牙色大如錢他龜久養亦生毛但大而無金線劉氏先天丸用之云通任脈補陰陽未免好奇方不録但置額上可斷邪瘧收書笥可闢蠹出蒙荃一種呷蛇龜日華子作夾蛇爾雅曰攝龜注曰陵龜抱朴子作蠳龜陶隱居作鴦龜云小龜也狹身長尾用卜吉凶與他龜相反唐本草云其腹折見蛇則呷而食之肉與甲均有毒不堪食但佩之闢蛇而已一種三足龜名賁山海經云任水西注伊水中多三足龜食之無大疾可以已腫唐書云先天二年江州獻六眼龜宋書云太始二年東陽太守劉協獻六目龜郭景純江賦有之爾雅注亦有之敬新磨口號曰睡一覺抵別人三覺明會典云暹羅國貢六足龜宋史云趙霆獻兩頭龜皆不常有之物遇之不宜輕食也雖三足龜山海經有已腫之言例以三足鱉之殺人其說詎可信乎一種名梟龜生南海與山海經所云杻陽之山怪水出焉中多旋龜鳥首蛇尾者蓋同類也旋龜云佩之已聾梟龜拾遺用治産難臨月佩之臨時用甲燒研酒服其肉性味無考必非佳品也以上並出本草綱目至爾雅以俯仰前後左右釋其形狀有靈謝果獵類若之名周禮有天地四方之屬春秋盜竊寶玉大弓公羊傳釋寶為龜周易或益之十朋之龜漢書釋之曰元龜尺二寸直一千百六十為尺貝公龜九寸直五百為壯貝侯龜七寸直三百為公貝子龜五寸直一百為小貝皆十朋為寶四品王梅溪字龜年名十朋取此義古人之重龜如此若其用以卜也古者國有守龜名之曰蔡有疑則灼之故曰蔡祭也致敬於鬼神以決所疑也或曰蔡察也卜而察其疑也史記龜策傳曰略聞夏殷欲卜者乃取蓍龜已則棄去之以為龜藏則不靈蓍久則不神至周之卜官乃寶藏蓍龜灼龜觀兆變化無窮是以周公卜三龜而武王有瘳紂為暴虐而元龜不吉晉文將定襄王之位卜得黃帝之兆左傳曰得黃帝戰於阪泉之兆卒受彤弓之病獻公貪驪姬之色卜而兆有口象其禍竟流五世奚齊卓子惠懷至文公乃定共五主非五代也楚靈將背周室卜而龜逆左傳曰靈王卜曰余尚得天下不吉投龜詢天而呼曰是區區者而不余卑余必自取之終受乾溪之敗君子謂夫輕卜筮無神明者悖故書建稽疑五謀而卜筮居其二五占從其多明有而不專之道也其措辭析理為至當而褚先生續之云能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰玉龜凡八名龜各有文在腹下文云云者某龜也取此龜不必滿尺二寸民人得長七八寸可寶矣又云神龜出江水中廬江郡歲時取生龜尺二寸者二十枚獻於太卜官龜千歲乃滿尺二寸又云取前足臑骨穿佩之取龜置室西北隅懸之入深山大林不惑又云南方老人取龜支床足老人死移床龜尚生不死龜能行氣導引近世江上有得名龜畜置之家因大富欲遣去人教殺之勿遣遣之破人家龜見夢曰送我水中無殺我也其家終殺之殺之後身死家不利又云宋元王時漁者得神龜龜見夢元王求脫王召博士衛平告以夢平與王反復數千言勸王留神龜殺而藏之以為國重寶其後戰勝攻取莫如元王元王之時衛平相宋宋國最強龜之力也其祝龜之辭稱為玉靈夫子且托為孔子之言讚歎之曰神龜知吉凶而見殺骨植空枯猶日辱於三足之烏月見食於蝦蟆荒誕之言不足信也玳瑁即玳瑁龜之別種也虞衡志曰生海洋深處似龜而殼稍長背有甲十三片黑白斑文相錯裙邊缺如鋸齒無足而有四鬣鬣有鱗斑文如甲海人養以鹽水飼以小魚每月必有一日不食或云遇庚申日則不食曰玳瑁齊埤雅曰玳瑁不再交卵生影抱謂之護卵南方異物志曰大者如籧篨背上有鱗大如扇煮柔作器光輝有色古人以為笄豪貴者或以飾梁棟沈佺期詩海燕雙棲玳瑁梁開寶本草曰生飲其血解百藥毒仇士良曰肉煮食逐邪熱利大小腸行氣血日華本草曰生取甲入藥必須生者凡作成器物皆經蒸煮用之無效磨汁服消癰毒止驚癇綱目曰治急驚客忤傷寒結熱狂言又治時行熱病發斑聞人規痘疹論曰全生犀角磨汁一合入豬心血少許紫草汁五匙治痘疹血熱黑陷亦可預解痘毒鱉綱目曰鱉行蹩躄故名俗呼團魚淮南子曰鱉無耳而神守故名神守埤雅曰魚滿三千六百則蛟龍引之而飛置鱉守之則免故名神守古今注名河伯從事陸生水居穹脊連脅四緣有肉裙以目為聽純雌無雄以蛇及黿為匹鱉有雌雄亦視腹文為別但與蛇及黿交耳故萬畢術云燒黿脂可以致鱉燒蛇脂不能致鱉然則氣相感召非以其與黿交也卵生其抱以目隨日影而望之在水中上必有浮沫名鱉津人望津撫掌作聲取之性畏蚊叮之則死入蚊煮得易爛而其骨甲又可熏蚊令化為水肉圖經云性冷損人拾遺用治熱氣濕痹戴元禮云性熱其陽氣聚於上甲久食令人生髮背按鱉背青木之色也木性善升故冬月蟄於沙泥其背上如盞大一塊常燥不濕人以是尋得之陽氣聚於上甲之說不為無見性有毒孫思邈謂同芥子食令人生惡瘡則生髮背之言不為無本戴氏所論確矣俗醫反云滋陰大謬雖作臛為八珍味之一然癰疽痘後熱病後平素血熱陰虛火旺及癥瘕之人概不宜食孕婦食之令人短項多食或竟生鱉拾遺曰內則食鱉去醜謂項下軟骨如龜形者也凡三足赤足獨目者頭足不縮者目凹陷者無裙者腹下有王字十字蛇紋者旱鱉在山上者並殺人究之此物本有毒其不犯此數種而外亦間有能害人者平人亦宜少食病人不食為是中其毒者蘆筍煮汁解之無則用蘆根折肱漫録曰中鱉毒藍汁可解無則以染布缸內靛花代之又不可同見菜食陶隱居曰銼鱉肉包以赤莧置濕地經旬皆成小鱉此說雖未必盡然而同食必有害則確也又同薄荷食亦害人小者味美而毒輕愈大愈毒無味洪容齊所謂沙地馬蹄鱉是也而國語公父文伯飲南宮敬叔酒露睹父為客羞鱉焉小睹父怒曰將使鱉長而後食之遂出蓋北人遠於水不知水族之味也甲能治老瘧攻瘧母及痃癖症積生取炙黃色研末服出時後方又治骨蒸發熱童便浸二三日煮再用酒炙黃研末服又治癰疽久不收口用生肌藥不效者燒存性研末摻出怪症奇方又治人咬指欲脫方同上鱉殼亦可出摘元方頭治産後陰脫及脫肛不收燒灰傅出千金方取其善縮也卵鹽藏煨食止久痢出綱目一種無裙頭足不縮者名納一作魶與鯢同名一種三足者爾雅曰鱉三足能山海經曰從山多三足鱉食之無蠱疫切不可信一種小如錢赤如血者淮南子曰朱鱉浮水必有大雨拾遺曰佩之刀劍不能傷女人有媚色未必然也此三種皆有毒殺人一種六足者能吐珠山海經呂氏春秋一統志皆有其語然埤雅曰蚌珠在腹鱉珠在足果爾何以能吐也綱目曰食之闢疫癧此豈尋常之物惡得而食之也至於鱉之抱卵以目聽亦有目是其精神全注於目也故多年老鱉腹內聚成鱉寶如一二寸小人眉目衣冠履襪悉具紀曉嵐先生灤陽消夏録言親見之豫外氏家亦有先慈氏亦親見之其他得此者吾鄉有數處皆以殺鱉而得舊傳生得此者割人臂上皮納入之可以洞見地下之物以鱉之精華在目也此說未知果否然其為物則極奇矣鱉腹中有寶其背必隆起較他鱉為高舊傳殺此鱉者其禍必至滅門驗之吾鄉數處信然積善之家諒不遇此然食鱉者則當知之也夷堅志曰乾道中崑山有老叟夢大舟內無數縲紲罪人哀呼求救次早啓戶堤下果有泊舟視之皆鱉也問其值索錢三萬如數與之盡放諸河夜復夢數百披甲人列拜門外謝再生恩且曰令翁一生無疾壽終升天子孫大富五世後如其言又聞數十年前吾鄉有嚴翁者素稱好善一夕夢緑衫白裙女子拜床下求救明日鄰翁得大鱉招翁飲翁至其家鱉尚未烹向翁延頸點頭翁恍疑昨夢贖而縱之遂終身不食鱉今其子孫數十人皆不食尚云乃繁盛書香奕葉也以此推之鱉能聚精會神結為奇寶是水族有靈之物也故於臨危能知求救則其死後必解尋仇且非肴饌必需之品可以少食可以不食不宜恣肆以口腹結冤家也冤家二字非杏云托拾外氏迂談醫家本有來生對報之訓見金匱玉函經解飲食之毒條又陶隱居亦云妄殺雞犬牛羊於亡魂皆有愆責皆古醫書之語仁愛之人自不以為河漢也黿亦名河伯從事俗呼癩團魚說文曰黿大鱉也圖經曰生南方江湖中大者圍一二丈南人捕食之肉五色而白處最多卵圓大如雞鴨卵産山崖或洲渚土窟中人尋得輒有數百枚煮之其白不凝拾遺曰性至難死剔其肉盡口猶咬物可張鳥鳶綱目曰介蟲惟黿最大故字從元形似鱉背有𦢏𦞙大頭黃頸腸屬於首其誕育也雄鳴上風雌鳴下風風化而孕其賦形也頸足皆方口如血盆隨月浮水月沉則沒其脂摩鐵則明得火可融鐵月令季夏之月命漁師伐蛟取鼉登龜取黿以其為人害也按黿水族巨物冬則蟄於江水深處至清明後散而之諸大澤中如楚之洞庭吾鄉之彭蠡遊行覓食其出也千百為群蔽江而上此數日往來舟楫皆停泊小港避之至霜降時水涸天寒仍入江潛伏不出矣此數月舟行夜不敢露坐晝不敢灌足於水又不敢炙煿腥膻黿聞其氣即出蓋此物能食人故呼為水老虎其力之大差與比倫又且便捷過於猿猱萬斛之舟能壞之竹木𤹀筏長百餘丈者能折之舟人遇此皆拋撒米粒焚香羅拜寂不敢嗶操舟為業暨貿敢江湖者終身不敢食其肉並不敢食鱉肉雖至遠方不敢斥其名稱為老爺並鱉亦呼老爺蓋黿與鱉同類故亦與鱉交論其食人大為人害然榜人嘗語豫曰凡舟子謀害孤客取財者不愁天理王法不容但恐老爺難見是乃神道設教可藉以警凶頑無怪左蠡之濱老爺廟香火之盛血食所宜有也乾隆庚辰青湖夏姓戚家嘗獲大黿豫曾食之腥膻無味此或烹飪失宜黿羹為八珍味之一左傳楚人獻黿於鄭靈公子公之食指動示子家曰必嘗異物公故弗與子公染食於鼎而食遂釀弒君之禍其性有毒病人概不宜食陶隱居曰食之補益此物多力而趫健又且多壽揆諸熊肉振羸之義所言或當不謬又云能變為魅非魅也黿為靈物不甘鼎俎復仇也凡臠割其肉偶一落地沾泥任洗濯百遍食之必至殺人即醃熏乾肉任懸掛甚高無人時能垂長至地沾惹泥土聞入聲遽縮如初此肉食之無得免者其靈異何如又肉色黃者有大毒鄰邑都昌江姓村疃地濱彭蠡乾隆辛亥夏見大黃黿浮游稻田淺水群以火器擊斃村中男婦食者百十人皆患黃汗症以常法治之不愈死者五人其餘皆委頓數月老弱者至連年始愈戒之戒之蟹蟹足名跪六跪雙螫殼名匡禮蠶則績而蟹有匡綱目曰傅肱蟹譜云蟹水蟲也故字從蟲亦魚屬也故亦從魚以其橫行則曰螃蟹以其行聲則曰郭索出楊子方言以其外骨則曰介士以其內空則曰無腸公子見抱朴子雄曰蜋蟻雌曰博帶見廣雅清異録曰含黃伯詩人玉屑曰內黃侯曾文清謝路憲送蟹評從來歎賞內黃侯風味尊前第一流只合蹣跚付湯鼎不須辛苦上糟丘種類極多圖經云六足者名蛫四足者名皆有大毒殼闊而多黃者名𦺗螯最利斷物如芟扁而大後足闊者名蝤蛑南人謂之撥掉子一名蟳兩螯如手力至強能與虎鬥虎不如也一螯大一螯小者名擁劍一名桀步常以大螯鬥小螯食又名執火螯赤也最小無毛者名蟛螖爾雅曰螖蠌小者蟧似蟛螖而大名蟛蜞不可食蔡謨初渡江誤食幾死嘆曰讀爾雅不熟為學者所之也雄者臍長雌者臍團腹黃應月盈虧生沙穴中見人便走者名沙狗兩螯極小如石者名蚌江海中蟹大如錢腹下復有小蟹如榆莢者名蟹奴又名寄居蟹腹內有白蟲如木鱉子者及居蚌腹者名蠣奴以上並不可食似膨蜞而生海中潮至則出穴者名望潮生溪澗石中小而殼堅赤者名石蟹並可食按蟹之類既繁則識之難盡圖經綱目雖各有考訂亦未能全其諸蟹之性俱動風發毒在蝦之上雖詩詞中以把盞持螯為韻事而病人概不宜食癰瘍風損及血疾目疾人尤不宜其色生青熟赤與蝦同宋人詩曰水清詎免雙螯黑秋老難逃一背紅蓋譏朱勔之貪橫必敗也其用能續絶傷跪折筋絶骨脫者唐瑤方生蟹搗爛和熱酒連飲數碗渣敷之半日許骨內谷谷有聲即愈乾者煅存性研末服亦佳又能開血閉消兒枕墮死胎千金蟹爪散蟹爪研末二合桂心瞿麥各一兩牛膝二兩俱為末空心酒服一錢似太少又能安生胎千金神造湯蟹爪敲碎一升甘草二尺流水一斗葦薪煮至三升入阿膠三兩煬盡頓服困不能服者灌入即效此方治閃折傷胎子死腹內或雙胎一死一生服之令死者出生者安又解魚毒集驗方曰食蟹即愈又治漆瘡鮮者搗塗乾者研末水調敷又治小兒解囟不合衍義用蟹螯同白芨末搗敷以愈為度仍內服肝腎補藥又鹽蟹汁淡喉痹腫痛含口內細細咽之殼燒煙能熏壁蝨陶隱居曰獨螯獨目兩目相向六足四足腹下有毛腹中生骨頭背有星點足斑目赤者並殺人冬瓜汁紫蘇汁蒜汁豉汁蘆根汁藕汁皆可解之張鼎曰孕婦食蟹令子橫生綱目曰同柿食動風蝑蟹法藏蟹曰蝑鹽藏糟藏酒浸醬汁浸皆佳久留易沙見燈亦沙蟹性夜喜就光取之者燃燈於水次則群蟹自來故見燈即沙蝑法不拘日夜必點燈照而蝑之則以後見燈不沙得椒易䐈得皂莢或蒜可免沙䐈得白芷則黃不散取蟹之時衍義曰八九月為蟹浪其黃滿腹陶隱居曰未被霜者甚有毒究之此物本有毒春夏固不宜霜後亦未嘗不毒也蝦一作蝦介蟲之小者首似龍身似蚱蜢磔須鉞鼻皆有斷節尾有硬鱗前四小足兩鉗後兩大足善躍每九十月有霧則蝦出必廣蓋有一種飛蟲名天蝦霧時則群墮水中化為蝦也然亦自生子子在腹下兩邊排列味甚鮮美性則動風發毒助火生蟲數十年前鄰居取蝦為業者冬月每頓食之一夜腹痛不可忍吐出小蟲急煮苦棟根皮服之吐瀉交作下血數升血中有天蝦蟲千百平人不宜過食瘡瘍風損血疾目疾人尤忌之糟藏最美蒸曝去殼名蝦米者次之陶隱居曰無須及腹下通黑者煮之色白者並不可食拾遺曰和熱飯作鮺味雖美能毒人至死其用則能托痘瘡凡真正虛寒塌陷者大鮮蝦數頭搗爛熱酒和服如山居不可卒得干蝦米亦可但力緩耳內有毒火者慎不可用又能下乳汁方同上但宜多食耳又能補腎興陽並出綱目又外治血風臁瘡同黃丹搗貼日一換出集簡方海蝦綱目曰爾雅名鰝拾遺謂之紅蝦小者長一二尺大者可至丈餘其殼每節可作大燈籠一枚嶺表録異云其色如朱又閩中有五色蝦長尺余彼人兩兩干之名對蝦用供上饌按海蝦肆中乾者長不過二三寸味極鮮美性有小毒而生於鹹水則能養陰益血故助熱生風發毒之害與淡水蝦不同拾遺曰治頭瘡去癬疥風瘙身癢蓋此數者皆血中風熱蝦性動風而出鹹水者能益血故反以治風理可信也又閩中一種龍蝦長二三尺首全似龍周櫟園先生曰望之如錢塘破陳擘青天飛去時令人敬畏初不敢食後見群食亦嘗試之味殊淡耳蚌陶隱居曰雉入大水為蜃即蚌也按蜃有二一蛟蜃一蛤蜃雉能化蛇又産蛟其所化乃蛟蜃非蛤蜃也陶說誤但雀入大水為蛤乃蚌屬耳綱目曰蚌類甚多長者曰蚌圓者曰蛤今混呼蚌蛤非也其肉日華子曰除煩解熱毒治血崩帶下入黃連末取汁點眼赤洗冤録曰入冰片末少許化汁塗湯火傷食療曰除熱解酒毒拾遺曰明目除濕主婦人勞損下血有熱者然性偏冷故衍義曰多食發風動冷氣凡諸蚌蛤肉性皆冷能動風中寒及風損人忌之而拾遺所謂除濕者凡水生之物皆能勝濕也劉因曰魚鱉螺蜆治濕氣而生於水麝香羚羊治石氣而生於山朱震亨乃云寇氏止言冷不言濕濕生熱熱久則氣上升而生痰生風何冷之有夫蚌能勝濕豈反生濕性本冷豈反生熱綱目於此等邪說不知駁正乃復混同引入使稂莠亂苗可謂無識蓋震亨全然聾瞽其於百病盡扯入痰字故先著濕字輾轉牽引可鄙可惡殼燒研為粉名蚌灰用飾牆垣闉墓擴如用石灰亦可入藥日華子曰治諸疳止利醋調敷癰腫綱目曰解熱燥濕止白濁帶下除濕腫水嗽咳而面腫小便不利胸膈間有水氣者為水嗽明目擦陰瘡濕瘡痱癢壽域神方用治腳指間濕爛癢者加枯礬痛甚者加滑石馬刀綱目曰爾雅曰蜌說文曰修為圓為𧑐周禮曰脾折醢江漢人呼單母汴人呼𤊿岸吳普本草曰齊蛤別録曰馬蛤陶隱居曰蝏䗒形似蚌而小狹長其殼粉有毒得水爛人腸又曰得水良唐本草曰得火良既系毒物得水得火皆不得云良肉性同蚌肉按馬刀殼粉既云能烘人腸合諸本經能殺禽獸賊鼠之語明明大毒之物肉又安能如蚌肉之無毒乎不宜輕食𧍧䗯嘉祐本草曰生䗯水土記曰𧍧蛤衍義曰形似馬刀肉性冷多食發風亦非佳物也蜆綱目曰蜆晛也詩見晛曰消見晛曰流注日初出也此蚌殼內光耀故名隋書劉臻父顯嗜蜆呼扁螺大小厚薄不一拾遺曰殼外黑色能候風雨以殼飛圖經曰下濕氣通乳糟食或糟煮食良日華子曰去熱明目利小便解濕毒酒毒目黃並煮食生浸汁飲止消渴殼粉治火鬱頸吞酸及火嗽摻一切濕瘡以上江湖溪澗淡水所出之蚌珍珠牡一作真珠禹貢作珠按珠古出於合浦今則閩粵沿海各有珠池蛋人以採珠為業取之於海亦不盡取於池漢馬援徵交趾徵則徵二立銅柱於珠崖為華夷之界珠崖隸粵西或作朱崖古採珠之地也初援之出也後車載薏苡闢瘴及其歸也梁松以薏苡為明珠因以得謗究之珠亦非盡出於海處處老蚌中皆有即禹貢淮夷珠言淮夷所貢未嘗言他處不産且亦諸蚌諸蛤總名亦未言何蚌所出但光明圓大者為難得耳冀越集格古論埤雅諸書各有所考均未能詳且不甚確不足録也大抵蚌陰類而生於水感月之光彩而孕珠故古諺云上巳有風梨有蠹中秋無月蚌無胎此農家候某日陰晴以卜歲之意未必以中秋一夕之月為胎也惟其如此故珠為水月之精華其用於除煩退熱安神鎮驚皆陰分之病宜有驗也眼科用以點目去翳者借其光明瑩徹也而外科生肌藥亦用之殊無取矣其肉食之養陰退熱之效加速動風助冷之害亦與諸蚌同也石決明日華本草名九孔螺殼名千里光圖經曰七孔九孔者良衍義曰登萊海邊甚多肉與殼兩可用功力相同按石決明為眼科聖藥退肝熱補肝虛治青盲翳障內服外點而別録謂久服益精輕身海藥本草謂能治骨蒸勞極綱目曰通五淋皆不虛也惜乎遠海之地但得其殼不能食其肉也蛤蜊本草會編曰生江南海中紫唇白殼大二三寸閩淅人以充海錯曝乾貨之遠方掌禹錫曰肉久食能潤五臟止消渴治婦人血塊蓋海物味鹹能益血故潤燥能軟堅故破塊而綱目混引高武痘疹正宗之說曰海錯發疹多致傷損脾胃生痰作嘔作瀉大謬海錯發疹見於何書傷損脾胃是何理解且謂古方痘毒入目以蛤蜊汁點之者大為不可古方生蛤蜊入黃連末一分候水出點目眥遠海之地用蚌蛤或田螺癢者入膽礬一分同黃連末取水點此不專治痘毒一切赤眼腫痛皆佳惟寒眼忌用云蛤蜊雖寒而濕中有火既云寒何以又有火且水生者皆能勝濕此何以又有濕又何以生痰與前條朱震亨之言如出一口因思古人良法美意遭後世聾瞽敗壞者不知凡幾可勝浩嘆蛤粉綱目曰能解熱利濕定喘嗽消浮腫利小便解結氣消癭核及婦人一切血病又曰蛤粉衍義謂衆蛤之灰近乃專用蛤蜊然貨者亦多雜治蚌蛤蚶蠣諸殼為之但性味鹹寒不甚相遠功能軟散小異大同不比江湖淡水所出僅能清熱利濕而已也此論可謂周知物理洞悉病情何以引用各書遂至不分美惡糠粃混收不可解也蟶綱目曰海中小蚌也形長短大小不一與馬刀𧍧蜆相似閩粵人以田種之名蟶田小者為蟶苗曝者名蟶乾嘉祐本草曰蟶性補虛止冷利治婦人産後虛損按此養陰益血之功也海物均有而蟶為重食療本草曰天行熱病及傷寒後慎不可食車螯俗訛為昌蛾又名蜃綱目曰周禮鱉人掌互物介蟲名互春獻鱉蜃秋獻龜魚則蜃似為諸蛤通名不專指車螯故郭注爾雅蚌含漿云即蜃也拾遺曰生海中是大蛤能吐氣成樓臺春夏島漵間常有此氣蜃樓海市蛟蜃也非蛤蜃爾雅翼曰雀入淮為蛤雉入海為蜃蜃大蛤也雉所化亦是蛟蜃且呂氏月令只雲水未嘗分別淮海今戴記因之肉可食殼可飾器物色紫璀燦如玉斑點如花故蜃之小者名玉珧圖經曰肉似蛤蜊而堅硬食療本草曰性冷不宜多食按車螯性雖冷而能解毒癰腫初起宜食水土記曰似車螯而角不正者名移角殼薄者名姑勞小者名羊蹄肉性皆與車螯倣佛魁蛤即爾雅注之蚶一作爾雅曰魁陸綱目曰魁者羹鬥之名蛤形肖之故名故字從鬥從鬼詭聲也北斗魁杓亦取其形似也嶺表録異曰南人名空慈子尚書盧鈞以其殼似瓦屋之壟改名瓦屋子又名瓦壟子廣人重其肉呼為天臠又曰蜜丁說文曰老伏翼即蝙蝠化為魁蛤故又名伏老臨海異物志曰蚶之大者徑四寸肉味極佳浙東以田種之名蚶田其性張鼎曰寒能潤五臟止消渴利關節拾遺曰溫能治腰脊冷風利五臟健胃令人能食四聲本草曰溫中消食起陽凡食訖以飯壓之否則令人口乾三說寒溫互異然日華子用其殼火煅醋淬治血氣冷氣症癖性溫確矣而又能潤燥止渴者海物味鹹能益陰滋血故雖溫不燥耳其殼可飾器物今名螺鈿蓋即車渠貝子之同類也書大傳西伯既勘黎紂囚之羑里散宜生之江漢之濱得大貝如大車之渠以贖其罪故名車渠並附於左車渠見韻會劉積霏雪録名海扇綱目曰此瓦壟之大者長二三尺闊尺許厚二三寸殼外溝壟如蚶而深大皆縱文如瓦溝無橫文殼內白皙如玉番人以飾器物丹鉛録曰車渠作杯注酒滿過一分不溢性大寒能安神鎮心解百藥毒及蟲螫同玳瑁人乳磨等分服貝子別録名貝齒日華子名白貝俗名海肥圖經曰今多穿與小兒戲弄畫家用以砑物綱目曰古者貨貝而寶龜用為交易以二為朋詩菁莪錫我百朋注曰兩貝為朋一為莊四莊為手四手為苗五苗為索貝形大如拇指長寸許腹背皆白背隆如龜腹下兩開相向有齒刻如魚齒其中肉如蝌蚪有首尾爾雅云貝在陸曰在水曰蜬大曰小曰黑曰元曰貽黃質白文曰余白質黃文曰余泉博而頯曰蚆大而險曰蜠小而橢曰又古有相貝經云朱仲受之於琴高以遺會稽太守嚴助曰徑尺之貝三代正瑞靈奇祕寶次則盈尺狀如赤電黑雲者為紫貝素質紅章為朱貝青池緑文為緩貝黑文黃畫為霞貝紫貝愈疾朱貝明目綬貝消氣脹霞貝服蛆蟲雖不能延齡增壽其御害一也復有下此者膺喙蟬脊但逐濕去水無奇功也貝之大者如輪可以明目南海貝如硃礫白駁性寒味甘可止水毒浮貝使人寡欲勿近婦人果爾何以反勿近婦人豈欲其多欲乎黑白各半是也濯貝使人善驚勿近童子黃唇齒有赤駁是也雖貝使人病瘧黑鼻無皮是也皭貝使人胎消勿近孕婦赤常通脊是也惠貝使人善忘赤熾內殼有赤絡是也醟貝使童子愚女人淫青唇赤鼻是也碧貝使人盜脊上有縷勾唇雨則重霽則輕是也委貝使人惡夜行能闢百獸鬼魅赤而中圓雨則輕霽則重是也其性陶隱居謂點目去翳藥性本草謂能治傷寒狂熱海藥本草謂能下水氣消浮腫又有紫貝唐本草曰形如貝子而大背有紫斑南夷以為貨布綱目曰詩疏云紫貝質白如玉紫點為文行列相當大者徑一尺七八寸交趾九真以為杯盤性能去目翳消小兒斑疹按貝子車渠皆瓦壟之別種而瓦壟肉可食且益人貝子車渠之肉醫書本草未嘗道及或者不可食歟抑殼可寶肉逐為其所掩因置而弗道歟至於車渠之列於七寶車渠玳瑁珠貝珊瑚貓兒眼瑟瑟為七寶加祖母緑為八寶加火齊為九寶加通天犀為十寶今猶有能辨之者貝子之用於交易在古為然觀財貨寶貫買賣賈價販貯貴賤質貸贈貺賂遺賞賜賵贐賚齎等字皆從貝可知矣後世惟雲南用之明珠沐英之開府滇黔也史臣贊曰不獨貝金象齒來自殊方抑且金馬碧雞入參侍從然古之用貝夏殷以前不可考已說文曰古者以貝為貨至秦始廢貝行錢然周已有太公九府圜法以下闕文調疾飲食辨卷之六下蟾蜍一名𦸉𪓰一名䗇俗呼癩蝦蟆圖經曰蟾蜍多在籬落卑濕處形大背有痱㿔行極遲鈍不能躍亦不能鳴而別録云蝦蟆一名蟾蜍非也蝦蟆多在陂澤形小皮上無痱㿔有黑斑點能跳接百蟲二物雖同類而各種且爾雅𪓰蟾諸郭注云似蝦蟆居陸地則非一物明矣綱目曰詹諸或作蟾其聲詹諸其皮黿其行𪓿𪓿詩云得此𪓿韓詩注云蟾蜍也新臺篇作戚施非此二字後世名苦其聲也又名蚵蚾其皮柯礧也說文云三足者為蟾抱朴子云三足者能食山精鬼魅至千歲頭上有角腹下有丹書食之可仙凡三足及異形之物皆有毒殺人慎不可食術家取以起霧祈雨闢兵解縛陶隱居云五月五日取蟾蜍五枚反縛置室中明旦視縛自解者取為術用能使人縛亦自解按蟾蜍本有靈異其三足及有角有丹書者非常有之物可無深論而尋常四足之蟾聚置密器任如何覆蓋必能漸次逸去惟置高處不近土則不能去故俗傳其能土遁術家用之或以此乎論其充饌似非所宜而能為用於病陶隱居曰溫病發斑困篤者去腸生搗食一二枚無不愈者拾遺曰不能食搗爛絞汁服入酒一二盞同搗乃有汁且於斑疹更為親切或燒末服全嬰方治小兒疳利腹大黃瘦頭生瘡結羊核也用大蟾蜍去首足腸清油塗陰陽瓦炙熟食酒烹或醋烹更佳服五六枚必形容改變而愈外臺方治小兒臍瘡出水久不愈者蟾蜍燒末同牡礪等分摻錦囊祕覽治附骨壞疽膿血不已大蟾蜍一枚亂髮如雞子大一團豬油四兩熬枯去渣冷定先以川烏桑白皮煎水洗試干龍骨末摻四圍此物難得海螵蛸爐甘石可代前膏貼之醫林集要治發背初起用大蟾蜍縛置瘡上蟾必昏憒放水中救其命再易一枚至三四枚蟾久伏不昏憒則毒散矣勢重者破開乘熱連腸肚合瘡上少頃必臭再易二三次愈或剝皮剪小孔乘熱貼余居士用大蟾蜍用石灰搗爛敷頻易取瘥此方宜酌用恐石灰傷肉後難合口然堅腫過甚或四圍麻木非此無功肘後方治狾犬咬傷每七日一發咬時急視頭上有血發一二莖拔去生食蟾蜍膾亦可燒炙食勿令本人知後不再發備急方治閃折骨傷大蟾蜍搗爛敷劈竹裹縛又治痔瘡蟾蜍火煅存性為末豬廣腸一段札定兩頭煮熟切碎蘸蟾末食三四次愈得效方治大風癘疾蟾蜍泥包煨熟煎酒儘量飲不拘次數又蟾腹碩大由其自運氣鼓之欲其脹則頃刻而脹欲其消亦頃刻而消故可治氣腫或乾蟾入湯劑或為末或煮炙其肉食皆佳但性能閉小便凡諸病小便短赤者藥餌飲食皆不宜犯此又凡腹下無八字者赤者皆有毒不可食又眉間白汁名蟾酥入外科方能拔毒去死肌又能治喉痹乳蛾活人心鏡用真蟾酥草烏尖牙皂等分為末每用半分點患處立效蝦蟆爾雅曰蟼蟆一作蝦䗫拾遺陶氏以蟾蜍注蝦蟆遂致混無區別蝦蟆居水背有黑點身小能跳能鳴蟾蜍居陸身大背無黑點而有痱㿔不能鳴跳又有蛙蛤螻蟈長肱石版蠼子諸類或生陂澗或在溝渠周禮蟈人掌去蛙邑注云焚牡菊灰灑之則死按蛙黽與人無害何故殺之若惡其聒耳則其聲皆在田野宮禁深沉諒必無此何至以此等瑣事上廑廟謨且為之設官明系漢人攙雜不足信也炮炙論曰蝦蟆有數種一種黑虎身小嘴黑腳有斑一種蚼黃腳前大後小斑色有尾一種黃遍身黃有臍帶帶中常出水一種螻蟈即夜鳴腰細口大蒼黑色一種蟾即黃斑頭上有肉角其蝦蟆腹下有斑腳短不能鳴按蝦蟆拾遺謂能鳴炮炙論謂不能鳴蓋此物繁多有能鳴有不能鳴其名亦隨人所命大抵蝦蟆之類鳴聲小而長蛙之類鳴聲大而短也月令孟夏螻蟈鳴仲夏僅舌無聲注謂皆指蝦蟆不如今訓詁家以反舌屬鳥為是其性較蟾更熱閉人水道尤甚詳見下蛙條平人且不宜食何況病人本經謂食之不患熱病藥性本草謂能治熱腫熱結日華本草謂其解煩熱治熱狂皆大誤不可信惟生搗敷蛇咬腹中肝治蛇咬人牙在肉中痛不可忍搗爛敷之立出癩蝦蟆更佳剝下皮乘熱貼小兒癤毒膽治小兒忽然失音不啼不乳點舌上即出聲取善鳴者蛙別録名長股俗名田雞又名水雞又名青雞爾雅曰在水曰黽郭注曰耿黽似青蛙一名土鴨在山岩名石蛤又名石雞又名蛤魚又名哇魚又名石鴨圖經曰處處有之似蝦蟆背色青緑故曰青蛙亦有背上作黃路者謂之金線蛙鳴聲壯大不相接續亦不群噪今俗混呼蝦䗫漢書武帝元鼎元年秋蛙與蝦䗫群鬥明明二種矣綱目曰諸物形稱雖異功用則同按蛙與蝦蟆各種性皆大熱有毒無甚功用日華子寇宗奭皆謂其能解毒綱目至云性同螺蚌其熱似魚而魚不過助火即鮎鱯之類亦不過動風發毒此物助熱至閉人水道使熱內結而不可解猥云寒同螺蚌乎蘇頌云能補虛損宜産婦盡屬謬談延壽書云蛙骨熱食之小便苦淋食多令人尿閉有至死者妊娠食蛙令人短壽此係正論惜骨熱二字又開疑竇食蛙尿閉者何嘗食骨可見肉寒骨熱之說皆誤近效方曰食蝦蟆尿閉濃煎豆豉湯頻飲可解而陳嘉謨謂天行面赤項腫名蝦蟆瘟生搗金線蛙水調絞汁空腹飲極效此乃惡症若能救療誠為至美但恐以熱濟熱遂至不可挽回如果他藥不效不得不一試之故存其方以備急若其充饌適口嗜食者甚多暗受其害者亦極不少杏云以其死可慘不忍食性熱害人不敢食而綱目引東方朔傳云長安水多蛙魚得以家及人足謂古昔已常食之如魚秦中自古帝王州四塞河山土肥地廣豈借區區之蛙以為足乎一種小而有尾者名溪狗性大毒一種大者文字集略曰大如屨名田父能食蛇蛇本食蛙此反食蛇性尤毒殺人其子名蝌蚪山海經曰活師爾雅曰活東又曰懸針俗名水仙子又曰蝦蟆臺綱目曰蝌蚪亦名蛞鬥蝦蟆青蛙之子也初春蛙蟆曳腸於水際草上纏繞如索漸見黑點至春水生鳴以聒之則蝌蚪出謂之聒子故曰蝦蟆聲抱也其子似河豚青黑色古有蝌蚪書其點畫似之故曰蟲書始則有尾無足漸大則足生尾脫古今注曰元魚聞雷則尾脫非也陸佃農書曰二月大盡則先生前足小盡則先生後足觀此知蛙黽之鳴即蛙黽之生也先王之世乃設官以殺之其於不夭夭不殺胎之義謂何哉且也每鳴在分前必復有春寒播種宜遲在分後則寒氣已盡播種宜早鳴聲多而達旦歲必豐少而中宵即止歲必歉今夜不鳴來日必雨久雨忽鳴來日必晴故章孝標詩云田家無五行水旱卜蛙聲範石湖詩曰薄霧哇聲連晚鬧今年田稻十分收是乃天之所以鼓蕩陽氣預報凶豐者也聖人明於物理肯盡族而殲之乎又考工記謂蛙黽之屬以脰鳴亦非也海參此不知海中何蟲俗云蛭非也形相似耳有數種以曝乾色黑堅如木石一枚重半斤以上者為佳名大烏肉厚味美其次則遍身生刺一枚重二三兩者肉不及大烏之厚味則相等名刺參又名鸚哥嘴雖干而不甚堅硬形扁者名草鞋底肉薄無味生北海遼瀋者為上登萊青州者次之其東南閩粵所出下矣性能養血養陰補諸虛百損凡人參沙參丹參元參之類皆補此亦肉食之補者故命以參名也虛勞咯血咳嗽同老鴨煮婦人産後蓐勞同羊肉煮食並飲其汁老人風祕及中風癱瘓肌膚羸瘦筋骨無力同羖豬蹄腳煮食火腿尤佳說鈴曰海參形似男陽可以補腎興陽信如其說當同雞或羊肉或大鮮蝦煮蓋其性雖養陰而不寒冷故輔以陽分之味亦能助陽也又風祕內食海參宜外用導法肥皂莢杵爛塞入肛門燕窩此亦不知何物閩部疏曰是海燕銜膾殘魚所作人欲其來刻桐木作雌雄二燕形投井中則群燕自來作窩一說此燕不至人家作窩於海崖石上大尋得取之又一說雖作窩於海崖卻不黏著石上燕每渡海以此為舟此則孩稚之語海外風濤不知其幾千百里豈此戔戔之物所能渡乎性能補氣凡脾肺虛弱及一切虛在氣分者宜之又能固表表虛漏汗畏風者宜之最佳者每枚可重一兩以上白色如銀瓊州人呼為崖燕力尤大一種色微紅者食品所賤名血燕云能兼補血分有表邪人切忌海䖳嶺録曰閩人曰䖳或作蜇廣人曰水母異苑名石鏡拾遺名樗蒲魚綱目曰形渾然凝結無頭足口眼腹下如懸絮色紅紫群蝦附之咂其涎沫浮泛如飛為潮所擁蝦去而䖳不得歸因割取之故海錯志名蝦肋江賦曰水母目蝦浸以石灰礬水色變白生切和鹽醋食可下酒其厚者名䖳頭色紫不變氣甚腥拾遺曰能治婦人勞損積血帶下醋浸貼湯火傷異苑曰療河魚腹疾其症腹脹如鼓似水腫四肢消瘦不思飲食左傳楚子問於蕭子曰河魚腹疾奈何蓋澤居者坐臥卑濕多食魚蝦症多患此故名按海䖳生於鹹水色又紅紫故專主血分之病又能去濕而解久食魚蝦之積毒誠佳物也但入饌不拘厚薄宜生食治病宜厚者力勝酒煮熟食之天錫詩曰霞衣褪色脂流滑瓊縷烹香酒力醒亦熟食也蜂蜜本經名石蜜又名岩蜜又名石飴以其生於岩石間也拾遺曰博物志云南方諸山幽僻處出蜜蠟在絶巖石壁非攀緣所及于山頂以籃輿懸下取之蜂去有小鳥如雀啄食其餘名靈雀至春蜂歸如舊人占護其處各有主者謂之蜜塞綱目曰陳氏所謂靈雀者每正月則於岩石間尋求安處雀止蜂亦隨而止故呼為蜜母按閩廣天氣不寒故有野蜜他處皆家畜之入藥以野蜜為勝故本草多言石蜜岩蜜入食料則不拘圖經曰近世宣州有黃連蜜色黃味微苦雍洛間有梨花蜜白如凝脂毫州太清宮有檜花蜜色微赤柘城有何首烏蜜色更赤並蜂採花作之蜜性各隨花性之溫涼也愚極謬極蜂無處不到其於諸花無時不採豈有一歲之中專俟某花開放之數日守此一樹採以釀蜜他樹毫無沾惹他時絶不採釀之理乎黃連檜花梨花何首烏者因蜜敗變色變味巧立名色以求售著書立說者亦墮其術中乎諸家論蜜有云色青色緑者有云味酸味蘞者不知蜜以味甘色白或黃赤帶沙者為正不沙者僞也味雜色改者敗也採割之時秋冬為上味既醇正又可久留春夏易敗不堪而食物本草謂冬夏為上誤也一種微苦者石蜜也入藥最佳俗呼廣蜜其餘諸蜜別録云微溫劉完素云蜂寒而蜜溫有謂其性涼者大誤也蓋蜜成於群蜂所釀其勢叢雜有火之象斷無不熱之理而蜂本有毒之物聚衆毒而為蜜尤斷無反涼之理綱目曰生涼熟溫尤為大誤食療曰西蜜涼南蜜熱川蜜溫亦誤也王充論衡曰蜂蠆稟太陽火氣而生故毒在尾蜜為蜂液食多則有毒煉過則無毒矣此見理之言也生蜜之熱猶生酒之酷烈熟蜜之平猶酒之得煮沸而平試觀生蜜食多令人咽間作熱火嗽者或動血或失音或唇舌咽喉作腫熟蜜則無此害可云生涼熟溫乎凡熱在脾肺及中滿並內有蟲之人概不宜食每見世醫治嗽誤於性涼之說用以潤肺反以助火傷肺願切戒之孫思邈曰同生蔥萵苣食令人下利同鮺食令人暴亡其功用有四和中解毒緩急潤燥本經曰安五臟益氣補中止痛解毒和百藥別録曰養脾氣除心煩傷寒論有蜜煎導法治久熱津枯大便祕結産書治産後作渴熱水調熟蜜飲海上方治胎干難産蜂蜜真香油各一碗煎數沸服心鏡治痘痂不落作癢湯調石蜜時時刷之加大黃末更佳又治癮疹瘙癢酒和熟蜜飲觀其所治諸病用雖有四潤燥之力為多也而本經有和百藥三字後世丸藥遂不用之亦誤也蓋本經所謂和者猶甘草之和也若腎虛症中滿及蟲症堵濕熱忌滋潤等症所主之藥皆蜂蜜之仇家敵國豈可一例用之或水丸或米麵糊或蒸餅或阿膠鹿膠等化水均可和丸古丸藥法皆如此其書具在可以檢閲後世拘拘此物小則減藥力大或與病相反令人加病至於炮製諸藥蜜炙者無非取其滋潤肺燥咳嗽之用沙參上氣喘促之用桑皮蜜炙宜也若黃耆則固衛陽實肌表甘草則建中氣助脾元安所取於蜜乎古法皆以水潤透黃耆或以酒潤透炙之於固表托裡之劑為更宜也今則定用蜜炙吾不知始自何人附論於此願舉世醫人三反之其渣滓為蠟本經曰主下利膿血補中續絶傷別録曰療泄澼後重見白膿此症有數年不愈者失調或至於死但煉黃蠟服之病愈為度妙法也藥性本草曰治孕婦胎動下血欲死黃蠟四五錢好酒煎化服立瘥千金方治熱利及産後熱利黃蠟棋子大二塊阿膠二錢當歸二錢黃連三錢黃柏一錢陳廩米半升水三升先煎米至一升入藥再煎溫服熱不甚者黃連酌減華陀治下利食入即吐蜜蠟方寸大一塊雞子黃一個石蜜苦酒發灰黃連末各半雞子殼先煎蜜蠟苦酒雞子令勻乃納連發熬至可丸二日服盡又治肺虛熱咳煩滿乾渴體倦肌瘦發熱減食黃蠟八兩熔作一百二十丸蛤粉四兩為衣試蛤粉味不咸者乃淡水蚌蛤不堪用以牡蠣粉代之胡桃半個細嚼溫水下一丸出普濟方又治肝虛雀目黃蠟不拘多少熔化入蛤粉相和不如石決明每用三四錢以豬肝二兩批開摻藥在內麻線札定煮熟乘熱蒸眼至溫食之飲汁盡日二次病愈為度出集驗方又治臁脛爛瘡楊柳槐椿楝五枝同荊芥煎湯洗試干以黃蠟攤油紙上宜略加陳脂麻油比瘡略寬貼十層每三日一洗除去靠里一層一月全愈出醫林集要按蠟與蜜同出於蜂蜜味至甘蠟味至淡故云淡如嚼蠟而淡者功用反勝於濃奇物也洗冤録曰黃蠟炒雞食令人脹悶三日而食解法用冬葵子一二合研碎煎飲之即下蜂子一名範又作𧍙禮曰範則冠而蟬有緌圖經曰即蜜蜂之子如蠶蛹而色白在蜜脾中蜂之釀蜜有鬣層層比附如牛羊腹內百葉又有孔故曰蜜脾嶺南人油炒食之綱目曰蜂蛹未生翅足時古人以供食禮記有雀鷃蜩範是也按蜂蛹今不聞有食者古人饞口乃至是乎況其性有毒土蜂黃蜂諸蛹古皆食之性尤毒雖本經別録言其功用不足録也蚳醢此蟻卵所作之醬見周禮饋食之豆蜃蚳鹽醢綱目曰蟻亦作蟻又名元駒大者曰蚍蜉亦曰馬蟻赤者名飛者名尉楊子方言曰齊魯謂之蚼蟓梁益謂之元蚼幽燕謂之蛾蛘夏小正十二月元蚼奔蟻喜酣戰故有馬駒之稱有大小黑白黃赤數種穴居卵生其居有等行有隊能知雨候春出冬蟄壅土成坌曰蟻封蟻侄蟻塿蟻冢卵名蚳山人掘之可至鬥石古人食之今惟南夷食之劉恂嶺表録異云交廣溪峒酋長取以為醬云味甚鮮美按天生萬物么麼至蟻極矣乃亦以人之口腹使不得安其生溪峒蠻夷無足深怪不知古昔聖人何以亦出於此耶稱此以求嗜壁蝨嗜瘡痂嗜爪甲嗜糞浸脂麻嗜婦人月水均非異事矣或曰蚳醢不宜食固已然古人既已充饌安必後人之不食其性究竟何如曰天下力大莫過於蟻聚最小者二三十頭不及一分之重而一蟻能舉二三分重之物准此為率人有七尺之軀拔山扛鼎易易耳故習武之人舊有擂赤蟻和酒服之方云使人多力然少年曾服此藥至老死時停尸不得過一日過一日則筋肉腐敗不能治手其毒何如可以例蚳醢矣綱目又曰北史五行志拓拔魏時兗州有赤蟻與黑蟻鬥長六七步闊四寸觀此則離騷所謂南方赤蟻若象元蜂若壺者非寓言也大誤之極夫史所謂長闊者謂其攢聚之多也豈謂一蟻有如許之長闊乎信如此云請問若象之蟻生於何地誰曾見之乎蛇第蛇之類不下百餘種加以各處土産不同一種之中又有多種可食者假其毒以攻毒治大風疥癩中風癱瘓疔瘡惡腫發背癰疽風瘙癮疹驚風搐搦瘰癧漏瘡楊梅結毒痘瘡倒陷半身枯死骨節痹痛不仁筋急屈伸不遂筋軟無力不能履地不能久立皆有奇功蓋蛇與鰻鱓同氣其形長瘦似人身上之筋故能強筋而治筋病與本草藤蔓諸物皆能強筋通脈絡者理同也又善竄善鑽故能攻堅散結治一切癰瘍疔腫皮數脫故能治皮膚瘡疥癮疹不可食者能毒人至死無藥可解且化人血肉為水僅存白骨辨之不可不審也然種類既多萬難盡識如遇惡症不得不用宜博訪本土之人遠方來者其言未可遽信恐土産不同也一家之書不可盡信恐臨時檢閲所見不多難免耳食也第一能辨者弄蛇之丐次則山中慣食蛇肉之人再證以本草醫書然後用之慎無輕率從事也豫生長城市見蛇本少平素咨詢本土可食不可食之蛇略具梗概如左天下之大未知可以相例否一種色蒼身有黑斑腹下白者俗名筍殼斑毒最輕一種色蒼無斑首無冠眉心無王字俗名灰色蛇毒亦輕此二種肉可食又可以攻病一種狀如灰色蛇眉間有王字大者首有冠見人則昂首噴涎人不避則豎立數尺與人相比避之則又逐人其頷怒張闊五七寸夜則嗛火俗名犁頭蛇又名煽頭風毒極重螫人至死食之化人血肉至惡之物也一種色全黑腹下白如銀一種色深黑而暗腹下黃俗皆呼烏蛇此二種大者頭亦有冠螫人至死即不死亦百藥不能治潰爛終身蛇類黑色者毒必重而烏梢蛇能治病乃另是一種奇物詳見後慎勿以他黑色者例之凡色黑即萬不可食也一種小如指長僅數寸色蒼麻俗名麻七寸又名爛肚蛇因其腹下常有血如爛瘡極喜螫人幸猶易治然不可食能殺人一種紅黑節節相間即本草之赤蛇一種黃黑節節相間即本草之黃頷蛇俗皆名竹節蛇綱目言二蛇最為不毒肘後千金外臺梅師諸方皆用為藥且用其所吞蛙鼠甚不可信食其肉皆殺人螫人亦死一種青黑節節相間即肘後之竹節蛇一種色全青即肘後之青蝰蛇一種色青近尾三四寸有紅黑點即綱目之熇尾蛇此三種極毒螫人立死若螫手足指勿俟其腫急斷去之不可斷剮去其肉可以保命否則不能解救一種青黑相雜不分竹節名菜花蛇毒亦重不可食古方亦用之切不可信凡此皆衆說相同其言的的不謬至若醫書本草雖不能盡無訛誤而合理可從者亦不少是皆古人嘉惠後人之盛心也備列於編俾資考訂焉白花蛇出蘄州故名蘄蛇衍義曰諸蛇鼻皆向上此獨向下故呼蹇鼻蛇綱目曰花蛇湖蜀皆有黔中亦多蘄州者絶佳然不多産市肆所售官司所取皆自江南興國州來其狀龍頭虎尾黑質白花脅有二十四方勝復有念珠斑口有四長牙尾上有佛指甲長一二分腸形如連珠取得劙去腸洗淨盤定札縛炕干可以致遠若欲久留以瓷罐盛泥頭勿露風如藏燒酒法可數年不壞雖枯眼光不陷故爾雅翼云蛇死目皆閉惟蘄蛇目開舒蘄兩界者則一開一閉螫人甚毒入藥供食大能治病圖經云頭尾各一尺有大毒宜去之其搜風攻毒活絡舒筋較諸蛇為勝入人屋中作爛瓜氣性善螫人而毒重若用新鮮者以磚燒紅置蛇於上好醋沃之盆覆一夜如此三次去骨芼以五味食之較乾枯者力尤勝聖濟總録曰乾花蛇春秋酒浸三宿夏一宿冬五宿炭火焙乾用此不必拘以潤透為限焙宜極熟不可帶生烏梢蛇一名黑花蛇開寶本草曰出商洛山谷背有三稜色黑如漆性善不噬物圖經曰蘄黃諸州亦有乾寧記曰此蛇不食生命身黑而光頭圓尾尖眼有赤光至死不陷重七錢至一兩者為上十兩至一鎰次之粗大者力彌減也衍義曰劍脊烏梢蛇能穿小錢一百文者佳亦有長丈餘者綱目曰有二種一種劍脊細尾者為上一種長大無劍脊尾粗者名風梢蛇亦可治病而力不及按黑色蛇除此二種外均殺人慎不可食此二種既云性善毒宜較輕何以劉純治例及乾坤祕韞皆用其肉餵雞然後食雞治病考方書用此法蓋因物性極毒不敢經食其肉不得已輾轉迂回而出於此乃不施於性惡之蛇而施於此或者以其不噬人不食生命為善而毒亦無異他烏蛇之甚乎用宜審慎也又俗傳烏蛇行過之路草俱變黑者乃為至寶幻談也金蛇圖經曰出賓州澄州大如中指長尺許身作金色有白光者名銀蛇俱能解毒近信州上饒縣出一種金星地鱔酷似此蛇亦能解毒綱目曰嶺表録異云金蛇一名地鱔白者名錫蛇黔州者佳桂州次之大如拇指長尺許能解衆毒除邪熱據此則地鱔即金蛇非二物矣拾遺曰嶺南多毒解毒之藥金蛇白藥是也元儒劉因之産蓋本諸此水蛇一名公蠣蛇綱目曰在在水中有之大如鱔黃黑色有纈紋齧人不甚毒陶隱居言能化鱧者此也水中又有一種泥蛇黑色成群齧人甚毒劉松篁經驗方用治天蛇毒天蛇見後水蛇皮去頭尾用中段包手指自能束緊外以紙護之即愈愈後解視皮肉宛然有一小蛇頭目俱全按此種古人治病但用其皮聖惠方治消渴亦只用皮方不甚佳不録想其肉不可食矣黃喉蛇即黃頷蛇赤楝蛇即赤蛇又名桑根蛇俱已見前皆大毒殺人而諸家方中用之已屬非是且用自死者其好奇無理尤為可笑千金方乃至用自死黃頷赤燒焦為末治瘋犬咬傷此乃必死惡症救宜極早庶可回生乃欲尋自死蛇知在何年何地乎古人有如此奇方後人不知駁正反筆載之更奇而又奇也況自死禽獸猶且害人蛇本毒物加以自死其毒何知可釀酒可入丸散乎醫書每用自死龜板似亦非理至於救瘋犬傷不拘何蛇可食者食之以頭尾燒焦為末塗患處毒蛇不可食者外用塗之皆可蝮蛇又名反鼻陶隱居曰蝮蛇黃黑色如土白斑黃頷尖口蛇類甚衆獨此與及青蛙三種為最惡被螫者不即療多死即療亦難必生唐本草曰蝮蛇作地色鼻反口長身短頭尾相似山南漢沔多有一名虺非二種也綱目曰蝮與陶氏言二種蘇氏言一種按爾雅云蝮身博三寸首大如擘是以為一種郭注云此自一種名為蝮細頸大頭色如綬文文間有毛如豬鬣大者長七八尺一名反鼻鼻上有針顏師古曰蝮長大短小自不難辨是又以為二種考爾雅郭注曰蝮屬最有毒恐此等惡蛇不惟不止一種並不止二種也拾遺曰諸蛇卵生此獨胎生其毒著手斷手著足斷足或令人全身糜爛或吐涎於草上著人成瘡身腫潰爛極難治療名蛇漠瘡當作沫治法與蛇螫同抱朴子曰被蝮齧者即時以刀割去瘡肉投地沸如火炙須臾焦盡人乃得活王充論衡曰蝮蛇稟太陽火氣而生其毒最烈按蝮之毒如此而別録拾遺藥性本草並用以釀酒治大風癘疾五痔腸風惡瘡頑痹半枯死等病恐其難信綱目曰癘疾感天氣肅殺之氣而成惡疾也蝮蛇稟陰陽毒烈之氣而生惡物也非惡物不能攻惡疾語雖有理終不宜輕用故不敢列其方必不得已而用非訪來閲歷之人不可又有一種千歲蝮生東間湖蜀黔中皆有非獨東間也狀如蝮而短居樹上有四腳能跳來齧人齧已還樹作聲曰斫木斫木者不可救也若云博叔博叔者尚可治之用細辛雄黃等分為末急敷之日三四易緩則不救洗冤録曰被蝮齧死急以白芷一味為末麥門冬湯下即活綱目曰字林云一種名聽形如蜥蜴出魏興其齧人已還樹垂頭聽聞器聲乃去其狀頭尾一般大如搗衣杵長一二尺名合木蛇談野翁方名斫木蛇又名望板歸救之用嫩黃荊葉搗爛敷傷處又有一種怪蛇居木杪人行其下則從高墮地碎為數片人不顧而去則免若以手拾其一片則數片立時合為一蛇齧人立死其速無比此亦山行者所宜知也兩頭蛇爾雅曰中央有枳首蛇中國之異氣也注枳兩也綱目曰郭注云江東人呼越王約發亦名弩弦博物志云鱉食牛血所化然自有種類非盡化生也嶺表録異云嶺外極多長尺余大如小指背有綿文腹下鮮紅人習見不以為異爾雅翼云寧國甚多數十同穴黑鱗白章又一種大如蚯蚓有鱗其尾如首張耒雜志云黃州者大如蚯蚓云是老蚓所化行甚鈍不類蛇南越志云無毒夷人食之按兩頭蛇何等戾氣古云見之者死故孫叔敖殺而埋之可食乎適成其為夷人也天蛇綱目曰夢溪筆談云天蛇生幽暗之地雨後則出越人深畏之大如箸而扁長三四尺色黃赤澆以醋則消石灰摻之亦死人被其螫一為露水所濡則遍身潰爛廣西一吏患此醫以藥敷之鉗出十餘蛇而疾終不起又錢塘一田夫病癩通身潰爛西溪寺僧視之曰此天蛇毒非癩也以秦皮煮汁一斗令其恣飲初日減半三日全愈按天蛇毒外治何不即用醋及石灰宜必有效豫每思天蛇螫者瘡中有蛇與犬傷者腹中生狗其理無異但天蛇毒服秦皮可不出蛇而安不則出十餘蛇而亦死未知可以相例否犬傷亦有小便內出十餘狗而不得生者藍蛇拾遺曰生蒼梧諸縣狀如蝮腰有約文從約截斷用前頭為藥可毒人至死以後尾作餔食即解奇物也故嶺南人呼為藍藥蚺蛇生交廣山中故名南蛇行不舉首故又名埋頭蛇酉陽雜俎曰長十丈能吞鹿鹿消盡乃繞樹而使腹中之骨穿鱗而出養瘡時甚肥美綱目曰録異記云大者長五六丈圍四五尺身有斑紋如故綿纈在山中俟鹿吞之蛇遂羸瘦鹿消乃肥壯海槎録云蚺蛇吞鹿及山馬從後腳入毒氣呵及角自解脫王濟手記云廣州山中出蚺蛇大者長十餘丈食獐鹿骨角俱糜化人采葛塞穴口蛇嗅之即靡乃發穴取之範石湖虞衡志云塞兵捕蚺蛇滿頭插花蛇即注視不動乃逼而斷其首山海經云巴蛇吞象三年而出其骨君子服之無心腹之疾郭注云今蚺蛇即其類也按說鈴曰蚺蛇性好淫猺婦懷利刃入山蛇即繞而淫之其交以尾交時昏然如醉因斷其首見人頭插花雜以為婦人即注視不動投以婦人中衣即以首入其中嗅之皆可就而取之其肉極肥美有小毒然食之可闢瘟疫瘴癘出食療本草藥性本草除手足痛風殺三蟲去死肌治皮膚風毒厲風疥癬惡瘡出綱目又治狂犬毒多食蚺蛇肉即解無則以干脯為末水服五分日三服似太少宜每服五錢無蚺他蛇亦可出外臺祕要故柳子厚捕蛇者說曰永州之野産異蛇黑質白章出草木盡死他家說蚺蛇並無此語然得而臘之以為餌可已大風攣踠其膽上旬近頭中旬近心下旬近尾諸本草並云亦能治風又點目腫翳障及小兒疳痢牙疳皆不言其活血惟拾遺云破血止血利殺蟲蠱此膽取下時其跳擲可至尋丈歷數刻之久漸跳漸低乃取而懸之未乾時嚮明照看其中汁上下奔走若飛蓋其性善動不停故能治血凝氣滯金瘡杖瘡跌撲悶絶者酒和服立醒明楊中愍公直言受杖其戚好贈以蚺蛇膽公笑曰椒山自有膽也圖經曰雷州蛇戶五月五日舁蛇入官取膽取訖縫創口放之他日捕之蛇遠遠露腹以示無膽取後可活三年綱目曰無論破腹取膽萬無再活之理即有之南人嗜蛇搜取無不至肯容蚺之再活露腹乎蚺好淫之物其油反能萎陽庭聞述略曰明武宗宿豹房劉瑾以蚺蛇油萎其陽遂不入內宮而出遊宣府此物理之難究者蚺蛇無鱗一種有鱗者巨蟒也長丈餘方輿勝覽曰鱗蛇出安南雲南鎮康臨安沅江孟養諸處有黃黑二色又有四足能食麋鹿春冬居出夏秋居水有毒傷人土人亦食其肉取膽治病按蚺蛇雖有毒不重且能治多病此蛇既毒重傷人又有鱗有足與蚺絶不相侔不宜輕食附蛇蛻本經名龍衣又名弓衣別録名蛇符吳普本草名蛇筋圖經曰蛇觸不潔即蛻太飽亦蛻八九月將蟄亦蛻陶隱居曰蛇形短其蛻少見草中惟有長者多是黃頷赤輩不能辨別但取完全者用之雷斆曰凡使勿用青黃蒼色以白如銀者為佳綱目曰入藥有四義一辟惡取其變化性靈也故治邪辟鬼魅癲狂蠱瘧諸疾二去風取其屬巽又善竄也故治驚癜駁喉舌諸疾三殺蟲故治惡瘡痔漏癬疥諸疾四有脫義故治胎産皮膚諸疾外此者蛇善搖頭弄舌故治小兒瘛瘲搖頭弄舌蛇蛻連目俱蛻故治目中翳障蛇為北方元武星象故治腎風腎火耳中大痛如有蟲行或流血或干痛醫方摘要用蛇蛻全者燒存性研末吹之又千金方治小兒口緊不乳及重舌木舌蛇蛻全者煅存性研末敷並乳調敷少許又聖濟總録治石癰無膿堅硬如石醋浸蛇蛻貼之又治婦人難産以全蛻絹袋盛繞腰繫之臨産煎湯頻浴産門又燒灰東向酒服方寸匕出元和紀用經方又久瘧連年用蛇蛻全者取頭塞左耳尾塞右耳身佩懷中出必效方本草綱目蛇蛻曰蛇字古作它俗作蛇此亦古字有餘移他三音嶺南人長食呼為茅鱔山海經云海外西南人呼蟲為蛇以蛇為魚蛇在禽為翼火在卦為巽風在神為元武在物為毒蟲有水火草木土五種出北戶録青黃赤白黑金翠斑藍諸色毒蟲也而有無毒者金蛇水蛇鱗蟲也而有生毛者蝮蛇見前又山海經云長蛇毛如彘卵生也而有胎生者蝮蛇腹行也而有四足者鱗蛇千歲蝮並見前又有冠者如雞冠黑色不拘何種有冠者即能殺人慎不可食角者一種名三角蛇有角一種名骨咄犀又曰骨篤犀唐書載古都國産此則骨咄骨篤及古都之訛也輟耕録曰骨咄犀大蛇之角也能解蠱毒如犀角故名松漠紀聞曰骨咄犀文如象牙帶黃色無價之寶也明會典曰蛇角出哈密衛西域記曰骨篤犀出西番曹昭格古論曰骨篤犀色如碧玉微黃扣之聲亦如玉嗅之有香燒之不臭最貴重能消腫解毒按此另是一種異蛇非諸蛇大者皆有角也其蛇大如蚺數十步觸其毒氣立死西人設弩取之不拘癰疽惡毒以角一片安患處即牢不可脫少頃毒為所吸角熱如火毒盡角自落即愈以角浸冷水中去其毒可以復用真無價之寶也見說鈴翼者西山經云大華山有蛇六足四翼名肥蚣飛者海內南經曰柴桑多飛蛇獸首者大荒西經曰出肅慎國名琴蛇人面者江湖紀聞曰出嶺表能呼人姓名害人惟畏蜈蚣兩首者見前兩身者北山經曰渾渾之山有蛇曰肥螿一首兩身見則大汗管子曰涸水之精名曰蟡狀如蛇一首兩身歧尾者廣志曰出雲南鉤尾者張文仲曰能鉤人獸入水食之熇尾者見前柂形者張文仲曰齧人必死杵形者即合木蛇見前又有青蝰白蝰蒼文蝮白頸黑甲赤目黃口張文仲曰此皆蛇之至毒者又南方有蚼蛇人若傷之不死終身俟其主雖百從人中能取之必避百里外乃免其舌雙物理論曰舌者心苗心火旺於巳故蛇舌雙按此解矇混是為不知物理蓋造物賦形只有四象曰圓曰扁曰尖曰長任奇形怪狀萬變不同總不出乎四者之外圓象金扁象水尖象火長象木火善上水善下金善合木善分蛇身長木也木在天為風故中蛇毒為風毒木在體為筋在竅為目故被螫者其腫痛不漫延肌肉隨筋而行若不急加札縛縱傷在足趾頃刻過膝頃刻上股入腹傷肝則死初螫時腫痛未形目即茫無所見視一物皆有數形一人皆有數體甚者一物為十餘物一人為十餘人木之分舌之所以雙也試觀木由一木而干由干而枝枝復有孫枝孫枝又有無數小枝大樹一章其分也不可以計故治蛇傷雄黃羖羊角白芷蒼耳荊芥穿山甲蜈蚣均治風之藥而用蛇治病亦能主大風癘疾中風風痹半身枯死者以風治風同氣相求也然則其舌雙者分之象也猥云巳火火何以必雙乎知此而蛇之所以毒與解蛇毒皆得其理乎其耳聾埤雅曰蛇聾虎齆其聽以目出埤雅其蟠向壬出淮南子其毒在涎弄舌者對其口唾之則以後永不噬人或云洗去其涎或云去其齒皆謬也其珠在口埤雅曰龍珠在頷蛇珠在口懷珠蛇必喜投暗見人張口吐氣如燼其行也紆草行則徑直如天亦不盡紆其食也吞有齒無牙皮數解脫變化論曰龍易骨蛇易皮性曉方藥出異苑蛇交則雄入雌腹非也其交雌先豎立雄昂首向上就之相扭結如繩狀可立人行十步之久倒地復如之至三四次則雄尾入雌尾內數寸段成式曰人見蛇交三年死李鵬飛曰主有喜慶交雉則生蟂生蜃又以龜鱉為雌與鱔鱧能氣入水交石斑魚入山與孔雀匹禽經曰鵲見蛇則噪而奔孔見蛇則喜而躍竹化蛇見異苑蛇化雉見雉條夔憐蛇蛇憐風出莊子水蛇化鱔能通身浮水面慎不可食螣蛇化龍騰蛇聽孕出變化論抱朴子亦曰螣蛇不交元蛇吞麈巴蛇吞象鴆步則蛇出出禽經鴆能禹步禁咒使大石自轉取蛇食之鳴則蛇結伯勞也顴鶴鷹鶻鶖鳥之食蛇者也虎猴麂麝牛獸之食蛇者也內解蛇毒之藥則雄黃蜈蚣穿山甲貝母大蒜薤白蒼耳蒲公英尤莫如白芷荊芥或煎酒或為末毒重者不住服之免使入腹如潰爛日久藥中無白芷萬不能愈外敷蛇毒之藥則人津唾齒垽韭汁細辛薑黃豆葉苧葉酒煎汁服渣敷患處黃荊葉慈姑葉雄黃蜈蚣燒研末塗蝦蟆搗爛敷是也亦不可離白芷荊芥近有一藥螫時冷水洗淨鉗去蛇齒以煙筒內油煙屎擦之擦久又洗洗淨又擦最佳若有親人尤不如令其口噙釅燒酒吮之吮數口吐去勿使一滴入喉又噙又吮以痛減為度得多人更換吮咂尤妙肘後方云用雞卵輕敲一小孔合瘡口甚佳又蚤休一名紫河車俗名七葉一枝花生深山不聞金鼓聲者醋磨頻搽亦外解蛇毒聖藥但極難得人家栽蒔者不甚效也有歌云七葉一枝花深山是我家有人尋得見那伯斗大蛇肘後方云被毒蛇螫急掘地作坑埋傷處緊築其土毒即入土中良久痛減乃出蛇瘡未愈禁熱食食之即發又被蛇螫不可渡水渡水則痛加甚若乘船渡可殺人以上雜蟲類按龜蛇上應北方星象且能變化是靈物也無故誠不宜輕殺然龜不為人害蛇中有干歲蝮居樹間無因肆毒必聽哭聲乃始快意人面妖蛇呼人姓名致人於死世間惡物至於此極其害較諸魑魅魍魎奚啻十倍不知大禹鑄鼎以闢神奸亦曾及此物否又有蚼蛇偶被人傷雖百里猶尋主者是知有冤仇報復也人靈於物且貴於物者也獨不知冤仇報復那鄙性不喜殺生每以此物雖死不蔽其辜見輒殺之自以為非過舉也近聞良友之規曰蛇之能起惡疾子所知也齧人者以人逐之急或誤踐之齧以求脫非害人也徒以人面蜊之數種遷怒於多蛇何度量之不廣也且子言鼎象抑亦聞神禹之碑乎昔者禹跡遍於九州見蛇為人害立碑西土以制其毒迄今碑所烈焰熾騰之夕詰旦視之其前後數百步積蛇骨尺有咫此其妙用較九金鑄醜為尤巨也然四千餘歲矣蝮未絶於天下子欲使舉世盡無蛇患不知天生千百如子者能殺盡天下之蛇否豫聞之汗赧因思理有偏全又有精細不學面牆之人見其偏未見其全自以為有見知其粗不知其精自以為能知如豫者適成其識趣之卑且陋也附此以識愧解魚蟲諸毒並辨毒法散見各條
